<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Admin PRO</title>

<style>
body{
  background:#0d0d0d;
  color:white;
  font-family:Cairo;
  text-align:center;
  padding:20px;
}

input,button{
  padding:10px;
  margin:6px;
  border-radius:10px;
  border:none;
}

button{
  background:gold;
  color:black;
  font-weight:bold;
  cursor:pointer;
}

.card{
  background:#1a1a1a;
  padding:12px;
  margin:10px auto;
  border-radius:12px;
  max-width:420px;
  text-align:right;
}

.slider{
  position:relative;
  width:100%;
  height:220px;
  overflow:hidden;
  border-radius:10px;
  background:#222;
}

.slides{
  display:flex;
  transition:transform 0.4s ease;
}

.slides img{
  width:100%;
  height:220px;
  object-fit:cover;
  flex-shrink:0;
}

.navBtn{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background:rgba(0,0,0,0.6);
  color:white;
  border:none;
  width:35px;
  height:35px;
  border-radius:50%;
}

.prev{left:5px;}
.next{right:5px;}

.smallBtn{
  background:#333;
  color:white;
  font-size:12px;
  padding:5px;
  margin-top:5px;
}

.section{display:none;}
.active{display:block;}

</style>
</head>

<body>

<h2>🔥 Admin PRO</h2>

<div id="panel">

<input type="text" id="name" placeholder="اسم المنتج">
<input type="number" id="price" placeholder="السعر">
<input type="file" id="images" multiple>
<button id="addBtn">إضافة منتج</button>

<h3>المنتجات</h3>
<div id="list"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getFirestore,
collection,
addDoc,
getDocs,
updateDoc,
doc,
deleteDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyCG6Yc0iH-rt-PaiRqL_V9Re1z49ZF3OMM",
authDomain: "zahraa-store-f4c90.firebaseapp.com",
projectId: "zahraa-store-f4c90"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* رفع صورة */
async function uploadImage(file){
const form = new FormData();
form.append("file", file);
form.append("upload_preset", "zahraa_upload");

const res = await fetch(
"https://api.cloudinary.com/v1_1/dxlxwe55b/image/upload",
{ method:"POST", body:form }
);

const data = await res.json();
return data.secure_url;
}

/* إضافة منتج */
document.getElementById("addBtn").onclick = async ()=>{

const name = document.getElementById("name").value;
const price = document.getElementById("price").value;
const files = document.getElementById("images").files;

let images=[];

for(let i=0;i<files.length;i++){
images.push(await uploadImage(files[i]));
}

await addDoc(collection(db,"products"),{
name,
price:Number(price),
images,
index:0
});

load();
};

/* تحميل المنتجات */
async function load(){
const list=document.getElementById("list");
list.innerHTML="";

const snap=await getDocs(collection(db,"products"));

snap.forEach(d=>{
const p=d.data();

let imgs = Array.isArray(p.images)?p.images:[];

list.innerHTML+=`
<div class="card">

<div class="slider" id="slider-${d.id}">
  <div class="slides">
    ${imgs.map(img=>`
      <div style="position:relative;width:100%;">
        <img src="${img}">
        <button class="smallBtn" onclick="removeImg('${d.id}','${img}')">🗑 حذف</button>
      </div>
    `).join("")}
  </div>

  ${imgs.length>1?`
  <button class="navBtn prev" onclick="move('${d.id}',-1)">‹</button>
  <button class="navBtn next" onclick="move('${d.id}',1)">›</button>
  `:""}
</div>

<input id="n-${d.id}" value="${p.name}">
<input id="p-${d.id}" value="${p.price}">

<input type="file" id="add-${d.id}">
<button onclick="addImg('${d.id}')">➕ إضافة صورة</button>

<button onclick="update('${d.id}')">تعديل</button>
<button onclick="del('${d.id}')">حذف المنتج</button>

</div>
`;
});
}

/* سلايدر */
let indexMap={};

window.move=(id,dir)=>{
const slider=document.querySelector(`#slider-${id} .slides`);
const imgs=slider.querySelectorAll("img");

if(!indexMap[id]) indexMap[id]=0;

indexMap[id]+=dir;

if(indexMap[id]<0) indexMap[id]=imgs.length-1;
if(indexMap[id]>=imgs.length) indexMap[id]=0;

slider.style.transform=`translateX(-${indexMap[id]*100}%)`;
};

/* حذف صورة */
window.removeImg=async(id,img)=>{

const snap=await getDocs(collection(db,"products"));

snap.forEach(async d=>{
if(d.id===id){
let data=d.data();

let newImgs=data.images.filter(i=>i!==img);

await updateDoc(doc(db,"products",id),{
images:newImgs
});

load();
}
});
};

/* إضافة صورة */
window.addImg=async(id)=>{

const file=document.getElementById("add-"+id).files[0];
if(!file) return;

const url=await uploadImage(file);

const snap=await getDocs(collection(db,"products"));

snap.forEach(async d=>{
if(d.id===id){
let data=d.data();

let newImgs=[...data.images,url];

await updateDoc(doc(db,"products",id),{
images:newImgs
});

load();
}
});
};

/* تعديل */
window.update=async(id)=>{
const name=document.getElementById("n-"+id).value;
const price=document.getElementById("p-"+id).value;

await updateDoc(doc(db,"products",id),{
name,
price:Number(price)
});

load();
};

/* حذف منتج */
window.del=async(id)=>{
await deleteDoc(doc(db,"products",id));
load();
};

load();

</script>

</body>
</html>
