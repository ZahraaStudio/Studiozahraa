<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getAuth,
onAuthStateChanged,
signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc,
updateDoc,
onSnapshot,
query,
orderBy
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* FIREBASE */
const firebaseConfig = {
apiKey: "AIzaSyCG6Yc0iH-rt-PaiRqL_V9Re1z49ZF3OMM",
authDomain: "zahraa-store-f4c90.firebaseapp.com",
projectId: "zahraa-store-f4c90"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* LOGIN */
document.getElementById("loginBtn").onclick = async ()=>{
const email = document.getElementById("email").value;
const pass = document.getElementById("pass").value;
await signInWithEmailAndPassword(auth, email, pass);
};

/* PANEL */
onAuthStateChanged(auth,(user)=>{
if(user){
document.getElementById("loginBox").style.display="none";
document.getElementById("panel").style.display="block";
load();
loadOrders();
}
});

/* TAB */
window.showTab = (tab)=>{
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(tab).classList.add("active");
};

/* 🔥 رفع الصور الحقيقي */
async function uploadImage(file){
const form = new FormData();
form.append("file", file);
form.append("upload_preset", "zahraa_upload");

const res = await fetch(
"https://api.cloudinary.com/v1_1/dxlxwe55b/image/upload",
{ method:"POST", body:form }
);

const data = await res.json();
return data.secure_url;
}

/* 🔥 إضافة منتج + صور */
document.getElementById("addBtn").onclick = async ()=>{

const name = document.getElementById("name").value;
const price = document.getElementById("price").value;
const files = document.getElementById("images").files;

if(!name || !price){
alert("اكتب اسم وسعر المنتج");
return;
}

let images = [];

for(let i=0;i<files.length;i++){
const url = await uploadImage(files[i]);
images.push(url);
}

await addDoc(collection(db,"products"),{
name:name,
price:Number(price),
images:images,
createdAt:Date.now()
});

document.getElementById("name").value="";
document.getElementById("price").value="";
document.getElementById("images").value="";

load();
};

/* PRODUCTS */
async function load(){
const list = document.getElementById("list");
list.innerHTML="";

const snap = await getDocs(collection(db,"products"));

snap.forEach(d=>{
const p = d.data();

/* سلايدر بسيط */
let imgs = "";

if(Array.isArray(p.images) && p.images.length>0){
imgs = p.images.map(img=>`<img src="${img}">`).join("");
}

list.innerHTML += `
<div class="card">
<input id="n-${d.id}" value="${p.name}">
<input id="p-${d.id}" value="${p.price}">
<div>${imgs}</div>

<button onclick="edit('${d.id}')">تعديل</button>
<button onclick="del('${d.id}')">حذف</button>
</div>
`;
});
}

window.del = async (id)=>{
await deleteDoc(doc(db,"products",id));
load();
};

window.edit = async (id)=>{
const name = document.getElementById("n-"+id).value;
const price = document.getElementById("p-"+id).value;
await updateDoc(doc(db,"products",id),{name,price});
load();
};

/* DASHBOARD FIX */
function updateDashboard(orders){

let totalOrders = orders.length;
let revenue = 0;
let pending = 0;

orders.forEach(o=>{

let cart = Array.isArray(o.cart) ? o.cart : [];

let total = cart.reduce((s,i)=>s + (Number(i.price)||0),0);

revenue += total;

if(o.status==="pending") pending++;

});

document.getElementById("totalOrders").innerText = totalOrders;
document.getElementById("totalRevenue").innerText = revenue;
document.getElementById("pendingOrders").innerText = pending;
}

/* ORDERS FIX */
function loadOrders(){

const box = document.getElementById("ordersList");

const q = query(collection(db,"orders"), orderBy("createdAt","desc"));

onSnapshot(q,(snap)=>{

box.innerHTML="";
let orders=[];

snap.forEach(d=>{

const o = d.data();

let cart = Array.isArray(o.cart) ? o.cart : [];

let total = cart.reduce((s,i)=>s + (Number(i.price)||0),0);

orders.push(o);

let status = o.status || "pending";

box.innerHTML+=`
<div class="card">

<h3>🆔 ${o.orderId || d.id}</h3>

<p>${o.name || ""}</p>
<p>📞 ${o.phone || ""}</p>
<p>📍 ${o.address || ""}</p>

<p>🛒 ${cart.length} منتجات</p>

<p>💰 ${total} جنيه</p>

<p>📦 ${status}</p>

<select onchange="updateStatus('${d.id}',this.value)">
<option value="pending" ${status==="pending"?"selected":""}>pending</option>
<option value="processing">processing</option>
<option value="shipped">shipped</option>
<option value="delivered">delivered</option>
<option value="canceled">canceled</option>
</select>

</div>
`;
});

updateDashboard(orders);

});

}

window.updateStatus = async (id,status)=>{
await updateDoc(doc(db,"orders",id),{status});
};

</script>
