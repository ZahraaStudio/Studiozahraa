<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Admin</title>

<style>
body{background:#0d0d0d;color:white;font-family:Cairo;text-align:center;padding:20px}
input,button{padding:10px;margin:8px;border-radius:10px;border:none}
button{background:gold;color:black;font-weight:bold;cursor:pointer}
.card{background:#1a1a1a;padding:10px;margin:10px auto;border-radius:12px;max-width:350px}
img{width:100%;border-radius:10px}
</style>
</head>

<body>

<h2>🔥 الأدمن</h2>

<input type="password" id="pass" placeholder="password">
<button id="loginBtn">دخول</button>

<div id="panel" style="display:none">

<input type="text" id="name" placeholder="اسم المنتج"><br>
<input type="file" id="images" multiple><br>

<button id="addBtn">إضافة منتج</button>

<h3>المنتجات</h3>
<div id="list"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc,
updateDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyCG6Yc0iH-rt-PaiRqL_V9Re1z49ZF3OMM",
authDomain: "zahraa-store-f4c90.firebaseapp.com",
projectId: "zahraa-store-f4c90"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const PASSWORD = "zahraa2025";

/* LOGIN */
document.getElementById("loginBtn").addEventListener("click", () => {
  const v = document.getElementById("pass").value;

  if (v.trim() === PASSWORD) {
    document.getElementById("panel").style.display = "block";
    load();
  } else {
    alert("غلط");
  }
});

/* IMAGE */
function toBase64(file){
  return new Promise(res=>{
    const r = new FileReader();
    r.onload = e => res(e.target.result);
    r.readAsDataURL(file);
  });
}

/* ADD */
document.getElementById("addBtn").addEventListener("click", async ()=>{

  const name = document.getElementById("name").value;
  const files = document.getElementById("images").files;

  if(!name || files.length === 0){
    alert("املأ البيانات");
    return;
  }

  let images = [];

  for(let f of files){
    if(f.type.startsWith("image/")){
      images.push(await toBase64(f));
    }
  }

  await addDoc(collection(db,"products"),{
    name,
    images,
    createdAt: Date.now()
  });

  document.getElementById("name").value = "";
  document.getElementById("images").value = "";

  load();
});

/* LOAD */
async function load(){

  const list = document.getElementById("list");
  list.innerHTML = "";

  const snap = await getDocs(collection(db,"products"));

  snap.forEach(d=>{

    const p = d.data();

    list.innerHTML += `
      <div class="card">
        <input id="n-${d.id}" value="${p.name}">
        <img src="${p.images?.[0] || ''}">

        <button onclick="edit('${d.id}')">تعديل</button>
        <button onclick="del('${d.id}')">حذف</button>
      </div>
    `;
  });
}

/* DELETE */
window.del = async (id)=>{
  await deleteDoc(doc(db,"products",id));
  load();
}

/* EDIT */
window.edit = async (id)=>{
  const newName = document.getElementById("n-"+id).value;

  await updateDoc(doc(db,"products",id),{
    name:newName
  });

  load();
}

</script>

</body>
</html>
