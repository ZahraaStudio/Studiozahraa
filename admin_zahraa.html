<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Admin PRO</title>

<style>
body{
  background:#0d0d0d;
  color:white;
  font-family:Cairo;
  text-align:center;
  padding:20px;
}

input,button{
  padding:10px;
  margin:8px;
  border-radius:10px;
  border:none;
}

button{
  background:gold;
  color:black;
  font-weight:bold;
  cursor:pointer;
}

.card{
  background:#1a1a1a;
  padding:12px;
  margin:10px auto;
  border-radius:12px;
  max-width:400px;
  text-align:right;
}

img{
  width:100%;
  height:220px;
  object-fit:cover;
  border-radius:10px;
}

.slider{
  position:relative;
  width:100%;
  height:220px;
  overflow:hidden;
  border-radius:10px;
  margin-bottom:10px;
  background:#222;
}

.slides{
  display:flex;
  transition:transform 0.4s ease;
}

.slides img{
  width:100%;
  height:220px;
  object-fit:cover;
  flex-shrink:0;
}

.navBtn{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background:rgba(0,0,0,0.5);
  color:#fff;
  border:none;
  width:35px;
  height:35px;
  border-radius:50%;
  cursor:pointer;
}

.prev{left:5px;}
.next{right:5px;}

.menu{
  display:flex;
  gap:10px;
  justify-content:center;
  margin:15px 0;
}

.menu button{flex:1}

.section{display:none;}
.active{display:block;}

#dashboard{
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:15px;
}

.box{
  background:#111;
  padding:10px;
  border-radius:10px;
  min-width:120px;
  border:1px solid #333;
}

#toast{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:gold;
  color:black;
  padding:10px 20px;
  border-radius:20px;
  display:none;
  font-weight:bold;
}
</style>
</head>

<body>

<h2>🔥 Admin PRO</h2>

<div id="loginBox">
<input type="email" id="email" placeholder="email"><br>
<input type="password" id="pass" placeholder="password"><br>
<button id="loginBtn">دخول</button>
</div>

<div id="panel" style="display:none">

<div class="menu">
  <button onclick="showTab('products')">🛒 المنتجات</button>
  <button onclick="showTab('orders')">📦 الطلبات</button>
</div>

<div id="dashboard">
  <div class="box">📦 <span id="totalOrders">0</span></div>
  <div class="box">💰 <span id="totalRevenue">0</span></div>
  <div class="box">⏳ <span id="pendingOrders">0</span></div>
</div>

<div id="products" class="section active">

<input type="text" id="name" placeholder="اسم المنتج"><br>
<input type="number" id="price" placeholder="سعر المنتج"><br>
<input type="file" id="images" multiple><br>

<button id="addBtn">إضافة منتج</button>

<h3>المنتجات</h3>
<div id="list"></div>

</div>

<div id="orders" class="section">
<h3>📦 الطلبات</h3>
<div id="ordersList"></div>
</div>

</div>

<div id="toast">🛒 طلب جديد وصل!</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getAuth,
onAuthStateChanged,
signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc,
updateDoc,
onSnapshot,
query,
orderBy
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* FIREBASE */
const firebaseConfig = {
apiKey: "AIzaSyCG6Yc0iH-rt-PaiRqL_V9Re1z49ZF3OMM",
authDomain: "zahraa-store-f4c90.firebaseapp.com",
projectId: "zahraa-store-f4c90"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* LOGIN */
document.getElementById("loginBtn").onclick = async ()=>{
const email = document.getElementById("email").value;
const pass = document.getElementById("pass").value;
await signInWithEmailAndPassword(auth, email, pass);
};

onAuthStateChanged(auth,(user)=>{
if(user){
document.getElementById("loginBox").style.display="none";
document.getElementById("panel").style.display="block";
load();
loadOrders();
}
});

/* TAB */
window.showTab = (tab)=>{
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(tab).classList.add("active");
};

/* ADD PRODUCT */
document.getElementById("addBtn").onclick = async ()=>{

const name = document.getElementById("name").value;
const price = document.getElementById("price").value;

if(!name || !price){
alert("اكتب اسم وسعر المنتج");
return;
}

await addDoc(collection(db,"products"),{
name:name,
price:Number(price),
images:[],
createdAt:Date.now()
});

load();
};

/* LOAD PRODUCTS */
const sliderIndex = {};

async function load(){
const list = document.getElementById("list");
list.innerHTML="";

const snap = await getDocs(collection(db,"products"));

snap.forEach(d=>{
const p = d.data();
let images = Array.isArray(p.images) ? p.images : [];

list.innerHTML += `
<div class="card">

<div class="slider" id="slider-${d.id}">
  <div class="slides">
    ${images.length ? images.map(img=>`<img src="${img}">`).join("") :
    `<img src="https://via.placeholder.com/400x220?text=No+Image">`}
  </div>

  ${images.length > 1 ? `
    <button class="navBtn prev" onclick="moveSlide('${d.id}',-1)">‹</button>
    <button class="navBtn next" onclick="moveSlide('${d.id}',1)">›</button>
  ` : ""}
</div>

<input id="n-${d.id}" value="${p.name}">
<input id="p-${d.id}" value="${p.price}">
<button onclick="edit('${d.id}')">تعديل</button>
<button onclick="del('${d.id}')">حذف</button>

</div>
`;
});
}

/* SLIDER */
window.moveSlide = (id,dir)=>{
const slider = document.querySelector(`#slider-${id} .slides`);
const imgs = slider.querySelectorAll("img");

if(!sliderIndex[id]) sliderIndex[id]=0;

sliderIndex[id]+=dir;

if(sliderIndex[id] < 0) sliderIndex[id]=imgs.length-1;
if(sliderIndex[id] >= imgs.length) sliderIndex[id]=0;

slider.style.transform = `translateX(-${sliderIndex[id]*100}%)`;
};

/* DELETE */
window.del = async (id)=>{
await deleteDoc(doc(db,"products",id));
load();
};

/* EDIT */
window.edit = async (id)=>{
const name = document.getElementById("n-"+id).value;
const price = document.getElementById("p-"+id).value;
await updateDoc(doc(db,"products",id),{name,price});
load();
};

/* ORDERS SAFE */
function loadOrders(){

const box=document.getElementById("ordersList");

const q=query(collection(db,"orders"),orderBy("createdAt","desc"));

onSnapshot(q,(snap)=>{

box.innerHTML="";

snap.forEach(d=>{
const o=d.data();

let cart = Array.isArray(o.cart)?o.cart:[];

let total = cart.reduce((s,i)=>s+(Number(i.price)||0),0);

box.innerHTML+=`
<div class="card">

<h3>🆔 ${o.orderId||d.id}</h3>
<p>${o.name||""}</p>
<p>${o.phone||""}</p>
<p>${o.address||""}</p>

<p>💰 ${total}</p>
<p>📦 ${o.status||"pending"}</p>

</div>
`;
});

});

}

</script>

</body>
</html>
