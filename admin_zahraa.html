<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Admin PRO</title>

<style>
body{
  background:#0d0d0d;
  color:white;
  font-family:Cairo;
  text-align:center;
  padding:20px;
}

input,button{
  padding:10px;
  margin:8px;
  border-radius:10px;
  border:none;
}

button{
  background:gold;
  color:black;
  font-weight:bold;
  cursor:pointer;
}

.card{
  background:#1a1a1a;
  padding:10px;
  margin:10px auto;
  border-radius:12px;
  max-width:350px;
}

img{
  width:100%;
  border-radius:10px;
}
</style>
</head>

<body>

<h2>🔥 Admin PRO</h2>

<input type="password" id="pass" placeholder="password">
<button id="loginBtn">دخول</button>

<div id="panel" style="display:none">

<input type="text" id="name" placeholder="اسم المنتج"><br>
<input type="file" id="images" multiple><br>

<button id="addBtn">إضافة منتج</button>

<h3>المنتجات</h3>
<div id="list"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc,
updateDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyCG6Yc0iH-rt-PaiRqL_V9Re1z49ZF3OMM",
authDomain: "zahraa-store-f4c90.firebaseapp.com",
projectId: "zahraa-store-f4c90"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const PASSWORD = "zahraa2025";
const cloudName = "dxlxwe55b";
const uploadPreset = "zahraa_upload";

/* LOGIN */
document.getElementById("loginBtn").onclick = ()=>{
  if(document.getElementById("pass").value === PASSWORD){
    document.getElementById("panel").style.display = "block";
    load();
  } else alert("غلط");
};

/* UPLOAD CLOUDINARY */
async function upload(file){

  const form = new FormData();
  form.append("file", file);
  form.append("upload_preset", uploadPreset);

  const res = await fetch(
    `https://api.cloudinary.com/v1_1/${cloudName}/image/upload`,
    { method:"POST", body:form }
  );

  const data = await res.json();
  return data.secure_url;
}

/* ADD */
document.getElementById("addBtn").onclick = async ()=>{

  const name = document.getElementById("name").value;
  const files = document.getElementById("images").files;

  if(!name || files.length===0){
    alert("املأ البيانات");
    return;
  }

  let images = [];

  for(let f of files){
    images.push(await upload(f));
  }

  await addDoc(collection(db,"products"),{
    name,
    images,
    createdAt:Date.now()
  });

  document.getElementById("name").value="";
  document.getElementById("images").value="";

  load();
};

/* LOAD */
async function load(){

  const list = document.getElementById("list");
  list.innerHTML = "";

  const snap = await getDocs(collection(db,"products"));

  snap.forEach(d=>{

    const p = d.data();

    list.innerHTML += `
      <div class="card">
        <input id="n-${d.id}" value="${p.name}">
        <img src="${p.images?.[0] || ''}">

        <button onclick="edit('${d.id}')">تعديل</button>
        <button onclick="del('${d.id}')">حذف</button>
      </div>
    `;
  });
}

window.del = async (id)=>{
  await deleteDoc(doc(db,"products",id));
  load();
};

window.edit = async (id)=>{
  const v = document.getElementById("n-"+id).value;
  await updateDoc(doc(db,"products",id),{name:v});
  load();
};

</script>

</body>
</html>
