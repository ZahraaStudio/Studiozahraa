<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>لوحة تحكم المنتجات</title>

<style>
body {
  font-family: 'Cairo', sans-serif;
  background-color: #111;
  color: #fff;
  text-align: center;
  padding: 20px;
}

input, button {
  padding: 10px;
  margin: 10px;
  border-radius: 10px;
  border: none;
  font-size: 1rem;
}

button{
  background: gold;
  color: black;
  cursor: pointer;
  font-weight: bold;
}

.hidden { display: none; }

.preview img{
  width: 120px;
  margin: 5px;
  border-radius: 10px;
}

.product-item{
  background:#222;
  margin:10px auto;
  padding:10px;
  border-radius:10px;
  max-width:300px;
}
</style>
</head>

<body>

<h2>🔥 لوحة التحكم - إضافة منتج</h2>

<div id="login-section">
  <p>ادخل كلمة المرور:</p>
  <input type="password" id="password" placeholder="••••••••">
  <button id="loginBtn">دخول</button>
</div>

<div id="admin-section" class="hidden">

  <input type="text" id="productName" placeholder="اسم المنتج"><br>

  <input type="file" id="productImage" multiple accept="image/*"><br>

  <div class="preview" id="preview"></div>

  <button id="addBtn">إضافة المنتج</button>

  <h3>المنتجات الحالية:</h3>
  <div id="productList"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* 🔥 Firebase */
const firebaseConfig = {
  apiKey: "PUT-API-KEY",
  authDomain: "PUT-AUTH",
  projectId: "PUT-ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* Cloudinary */
const cloudName = "dxlxwe55b";
const uploadPreset = "zahraa_upload";

/* password */
const correctPassword = "zahraa2025";

/* ================= LOGIN ================= */
document.getElementById("loginBtn").addEventListener("click", () => {

  const pass = document.getElementById("password").value;

  if(pass === correctPassword){
    document.getElementById("login-section").style.display = "none";
    document.getElementById("admin-section").classList.remove("hidden");
    loadProducts();
  } else {
    alert("كلمة المرور غلط");
  }
});

/* ================= UPLOAD IMAGE ================= */
async function uploadToCloudinary(file){

  const form = new FormData();
  form.append("file", file);
  form.append("upload_preset", uploadPreset);

  const res = await fetch(
    `https://api.cloudinary.com/v1_1/${cloudName}/image/upload`,
    { method:"POST", body:form }
  );

  const data = await res.json();
  return data.secure_url;
}

/* ================= ADD PRODUCT ================= */
async function addProduct(){

  const name = document.getElementById("productName").value;
  const files = document.getElementById("productImage").files;

  if(!name || files.length === 0){
    alert("املأ البيانات");
    return;
  }

  let images = [];

  for(let file of files){
    const url = await uploadToCloudinary(file);
    images.push(url);
  }

  await addDoc(collection(db,"products"),{
    name,
    images,
    createdAt: Date.now()
  });

  alert("تم رفع المنتج 🔥");

  document.getElementById("productName").value = "";
  document.getElementById("productImage").value = "";
  document.getElementById("preview").innerHTML = "";

  loadProducts();
}

/* ================= LOAD PRODUCTS ================= */
async function loadProducts(){

  const productList = document.getElementById("productList");
  productList.innerHTML = "";

  const snap = await getDocs(collection(db,"products"));

  snap.forEach(doc => {

    const p = doc.data();

    productList.innerHTML += `
      <div class="product-item">
        <p><strong>${p.name}</strong></p>
        <img src="${p.images[0]}" style="width:100%;border-radius:10px;">
      </div>
    `;
  });
}

/* ================= BUTTON ================= */
document.getElementById("addBtn").addEventListener("click", addProduct);

/* ================= PREVIEW ================= */
document.getElementById("productImage").addEventListener("change", function(){

  const preview = document.getElementById("preview");
  preview.innerHTML = "";

  for(let file of this.files){
    const img = document.createElement("img");
    img.src = URL.createObjectURL(file);
    preview.appendChild(img);
  }
});

</script>

</body>
</html>
