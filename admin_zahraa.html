<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Admin PRO</title>

<style>
body{
  background:#0d0d0d;
  color:white;
  font-family:Cairo;
  text-align:center;
  padding:20px;
}

input,button{
  padding:10px;
  margin:8px;
  border-radius:10px;
  border:none;
}

button{
  background:gold;
  color:black;
  font-weight:bold;
  cursor:pointer;
}

.card{
  background:#1a1a1a;
  padding:10px;
  margin:10px auto;
  border-radius:12px;
  max-width:350px;
}

img{
  width:100%;
  border-radius:10px;
}

/* 🔥 NEW MENU */
.menu{
  display:flex;
  justify-content:center;
  gap:10px;
  margin:15px 0;
}

.menu button{
  flex:1;
}

/* hide sections */
.section{
  display:none;
}
.active{
  display:block;
}
</style>
</head>

<body>

<h2>🔥 Admin PRO</h2>

<div id="loginBox">

<input type="email" id="email" placeholder="email"><br>
<input type="password" id="pass" placeholder="password"><br>

<button id="loginBtn">دخول</button>

</div>

<div id="panel" style="display:none">

<!-- 🔥 MENU -->
<div class="menu">
  <button onclick="showTab('products')">🛒 المنتجات</button>
  <button onclick="showTab('orders')">📦 الطلبات</button>
</div>

<!-- 🛒 PRODUCTS -->
<div id="products" class="section active">

<input type="text" id="name" placeholder="اسم المنتج"><br>
<input type="number" id="price" placeholder="سعر المنتج"><br>
<input type="file" id="images" multiple><br>

<button id="addBtn">إضافة منتج</button>

<h3>المنتجات</h3>
<div id="list"></div>

</div>

<!-- 📦 ORDERS -->
<div id="orders" class="section">

<h3>📦 الطلبات</h3>
<div id="ordersList"></div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getAuth,
onAuthStateChanged,
signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc,
updateDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyCG6Yc0iH-rt-PaiRqL_V9Re1z49ZF3OMM",
authDomain: "zahraa-store-f4c90.firebaseapp.com",
projectId: "zahraa-store-f4c90"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const cloudName = "dxlxwe55b";
const uploadPreset = "zahraa_upload";

/* LOGIN */
document.getElementById("loginBtn").onclick = async ()=>{

  const email = document.getElementById("email").value;
  const pass = document.getElementById("pass").value;

  await signInWithEmailAndPassword(auth, email, pass);
};

/* SHOW PANEL */
onAuthStateChanged(auth,(user)=>{
  if(user){
    document.getElementById("loginBox").style.display="none";
    document.getElementById("panel").style.display="block";
    load();
    loadOrders();
  }
});

/* TAB SWITCH */
window.showTab = (tab)=>{

  document.querySelectorAll(".section").forEach(s=>{
    s.classList.remove("active");
  });

  document.getElementById(tab).classList.add("active");
};

/* UPLOAD */
async function upload(file){

  const form = new FormData();
  form.append("file", file);
  form.append("upload_preset", uploadPreset);

  const res = await fetch(
    `https://api.cloudinary.com/v1_1/${cloudName}/image/upload`,
    { method:"POST", body:form }
  );

  return (await res.json()).secure_url;
}

/* ADD PRODUCT */
document.getElementById("addBtn").onclick = async ()=>{

  const name = document.getElementById("name").value;
  const price = document.getElementById("price").value;
  const files = document.getElementById("images").files;

  if(!name || !price || files.length===0){
    alert("املأ البيانات");
    return;
  }

  let images = [];

  for(let f of files){
    images.push(await upload(f));
  }

  await addDoc(collection(db,"products"),{
    name,
    price,
    images,
    createdAt:Date.now()
  });

  load();
};

/* PRODUCTS */
async function load(){

  const list = document.getElementById("list");
  list.innerHTML="";

  const snap = await getDocs(collection(db,"products"));

  snap.forEach(d=>{

    const p = d.data();

    list.innerHTML += `
      <div class="card">
        <input id="n-${d.id}" value="${p.name}">
        <input id="p-${d.id}" value="${p.price}">
        <img src="${p.images?.[0] || ''}">

        <button onclick="edit('${d.id}')">تعديل</button>
        <button onclick="del('${d.id}')">حذف</button>
      </div>
    `;
  });
}

window.del = async (id)=>{
  await deleteDoc(doc(db,"products",id));
  load();
};

window.edit = async (id)=>{

  const name = document.getElementById("n-"+id).value;
  const price = document.getElementById("p-"+id).value;

  await updateDoc(doc(db,"products",id),{
    name,
    price
  });

  load();
};

/* ORDERS */
async function loadOrders(){

  const box = document.getElementById("ordersList");
  box.innerHTML = "";

  const snap = await getDocs(collection(db,"orders"));

  snap.forEach(d=>{

    const o = d.data();

    let total = 0;
    o.cart.forEach(i=> total += Number(i.price));

    box.innerHTML += `
      <div class="card">
        <h3>${o.name}</h3>
        <p>📞 ${o.phone}</p>
        <p>📍 ${o.address}</p>
        <p>💰 ${total} جنيه</p>
        <p>📦 ${o.status}</p>

        <button onclick="ship('${d.id}')">🚚 شحن</button>
        <button onclick="done('${d.id}')">✅ تنفيذ</button>
      </div>
    `;
  });
}

window.ship = async (id)=>{
  await updateDoc(doc(db,"orders",id),{status:"shipped"});
  loadOrders();
};

window.done = async (id)=>{
  await updateDoc(doc(db,"orders",id),{status:"done"});
  loadOrders();
};

</script>

</body>
</html>
