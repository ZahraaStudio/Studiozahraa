<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Admin</title>

<style>
body{background:#111;color:white;font-family:Cairo;text-align:center;padding:20px}
input,button{padding:10px;margin:10px;border-radius:10px;border:none}
button{background:gold;color:black;font-weight:bold}
img{width:100px;margin:5px;border-radius:10px}
</style>
</head>

<body>

<h2>🔥 Admin</h2>

<input type="password" id="pass" placeholder="password"><br>
<button onclick="login()">دخول</button>

<div id="panel" style="display:none">

<input type="text" id="name" placeholder="اسم المنتج"><br>
<input type="file" id="img" multiple><br>

<div id="preview"></div>

<button onclick="addProduct()">إضافة</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCG6Yc0iH-rt-PaiRqL_V9Re1z49ZF3OMM",
  authDomain: "zahraa-store-f4c90.firebaseapp.com",
  projectId: "zahraa-store-f4c90"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const password = "zahraa2025";

window.login = function(){
  if(document.getElementById("pass").value === password){
    document.getElementById("panel").style.display="block";
  }else alert("غلط");
}

function toBase64(file){
  return new Promise(resolve=>{
    const r = new FileReader();
    r.onload = e=>resolve(e.target.result);
    r.readAsDataURL(file);
  });
}

window.addProduct = async function(){

  const name = document.getElementById("name").value;
  const files = document.getElementById("img").files;

  if(!name || files.length===0){
    alert("املأ البيانات");
    return;
  }

  let images=[];

  for(let f of files){
    const base64 = await toBase64(f);
    images.push(base64);
  }

  await addDoc(collection(db,"products"),{
    name,
    images,
    createdAt: Date.now()
  });

  alert("تم الإضافة 🔥");
}

document.getElementById("img").onchange = function(){
  const p=document.getElementById("preview");
  p.innerHTML="";
  for(let f of this.files){
    const i=document.createElement("img");
    i.src=URL.createObjectURL(f);
    p.appendChild(i);
  }
}

</script>

</body>
</html>
