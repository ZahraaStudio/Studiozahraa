<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zahraa Admin Pro</title>

<style>
body{
margin:0;
font-family:Cairo;
background:#0d0d0d;
color:white;
display:flex;
flex-wrap:wrap;
}

/* SIDEBAR */
.sidebar{
width:220px;
background:#111;
height:100vh;
padding:15px;
position:fixed;
right:0;
top:0;
}

.sidebar h2{color:gold;text-align:center;}

.sidebar button{
width:100%;
margin:10px 0;
padding:10px;
border:none;
border-radius:8px;
background:#222;
color:white;
cursor:pointer;
}

/* CONTENT */
.main{
margin-right:220px;
padding:20px;
width:100%;
}

/* MOBILE */
@media(max-width:768px){
.sidebar{
width:100%;
height:auto;
position:relative;
}
.main{
margin-right:0;
}
}

/* CARDS */
.product{
background:#1a1a1a;
padding:10px;
border-radius:10px;
margin:10px 0;
}

/* SLIDER */
.slider{
position:relative;
}

.slider img{
width:100%;
height:200px;
object-fit:cover;
border-radius:10px;
}

.slider button{
position:absolute;
top:50%;
transform:translateY(-50%);
background:rgba(0,0,0,0.5);
border:none;
color:white;
font-size:20px;
cursor:pointer;
padding:5px 10px;
}

.prev{right:5px;}
.next{left:5px;}

.thumb{
width:60px;
height:60px;
object-fit:cover;
border-radius:6px;
margin:3px;
cursor:pointer;
border:2px solid transparent;
}

.thumb.active{
border-color:gold;
}

/* INPUT */
input{
width:100%;
margin:5px 0;
padding:8px;
border-radius:8px;
border:none;
}

/* BUTTON */
button{
padding:8px;
margin:5px 0;
border:none;
border-radius:8px;
background:gold;
cursor:pointer;
font-weight:bold;
}

/* SECTION */
.section{display:none;}
.active{display:block;}

</style>
</head>

<body>

<div class="sidebar">
<h2>🔥 Zahraa</h2>
<button onclick="show('dashboard')">📊 Dashboard</button>
<button onclick="show('products')">🛒 المنتجات</button>
<button onclick="show('orders')">📦 الطلبات</button>
</div>

<div class="main">

<div id="dashboard" class="section active">
<h2>📊 Dashboard</h2>
<div>📦 <span id="totalOrders">0</span></div>
<div>💰 <span id="totalRevenue">0</span></div>
<div>⏳ <span id="pendingOrders">0</span></div>
</div>

<div id="products" class="section">
<h2>🛒 المنتجات</h2>

<input id="name" placeholder="اسم المنتج">
<input id="price" placeholder="السعر">
<input type="file" id="images" multiple>
<button id="addBtn">إضافة</button>

<div id="list"></div>
</div>

<div id="orders" class="section">
<h2>📦 الطلبات</h2>
<div id="ordersList"></div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getFirestore,
collection,
addDoc,
getDocs,
updateDoc,
doc,
deleteDoc,
onSnapshot,
query,
orderBy
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyCG6Yc0iH-rt-PaiRqL_V9Re1z49ZF3OMM",
authDomain: "zahraa-store-f4c90.firebaseapp.com",
projectId: "zahraa-store-f4c90"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* NAV */
window.show = (id)=>{
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
};

/* رفع صورة */
async function uploadImage(file){
const form = new FormData();
form.append("file", file);
form.append("upload_preset", "zahraa_upload");

const res = await fetch("https://api.cloudinary.com/v1_1/dxlxwe55b/image/upload",
{method:"POST",body:form});

return (await res.json()).secure_url;
}

/* إضافة منتج */
document.getElementById("addBtn").onclick = async ()=>{

const name=document.getElementById("name").value;
const price=document.getElementById("price").value;
const files=document.getElementById("images").files;

let imgs=[];

for(let i=0;i<files.length;i++){
imgs.push(await uploadImage(files[i]));
}

await addDoc(collection(db,"products"),{
name,
price:Number(price),
images:imgs,
createdAt:Date.now()
});

loadProducts();
};

/* سلايدر */
let currentIndex={};

function renderSlider(id,images){

currentIndex[id]=currentIndex[id]||0;

return `
<div class="slider">
<img id="img-${id}" src="${images[currentIndex[id]] || ''}">

<button class="prev" onclick="changeImg('${id}',-1,${JSON.stringify(images).replace(/"/g,'&quot;')})">‹</button>
<button class="next" onclick="changeImg('${id}',1,${JSON.stringify(images).replace(/"/g,'&quot;')})">›</button>

<div>
${images.map((img,i)=>`
<img src="${img}" class="thumb ${i===0?'active':''}"
onclick="selectImg('${id}',${i},${JSON.stringify(images).replace(/"/g,'&quot;')})">
`).join('')}
</div>

</div>
`;
}

window.changeImg=(id,step,imgs)=>{
currentIndex[id]=(currentIndex[id]+step+imgs.length)%imgs.length;
document.getElementById("img-"+id).src=imgs[currentIndex[id]];
};

window.selectImg=(id,i,imgs)=>{
currentIndex[id]=i;
document.getElementById("img-"+id).src=imgs[i];
};

/* تحميل منتجات */
async function loadProducts(){
const box=document.getElementById("list");
box.innerHTML="";

const snap=await getDocs(collection(db,"products"));

snap.forEach(d=>{
const p=d.data();

box.innerHTML+=`
<div class="product">

${renderSlider(d.id,p.images||[])}

<input id="n-${d.id}" value="${p.name}">
<input id="p-${d.id}" value="${p.price}">

<input type="file" id="new-${d.id}">
<button onclick="addImage('${d.id}')">➕ إضافة صورة</button>

<input type="number" id="delIndex-${d.id}" placeholder="رقم الصورة للحذف">
<button onclick="deleteImage('${d.id}')">❌ حذف صورة</button>

<button onclick="updateProduct('${d.id}')">💾 حفظ التعديل</button>
<button onclick="del('${d.id}')">🗑 حذف المنتج</button>

</div>
`;
});
}

/* تعديل */
window.updateProduct=async(id)=>{
const name=document.getElementById("n-"+id).value;
const price=document.getElementById("p-"+id).value;

await updateDoc(doc(db,"products",id),{
name,
price:Number(price)
});

loadProducts();
};

/* إضافة صورة */
window.addImage=async(id)=>{
const file=document.getElementById("new-"+id).files[0];
if(!file) return;

const url=await uploadImage(file);

const ref=doc(db,"products",id);
const snap=await getDocs(collection(db,"products"));

let product;

snap.forEach(d=>{
if(d.id===id) product=d.data();
});

let images=product.images||[];
images.push(url);

await updateDoc(ref,{images});

loadProducts();
};

/* حذف صورة */
window.deleteImage=async(id)=>{
const index=parseInt(document.getElementById("delIndex-"+id).value);

const ref=doc(db,"products",id);
const snap=await getDocs(collection(db,"products"));

let product;

snap.forEach(d=>{
if(d.id===id) product=d.data();
});

let images=product.images||[];

images.splice(index,1);

await updateDoc(ref,{images});

loadProducts();
};

/* حذف */
window.del=async(id)=>{
await deleteDoc(doc(db,"products",id));
loadProducts();
};

/* الطلبات */
function loadOrders(){
const box=document.getElementById("ordersList");

const q=query(collection(db,"orders"),orderBy("createdAt","desc"));

onSnapshot(q,(snap)=>{

box.innerHTML="";

let totalOrders=0;
let revenue=0;
let pending=0;

snap.forEach(d=>{
const o=d.data();

totalOrders++;

let total=o.cart?.reduce((s,i)=>s+Number(i.price),0)||0;
revenue+=total;

if(o.status==="pending") pending++;

box.innerHTML+=`
<div class="product">
<p>${o.name}</p>
<p>${o.phone}</p>
<p>${o.address}</p>
<p>💰 ${total}</p>
</div>
`;
});

document.getElementById("totalOrders").innerText=totalOrders;
document.getElementById("totalRevenue").innerText=revenue;
document.getElementById("pendingOrders").innerText=pending;

});
}

loadProducts();
loadOrders();

</script>

</body>
</html>
