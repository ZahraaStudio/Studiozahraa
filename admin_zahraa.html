<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getAuth,
onAuthStateChanged,
signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc,
updateDoc,
onSnapshot,
query,
orderBy
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyCG6Yc0iH-rt-PaiRqL_V9Re1z49ZF3OMM",
authDomain: "zahraa-store-f4c90.firebaseapp.com",
projectId: "zahraa-store-f4c90"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const cloudName = "dxlxwe55b";
const uploadPreset = "zahraa_upload";

/* LOGIN */
document.getElementById("loginBtn").onclick = async ()=>{
  const email = document.getElementById("email").value;
  const pass = document.getElementById("pass").value;
  await signInWithEmailAndPassword(auth, email, pass);
};

/* PANEL */
onAuthStateChanged(auth,(user)=>{
  if(user){
    document.getElementById("loginBox").style.display="none";
    document.getElementById("panel").style.display="block";
    load();
    loadOrders();
  }
});

/* TAB */
window.showTab = (tab)=>{
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById(tab).classList.add("active");
};

/* UPLOAD */
async function upload(file){
  const form = new FormData();
  form.append("file", file);
  form.append("upload_preset", uploadPreset);

  const res = await fetch(
    `https://api.cloudinary.com/v1_1/${cloudName}/image/upload`,
    {method:"POST", body:form}
  );

  return (await res.json()).secure_url;
}

/* ✅ FIX 1: ADD PRODUCT */
document.getElementById("addBtn").onclick = async ()=>{

  const name = document.getElementById("name").value;
  const price = document.getElementById("price").value;
  const files = document.getElementById("images").files;

  if(!name || !price || files.length===0){
    alert("املأ البيانات");
    return;
  }

  let images = [];

  for(let f of files){
    const url = await upload(f);
    images.push(url);
  }

  await addDoc(collection(db,"products"),{
    name,
    price,
    images,
    createdAt:Date.now()
  });

  document.getElementById("name").value="";
  document.getElementById("price").value="";
  document.getElementById("images").value="";

  load(); // refresh
};

/* PRODUCTS */
async function load(){
  const list = document.getElementById("list");
  list.innerHTML="";
  const snap = await getDocs(collection(db,"products"));

  snap.forEach(d=>{
    const p = d.data();

    list.innerHTML += `
      <div class="card">
        <input id="n-${d.id}" value="${p.name}">
        <input id="p-${d.id}" value="${p.price}">
        <img src="${p.images?.[0] || ''}">
        <button onclick="edit('${d.id}')">تعديل</button>
        <button onclick="del('${d.id}')">حذف</button>
      </div>
    `;
  });
}

window.del = async (id)=>{
  await deleteDoc(doc(db,"products",id));
  load();
};

window.edit = async (id)=>{
  const name = document.getElementById("n-"+id).value;
  const price = document.getElementById("p-"+id).value;
  await updateDoc(doc(db,"products",id),{name,price});
  load();
};

/* ORDERS */
function loadOrders(){

  const box = document.getElementById("ordersList");

  const q = query(collection(db,"orders"), orderBy("createdAt","desc"));

  onSnapshot(q,(snap)=>{

    box.innerHTML="";

    let orders = [];

    snap.forEach(d=>{
      const o = d.data();
      orders.push(o);

      const total = o.totalPrice || (o.cart?.reduce((s,i)=>s + Number(i.price),0)) || 0;

      box.innerHTML += `
        <div class="card">

          <h3>🆔 ${d.id}</h3>

          <p>${o.name}</p>
          <p>📞 ${o.phone}</p>
          <p>📍 ${o.address}</p>

          <p>💰 ${total} جنيه</p>

          <p>📦 ${o.status}</p>

          <select onchange="updateStatus('${d.id}',this.value)">
            <option value="pending" ${o.status==="pending"?"selected":""}>pending</option>
            <option value="processing" ${o.status==="processing"?"selected":""}>processing</option>
            <option value="shipped" ${o.status==="shipped"?"selected":""}>shipped</option>
            <option value="delivered" ${o.status==="delivered"?"selected":""}>delivered</option>
            <option value="canceled" ${o.status==="canceled"?"selected":""}>canceled</option>
          </select>

        </div>
      `;
    });

  });
}

/* STATUS */
window.updateStatus = async (id,status)=>{
  await updateDoc(doc(db,"orders",id),{status});
};

</script>
