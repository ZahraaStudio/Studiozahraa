<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>السلة - ZAHRAA STUDIO</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<style>
body{
  margin:0;
  background:#0d0d0d;
  color:white;
  font-family: 'Cairo', sans-serif;
  padding-bottom: 80px;
}
header {
  background: #111;
  padding: 15px;
  text-align: center;
  border-bottom: 1px solid #d4af37;
  position: sticky;
  top: 0;
  z-index: 100;
}
.container { padding: 15px; max-width: 600px; margin: auto; }
.card{
  background:#111;
  margin-bottom: 15px;
  padding: 15px;
  border-radius: 15px;
  display: flex;
  align-items: center;
  gap: 15px;
  border: 1px solid #222;
}
.card img {
  width: 70px;
  height: 70px;
  object-fit: cover;
  border-radius: 10px;
}
.card-info { flex: 1; }
.card-info h3 { margin: 0; font-size: 16px; color: #d4af37; }
.card-info p { margin: 5px 0 0; font-weight: bold; }
.remove-btn {
  background: #ff4444;
  color: white;
  border: none;
  padding: 8px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 12px;
}
.empty-msg { text-align: center; margin-top: 50px; color: #777; }
.total-box {
  background: #1a1a1a;
  padding: 20px;
  border-radius: 15px;
  margin-top: 20px;
  text-align: center;
}
.total-box h3 { margin: 0 0 15px; color: #d4af37; }
.checkout-btn {
  display: block;
  background: #d4af37;
  color: #000;
  text-decoration: none;
  padding: 12px;
  border-radius: 25px;
  font-weight: bold;
  margin-top: 10px;
}
.clear-btn {
  background: none;
  border: 1px solid #ff4444;
  color: #ff4444;
  padding: 8px 15px;
  border-radius: 20px;
  margin-top: 15px;
  cursor: pointer;
}
/* Bottom Bar */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  background: #111;
  display: flex;
  justify-content: space-around;
  padding: 10px;
  border-top: 1px solid #d4af37;
  z-index: 1000;
}
.nav-item { color: #fff; text-decoration: none; text-align: center; font-size: 12px; }
.nav-item.active { color: #d4af37; }
</style>
</head>
<body>

<header>
  <h2 style="margin:0; color:#d4af37;">🛒 سلة المشتريات</h2>
</header>

<div class="container">
  <div id="cartList"></div>
  
  <div id="summary" style="display:none;">
    <div class="total-box">
      <h3 id="totalPrice">الإجمالي: 0 جنيه</h3>
      <a href="checkout.html" class="checkout-btn">إتمام الطلب 💳</a>
      <button class="clear-btn" onclick="clearCart()">تفريغ السلة 🗑️</button>
    </div>
  </div>
  
  <div id="empty" class="empty-msg">
    <p style="font-size: 40px;">🛒</p>
    <p>سلتك فارغة حالياً</p>
    <a href="products.html" style="color:#d4af37; text-decoration:none;">تصفح المنتجات من هنا</a>
  </div>
</div>

<div class="bottom-nav">
  <a href="index.html" class="nav-item">🏠<br>الرئيسية</a>
  <a href="products.html" class="nav-item">🛍️<br>المتجر</a>
  <a href="cart.html" class="nav-item active">🛒<br>السلة</a>
  <a href="checkout.html" class="nav-item">💳<br>الدفع</a>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart") || "[]");

function loadCart(){
  const list = document.getElementById("cartList");
  const summary = document.getElementById("summary");
  const empty = document.getElementById("empty");
  
  if(cart.length === 0){
    list.innerHTML = "";
    summary.style.display = "none";
    empty.style.display = "block";
    return;
  }
  
  empty.style.display = "none";
  summary.style.display = "block";
  list.innerHTML = "";
  
  let total = 0;
  cart.forEach((p, i) => {
    total += Number(p.price || 0);
    list.innerHTML += `
      <div class="card">
        <img src="${p.images && p.images[0] ? p.images[0] : ''}" alt="${p.name}">
        <div class="card-info">
          <h3>${p.name}</h3>
          <p>${p.price} جنيه</p>
        </div>
        <button class="remove-btn" onclick="removeItem(${i})">حذف</button>
      </div>
    `;
  });
  
  document.getElementById("totalPrice").innerText = "الإجمالي: " + total + " جنيه";
}

window.removeItem = (i) => {
  cart.splice(i, 1);
  localStorage.setItem("cart", JSON.stringify(cart));
  loadCart();
};

window.clearCart = () => {
  if(confirm("هل تريد تفريغ السلة؟")){
    cart = [];
    localStorage.setItem("cart", "[]");
    loadCart();
  }
};

loadCart();
</script>
</body>
</html>
