<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Cart</title>

<style>
body{
  background:#0d0d0d;
  color:white;
  font-family:Cairo;
  text-align:center;
}

.card{
  background:#111;
  margin:10px;
  padding:10px;
  border-radius:12px;
}

button{
  padding:8px;
  background:red;
  color:white;
  border:none;
  border-radius:10px;
}
</style>
</head>

<body>

<h2>🛒 السلة</h2>

<div id="cart"></div>

<h3 id="total"></h3>

<button onclick="clearCart()">تفريغ السلة</button>

<script>

let cart = JSON.parse(localStorage.getItem("cart")||"[]");

function load(){

  let box = document.getElementById("cart");
  let total = 0;

  box.innerHTML="";

  cart.forEach((p,i)=>{

    total += Number(p.price);

    box.innerHTML += `
      <div class="card">
        ${p.name} - ${p.price} جنيه
        <br>
        <button onclick="removeItem(${i})">حذف</button>
      </div>
    `;
  });

  document.getElementById("total").innerText = "الإجمالي: "+total+" جنيه";
}

window.removeItem = (i)=>{
  cart.splice(i,1);
  localStorage.setItem("cart",JSON.stringify(cart));
  load();
};

window.clearCart = ()=>{
  cart = [];
  localStorage.setItem("cart","[]");
  load();
};

load();

</script>

</body>
</html>
