<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>تتبع طلبك — كاشير الزهراء</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080b10;
  --bg2:#0e1117;
  --card:#131820;
  --border:#1e2736;
  --gold:#d4af37;
  --gold2:#f0cc55;
  --green:#22c55e;
  --orange:#f59e0b;
  --red:#ef4444;
  --blue:#3b82f6;
  --text:#e8eaf0;
  --text2:#8a92a0;
  --text3:#4a5568;
}
html,body{min-height:100vh;font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);direction:rtl;overflow-x:hidden}

/* ── Background particles ── */
.bg-glow{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0}
.bg-glow::before{content:'';position:absolute;top:-40%;right:-30%;width:700px;height:700px;background:radial-gradient(circle,rgba(212,175,55,.07) 0%,transparent 65%);border-radius:50%}
.bg-glow::after{content:'';position:absolute;bottom:-30%;left:-20%;width:500px;height:500px;background:radial-gradient(circle,rgba(59,130,246,.06) 0%,transparent 60%);border-radius:50%}

.page-wrap{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:32px 16px 48px}

/* ── Logo / brand ── */
.brand{display:flex;flex-direction:column;align-items:center;gap:8px;margin-bottom:36px}
.brand-logo{width:64px;height:64px;background:linear-gradient(135deg,#d4af37,#a88520);border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:28px;box-shadow:0 8px 32px rgba(212,175,55,.35);animation:logoPulse 3s ease-in-out infinite}
@keyframes logoPulse{0%,100%{box-shadow:0 8px 32px rgba(212,175,55,.35)}50%{box-shadow:0 8px 48px rgba(212,175,55,.55)}}
.brand-name{font-size:22px;font-weight:900;color:var(--gold);letter-spacing:.5px}
.brand-sub{font-size:12px;color:var(--text2);font-weight:700}

/* ── Search box ── */
.search-card{background:var(--card);border:1.5px solid var(--border);border-radius:24px;padding:28px;width:100%;max-width:480px;margin-bottom:28px;box-shadow:0 16px 48px rgba(0,0,0,.4)}
.search-label{font-size:13px;font-weight:900;color:var(--text2);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.search-label i{color:var(--gold)}
.search-row{display:flex;gap:8px}
.search-inp{flex:1;background:#0a0d14;border:2px solid var(--border);border-radius:14px;color:var(--text);padding:13px 16px;font-family:'Cairo',sans-serif;font-size:14px;font-weight:700;outline:none;transition:border-color .2s}
.search-inp:focus{border-color:var(--gold)}
.search-inp::placeholder{color:var(--text3)}
.search-btn{background:linear-gradient(135deg,#d4af37,#a88520);border:none;border-radius:14px;padding:13px 20px;color:#000;font-family:'Cairo',sans-serif;font-size:13px;font-weight:900;cursor:pointer;display:flex;align-items:center;gap:6px;transition:opacity .2s;white-space:nowrap}
.search-btn:hover{opacity:.85}
.search-btn:disabled{opacity:.5;cursor:default}
.search-tabs{display:flex;gap:8px;margin-bottom:16px}
.search-tab{flex:1;padding:8px;border:1.5px solid var(--border);border-radius:10px;background:transparent;color:var(--text2);font-family:'Cairo',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .18s}
.search-tab.active{background:rgba(212,175,55,.12);border-color:var(--gold);color:var(--gold)}

/* ── Result card ── */
.result-card{background:var(--card);border:1.5px solid var(--border);border-radius:24px;width:100%;max-width:480px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.5);animation:slideUp .35s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* Result header */
.result-head{padding:22px 24px 18px;border-bottom:1px solid var(--border);position:relative}
.result-inv{font-size:12px;color:var(--text2);font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.result-name{font-size:20px;font-weight:900;color:var(--text);margin-bottom:2px}
.result-date{font-size:11px;color:var(--text3);font-weight:600}
.result-badge{position:absolute;top:20px;left:24px;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:900}

/* Status stepper */
.stepper{padding:24px}
.stepper-track{position:relative;padding-bottom:8px}
.stepper-step{display:flex;align-items:flex-start;gap:14px;margin-bottom:0;position:relative}
.stepper-step:not(:last-child)::before{content:'';position:absolute;right:15px;top:32px;bottom:-8px;width:2px;background:var(--border)}
.stepper-step.done::before{background:linear-gradient(to bottom,var(--green),var(--green))}
.stepper-step.active-step::before{background:linear-gradient(to bottom,var(--gold),var(--border))}
.step-icon{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;border:2px solid var(--border);background:var(--bg2);transition:all .4s}
.stepper-step.done .step-icon{background:linear-gradient(135deg,#166534,#22c55e);border-color:var(--green);color:#fff;box-shadow:0 0 12px rgba(34,197,94,.4)}
.stepper-step.active-step .step-icon{background:linear-gradient(135deg,#a88520,#d4af37);border-color:var(--gold);color:#000;box-shadow:0 0 16px rgba(212,175,55,.5);animation:stepPulse 1.5s ease-in-out infinite}
@keyframes stepPulse{0%,100%{box-shadow:0 0 16px rgba(212,175,55,.5)}50%{box-shadow:0 0 28px rgba(212,175,55,.8)}}
.step-info{flex:1;padding:4px 0 24px}
.step-label{font-size:13px;font-weight:900;color:var(--text)}
.stepper-step:not(.done):not(.active-step) .step-label{color:var(--text3)}
.step-sub{font-size:11px;color:var(--text2);margin-top:2px;font-weight:600}
.stepper-step:not(.done):not(.active-step) .step-sub{color:var(--text3)}

/* Order items mini */
.items-section{padding:0 24px 20px}
.items-title{font-size:11px;font-weight:900;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.item-row{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:#0a0d14;border-radius:10px;margin-bottom:6px}
.item-name{font-size:12px;font-weight:800;color:var(--text)}
.item-qty{font-size:11px;color:var(--text2);font-weight:700}
.item-price{font-size:12px;font-weight:900;color:var(--gold)}

/* Totals */
.totals-section{padding:0 24px 24px}
.total-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:12px}
.total-row:last-child{border-bottom:none;font-size:14px;font-weight:900;color:var(--gold)}
.total-row .k{color:var(--text2);font-weight:700}
.total-row .v{font-weight:900}

/* Contact / action */
.action-row{padding:16px 24px 24px;display:flex;gap:10px;border-top:1px solid var(--border)}
.action-btn{flex:1;padding:11px;border-radius:12px;border:none;font-family:'Cairo',sans-serif;font-size:12px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .18s}
.action-whatsapp{background:linear-gradient(135deg,#25D366,#128C7E);color:#fff}
.action-whatsapp:hover{opacity:.85}
.action-refresh{background:var(--border);color:var(--text2)}
.action-refresh:hover{background:rgba(212,175,55,.12);color:var(--gold)}

/* Empty / error */
.state-box{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 24px;gap:14px;text-align:center}
.state-icon{font-size:48px;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.state-title{font-size:16px;font-weight:900;color:var(--text)}
.state-sub{font-size:12px;color:var(--text2);font-weight:600}

/* Spinner */
.spin-wrap{display:flex;flex-direction:column;align-items:center;gap:16px;padding:48px 24px}
.spinner-ring{width:44px;height:44px;border:4px solid var(--border);border-top:4px solid var(--gold);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Store info footer */
.store-footer{margin-top:24px;font-size:11px;color:var(--text3);text-align:center;font-weight:600;display:flex;flex-direction:column;gap:4px}
.store-footer a{color:var(--gold);text-decoration:none;font-weight:700}
</style>
</head>
<body>
<div class="bg-glow"></div>
<div class="page-wrap">

  <!-- Brand -->
  <div class="brand">
    <div class="brand-logo" id="brand-logo">⚡</div>
    <div class="brand-name" id="brand-name">ZAHRAA STUDIO</div>
    <div class="brand-sub">تتبع حالة طلبك</div>
  </div>

  <!-- Search Card -->
  <div class="search-card">
    <div class="search-tabs">
      <button class="search-tab active" id="tab-inv" onclick="switchTab('inv')">
        <i class="fas fa-hashtag"></i> رقم الفاتورة
      </button>
      <button class="search-tab" id="tab-phone" onclick="switchTab('phone')">
        <i class="fas fa-phone"></i> رقم الهاتف
      </button>
    </div>
    <div class="search-label">
      <i class="fas fa-search"></i>
      <span id="search-label-text">أدخل رقم فاتورتك</span>
    </div>
    <div class="search-row">
      <input class="search-inp" id="search-inp" type="text"
        placeholder="مثال: INV-00123" autocomplete="off"
        onkeydown="if(event.key==='Enter')doSearch()">
      <button class="search-btn" id="search-btn" onclick="doSearch()">
        <i class="fas fa-search"></i> بحث
      </button>
    </div>
  </div>

  <!-- Result Area -->
  <div id="result-area" style="width:100%;max-width:480px"></div>

  <div class="store-footer">
    <span>مدعوم بنظام كاشير الزهراء</span>
    <a href="dashboard.html"><i class="fas fa-lock"></i> لوحة الإدارة</a>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCG6Yc0iH-rt-PaiRqL_V9Re1z49ZF3OMM",
  authDomain: "zahraa-store-f4c90.firebaseapp.com",
  projectId: "zahraa-store-f4c90",
  storageBucket: "zahraa-store-f4c90.firebasestorage.app",
  messagingSenderId: "885722081307",
  appId: "1:885722081307:web:7c91e0f8b0ea9b8b4df0be"
};
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let searchMode = 'inv'; // 'inv' or 'phone'

/* Load branding from Firestore settings */
async function loadBranding() {
  try {
    const doc = await db.collection('settings').doc('store').get();
    if (doc.exists) {
      const d = doc.data();
      if (d.storeName) document.getElementById('brand-name').textContent = d.storeName;
      if (d.logoUrl) {
        const logoEl = document.getElementById('brand-logo');
        logoEl.style.backgroundImage = `url(${d.logoUrl})`;
        logoEl.style.backgroundSize = 'cover';
        logoEl.style.backgroundPosition = 'center';
        logoEl.textContent = '';
      }
    }
  } catch(e) {}
}
loadBranding();

/* ── Tab switch ── */
function switchTab(mode) {
  searchMode = mode;
  document.getElementById('tab-inv').classList.toggle('active', mode === 'inv');
  document.getElementById('tab-phone').classList.toggle('active', mode === 'phone');
  const inp = document.getElementById('search-inp');
  if (mode === 'inv') {
    inp.placeholder = 'مثال: INV-00123';
    document.getElementById('search-label-text').textContent = 'أدخل رقم فاتورتك';
  } else {
    inp.placeholder = 'مثال: 05xxxxxxxx';
    document.getElementById('search-label-text').textContent = 'أدخل رقم هاتفك';
  }
  inp.value = '';
  document.getElementById('result-area').innerHTML = '';
}

/* ── Search ── */
async function doSearch() {
  const val = document.getElementById('search-inp').value.trim();
  if (!val) { pulse(); return; }
  const btn = document.getElementById('search-btn');
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
  const area = document.getElementById('result-area');
  area.innerHTML = `<div class="result-card"><div class="spin-wrap"><div class="spinner-ring"></div><p style="color:var(--text2);font-size:13px;font-weight:700">جاري البحث...</p></div></div>`;

  try {
    let orders = [];
    if (searchMode === 'inv') {
      /* By invoice number or doc ID */
      const byId  = await db.collection('pos_invoices').doc(val).get().catch(() => null);
      if (byId && byId.exists) { orders = [{ id: byId.id, ...byId.data() }]; }
      else {
        const byNum = await db.collection('pos_invoices').where('invoiceNumber','==',val).limit(5).get();
        byNum.forEach(d => orders.push({ id: d.id, ...d.data() }));
      }
    } else {
      /* By phone */
      const byPhone = await db.collection('pos_invoices').where('phone','==',val).orderBy('createdAt','desc').limit(5).get();
      byPhone.forEach(d => orders.push({ id: d.id, ...d.data() }));
    }

    if (!orders.length) {
      area.innerHTML = `
        <div class="result-card">
          <div class="state-box">
            <div class="state-icon">🔍</div>
            <div class="state-title">لم يتم العثور على طلب</div>
            <div class="state-sub">تحقق من رقم الفاتورة أو رقم الهاتف وحاول مجدداً</div>
          </div>
        </div>`;
    } else if (orders.length === 1) {
      renderOrderResult(orders[0], area);
    } else {
      /* Multiple orders - show list */
      renderOrderList(orders, area);
    }
  } catch(e) {
    area.innerHTML = `
      <div class="result-card">
        <div class="state-box">
          <div class="state-icon">⚠️</div>
          <div class="state-title">حدث خطأ</div>
          <div class="state-sub">${e.message}</div>
        </div>
      </div>`;
  }
  btn.disabled = false;
  btn.innerHTML = '<i class="fas fa-search"></i> بحث';
}

/* ── Render multiple orders ── */
function renderOrderList(orders, area) {
  const rows = orders.map(o => {
    const status = getStatusInfo(o);
    const date = o.createdAt ? new Date(o.createdAt.toDate ? o.createdAt.toDate() : o.createdAt)
      .toLocaleDateString('ar-EG', {month:'short',day:'numeric'}) : '—';
    return `<div class="item-row" style="cursor:pointer;margin-bottom:8px;border-radius:12px;padding:12px 14px" onclick="renderOrderResult(${JSON.stringify(o).replace(/"/g,'&quot;')},document.getElementById('result-area'))">
      <div>
        <div style="font-size:12px;font-weight:900;color:var(--gold)"># ${o.invoiceNumber||o.id.slice(0,8)}</div>
        <div style="font-size:11px;color:var(--text2);font-weight:700">${date}</div>
      </div>
      <span style="font-size:11px;font-weight:900;color:${status.color};background:${status.bg};padding:4px 10px;border-radius:20px">${status.label}</span>
    </div>`;
  }).join('');
  area.innerHTML = `
    <div class="result-card">
      <div style="padding:20px">
        <div class="items-title"><i class="fas fa-list"></i> طلباتك الأخيرة</div>
        ${rows}
      </div>
    </div>`;
}

/* ── Status logic ── */
function getStatusInfo(o) {
  const st = (o.status || '').toString();
  if (st === 'تم التسليم' || st === 'delivered') return { label:'تم التسليم ✅', color:'#fff', bg:'rgba(34,197,94,.25)', step:3 };
  if (o.orderPrepared || st === 'جاهز للاستلام') return { label:'جاهز للاستلام 📦', color:'#d4af37', bg:'rgba(212,175,55,.15)', step:2 };
  if (st === 'مكتمل' && !o.orderPrepared) return { label:'جاهز ✅', color:'#22c55e', bg:'rgba(34,197,94,.12)', step:2 };
  return { label:'قيد التجهيز ⏳', color:'#f59e0b', bg:'rgba(245,158,11,.12)', step:1 };
}

function getStepState(statusStep, thisStep) {
  if (thisStep < statusStep) return 'done';
  if (thisStep === statusStep) return 'active-step';
  return '';
}

/* ── Render single order ── */
window.renderOrderResult = function(o, area) {
  if (typeof area === 'string') area = document.getElementById('result-area');
  const status = getStatusInfo(o);
  const step = status.step;

  const date = o.createdAt
    ? new Date(o.createdAt.toDate ? o.createdAt.toDate() : o.createdAt)
        .toLocaleDateString('ar-EG',{year:'numeric',month:'long',day:'numeric',hour:'2-digit',minute:'2-digit'})
    : '—';

  const tot = parseFloat(o.totalPrice)||0;
  const rem = parseFloat(o.remainingAmount)||0;
  const paid = parseFloat(o.paidAmount)||tot-rem;
  const items = o.items || [];

  const itemsHTML = items.slice(0,6).map(i => `
    <div class="item-row">
      <div>
        <div class="item-name">${i.name||'—'}</div>
        <div class="item-qty">× ${i.qty||1}</div>
      </div>
      <div class="item-price">${((i.price||0)*(i.qty||1)).toFixed(2)} ج</div>
    </div>`).join('') + (items.length > 6 ? `<div style="text-align:center;font-size:11px;color:var(--text3);padding:6px">+${items.length-6} منتجات أخرى</div>` : '');

  const steps = [
    { icon:'fas fa-receipt',     label:'تم استلام الطلب',     sub:'تم تسجيل طلبك بنجاح' },
    { icon:'fas fa-box-open',    label:'قيد التجهيز',         sub:'يتم الآن تحضير طلبك' },
    { icon:'fas fa-boxes-stacked', label:'جاهز للاستلام',      sub:'طلبك أصبح جاهزاً' },
    { icon:'fas fa-truck-fast',  label:'تم التسليم',          sub:'تم تسليم طلبك بنجاح' },
  ];

  const stepsHTML = steps.map((s, i) => {
    const st = getStepState(step, i + 1);
    return `
      <div class="stepper-step ${st}">
        <div class="step-icon"><i class="${s.icon}"></i></div>
        <div class="step-info">
          <div class="step-label">${s.label}</div>
          <div class="step-sub">${st === 'done' ? '✅ ' : st === 'active-step' ? '🔄 ' : ''}${s.sub}</div>
        </div>
      </div>`;
  }).join('');

  const whatsapp = o.phone ? o.phone.replace(/[^0-9]/g,'') : '';

  area.innerHTML = `
    <div class="result-card">
      <!-- Header -->
      <div class="result-head">
        <div class="result-inv"><i class="fas fa-hashtag"></i> رقم الفاتورة</div>
        <div class="result-name">${o.invoiceNumber || o.id?.slice(0,10) || '—'}</div>
        <div class="result-date"><i class="fas fa-calendar-alt" style="color:var(--text3)"></i> ${date}</div>
        <div class="result-badge" style="color:${status.color};background:${status.bg}">${status.label}</div>
      </div>

      <!-- Stepper -->
      <div class="stepper">
        <div class="stepper-track">${stepsHTML}</div>
      </div>

      <!-- Items -->
      ${items.length ? `
      <div class="items-section">
        <div class="items-title"><i class="fas fa-shopping-bag"></i> المنتجات</div>
        ${itemsHTML}
      </div>` : ''}

      <!-- Totals -->
      <div class="totals-section">
        <div class="total-row"><span class="k">إجمالي الطلب</span><span class="v">${tot.toFixed(2)} ج</span></div>
        ${rem > 0 ? `
        <div class="total-row"><span class="k" style="color:var(--green)">المدفوع</span><span class="v" style="color:var(--green)">${paid.toFixed(2)} ج</span></div>
        <div class="total-row"><span class="k" style="color:var(--red)">المتبقي</span><span class="v" style="color:var(--red)">${rem.toFixed(2)} ج</span></div>
        ` : `
        <div class="total-row"><span class="k" style="color:var(--green)">✅ تم السداد بالكامل</span><span class="v" style="color:var(--green)">${tot.toFixed(2)} ج</span></div>
        `}
      </div>

      <!-- Actions -->
      <div class="action-row">
        ${whatsapp ? `
        <button class="action-btn action-whatsapp" onclick="window.open('https://wa.me/${whatsapp}','_blank')">
          <i class="fab fa-whatsapp"></i> تواصل معنا
        </button>` : ''}
        <button class="action-btn action-refresh" onclick="doSearch()">
          <i class="fas fa-sync-alt"></i> تحديث
        </button>
      </div>
    </div>`;
};

function pulse() {
  const inp = document.getElementById('search-inp');
  inp.style.borderColor = 'var(--red)';
  inp.style.animation = 'none';
  setTimeout(() => {
    inp.style.borderColor = '';
    inp.style.animation = '';
  }, 1500);
}

/* Auto-load if URL has ?id= */
window.addEventListener('DOMContentLoaded', () => {
  const params = new URLSearchParams(location.search);
  const id = params.get('id') || params.get('inv');
  if (id) {
    document.getElementById('search-inp').value = id;
    doSearch();
  }
});
</script>
</body>
</html>
