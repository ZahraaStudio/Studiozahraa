<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>المشتريات — كاشير الزهراء</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
<script src="shared.js"></script>
</head>
<body>
<div class="app-shell">
  <div id="sidebar"></div>
  <div class="page-content">
    <div class="page-header">
      <h1><i class="fas fa-cart-arrow-down"></i> فواتير المشتريات</h1>
      <button class="btn btn-primary" onclick="openAdd()"><i class="fas fa-plus"></i> فاتورة شراء جديدة</button>
    </div>
    <div class="page-body">
      <div id="pur-table"><div class="spinner"></div></div>
    </div>
  </div>
</div>

<div class="overlay" id="pur-modal">
  <div class="modal modal-lg">
    <div class="modal-header"><h3>فاتورة شراء جديدة</h3><button class="close-btn" onclick="closeModal('pur-modal')">✕</button></div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group"><label>المورد</label><select class="form-control" id="pur-sup"><option value="">اختر المورد</option></select></div>
        <div class="form-group"><label>التاريخ</label><input class="form-control" id="pur-date" type="date"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>رقم الفاتورة</label><input class="form-control" id="pur-no" placeholder="رقم فاتورة المورد"></div>
        <div class="form-group"><label>طريقة الدفع</label>
          <select class="form-control" id="pur-pay"><option>نقدي</option><option>آجل</option><option>جزئي</option></select></div>
      </div>
      <div style="margin-bottom:12px">
        <div style="font-size:12px;font-weight:700;color:var(--text2);margin-bottom:8px">البنود:</div>
        <div id="pur-items"></div>
        <button class="btn btn-ghost" style="width:100%;margin-top:8px" onclick="addPurItem()"><i class="fas fa-plus"></i> إضافة بند</button>
      </div>
      <div class="form-row">
        <div class="form-group"><label>إجمالي الفاتورة (ج)</label><input class="form-control" id="pur-total" readonly style="font-weight:900;color:var(--gold)"></div>
        <div class="form-group"><label>المبلغ المدفوع (ج)</label><input class="form-control" id="pur-paid" type="number" min="0" oninput="calcPur()"></div>
      </div>
      <div class="form-group"><label>ملاحظات</label><textarea class="form-control" id="pur-notes" rows="2"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-primary" onclick="savePurchase()"><i class="fas fa-save"></i> حفظ الفاتورة</button>
      <button class="btn btn-ghost" onclick="closeModal('pur-modal')">إلغاء</button>
    </div>
  </div>
</div>

<script>
injectSharedCSS();
let purchases = [], suppliers = [], products = [], purItems = [];

requireAuth(async () => {
  await Promise.all([loadSuppliers(), loadProducts(), loadPurchases()]);
});

async function loadSuppliers() {
  try {
    const snap = await db.collection('pos_suppliers').get();
    suppliers = [];
    snap.forEach(d => suppliers.push({ id: d.id, ...d.data() }));
    const sel = document.getElementById('pur-sup');
    sel.innerHTML = '<option value="">اختر المورد</option>' + suppliers.map(s=>`<option value="${s.id}">${s.name}</option>`).join('');
  } catch(e) {}
}

async function loadProducts() {
  try {
    const snap = await db.collection('products').get();
    products = [];
    snap.forEach(d => products.push({ id: d.id, ...d.data() }));
  } catch(e) {}
}

async function loadPurchases() {
  try {
    const snap = await db.collection('pos_purchases').orderBy('createdAt','desc').limit(100).get();
    purchases = [];
    snap.forEach(d => purchases.push({ id: d.id, ...d.data() }));
    render();
  } catch(e) {
    document.getElementById('pur-table').innerHTML = `<div class="empty-state"><i class="fas fa-cart-arrow-down"></i><p>لا توجد مشتريات</p></div>`;
  }
}

function render() {
  const el = document.getElementById('pur-table');
  if (!purchases.length) { el.innerHTML = `<div class="empty-state"><i class="fas fa-cart-arrow-down"></i><p>لا توجد فواتير شراء</p></div>`; return; }
  el.innerHTML = `<div class="tbl-wrap"><table>
    <thead><tr><th>رقم الفاتورة</th><th>المورد</th><th>التاريخ</th><th>الإجمالي</th><th>المدفوع</th><th>المتبقي</th><th>الحالة</th><th>إجراءات</th></tr></thead>
    <tbody>${purchases.map(p=>{
      const sup = suppliers.find(s=>s.id===p.supplierId);
      const rem = (p.total||0)-(p.paid||0);
      return `<tr>
        <td style="font-family:monospace">${p.invoiceNo||p.id.slice(0,8)}</td>
        <td style="font-weight:700">${sup?sup.name:p.supplierName||'—'}</td>
        <td style="font-size:11px">${fmtDate(p.createdAt)}</td>
        <td style="color:var(--gold);font-weight:900">${fmt(p.total)}</td>
        <td style="color:var(--green)">${fmt(p.paid)}</td>
        <td style="color:${rem>0?'var(--red)':'var(--green)'}">${fmt(rem)}</td>
        <td><span class="badge badge-${rem<=0?'green':'orange'}">${rem<=0?'مكتمل':'جزئي'}</span></td>
        <td><button class="btn btn-danger" style="padding:5px 8px;font-size:11px" onclick="delPurchase('${p.id}')"><i class="fas fa-trash"></i></button></td>
      </tr>`;
    }).join('')}</tbody>
  </table></div>`;
}

window.openAdd = () => {
  purItems = [{ product:'', qty:1, price:0 }];
  document.getElementById('pur-date').value = new Date().toISOString().split('T')[0];
  document.getElementById('pur-no').value = '';
  document.getElementById('pur-notes').value = '';
  document.getElementById('pur-paid').value = '';
  renderPurItems();
  openModal('pur-modal');
};

function renderPurItems() {
  const prodOpts = products.map(p=>`<option value="${p.id}" data-price="${p.cost||0}">${p.name}</option>`).join('');
  document.getElementById('pur-items').innerHTML = purItems.map((item,i)=>`
    <div style="display:grid;grid-template-columns:2fr 1fr 1fr auto;gap:6px;align-items:end;margin-bottom:6px">
      <div>
        <select class="form-control" onchange="purItemChange(${i},'product',this.value,this)" style="font-size:12px">
          <option value="">اختر منتج...</option>${prodOpts}
        </select>
      </div>
      <input class="form-control" type="number" min="1" value="${item.qty}" placeholder="الكمية" oninput="purItemChange(${i},'qty',this.value)" style="font-size:12px">
      <input class="form-control" type="number" min="0" step="0.01" value="${item.price}" placeholder="السعر" oninput="purItemChange(${i},'price',this.value)" style="font-size:12px">
      <button class="btn btn-danger" style="padding:5px 8px" onclick="remPurItem(${i})">🗑️</button>
    </div>`).join('');
  calcPur();
}

window.addPurItem = () => { purItems.push({ product:'', qty:1, price:0 }); renderPurItems(); };
window.remPurItem = i => { purItems.splice(i,1); renderPurItems(); };
window.purItemChange = (i, field, val, el) => {
  purItems[i][field] = field==='qty'||field==='price' ? parseFloat(val)||0 : val;
  if (field==='product' && el) {
    const opt = el.options[el.selectedIndex];
    const price = parseFloat(opt?.dataset?.price)||0;
    if (price > 0) purItems[i].price = price;
  }
  calcPur();
};

function calcPur() {
  const total = purItems.reduce((s,i)=>s+(i.qty||0)*(i.price||0),0);
  document.getElementById('pur-total').value = total.toFixed(2);
}

window.savePurchase = async () => {
  const supId = document.getElementById('pur-sup').value;
  const items = purItems.filter(i=>i.product&&i.qty>0);
  if (!items.length) { toast('أضف بنداً واحداً على الأقل','warn'); return; }
  const total = items.reduce((s,i)=>s+i.qty*i.price,0);
  const paid = parseFloat(document.getElementById('pur-paid').value)||0;
  const sup = suppliers.find(s=>s.id===supId);
  const data = {
    supplierId: supId,
    supplierName: sup?.name||'',
    invoiceNo: document.getElementById('pur-no').value.trim(),
    paymentMethod: document.getElementById('pur-pay').value,
    items: items.map(i=>({ productId:i.product, productName:products.find(p=>p.id===i.product)?.name||'', qty:i.qty, price:i.price, total:i.qty*i.price })),
    total, paid,
    notes: document.getElementById('pur-notes').value.trim(),
    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
    cashierId: currentUser?.uid,
  };
  try {
    await db.collection('pos_purchases').add(data);
    // Update stock
    for (const item of items) {
      if (item.product) {
        await db.collection('products').doc(item.product).update({
          stock: firebase.firestore.FieldValue.increment(item.qty),
          cost: item.price,
        });
      }
    }
    toast('✅ تم حفظ فاتورة الشراء وتحديث المخزون','ok');
    closeModal('pur-modal');
    loadPurchases();
  } catch(e) { toast('خطأ: '+e.message,'err'); }
};

window.delPurchase = async id => {
  if (!await confirm2('حذف هذه الفاتورة؟')) return;
  try { await db.collection('pos_purchases').doc(id).delete(); toast('🗑️ تم الحذف','ok'); loadPurchases(); }
  catch(e) { toast('خطأ: '+e.message,'err'); }
};

document.querySelectorAll('.overlay').forEach(m=>{m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('open');});});
</script>
</body>
</html>
