<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Store PRO</title>

<style>
body{
  margin:0;
  background:#0d0d0d;
  font-family:Cairo;
  color:white;
}

h2{
  text-align:center;
  color:gold;
  margin:15px;
}

input{
  width:90%;
  margin:10px auto;
  display:block;
  padding:10px;
  border-radius:10px;
  border:none;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
  gap:12px;
  padding:12px;
}

.card{
  background:#111;
  border-radius:15px;
  overflow:hidden;
}

/* SLIDER */
.slider{
  position:relative;
  width:100%;
  height:150px;
  overflow:hidden;
}

.slides{
  display:flex;
  transition:0.3s;
}

.slides img{
  width:100%;
  height:150px;
  object-fit:cover;
  flex-shrink:0;
  background:#222;
}

/* arrows FIXED */
.arrow{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background:rgba(0,0,0,0.4);
  border:none;
  color:white;
  font-size:14px;
  padding:4px 8px;
  cursor:pointer;
  border-radius:6px;
}

.prev{right:5px;}
.next{left:5px;}

/* dots */
.dots{
  position:absolute;
  bottom:5px;
  width:100%;
  text-align:center;
}

.dot{
  display:inline-block;
  width:6px;
  height:6px;
  background:#777;
  border-radius:50%;
  margin:2px;
}

.dot.active{
  background:gold;
}

/* FULLSCREEN PRO */
.fullscreen{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.95);
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  z-index:9999;
}

.fullscreen img{
  max-width:95%;
  max-height:75%;
  border-radius:10px;
}

.full-name{
  margin-top:10px;
  color:gold;
  font-size:18px;
}

.closeFull{
  position:absolute;
  top:20px;
  left:20px;
  font-size:22px;
  cursor:pointer;
}

/* FULLSCREEN arrows */
.full-arrow{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  font-size:25px;
  background:rgba(0,0,0,0.4);
  padding:5px 10px;
  cursor:pointer;
}

.full-prev{right:10px;}
.full-next{left:10px;}

button,a{
  display:block;
  margin:8px auto;
  padding:8px;
  width:90%;
  border-radius:20px;
  text-align:center;
  border:none;
  cursor:pointer;
}

a{
  background:#25D366;
  color:white;
  text-decoration:none;
}

button{
  background:gold;
  color:black;
  font-weight:bold;
}

#toast{
  position:fixed;
  bottom:-100px;
  left:50%;
  transform:translateX(-50%);
  background:#25D366;
  padding:10px 20px;
  border-radius:20px;
  transition:0.3s;
}
#toast.show{bottom:20px;}

</style>
</head>

<body>

<h2>🔥 Zahraa Store PRO</h2>

<input id="search" placeholder="ابحث عن منتج...">

<div class="grid" id="grid"></div>

<div class="fullscreen" id="full">
  <span class="closeFull" onclick="closeFull()">✕</span>

  <span class="full-arrow full-prev" onclick="moveFull(-1)">›</span>
  <span class="full-arrow full-next" onclick="moveFull(1)">‹</span>

  <img id="fullImg">
  <div class="full-name" id="fullName"></div>
</div>

<div id="toast">تمت الإضافة 🛒</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyCG6Yc0iH-rt-PaiRqL_V9Re1z49ZF3OMM",
authDomain: "zahraa-store-f4c90.firebaseapp.com",
projectId: "zahraa-store-f4c90"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let products = [];
let sliders = {};
let fullImages = [];
let fullIndex = 0;

/* FULLSCREEN */
window.openFull = (images,index,name)=>{
  fullImages = images;
  fullIndex = index;

  document.getElementById("full").style.display="flex";
  document.getElementById("fullImg").src = images[index];
  document.getElementById("fullName").innerText = name;
};

window.closeFull = ()=>{
  document.getElementById("full").style.display="none";
};

window.moveFull = (step)=>{
  fullIndex = (fullIndex + step + fullImages.length) % fullImages.length;
  document.getElementById("fullImg").src = fullImages[fullIndex];
};

/* SLIDER */
function createSlider(id,images,name){

  if(!images || !images.length) return "";

  sliders[id]=0;

  return `
  <div class="slider">

    <div class="slides" id="slides-${id}">
      ${images.map((img,i)=>`
        <img src="${img}" onclick="openFull(${JSON.stringify(images)},${i},'${name}')">
      `).join("")}
    </div>

    <button class="arrow prev" onclick="move('${id}',-1)">›</button>
    <button class="arrow next" onclick="move('${id}',1)">‹</button>

    <div class="dots">
      ${images.map((_,i)=>`
        <span class="dot ${i==0?'active':''}" id="dot-${id}-${i}"></span>
      `).join("")}
    </div>

  </div>`;
}

window.move = (id,step)=>{
  const slider = document.getElementById("slides-"+id);
  const imgs = slider.children.length;

  sliders[id]=(sliders[id]+step+imgs)%imgs;

  slider.style.transform = `translateX(-${sliders[id]*100}%)`;

  for(let i=0;i<imgs;i++){
    document.getElementById(`dot-${id}-${i}`).classList.remove("active");
  }
  document.getElementById(`dot-${id}-${sliders[id]}`).classList.add("active");
};

/* LOAD */
async function load(){
  const snap = await getDocs(collection(db,"products"));

  products = [];
  snap.forEach(d=>{
    products.push({id:d.id, ...d.data()});
  });

  render(products);
}

/* RENDER */
function render(list){

  document.getElementById("grid").innerHTML="";

  list.forEach(p=>{
    document.getElementById("grid").innerHTML += `
      <div class="card">

        ${createSlider(p.id,p.images,p.name)}

        <h3>${p.name}</h3>
        <p>${p.price} جنيه</p>

      </div>
    `;
  });
}

/* SEARCH */
document.getElementById("search").addEventListener("input",(e)=>{
  render(products.filter(p=>p.name.toLowerCase().includes(e.target.value.toLowerCase())));
});

load();

</script>

</body>
</html>
