<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Store PRO</title>

<style>
* {
  box-sizing: border-box;
}

body{
  margin:0;
  background: linear-gradient(135deg, #0d0d0d 0%, #1a1a1a 100%);
  font-family: 'Cairo', sans-serif;
  color:white;
  min-height: 100vh;
}

h2{
  text-align:center;
  background: linear-gradient(135deg, #ffd700, #ffed4e);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin:15px;
  font-size: 32px;
  font-weight: bold;
  text-shadow: 0 2px 10px rgba(255, 215, 0, 0.3);
  animation: glow 2s ease-in-out infinite;
}

@keyframes glow {
  0%, 100% { filter: drop-shadow(0 0 5px rgba(255, 215, 0, 0.5)); }
  50% { filter: drop-shadow(0 0 15px rgba(255, 215, 0, 0.8)); }
}

input{
  width:90%;
  margin:10px auto;
  display:block;
  padding:12px 15px;
  border-radius:15px;
  border:2px solid #ffd700;
  background: rgba(255, 255, 255, 0.1);
  color: white;
  font-size: 14px;
  transition: all 0.3s ease;
}

input::placeholder {
  color: rgba(255, 255, 255, 0.6);
}

input:focus {
  outline: none;
  background: rgba(255, 255, 255, 0.15);
  box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
  border-color: #ffed4e;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
  gap:15px;
  padding:15px;
  animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.card{
  background: linear-gradient(135deg, #1a1a1a 0%, #222 100%);
  border-radius:15px;
  overflow:hidden;
  border: 1px solid rgba(255, 215, 0, 0.2);
  transition: all 0.3s ease;
  box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
  display: flex;
  flex-direction: column;
}

.card:hover {
  transform: translateY(-8px);
  border-color: rgba(255, 215, 0, 0.6);
  box-shadow: 0 8px 25px rgba(255, 215, 0, 0.3);
}

.card-info {
  padding: 10px;
  text-align: center;
  cursor: pointer;
}

.card h3 {
  margin: 0 0 5px 0;
  font-size: 16px;
  color: #ffd700;
}

.card p {
  margin: 0;
  color: #ffed4e;
  font-weight: bold;
  font-size: 14px;
}

/* SLIDER */
.slider{
  position:relative;
  width:100%;
  height:180px;
  overflow:hidden;
  background: #0a0a0a;
}

.slides{
  display:flex;
  height: 100%;
  transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

.slides img{
  width:100%;
  height:100%;
  object-fit:cover;
  flex-shrink:0;
  background: #111;
  cursor: pointer;
}

/* arrows FIXED */
.arrow{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background: rgba(0, 0, 0, 0.5);
  border:none;
  color: #ffd700;
  font-size:16px;
  width: 28px;
  height: 28px;
  cursor:pointer;
  border-radius:50%;
  transition: all 0.3s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
  backdrop-filter: blur(2px);
}

.arrow:hover {
  background: rgba(212, 175, 55, 0.8);
  color: #000;
}

.prev{right:5px;}
.next{left:5px;}

/* dots */
.dots{
  position:absolute;
  bottom:8px;
  width:100%;
  text-align:center;
  z-index: 5;
}

.dot{
  display:inline-block;
  width:6px;
  height:6px;
  background: rgba(255, 255, 255, 0.3);
  border-radius:50%;
  margin:0 2px;
  transition: all 0.3s ease;
}

.dot.active{
  background: #ffd700;
  width: 12px;
  border-radius: 4px;
}

/* FULLSCREEN PRO */
.fullscreen{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.98);
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  z-index:9999;
}

.fullscreen img{
  max-width:95%;
  max-height:75%;
  border-radius:10px;
  box-shadow: 0 0 40px rgba(255, 215, 0, 0.2);
}

.full-name{
  margin-top:15px;
  color: #ffd700;
  font-size:20px;
  font-weight: bold;
}

.closeFull{
  position:absolute;
  top:20px;
  right:20px;
  font-size:24px;
  cursor:pointer;
  background: rgba(255, 215, 0, 0.8);
  color: #000;
  width: 35px;
  height: 35px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  border: none;
}

/* FULLSCREEN arrows */
.full-arrow{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  font-size:24px;
  background: rgba(255, 215, 0, 0.8);
  width: 40px;
  height: 40px;
  cursor:pointer;
  border-radius: 50%;
  color: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  border: none;
}

.full-prev{right:15px;}
.full-next{left:15px;}

.btn-group {
  padding: 0 10px 10px 10px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

button, .wa-link{
  display:block;
  padding:10px;
  width:100%;
  border-radius:12px;
  text-align:center;
  border:none;
  cursor:pointer;
  transition: all 0.3s ease;
  font-weight: bold;
  font-size: 14px;
  text-decoration: none;
}

.wa-link{
  background: linear-gradient(135deg, #25D366, #20BA58);
  color:white;
}

button.add-btn{
  background: linear-gradient(135deg, #ffd700, #ffed4e);
  color:black;
}

#toast{
  position:fixed;
  bottom:-100px;
  left:50%;
  transform:translateX(-50%);
  background: linear-gradient(135deg, #25D366, #20BA58);
  padding:12px 24px;
  border-radius:25px;
  transition: bottom 0.3s ease;
  font-weight: bold;
  box-shadow: 0 4px 15px rgba(37, 211, 102, 0.4);
  z-index: 10000;
}

#toast.show{ bottom:20px; }

@media (max-width: 768px) {
  h2 { font-size: 24px; }
  .grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; padding: 10px; }
}

</style>
</head>

<body>

<h2>🔥 Zahraa Store PRO</h2>

<input id="search" placeholder="ابحث عن منتج...">

<div class="grid" id="grid"></div>

<div class="fullscreen" id="full">
  <button class="closeFull" onclick="closeFull()">✕</button>
  <button class="full-arrow full-prev" onclick="moveFull(-1)">›</button>
  <button class="full-arrow full-next" onclick="moveFull(1)">‹</button>
  <img id="fullImg">
  <div class="full-name" id="fullName"></div>
</div>

<div id="toast">تمت الإضافة 🛒</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyCG6Yc0iH-rt-PaiRqL_V9Re1z49ZF3OMM",
authDomain: "zahraa-store-f4c90.firebaseapp.com",
projectId: "zahraa-store-f4c90"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let products = [];
let sliders = {};
let fullImages = [];
let fullIndex = 0;

window.openProduct = (id) => {
  const p = products.find(x => x.id === id);
  localStorage.setItem("product", JSON.stringify(p));
  window.location.href = "product.html";
};

window.openFull = (images, index, name, event) => {
  event.stopPropagation();
  fullImages = images;
  fullIndex = index;
  document.getElementById("full").style.display="flex";
  document.getElementById("fullImg").src = images[index];
  document.getElementById("fullName").innerText = name;
};

window.closeFull = ()=>{
  document.getElementById("full").style.display="none";
};

window.moveFull = (step)=>{
  fullIndex = (fullIndex + step + fullImages.length) % fullImages.length;
  document.getElementById("fullImg").src = fullImages[fullIndex];
};

function createSlider(id, images, name){
  if(!images || !images.length) return "";
  sliders[id] = 0;
  return `
  <div class="slider">
    <div class="slides" id="slides-${id}">
      ${images.map((img, i) => `
        <img src="${img}" onclick="openFull(${JSON.stringify(images)}, ${i}, '${name}', event)" alt="${name}">
      `).join("")}
    </div>
    ${images.length > 1 ? `
      <button class="arrow prev" onclick="move('${id}', -1, event)">›</button>
      <button class="arrow next" onclick="move('${id}', 1, event)">‹</button>
      <div class="dots">
        ${images.map((_, i) => `<span class="dot ${i==0?'active':''}" id="dot-${id}-${i}"></span>`).join("")}
      </div>
    ` : ''}
  </div>`;
}

window.move = (id, step, event) => {
  event.stopPropagation();
  const slider = document.getElementById("slides-"+id);
  const imgs = slider.children.length;
  sliders[id] = (sliders[id] + step + imgs) % imgs;
  slider.style.transform = `translateX(-${sliders[id]*100}%)`;
  for(let i=0; i<imgs; i++){
    document.getElementById(`dot-${id}-${i}`).classList.remove("active");
  }
  document.getElementById(`dot-${id}-${sliders[id]}`).classList.add("active");
};

async function load(){
  const snap = await getDocs(collection(db, "products"));
  products = [];
  snap.forEach(d => {
    products.push({id: d.id, ...d.data()});
  });
  render(products);
}

function render(list){
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  list.forEach(p => {
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      ${createSlider(p.id, p.images, p.name)}
      <div class="card-info" onclick="openProduct('${p.id}')">
        <h3>${p.name}</h3>
        <p>${p.price} جنيه</p>
      </div>
      <div class="btn-group">
        <button class="add-btn" onclick="addCart('${p.id}')">🛒 أضف للسلة</button>
        <a class="wa-link" href="https://wa.me/201204194540?text=${encodeURIComponent('عايز المنتج: ' + p.name)}">اطلب واتساب</a>
      </div>
    `;
    grid.appendChild(card);
  });
}

window.addCart = (id) => {
  const p = products.find(x => x.id === id);
  let cart = JSON.parse(localStorage.getItem("cart") || "[]");
  cart.push(p);
  localStorage.setItem("cart", JSON.stringify(cart));
  const toast = document.getElementById("toast");
  toast.classList.add("show");
  setTimeout(() => toast.classList.remove("show"), 2000);
};

document.getElementById("search").addEventListener("input", (e) => {
  render(products.filter(p => p.name.toLowerCase().includes(e.target.value.toLowerCase())));
});

load();

</script>
</body>
</html>
