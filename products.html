<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zahraa Studio</title>

<style>
body{
  margin:0;
  font-family:Cairo;
  background:#0d0d0d;
  color:white;
}

h2{
  text-align:center;
  color:#d4af37;
  margin:20px 0;
}

/* grid */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:20px;
  padding:20px;
}

/* card */
.card{
  background:#111;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 0 15px rgba(212,175,55,0.2);
  transition:0.4s;
  cursor:pointer;
}

.card:hover{
  transform:translateY(-10px);
  box-shadow:0 0 25px rgba(212,175,55,0.6);
}

/* images */
.slider img{
  width:100%;
  height:220px;
  object-fit:cover;
  display:none;
}

.slider img.active{
  display:block;
}

/* info */
.info{
  padding:15px;
  text-align:center;
}

.info h3{
  color:#d4af37;
  margin:10px 0;
}

/* button */
.btn{
  display:inline-block;
  margin-top:10px;
  padding:8px 15px;
  background:linear-gradient(45deg,#d4af37,#ffd700);
  color:black;
  border-radius:20px;
  text-decoration:none;
  font-weight:bold;
}
</style>
</head>

<body>

<h2>🔥 منتجاتنا</h2>

<div class="grid" id="grid"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCG6Yc0iH-rt-PaiRqL_V9Re1z49ZF3OMM",
  authDomain: "zahraa-store-f4c90.firebaseapp.com",
  projectId: "zahraa-store-f4c90"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const grid = document.getElementById("grid");

async function loadProducts(){

  const snap = await getDocs(collection(db,"products"));

  snap.forEach(doc => {

    const p = doc.data();

    const card = document.createElement("div");
    card.className = "card";

    let imgs = "";
    p.images.forEach((img,i)=>{
      imgs += `<img src="${img}" class="${i===0?'active':''}">`;
    });

    card.innerHTML = `
      <div class="slider">${imgs}</div>

      <div class="info">
        <h3>${p.name}</h3>

        <a class="btn"
        href="https://wa.me/201204194540?text=${encodeURIComponent("عايز المنتج: " + p.name)}"
        target="_blank">
        واتساب
        </a>
      </div>
    `;

    grid.appendChild(card);

    /* slider */
    const images = card.querySelectorAll("img");
    let i = 0;

    setInterval(()=>{
      images.forEach(img=>img.classList.remove("active"));
      i = (i+1)%images.length;
      images[i].classList.add("active");
    },2500);

  });
}

loadProducts();

</script>

</body>
</html>
