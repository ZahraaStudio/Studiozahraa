<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Store PRO</title>

<style>
body{
  margin:0;
  background:#0d0d0d;
  font-family:Cairo;
  color:white;
}

h2{
  text-align:center;
  color:gold;
  margin:15px;
}

input{
  width:90%;
  margin:10px auto;
  display:block;
  padding:10px;
  border-radius:10px;
  border:none;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
  gap:12px;
  padding:12px;
}

.card{
  background:#111;
  border-radius:15px;
  overflow:hidden;
}

/* SLIDER */
.slider{
  position:relative;
  width:100%;
  height:150px;
  overflow:hidden;
}

.slides{
  display:flex;
  transition:0.3s;
}

.slides img{
  width:100%;
  height:150px;
  object-fit:cover;
  flex-shrink:0;
}

/* arrows */
.arrow{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background:rgba(0,0,0,0.5);
  border:none;
  color:white;
  font-size:20px;
  padding:5px 10px;
  cursor:pointer;
}

.prev{right:5px;}
.next{left:5px;}

/* dots */
.dots{
  position:absolute;
  bottom:5px;
  width:100%;
  text-align:center;
}

.dot{
  display:inline-block;
  width:6px;
  height:6px;
  background:#999;
  border-radius:50%;
  margin:2px;
}

.dot.active{
  background:gold;
}

/* FULLSCREEN PRO */
.fullscreen{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.95);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
  flex-direction:column;
}

.fullscreen img{
  max-width:95%;
  max-height:80%;
  border-radius:10px;
  transition:0.3s;
}

.closeFull{
  position:absolute;
  top:20px;
  left:20px;
  font-size:25px;
  color:white;
  cursor:pointer;
}

/* BUTTONS */
button,a{
  display:block;
  margin:8px auto;
  padding:8px;
  width:90%;
  border-radius:20px;
  text-align:center;
  border:none;
  cursor:pointer;
}

a{
  background:#25D366;
  color:white;
  text-decoration:none;
}

button{
  background:gold;
  color:black;
  font-weight:bold;
}

/* CART */
#overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:none;
  z-index:999;
}

#cartDrawer{
  position:fixed;
  top:0;
  right:-100%;
  width:85%;
  max-width:380px;
  height:100%;
  background:#111;
  z-index:1000;
  transition:0.35s;
  padding:10px;
  overflow-y:auto;
}

#cartDrawer.open{right:0;}

.cart-item{
  background:#1a1a1a;
  padding:10px;
  border-radius:10px;
  margin:10px 0;
}

.qty{
  display:flex;
  justify-content:center;
  gap:10px;
}

.qty button{
  width:30px;
  height:30px;
  border-radius:50%;
}

.remove{
  background:red;
  color:white;
}

#toast{
  position:fixed;
  bottom:-100px;
  left:50%;
  transform:translateX(-50%);
  background:#25D366;
  padding:10px 20px;
  border-radius:20px;
  transition:0.3s;
}
#toast.show{bottom:20px;}

</style>
</head>

<body>

<h2>🔥 Zahraa Store PRO</h2>

<input id="search" placeholder="ابحث عن منتج...">

<button onclick="openCart()">🛒 السلة</button>
<button onclick="goCheckout()">💳 إنهاء الطلب</button>

<div class="grid" id="grid"></div>

<div class="fullscreen" id="full">
  <span class="closeFull" onclick="closeFull()">✕</span>
  <img id="fullImg">
</div>

<div id="overlay" onclick="closeCart()"></div>

<div id="cartDrawer">
  <h3>🛒 السلة</h3>
  <div id="cartItems"></div>
  <h4 id="total">الإجمالي: 0 جنيه</h4>
</div>

<div id="toast">تمت الإضافة 🛒</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyCG6Yc0iH-rt-PaiRqL_V9Re1z49ZF3OMM",
authDomain: "zahraa-store-f4c90.firebaseapp.com",
projectId: "zahraa-store-f4c90"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let products = [];
let cart = JSON.parse(localStorage.getItem("cart") || "[]");

const grid = document.getElementById("grid");

/* FULLSCREEN */
window.openFull = (src)=>{
  document.getElementById("full").style.display="flex";
  document.getElementById("fullImg").src = src;
};
window.closeFull = ()=>{
  document.getElementById("full").style.display="none";
};

/* SLIDER */
let sliders = {};

function createSlider(id,images){

  if(!images || !images.length) return "";

  sliders[id]=0;

  return `
  <div class="slider">

    <div class="slides" id="slides-${id}">
      ${images.map(img=>`
        <img src="${img}" onclick="openFull('${img}')">
      `).join("")}
    </div>

    <button class="arrow prev" onclick="move('${id}',-1)">›</button>
    <button class="arrow next" onclick="move('${id}',1)">‹</button>

    <div class="dots">
      ${images.map((_,i)=>`
        <span class="dot ${i==0?'active':''}" id="dot-${id}-${i}"></span>
      `).join("")}
    </div>

  </div>`;
}

window.move = (id,step)=>{
  const slider = document.getElementById("slides-"+id);
  const imgs = slider.children.length;

  sliders[id]=(sliders[id]+step+imgs)%imgs;

  slider.style.transform = `translateX(-${sliders[id]*100}%)`;

  for(let i=0;i<imgs;i++){
    document.getElementById(`dot-${id}-${i}`).classList.remove("active");
  }
  document.getElementById(`dot-${id}-${sliders[id]}`).classList.add("active");
};

/* LOAD */
async function load(){
  const snap = await getDocs(collection(db,"products"));

  products = [];
  snap.forEach(d=>{
    products.push({id:d.id, ...d.data()});
  });

  render(products);
}

/* RENDER */
function render(list){

  grid.innerHTML="";

  list.forEach(p=>{

    const wa = encodeURIComponent(`عايز المنتج: ${p.name}`);

    grid.innerHTML += `
      <div class="card">

        ${createSlider(p.id,p.images)}

        <h3>${p.name}</h3>
        <p>${p.price} جنيه</p>

        <a href="https://wa.me/201204194540?text=${wa}" target="_blank">اطلب واتساب</a>

        <button onclick="addCart('${p.id}')">أضف للسلة</button>
      </div>
    `;
  });
}

/* CART */
window.addCart = (id)=>{
  const p = products.find(x=>x.id===id);

  let item = cart.find(x=>x.id===id);

  if(item){
    item.qty++;
  }else{
    cart.push({id:p.id,name:p.name,price:Number(p.price),qty:1});
  }

  localStorage.setItem("cart",JSON.stringify(cart));
  toast();
};

function toast(){
  const t=document.getElementById("toast");
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),1200);
}

/* SEARCH */
document.getElementById("search").addEventListener("input",(e)=>{
  render(products.filter(p=>p.name.toLowerCase().includes(e.target.value.toLowerCase())));
});

load();

</script>

</body>
</html>
