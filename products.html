<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Store PRO</title>

<style>
body{
  margin:0;
  background:#0d0d0d;
  font-family:Cairo;
  color:white;
}

h2{
  text-align:center;
  color:gold;
  margin:15px;
}

input{
  width:90%;
  margin:10px auto;
  display:block;
  padding:10px;
  border-radius:10px;
  border:none;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
  gap:12px;
  padding:12px;
}

.card{
  background:#111;
  border-radius:15px;
  overflow:hidden;
}

.card img{
  width:100%;
  height:150px;
  object-fit:cover;
}

.card h3{
  text-align:center;
  font-size:14px;
  color:gold;
  padding:5px;
}

.card p{
  text-align:center;
  margin:0;
  color:#fff;
}

a,button{
  display:block;
  margin:8px auto;
  padding:8px;
  width:90%;
  border-radius:20px;
  text-align:center;
  border:none;
  cursor:pointer;
}

a{
  background:#25D366;
  color:white;
  text-decoration:none;
  font-weight:bold;
}

button{
  background:gold;
  color:black;
  font-weight:bold;
}
</style>
</head>

<body>

<h2>🔥 Zahraa Store PRO</h2>

<input id="search" placeholder="ابحث عن منتج...">

<button onclick="showCart()">🛒 السلة</button>

<div class="grid" id="grid"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyCG6Yc0iH-rt-PaiRqL_V9Re1z49ZF3OMM",
authDomain: "zahraa-store-f4c90.firebaseapp.com",
projectId: "zahraa-store-f4c90"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let products = [];
let cart = JSON.parse(localStorage.getItem("cart") || "[]");

const grid = document.getElementById("grid");

/* LOAD */
async function load(){

  const snap = await getDocs(collection(db,"products"));

  products = [];

  snap.forEach(d=>{
    products.push({id:d.id, ...d.data()});
  });

  render(products);
}

/* RENDER */
function render(list){

  grid.innerHTML = "";

  list.forEach(p=>{

    const img = p.images?.[0] || "";

    const wa = encodeURIComponent(
`عايز المنتج: ${p.name}
💰 السعر: ${p.price} جنيه`
    );

    grid.innerHTML += `
      <div class="card">
        <img loading="lazy" src="${img}">
        <h3>${p.name}</h3>
        <p>💰 ${p.price} جنيه</p>

        <a href="https://wa.me/201204194540?text=${wa}" target="_blank">
          اطلب واتساب
        </a>

        <button onclick="addCart('${p.id}')">
          أضف للسلة
        </button>
      </div>
    `;
  });
}

/* SEARCH */
document.getElementById("search").addEventListener("input",(e)=>{

  const val = e.target.value.toLowerCase();

  render(products.filter(p =>
    p.name.toLowerCase().includes(val)
  ));

});

/* CART */
window.addCart = (id)=>{

  const p = products.find(x=>x.id===id);

  cart.push({
    name:p.name,
    price:p.price
  });

  localStorage.setItem("cart", JSON.stringify(cart));

  alert("تمت الإضافة 🛒");
};

/* SHOW CART */
window.showCart = ()=>{

  let total = 0;
  let text = "🛒 السلة:\n\n";

  cart.forEach(p=>{
    text += `- ${p.name} | ${p.price} جنيه\n`;
    total += Number(p.price);
  });

  text += "\n-----------------\n";
  text += "💰 الإجمالي: " + total + " جنيه";

  alert(text);
};

load();

</script>

</body>
</html>
