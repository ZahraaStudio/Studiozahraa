<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Products</title>

<style>
body{background:#0d0d0d;color:white;font-family:Cairo}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:15px;padding:20px}
.card{background:#111;border-radius:10px;overflow:hidden}
img{width:100%;height:200px;object-fit:cover}
h3{text-align:center;color:gold}
</style>
</head>

<body>

<h2 style="text-align:center;color:gold">منتجاتنا</h2>

<div class="grid" id="grid"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCG6Yc0iH-rt-PaiRqL_V9Re1z49ZF3OMM",
  authDomain: "zahraa-store-f4c90.firebaseapp.com",
  projectId: "zahraa-store-f4c90"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const grid=document.getElementById("grid");

async function load(){
  const snap=await getDocs(collection(db,"products"));

  snap.forEach(d=>{
    const p=d.data();

    grid.innerHTML+=`
      <div class="card">
        <img src="${p.images[0]}">
        <h3>${p.name}</h3>
      </div>
    `;
  });
}

load();

</script>

</body>
</html>
