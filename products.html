!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Store PRO</title>

<style>
* {
  box-sizing: border-box;
}

body{
  margin:0;
  background: linear-gradient(135deg, #0d0d0d 0%, #1a1a1a 100%);
  font-family: 'Cairo', sans-serif;
  color:white;
  min-height: 100vh;
}

h2{
  text-align:center;
  background: linear-gradient(135deg, #ffd700, #ffed4e);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin:15px;
  font-size: 32px;
  font-weight: bold;
  text-shadow: 0 2px 10px rgba(255, 215, 0, 0.3);
  animation: glow 2s ease-in-out infinite;
}

@keyframes glow {
  0%, 100% { filter: drop-shadow(0 0 5px rgba(255, 215, 0, 0.5)); }
  50% { filter: drop-shadow(0 0 15px rgba(255, 215, 0, 0.8)); }
}

input{
  width:90%;
  margin:10px auto;
  display:block;
  padding:12px 15px;
  border-radius:15px;
  border:2px solid #ffd700;
  background: rgba(255, 255, 255, 0.1);
  color: white;
  font-size: 14px;
  transition: all 0.3s ease;
}

input::placeholder {
  color: rgba(255, 255, 255, 0.6);
}

input:focus {
  outline: none;
  background: rgba(255, 255, 255, 0.15);
  box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
  border-color: #ffed4e;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
  gap:15px;
  padding:15px;
  animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.card{
  background: linear-gradient(135deg, #1a1a1a 0%, #222 100%);
  border-radius:15px;
  overflow:hidden;
  border: 1px solid rgba(255, 215, 0, 0.2);
  transition: all 0.3s ease;
  box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
}

.card:hover {
  transform: translateY(-8px);
  border-color: rgba(255, 215, 0, 0.6);
  box-shadow: 0 8px 25px rgba(255, 215, 0, 0.3);
}

.card h3 {
  margin: 10px;
  font-size: 16px;
  color: #ffd700;
  text-align: center;
}

.card p {
  margin: 5px 10px;
  text-align: center;
  color: #ffed4e;
  font-weight: bold;
  font-size: 14px;
}

/* SLIDER */
.slider{
  position:relative;
  width:100%;
  height:150px;
  overflow:hidden;
  background: #0a0a0a;
}

.slides{
  display:flex;
  transition: transform 0.4s ease;
}

.slides img{
  width:100%;
  height:150px;
  object-fit:cover;
  flex-shrink:0;
  background: linear-gradient(135deg, #222 0%, #111 100%);
}

/* arrows FIXED */
.arrow{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background: rgba(255, 215, 0, 0.8);
  border:none;
  color: #000;
  font-size:18px;
  padding:6px 10px;
  cursor:pointer;
  border-radius:6px;
  transition: all 0.3s ease;
  font-weight: bold;
  z-index: 10;
}

.arrow:hover {
  background: rgba(255, 237, 74, 1);
  transform: translateY(-50%) scale(1.1);
  box-shadow: 0 4px 12px rgba(255, 215, 0, 0.6);
}

.prev{right:8px;}
.next{left:8px;}

/* dots */
.dots{
  position:absolute;
  bottom:8px;
  width:100%;
  text-align:center;
  z-index: 5;
}

.dot{
  display:inline-block;
  width:8px;
  height:8px;
  background: rgba(255, 255, 255, 0.4);
  border-radius:50%;
  margin:3px;
  transition: all 0.3s ease;
  cursor: pointer;
}

.dot:hover {
  background: rgba(255, 255, 255, 0.7);
}

.dot.active{
  background: #ffd700;
  transform: scale(1.3);
}

/* FULLSCREEN PRO */
.fullscreen{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.98);
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  z-index:9999;
  animation: fadeInFull 0.3s ease;
}

@keyframes fadeInFull {
  from { opacity: 0; }
  to { opacity: 1; }
}

.fullscreen img{
  max-width:95%;
  max-height:75%;
  border-radius:10px;
  box-shadow: 0 0 40px rgba(255, 215, 0, 0.4);
  animation: slideInImg 0.3s ease;
}

@keyframes slideInImg {
  from { transform: scale(0.9); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

.full-name{
  margin-top:15px;
  color: #ffd700;
  font-size:20px;
  font-weight: bold;
}

.closeFull{
  position:absolute;
  top:20px;
  right:20px;
  font-size:28px;
  cursor:pointer;
  background: rgba(255, 215, 0, 0.8);
  color: #000;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s ease;
  border: none;
}

.closeFull:hover {
  background: rgba(255, 237, 74, 1);
  transform: scale(1.1);
}

/* FULLSCREEN arrows */
.full-arrow{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  font-size:28px;
  background: rgba(255, 215, 0, 0.8);
  padding:8px 12px;
  cursor:pointer;
  border-radius: 8px;
  color: #000;
  font-weight: bold;
  transition: all 0.3s ease;
  border: none;
}

.full-arrow:hover {
  background: rgba(255, 237, 74, 1);
  transform: translateY(-50%) scale(1.15);
  box-shadow: 0 4px 15px rgba(255, 215, 0, 0.6);
}

.full-prev{right:20px;}
.full-next{left:20px;}

button,a{
  display:block;
  margin:8px auto;
  padding:10px;
  width:90%;
  border-radius:20px;
  text-align:center;
  border:none;
  cursor:pointer;
  transition: all 0.3s ease;
  font-weight: bold;
}

a{
  background: linear-gradient(135deg, #25D366, #20BA58);
  color:white;
  text-decoration:none;
}

a:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(37, 211, 102, 0.4);
}

button{
  background: linear-gradient(135deg, #ffd700, #ffed4e);
  color:black;
  font-weight:bold;
}

button:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(255, 215, 0, 0.4);
}

#toast{
  position:fixed;
  bottom:-100px;
  left:50%;
  transform:translateX(-50%);
  background: linear-gradient(135deg, #25D366, #20BA58);
  padding:12px 24px;
  border-radius:25px;
  transition: bottom 0.3s ease;
  font-weight: bold;
  box-shadow: 0 4px 15px rgba(37, 211, 102, 0.4);
  z-index: 10000;
}

#toast.show{
  bottom:20px;
  animation: slideUp 0.3s ease;
}

@keyframes slideUp {
  from { transform: translateX(-50%) translateY(20px); opacity: 0; }
  to { transform: translateX(-50%) translateY(0); opacity: 1; }
}

/* Loading animation */
.loading {
  display: inline-block;
  width: 8px;
  height: 8px;
  background: currentColor;
  border-radius: 50%;
  animation: pulse 1.5s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

/* Responsive */
@media (max-width: 768px) {
  h2 {
    font-size: 24px;
  }
  
  .grid {
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 12px;
    padding: 12px;
  }
  
  .arrow {
    font-size: 16px;
    padding: 5px 8px;
  }
  
  .full-arrow {
    font-size: 24px;
    padding: 6px 10px;
  }
}

</style>
</head>

<body>

<h2>🔥 Zahraa Store PRO</h2>

<input id="search" placeholder="ابحث عن منتج...">

<div class="grid" id="grid"></div>

<div class="fullscreen" id="full">
  <button class="closeFull" onclick="closeFull()">✕</button>

  <button class="full-arrow full-prev" onclick="moveFull(-1)">›</button>
  <button class="full-arrow full-next" onclick="moveFull(1)">‹</button>

  <img id="fullImg">
  <div class="full-name" id="fullName"></div>
</div>

<div id="toast">تمت الإضافة 🛒</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyCG6Yc0iH-rt-PaiRqL_V9Re1z49ZF3OMM",
authDomain: "zahraa-store-f4c90.firebaseapp.com",
projectId: "zahraa-store-f4c90"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let products = [];
let sliders = {};
let fullImages = [];
let fullIndex = 0;

/* FULLSCREEN */
window.openFull = (images,index,name)=>{
  fullImages = images;
  fullIndex = index;

  document.getElementById("full").style.display="flex";
  document.getElementById("fullImg").src = images[index];
  document.getElementById("fullName").innerText = name;
};

window.closeFull = ()=>{
  document.getElementById("full").style.display="none";
};

window.moveFull = (step)=>{
  fullIndex = (fullIndex + step + fullImages.length) % fullImages.length;
  document.getElementById("fullImg").src = fullImages[fullIndex];
};

/* SLIDER */
function createSlider(id,images,name){

  if(!images || !images.length) return "";

  sliders[id]=0;

  return `
  <div class="slider">

    <div class="slides" id="slides-${id}">
      ${images.map((img,i)=>`
        <img src="${img}" onclick="openFull(${JSON.stringify(images)},${i},'${name}')" alt="${name}">
      `).join("")}
    </div>

    <button class="arrow prev" onclick="move('${id}',-1)">›</button>
    <button class="arrow next" onclick="move('${id}',1)">‹</button>

    <div class="dots">
      ${images.map((_,i)=>`
        <span class="dot ${i==0?'active':''}" id="dot-${id}-${i}" onclick="jumpToSlide('${id}',${i})"></span>
      `).join("")}
    </div>

  </div>`;
}

window.move = (id,step)=>{
  const slider = document.getElementById("slides-"+id);
  const imgs = slider.children.length;

  sliders[id]=(sliders[id]+step+imgs)%imgs;

  slider.style.transform = `translateX(-${sliders[id]*100}%)`;

  for(let i=0;i<imgs;i++){
    document.getElementById(`dot-${id}-${i}`).classList.remove("active");
  }
  document.getElementById(`dot-${id}-${sliders[id]}`).classList.add("active");
};

window.jumpToSlide = (id, index) => {
  const slider = document.getElementById("slides-"+id);
  const imgs = slider.children.length;
  
  sliders[id] = index;
  slider.style.transform = `translateX(-${sliders[id]*100}%)`;
  
  for(let i=0;i<imgs;i++){
    document.getElementById(`dot-${id}-${i}`).classList.remove("active");
  }
  document.getElementById(`dot-${id}-${index}`).classList.add("active");
};

/* LOAD */
async function load(){
  const snap = await getDocs(collection(db,"products"));

  products = [];
  snap.forEach(d=>{
    products.push({id:d.id, ...d.data()});
  });

  render(products);
}

/* RENDER */
function render(list){

  document.getElementById("grid").innerHTML="";

  list.forEach(p=>{
    document.getElementById("grid").innerHTML += `
      <div class="card">

        ${createSlider(p.id,p.images,p.name)}

        <h3>${p.name}</h3>
        <p>${p.price} جنيه</p>

      </div>
    `;
  });
}

/* SEARCH */
document.getElementById("search").addEventListener("input",(e)=>{
  render(products.filter(p=>p.name.toLowerCase().includes(e.target.value.toLowerCase())));
});

load();

</script>

</body>
</html>
