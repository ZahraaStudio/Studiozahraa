<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Store</title>

<style>
body{background:#0d0d0d;color:white;font-family:Cairo}
h2{text-align:center;color:gold}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:10px;
  padding:10px;
}

.card{
  background:#111;
  border-radius:15px;
  overflow:hidden;
  text-align:center;
}

img{
  width:100%;
  height:160px;
  object-fit:cover;
}

h3{
  color:gold;
  font-size:14px;
}

a{
  display:block;
  background:#25D366;
  color:white;
  padding:8px;
  margin:10px;
  border-radius:20px;
  text-decoration:none;
}
</style>
</head>

<body>

<h2>🔥 منتجاتنا</h2>

<div class="grid" id="grid"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyCG6Yc0iH-rt-PaiRqL_V9Re1z49ZF3OMM",
authDomain: "zahraa-store-f4c90.firebaseapp.com",
projectId: "zahraa-store-f4c90"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const grid = document.getElementById("grid");

async function load(){

  const snap = await getDocs(collection(db,"products"));

  snap.forEach(d=>{

    const p = d.data();

    const name = p.name || "منتج";

    const waText = encodeURIComponent("عايز المنتج: " + name);

    const waLink = `https://wa.me/201204194540?text=${waText}`;

    grid.innerHTML += `
      <div class="card">
        <img src="${p.images?.[0] || ''}">
        <h3>${name}</h3>
        <a href="${waLink}" target="_blank">اطلب واتساب</a>
      </div>
    `;
  });
}

load();

</script>

</body>
</html>
