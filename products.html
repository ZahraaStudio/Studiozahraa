<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Store PRO</title>

<style>
body{
  margin:0;
  background:#0d0d0d;
  font-family:Cairo;
  color:white;
}

h2{
  text-align:center;
  color:gold;
  margin:15px;
}

input{
  width:90%;
  margin:10px auto;
  display:block;
  padding:10px;
  border-radius:10px;
  border:none;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
  gap:12px;
  padding:12px;
}

.card{
  background:#111;
  border-radius:15px;
  overflow:hidden;
}

/* SLIDER */
.slider{
  position:relative;
  width:100%;
  height:150px;
  overflow:hidden;
}

.slides{
  display:flex;
  transition:transform 0.3s ease;
}

.slides img{
  width:100%;
  height:150px;
  object-fit:cover;
  flex-shrink:0;
}

/* DOTS */
.dots{
  position:absolute;
  bottom:5px;
  width:100%;
  text-align:center;
}

.dot{
  height:6px;
  width:6px;
  background:#666;
  display:inline-block;
  border-radius:50%;
  margin:2px;
}

.dot.active{
  background:gold;
}

/* FULLSCREEN */
.fullscreen{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

.fullscreen img{
  max-width:100%;
  max-height:100%;
  transform:scale(1);
  transition:transform 0.3s;
}

.card h3{
  text-align:center;
  font-size:14px;
  color:gold;
  padding:5px;
}

.card p{
  text-align:center;
  margin:0;
  color:#fff;
}

button,a{
  display:block;
  margin:8px auto;
  padding:8px;
  width:90%;
  border-radius:20px;
  text-align:center;
  border:none;
  cursor:pointer;
}

a{
  background:#25D366;
  color:white;
  text-decoration:none;
  font-weight:bold;
}

button{
  background:gold;
  color:black;
  font-weight:bold;
}
</style>
</head>

<body>

<h2>🔥 Zahraa Store PRO</h2>

<input id="search" placeholder="ابحث عن منتج...">

<button onclick="showCart()">🛒 السلة</button>
<button onclick="goCheckout()">💳 إنهاء الطلب</button>

<div class="grid" id="grid"></div>

<!-- FULLSCREEN -->
<div class="fullscreen" id="full" onclick="closeFull()">
  <img id="fullImg">
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyCG6Yc0iH-rt-PaiRqL_V9Re1z49ZF3OMM",
authDomain: "zahraa-store-f4c90.firebaseapp.com",
projectId: "zahraa-store-f4c90"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let products = [];
let cart = JSON.parse(localStorage.getItem("cart") || "[]");

const grid = document.getElementById("grid");

/* LOAD */
async function load(){
  const snap = await getDocs(collection(db,"products"));

  products = [];
  snap.forEach(d=>{
    products.push({id:d.id, ...d.data()});
  });

  render(products);
}

/* OPEN FULLSCREEN */
window.openFull = (src)=>{
  document.getElementById("full").style.display="flex";
  document.getElementById("fullImg").src = src;
};

window.closeFull = ()=>{
  document.getElementById("full").style.display="none";
};

/* SLIDER LOGIC */
function createSlider(images, id){

  let index = 0;

  return `
  <div class="slider" id="s-${id}">

    <div class="slides" style="transform:translateX(0%)">
      ${images.map(img=>`
        <img src="${img}" onclick="openFull('${img}')">
      `).join("")}
    </div>

    <div class="dots">
      ${images.map((_,i)=>`
        <span class="dot ${i===0?'active':''}"></span>
      `).join("")}
    </div>

  </div>`;
}

/* AUTO SLIDE */
function autoSlide(){

  document.querySelectorAll(".slider").forEach(slider=>{

    let slides = slider.querySelector(".slides");
    let imgs = slider.querySelectorAll("img");
    let dots = slider.querySelectorAll(".dot");

    let index = 0;

    setInterval(()=>{

      index++;
      if(index >= imgs.length) index = 0;

      slides.style.transform = `translateX(-${index*100}%)`;

      dots.forEach(d=>d.classList.remove("active"));
      dots[index].classList.add("active");

    },3000);

  });
}

/* RENDER */
function render(list){

  grid.innerHTML = "";

  list.forEach(p=>{

    const imgs = p.images || [];

    const wa = encodeURIComponent(
`عايز المنتج: ${p.name}
💰 السعر: ${p.price} جنيه`
    );

    grid.innerHTML += `
      <div class="card">

        ${createSlider(imgs,p.id)}

        <h3>${p.name}</h3>
        <p>💰 ${p.price} جنيه</p>

        <a href="https://wa.me/201204194540?text=${wa}" target="_blank">
          اطلب واتساب
        </a>

        <button onclick="addCart('${p.id}')">
          أضف للسلة
        </button>
      </div>
    `;
  });

  autoSlide();
}

/* SEARCH */
document.getElementById("search").addEventListener("input",(e)=>{
  const val = e.target.value.toLowerCase();
  render(products.filter(p=>p.name.toLowerCase().includes(val)));
});

/* CART */
window.addCart = (id)=>{

  const p = products.find(x=>x.id===id);

  cart.push({name:p.name, price:p.price});

  localStorage.setItem("cart", JSON.stringify(cart));

  alert("تمت الإضافة 🛒");
};

/* CART */
window.showCart = ()=>{

  let total=0;
  let text="🛒 السلة:\n\n";

  cart.forEach(p=>{
    text += `- ${p.name} | ${p.price} جنيه\n`;
    total+=Number(p.price);
  });

  text += "\n💰 الإجمالي: "+total;

  alert(text);
};

window.goCheckout = ()=>{
  window.location.href="checkout.html";
};

load();

</script>

</body>
</html>
