<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Store PRO</title>

<style>
body{
  margin:0;
  background:#0d0d0d;
  font-family:Cairo;
  color:white;
}

h2{
  text-align:center;
  color:gold;
  margin:15px;
}

input{
  width:90%;
  margin:10px auto;
  display:block;
  padding:10px;
  border-radius:10px;
  border:none;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
  gap:12px;
  padding:12px;
}

.card{
  background:#111;
  border-radius:15px;
  overflow:hidden;
}

/* SLIDER */
.slider{
  position:relative;
  width:100%;
  height:150px;
  overflow:hidden;
}

.slides{
  display:flex;
}

.slides img{
  width:100%;
  height:150px;
  object-fit:cover;
  flex-shrink:0;
}

/* FULLSCREEN */
.fullscreen{
  position:fixed;
  inset:0;
  background:black;
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

.fullscreen img{
  max-width:100%;
  max-height:100%;
}

/* BUTTONS */
button,a{
  display:block;
  margin:8px auto;
  padding:8px;
  width:90%;
  border-radius:20px;
  text-align:center;
  border:none;
  cursor:pointer;
}

a{
  background:#25D366;
  color:white;
  text-decoration:none;
}

button{
  background:gold;
  color:black;
  font-weight:bold;
}

/* ================= CART SHOPIFY PRO ================= */

#overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:none;
  z-index:999;
}

#cartDrawer{
  position:fixed;
  top:0;
  right:-100%;
  width:85%;
  max-width:380px;
  height:100%;
  background:#111;
  z-index:1000;
  transition:0.35s;
  padding:10px;
  overflow-y:auto;
}

#cartDrawer.open{
  right:0;
}

#cartDrawer h3{
  text-align:center;
  color:gold;
}

.cart-item{
  background:#1a1a1a;
  padding:10px;
  border-radius:10px;
  margin:10px 0;
}

.qty{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:5px;
}

.qty button{
  width:30px;
  height:30px;
  border-radius:50%;
}

.remove{
  background:red;
  color:white;
  width:100%;
  margin-top:5px;
}

.cart-footer{
  position:sticky;
  bottom:0;
  background:#111;
  padding:10px;
  border-top:1px solid #333;
}

/* TOAST PRO */
#toast{
  position:fixed;
  bottom:-100px;
  left:50%;
  transform:translateX(-50%);
  background:#25D366;
  padding:10px 20px;
  border-radius:20px;
  transition:0.3s;
}
#toast.show{
  bottom:20px;
}
</style>
</head>

<body>

<h2>🔥 Zahraa Store PRO</h2>

<input id="search" placeholder="ابحث عن منتج...">

<button onclick="openCart()">🛒 السلة</button>
<button onclick="goCheckout()">💳 إنهاء الطلب</button>

<div class="grid" id="grid"></div>

<div class="fullscreen" id="full" onclick="closeFull()">
  <img id="fullImg">
</div>

<!-- CART -->
<div id="overlay" onclick="closeCart()"></div>

<div id="cartDrawer">
  <h3>🛒 السلة</h3>
  <div id="cartItems"></div>

  <div class="cart-footer">
    <h4 id="total">الإجمالي: 0 جنيه</h4>
  </div>
</div>

<div id="toast">تمت الإضافة 🛒</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyCG6Yc0iH-rt-PaiRqL_V9Re1z49ZF3OMM",
authDomain: "zahraa-store-f4c90.firebaseapp.com",
projectId: "zahraa-store-f4c90"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let products = [];
let cart = JSON.parse(localStorage.getItem("cart") || "[]");

const grid = document.getElementById("grid");

/* LOAD */
async function load(){
  const snap = await getDocs(collection(db,"products"));

  products = [];
  snap.forEach(d=>{
    products.push({id:d.id, ...d.data()});
  });

  render(products);
}

/* FULLSCREEN */
window.openFull = (src)=>{
  document.getElementById("full").style.display="flex";
  document.getElementById("fullImg").src = src;
};

window.closeFull = ()=>{
  document.getElementById("full").style.display="none";
};

/* SLIDER */
function createSlider(images){
  if(!images) return "";

  return `
  <div class="slider">
    <div class="slides">
      ${images.map(img=>`
        <img src="${img}" onclick="openFull('${img}')">
      `).join("")}
    </div>
  </div>`;
}

/* RENDER */
function render(list){

  grid.innerHTML="";

  list.forEach(p=>{

    const wa = encodeURIComponent(`عايز المنتج: ${p.name}`);

    grid.innerHTML += `
      <div class="card">

        ${createSlider(p.images)}

        <h3>${p.name}</h3>
        <p>${p.price} جنيه</p>

        <a href="https://wa.me/201204194540?text=${wa}" target="_blank">اطلب واتساب</a>

        <button onclick="addCart('${p.id}')">أضف للسلة</button>
      </div>
    `;
  });
}

/* CART ADD PRO */
window.addCart = (id)=>{
  const p = products.find(x=>x.id===id);

  let item = cart.find(x=>x.id===id);

  if(item){
    item.qty += 1;
  }else{
    cart.push({
      id:p.id,
      name:p.name,
      price:Number(p.price),
      qty:1
    });
  }

  save();
  toast();
  renderCart();
};

/* OPEN CART */
window.openCart = ()=>{
  document.getElementById("overlay").style.display="block";
  document.getElementById("cartDrawer").classList.add("open");
  renderCart();
};

window.closeCart = ()=>{
  document.getElementById("overlay").style.display="none";
  document.getElementById("cartDrawer").classList.remove("open");
};

/* CART */
function renderCart(){

  let box = document.getElementById("cartItems");
  box.innerHTML="";

  let total=0;

  cart.forEach((p,i)=>{

    total += p.price * p.qty;

    box.innerHTML += `
      <div class="cart-item">
        <h4>${p.name}</h4>
        <p>${p.price} × ${p.qty}</p>

        <div class="qty">
          <button onclick="minus(${i})">-</button>
          <button onclick="plus(${i})">+</button>
        </div>

        <button class="remove" onclick="removeItem(${i})">حذف</button>
      </div>
    `;
  });

  document.getElementById("total").innerText =
  "الإجمالي: " + total + " جنيه";
}

/* QTY */
window.plus = (i)=>{
  cart[i].qty++;
  save();
  renderCart();
};

window.minus = (i)=>{
  cart[i].qty--;
  if(cart[i].qty<=0) cart.splice(i,1);
  save();
  renderCart();
};

window.removeItem = (i)=>{
  cart.splice(i,1);
  save();
  renderCart();
};

function save(){
  localStorage.setItem("cart",JSON.stringify(cart));
}

/* TOAST PRO */
function toast(){
  const t = document.getElementById("toast");
  t.classList.add("show");

  setTimeout(()=>{
    t.classList.remove("show");
  },1200);
}

/* CHECKOUT */
window.goCheckout = ()=>{
  window.location.href="checkout.html";
};

/* SEARCH */
document.getElementById("search").addEventListener("input",(e)=>{
  render(products.filter(p=>p.name.toLowerCase().includes(e.target.value.toLowerCase())));
});

load();

</script>

</body>
</html>
