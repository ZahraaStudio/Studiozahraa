<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Zahraa Store PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }
body{
  margin:0;
  background: #0d0d0d;
  font-family: 'Cairo', sans-serif;
  color:white;
  min-height: 100vh;
  padding-bottom: 70px;
}

header {
  background: #111;
  padding: 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  z-index: 1000;
  border-bottom: 1px solid #d4af37;
}

.cart-icon {
  position: relative;
  font-size: 24px;
  text-decoration: none;
  color: #d4af37;
}

.cart-count {
  position: absolute;
  top: -8px;
  right: -10px;
  background: red;
  color: white;
  font-size: 12px;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}

h2{
  text-align:center;
  color: #d4af37;
  margin: 15px 0;
  font-size: 28px;
}

input#search{
  width:90%;
  margin:10px auto;
  display:block;
  padding:12px;
  border-radius:15px;
  border:1px solid #d4af37;
  background: #1a1a1a;
  color: white;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:12px;
  padding:12px;
}

.card{
  background: #111;
  border-radius:15px;
  overflow:hidden;
  border: 1px solid #222;
  display: flex;
  flex-direction: column;
}

/* SLIDER */
.slider{
  position:relative;
  width:100%;
  height:160px;
  overflow:hidden;
  background: #000;
}

.slides{
  display:flex;
  height: 100%;
  transition: transform 0.3s ease-out;
}

.slides img{
  width:100%;
  height:100%;
  object-fit:cover;
  flex-shrink:0;
}

.arrow{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background: rgba(0,0,0,0.6);
  border:none;
  color: #d4af37;
  width: 30px;
  height: 30px;
  border-radius: 50%;
  cursor:pointer;
  z-index: 10;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
}
.prev{right:5px;}
.next{left:5px;}

.dots{
  position:absolute;
  bottom:8px;
  width:100%;
  text-align:center;
  z-index: 5;
}
.dot{
  display:inline-block;
  width:6px;
  height:6px;
  background: rgba(255,255,255,0.3);
  border-radius:50%;
  margin:0 2px;
}
.dot.active{ background: #d4af37; width: 12px; border-radius: 3px; }

.card-info { padding: 10px; text-align: center; cursor: pointer; }
.card h3 { margin: 0; font-size: 15px; color: #d4af37; }
.card p { margin: 5px 0; color: #fff; font-weight: bold; }

.btn-group { padding: 0 10px 10px; display: flex; flex-direction: column; gap: 5px; }
.add-btn { background: #d4af37; color: #000; border: none; padding: 8px; border-radius: 10px; font-weight: bold; cursor: pointer; }
.wa-btn { background: #25D366; color: #fff; text-decoration: none; padding: 8px; border-radius: 10px; font-weight: bold; text-align: center; font-size: 14px; }

/* Bottom Bar */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  background: #111;
  display: flex;
  justify-content: space-around;
  padding: 10px;
  border-top: 1px solid #d4af37;
  z-index: 1000;
}
.nav-item { color: #fff; text-decoration: none; text-align: center; font-size: 12px; }
.nav-item i { display: block; font-size: 20px; margin-bottom: 2px; }
.nav-item.active { color: #d4af37; }

#toast{
  position:fixed;
  bottom: 80px;
  left:50%;
  transform:translateX(-50%);
  background: #25D366;
  padding:10px 20px;
  border-radius:20px;
  display:none;
  z-index: 2000;
}
</style>
</head>
<body>

<header>
  <div style="font-weight: bold; color: #d4af37;">ZAHRAA STUDIO</div>
  <a href="cart.html" class="cart-icon">
    🛒 <span class="cart-count" id="cartCount">0</span>
  </a>
</header>

<h2>🔥 المنتجات المميزة</h2>
<input id="search" placeholder="ابحث عن منتج...">

<div class="grid" id="grid"></div>

<div class="bottom-nav">
  <a href="index.html" class="nav-item">🏠<br>الرئيسية</a>
  <a href="products.html" class="nav-item active">🛍️<br>المتجر</a>
  <a href="cart.html" class="nav-item">🛒<br>السلة</a>
  <a href="checkout.html" class="nav-item">💳<br>الدفع</a>
</div>

<div id="toast">تمت الإضافة للسلة 🛒</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCG6Yc0iH-rt-PaiRqL_V9Re1z49ZF3OMM",
  authDomain: "zahraa-store-f4c90.firebaseapp.com",
  projectId: "zahraa-store-f4c90"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let products = [];
let sliders = {};

window.updateCartCount = () => {
  let cart = JSON.parse(localStorage.getItem("cart") || "[]");
  document.getElementById("cartCount").innerText = cart.length;
};

window.addCart = (id) => {
  const p = products.find(x => x.id === id);
  let cart = JSON.parse(localStorage.getItem("cart") || "[]");
  cart.push(p);
  localStorage.setItem("cart", JSON.stringify(cart));
  updateCartCount();
  const t = document.getElementById("toast");
  t.style.display = "block";
  setTimeout(() => t.style.display = "none", 2000);
};

window.openProduct = (id) => {
  const p = products.find(x => x.id === id);
  localStorage.setItem("product", JSON.stringify(p));
  window.location.href = "product.html";
};

window.move = (id, step, event) => {
  event.stopPropagation();
  const slider = document.getElementById("slides-" + id);
  const imgs = slider.children.length;
  if(imgs <= 1) return;
  
  sliders[id] = (sliders[id] + step + imgs) % imgs;
  slider.style.transform = `translateX(-${sliders[id] * 100}%)`;
  
  // Update dots
  for(let i=0; i<imgs; i++){
    const dot = document.getElementById(`dot-${id}-${i}`);
    if(dot) dot.classList.toggle("active", i === sliders[id]);
  }
};

function createSlider(id, images, name){
  if(!images || !images.length) return `<div class="slider"><div class="slides"><img src=""></div></div>`;
  sliders[id] = 0;
  return `
  <div class="slider">
    <div class="slides" id="slides-${id}">
      ${images.map(img => `<img src="${img}" onclick="openProduct('${id}')">`).join("")}
    </div>
    ${images.length > 1 ? `
      <button class="arrow prev" onclick="move('${id}', -1, event)">›</button>
      <button class="arrow next" onclick="move('${id}', 1, event)">‹</button>
      <div class="dots">
        ${images.map((_, i) => `<span class="dot ${i==0?'active':''}" id="dot-${id}-${i}"></span>`).join("")}
      </div>
    ` : ''}
  </div>`;
}

async function load(){
  const snap = await getDocs(collection(db, "products"));
  products = [];
  snap.forEach(d => products.push({id: d.id, ...d.data()}));
  render(products);
  updateCartCount();
}

function render(list){
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  list.forEach(p => {
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      ${createSlider(p.id, p.images, p.name)}
      <div class="card-info" onclick="openProduct('${p.id}')">
        <h3>${p.name}</h3>
        <p>${p.price} جنيه</p>
      </div>
      <div class="btn-group">
        <button class="add-btn" onclick="addCart('${p.id}')">🛒 أضف للسلة</button>
        <a class="wa-btn" href="https://wa.me/201204194540?text=${encodeURIComponent('عايز المنتج: ' + p.name)}">واتساب</a>
      </div>
    `;
    grid.appendChild(card);
  });
}

document.getElementById("search").addEventListener("input", (e) => {
  render(products.filter(p => p.name.toLowerCase().includes(e.target.value.toLowerCase())));
});

load();
</script>
</body>
</html>
