<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZAHRAA STUDIO</title>

<style>
body {
  margin: 0;
  font-family: 'Cairo', sans-serif;
  background: #0d0d0d;
  color: white;
}

/* عنوان */
h2 {
  text-align: center;
  margin-top: 20px;
  color: #d4af37;
}

/* الجريد */
.products-container {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  gap: 20px;
  padding: 20px;
}

/* الكارت */
.product-card {
  background: #111;
  border-radius: 15px;
  overflow: hidden;
  box-shadow: 0 0 10px rgba(212,175,55,0.2);
  transition: 0.4s;
  position: relative;
}

.product-card:hover {
  transform: translateY(-10px) scale(1.02);
  box-shadow: 0 0 25px rgba(212,175,55,0.6);
}

/* الصور */
.slider {
  position: relative;
}

.slider img {
  width: 100%;
  height: 220px;
  object-fit: cover;
  display: none;
}

.slider img.active {
  display: block;
}

/* أزرار السلايدر */
.nav-btn {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(0,0,0,0.6);
  border: none;
  color: gold;
  font-size: 18px;
  padding: 5px 10px;
  cursor: pointer;
}

.prev { right: 10px; }
.next { left: 10px; }

/* النص */
.product-info {
  padding: 15px;
  text-align: center;
}

.product-info h4 {
  color: #d4af37;
  margin: 10px 0;
}

/* زر واتساب */
.whatsapp-btn {
  display: inline-block;
  margin-top: 10px;
  background: linear-gradient(45deg, #d4af37, #ffd700);
  color: black;
  padding: 8px 15px;
  border-radius: 20px;
  text-decoration: none;
  transition: 0.3s;
}

.whatsapp-btn:hover {
  transform: scale(1.1);
}

/* انيميشن دخول */
.product-card {
  opacity: 0;
  transform: translateY(30px);
  animation: fadeUp 0.6s forwards;
}

@keyframes fadeUp {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
</style>
</head>

<body>

<h2>منتجاتنا</h2>
<div class="products-container" id="productsGrid"></div>

<script>
const productsGrid = document.getElementById("productsGrid");

// جايب المنتجات (دلوقتي localStorage لحد ما نربط Firebase)
const products = JSON.parse(localStorage.getItem("products") || "[]");

products.forEach((p, index) => {

  const images = Array.isArray(p.images) ? p.images : [p.image];

  const card = document.createElement("div");
  card.className = "product-card";
  card.style.animationDelay = (index * 0.1) + "s";

  let imgsHTML = "";
  images.forEach((img, i) => {
    imgsHTML += `<img src="${img}" class="${i === 0 ? "active" : ""}">`;
  });

  card.innerHTML = `
    <div class="slider">
      ${imgsHTML}
      ${images.length > 1 ? `
        <button class="nav-btn prev">›</button>
        <button class="nav-btn next">‹</button>
      ` : ""}
    </div>

    <div class="product-info">
      <h4>${p.name}</h4>
      <a class="whatsapp-btn"
         href="https://wa.me/201204194540?text=${encodeURIComponent("عايز المنتج: " + p.name)}"
         target="_blank">
         اطلب دلوقتي
      </a>
    </div>
  `;

  productsGrid.appendChild(card);

  // تشغيل السلايدر
  const slider = card.querySelector(".slider");
  const imgs = slider.querySelectorAll("img");
  let current = 0;

  const showImage = (i) => {
    imgs.forEach(img => img.classList.remove("active"));
    imgs[i].classList.add("active");
  };

  const next = slider.querySelector(".next");
  const prev = slider.querySelector(".prev");

  if (next) {
    next.onclick = () => {
      current = (current + 1) % imgs.length;
      showImage(current);
    };
  }

  if (prev) {
    prev.onclick = () => {
      current = (current - 1 + imgs.length) % imgs.length;
      showImage(current);
    };
  }
});
</script>

</body>
</html>
