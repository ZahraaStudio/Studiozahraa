<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Store</title>

<style>
body{
  margin:0;
  background:#0d0d0d;
  font-family:Cairo;
  color:white;
}

h2{
  text-align:center;
  color:gold;
  margin:15px;
}

/* GRID ثابت مش بيتلخبط */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
  gap:12px;
  padding:12px;
}

/* كارت ثابت */
.card{
  background:#111;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 0 10px rgba(0,0,0,0.5);
  transition:0.2s;
}

.card:hover{
  transform:scale(1.03);
}

/* صورة ثابتة */
.card img{
  width:100%;
  height:150px;
  object-fit:cover;
  background:#222;
}

/* اسم */
.card h3{
  text-align:center;
  font-size:14px;
  color:gold;
  padding:8px;
}

/* زر واتساب */
a{
  display:block;
  margin:10px;
  padding:8px;
  text-align:center;
  background:#25D366;
  color:white;
  text-decoration:none;
  border-radius:20px;
  font-weight:bold;
}
</style>
</head>

<body>

<h2>🔥 منتجاتنا</h2>

<div class="grid" id="grid"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyCG6Yc0iH-rt-PaiRqL_V9Re1z49ZF3OMM",
authDomain: "zahraa-store-f4c90.firebaseapp.com",
projectId: "zahraa-store-f4c90"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const grid = document.getElementById("grid");

async function load(){

  const snap = await getDocs(collection(db,"products"));

  grid.innerHTML = ""; // مهم جدًا

  snap.forEach(d=>{

    const p = d.data();

    const name = p.name || "بدون اسم";
    const img = (p.images && p.images.length > 0) ? p.images[0] : "";

    const wa = encodeURIComponent("عايز المنتج: " + name);

    grid.innerHTML += `
      <div class="card">
        <img src="${img}">
        <h3>${name}</h3>
        <a href="https://wa.me/201204194540?text=${wa}" target="_blank">
          اطلب واتساب
        </a>
      </div>
    `;
  });
}

load();

</script>

</body>
</html>
