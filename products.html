<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product</title>

<style>
body{
  margin:0;
  font-family:Cairo;
  background:#0d0d0d;
  color:white;
}

/* container */
.container{
  max-width:600px;
  margin:auto;
  padding:15px;
}

/* title */
h2{
  text-align:center;
  color:#d4af37;
}

/* main image */
.main-img{
  width:100%;
  height:300px;
  object-fit:cover;
  border-radius:15px;
  cursor:pointer;
  box-shadow:0 0 15px rgba(212,175,55,0.2);
}

/* slider */
.slider{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  margin-top:10px;
}

.thumb{
  width:60px;
  height:60px;
  object-fit:cover;
  border-radius:10px;
  opacity:0.5;
  cursor:pointer;
  border:2px solid transparent;
}

.thumb.active{
  opacity:1;
  border:2px solid #d4af37;
}

/* arrows */
.arrow{
  background:#222;
  border:none;
  color:white;
  padding:10px;
  border-radius:50%;
  cursor:pointer;
}

/* whatsapp */
.btn{
  display:block;
  text-align:center;
  margin-top:20px;
  padding:12px;
  background:linear-gradient(45deg,#d4af37,#ffd700);
  color:black;
  border-radius:25px;
  text-decoration:none;
  font-weight:bold;
}

/* zoom modal */
.modal{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.9);
  justify-content:center;
  align-items:center;
}

.modal img{
  max-width:90%;
  max-height:80%;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<h2 id="name">تحميل...</h2>

<img id="mainImg" class="main-img" onclick="openZoom()">

<div class="slider">

<button class="arrow" onclick="prev()">‹</button>

<div id="thumbs" style="display:flex;gap:5px"></div>

<button class="arrow" onclick="next()">›</button>

</div>

<a id="wa" class="btn" target="_blank">اطلب واتساب</a>

</div>

<!-- Zoom -->
<div class="modal" id="modal" onclick="closeZoom()">
  <img id="zoomImg">
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCG6Yc0iH-rt-PaiRqL_V9Re1z49ZF3OMM",
  authDomain: "zahraa-store-f4c90.firebaseapp.com",
  projectId: "zahraa-store-f4c90"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const params = new URLSearchParams(location.search);
const id = params.get("id");

let images = [];
let index = 0;

async function load(){

  const snap = await getDoc(doc(db,"products",id));
  const p = snap.data();

  document.getElementById("name").innerText = p.name;

  images = p.images;

  updateImage();

  renderThumbs();

  document.getElementById("wa").href =
  "https://wa.me/201204194540?text=" + encodeURIComponent("عايز المنتج: " + p.name);
}

function updateImage(){
  document.getElementById("mainImg").src = images[index];
  document.getElementById("zoomImg").src = images[index];
}

function renderThumbs(){

  const box = document.getElementById("thumbs");
  box.innerHTML = "";

  images.forEach((img,i)=>{

    const t = document.createElement("img");
    t.src = img;
    t.className = "thumb" + (i===index ? " active":"");

    t.onclick = ()=>{
      index = i;
      updateImage();
      renderThumbs();
    };

    box.appendChild(t);
  });
}

/* arrows */
window.next = ()=>{
  index = (index + 1) % images.length;
  updateImage();
  renderThumbs();
}

window.prev = ()=>{
  index = (index - 1 + images.length) % images.length;
  updateImage();
  renderThumbs();
}

/* zoom */
window.openZoom = ()=>{
  document.getElementById("modal").style.display="flex";
}

window.closeZoom = ()=>{
  document.getElementById("modal").style.display="none";
}

load();

</script>

</body>
</html>
