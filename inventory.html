<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>المخزون — كاشير الزهراء</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
<script src="shared.js"></script>
</head>
<body>
<div class="app-shell">
  <div id="sidebar"></div>
  <div class="page-content">
    <div class="page-header">
      <h1><i class="fas fa-warehouse"></i> إدارة المخزون</h1>
      <div style="display:flex;gap:8px">
        <button class="btn btn-ghost" onclick="openAdjust()"><i class="fas fa-sliders"></i> تسوية مخزون</button>
        <button class="btn btn-ghost" onclick="openWaste()"><i class="fas fa-trash-alt"></i> تسجيل هالك</button>
      </div>
    </div>
    <div class="page-body">
      <!-- KPIs -->
      <div class="stat-grid">
        <div class="card"><div class="card-title">إجمالي المنتجات</div><div class="card-value" id="k-total">—</div></div>
        <div class="card"><div class="card-title">قيمة المخزون</div><div class="card-value" id="k-value">—</div></div>
        <div class="card"><div class="card-title" style="color:var(--orange)">تحت حد الطلب</div><div class="card-value" id="k-low" style="color:var(--orange)">—</div></div>
        <div class="card"><div class="card-title" style="color:var(--red)">نفد المخزون</div><div class="card-value" id="k-out" style="color:var(--red)">—</div></div>
      </div>
      <div class="search-bar">
        <input class="search-input" id="q" placeholder="🔍 بحث بالاسم..." oninput="filter()">
        <select class="search-input" style="flex:unset;width:140px" id="filter-type" onchange="filter()">
          <option value="">كل المنتجات</option>
          <option value="low">منخفض المخزون</option>
          <option value="out">نفد المخزون</option>
          <option value="tracked">يتتبع المخزون</option>
        </select>
      </div>
      <div id="inv-table"><div class="spinner"></div></div>
    </div>
  </div>
</div>

<!-- Adjust Modal -->
<div class="overlay" id="adj-modal">
  <div class="modal" style="max-width:440px">
    <div class="modal-header"><h3>تسوية مخزون</h3><button class="close-btn" onclick="closeModal('adj-modal')">✕</button></div>
    <div class="modal-body">
      <div class="form-group"><label>المنتج</label>
        <select class="form-control" id="adj-prod"><option value="">اختر...</option></select></div>
      <div class="form-row">
        <div class="form-group"><label>الكمية الفعلية</label><input class="form-control" id="adj-qty" type="number" min="0"></div>
        <div class="form-group"><label>سبب التسوية</label>
          <select class="form-control" id="adj-reason">
            <option>جرد يدوي</option><option>تالف</option><option>فقدان</option><option>إضافة</option><option>آخر</option>
          </select></div>
      </div>
      <div class="form-group"><label>ملاحظة</label><input class="form-control" id="adj-note" placeholder="ملاحظة (اختياري)"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-primary" onclick="saveAdjust()">تطبيق التسوية</button>
      <button class="btn btn-ghost" onclick="closeModal('adj-modal')">إلغاء</button>
    </div>
  </div>
</div>

<!-- Waste Modal -->
<div class="overlay" id="waste-modal">
  <div class="modal" style="max-width:420px">
    <div class="modal-header"><h3>تسجيل هالك / تالف</h3><button class="close-btn" onclick="closeModal('waste-modal')">✕</button></div>
    <div class="modal-body">
      <div class="form-group"><label>المنتج</label>
        <select class="form-control" id="waste-prod"><option value="">اختر...</option></select></div>
      <div class="form-row">
        <div class="form-group"><label>الكمية التالفة</label><input class="form-control" id="waste-qty" type="number" min="1" value="1"></div>
        <div class="form-group"><label>سبب الهالك</label>
          <select class="form-control" id="waste-reason"><option>تلف</option><option>انتهاء صلاحية</option><option>كسر</option><option>آخر</option></select></div>
      </div>
      <div class="form-group"><label>ملاحظة</label><input class="form-control" id="waste-note" placeholder="وصف المشكلة..."></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-danger" onclick="saveWaste()">تأكيد تسجيل الهالك</button>
      <button class="btn btn-ghost" onclick="closeModal('waste-modal')">إلغاء</button>
    </div>
  </div>
</div>

<script>
injectSharedCSS();
let prods = [];

requireAuth(async () => { await load(); });

async function load() {
  try {
    const snap = await db.collection('products').orderBy('name').get();
    prods = [];
    snap.forEach(d => prods.push({ id:d.id, ...d.data() }));
    // Update KPIs
    const tracked = prods.filter(p=>p.trackStock);
    const value = tracked.reduce((s,p)=>s+(p.stock||0)*(p.cost||0),0);
    const low = tracked.filter(p=>(p.stock||0)<=(p.reorderLevel||5)&&(p.stock||0)>0);
    const out = tracked.filter(p=>(p.stock||0)<=0);
    document.getElementById('k-total').textContent = prods.length;
    document.getElementById('k-value').textContent = fmt(value);
    document.getElementById('k-low').textContent = low.length;
    document.getElementById('k-out').textContent = out.length;
    // Populate product selects
    const opts = prods.map(p=>`<option value="${p.id}" data-stock="${p.stock||0}">${p.name} (${p.stock||0} ${p.unit||'قطعة'})</option>`).join('');
    ['adj-prod','waste-prod'].forEach(id => {
      document.getElementById(id).innerHTML = '<option value="">اختر...</option>' + opts;
    });
    filter();
  } catch(e) {
    document.getElementById('inv-table').innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-circle"></i><p>${e.message}</p></div>`;
  }
}

function filter() {
  const q = document.getElementById('q').value.toLowerCase();
  const ft = document.getElementById('filter-type').value;
  let list = prods;
  if (q) list = list.filter(p=>(p.name||'').toLowerCase().includes(q));
  if (ft==='low') list = list.filter(p=>p.trackStock&&(p.stock||0)<=(p.reorderLevel||5)&&(p.stock||0)>0);
  else if (ft==='out') list = list.filter(p=>p.trackStock&&(p.stock||0)<=0);
  else if (ft==='tracked') list = list.filter(p=>p.trackStock);
  render(list);
}

function render(list) {
  const el = document.getElementById('inv-table');
  if (!list.length) { el.innerHTML = `<div class="empty-state"><i class="fas fa-warehouse"></i><p>لا توجد منتجات</p></div>`; return; }
  el.innerHTML = `<div class="tbl-wrap"><table>
    <thead><tr><th>المنتج</th><th>المخزون الحالي</th><th>حد الطلب</th><th>قيمة المخزون</th><th>تتبع</th><th>الحالة</th><th>تسوية</th></tr></thead>
    <tbody>${list.map(p=>{
      const stockVal = (p.stock||0)*(p.cost||0);
      const isOut = p.trackStock&&(p.stock||0)<=0;
      const isLow = p.trackStock&&(p.stock||0)<=(p.reorderLevel||5)&&!isOut;
      return `<tr>
        <td><div style="font-weight:700">${p.icon||'📦'} ${p.name}</div><div style="font-size:10px;color:var(--text3)">${p.sku||''}</div></td>
        <td><span style="font-size:16px;font-weight:900;color:${isOut?'var(--red)':isLow?'var(--orange)':'var(--green)'}">${p.stock||0}</span> ${p.unit||'قطعة'}</td>
        <td>${p.trackStock?p.reorderLevel||5:'—'}</td>
        <td style="color:var(--gold)">${p.trackStock?fmt(stockVal):'—'}</td>
        <td><span class="badge ${p.trackStock?'badge-green':'badge-gray'}">${p.trackStock?'نعم':'لا'}</span></td>
        <td>${isOut?'<span class="badge badge-red">نفد</span>':isLow?'<span class="badge badge-orange">منخفض</span>':'<span class="badge badge-green">جيد</span>'}</td>
        <td><button class="btn btn-ghost" style="padding:4px 10px;font-size:11px" onclick="quickAdj('${p.id}')"><i class="fas fa-sliders"></i></button></td>
      </tr>`;
    }).join('')}</tbody>
  </table></div>`;
}

window.quickAdj = id => {
  document.getElementById('adj-prod').value = id;
  const p = prods.find(x=>x.id===id);
  document.getElementById('adj-qty').value = p?.stock||0;
  openModal('adj-modal');
};
window.openAdjust = () => { document.getElementById('adj-prod').value=''; document.getElementById('adj-qty').value=''; document.getElementById('adj-note').value=''; openModal('adj-modal'); };
window.openWaste = () => { document.getElementById('waste-prod').value=''; document.getElementById('waste-qty').value='1'; document.getElementById('waste-note').value=''; openModal('waste-modal'); };

window.saveAdjust = async () => {
  const prodId = document.getElementById('adj-prod').value;
  if (!prodId) { toast('اختر منتجاً','warn'); return; }
  const newQty = parseInt(document.getElementById('adj-qty').value)||0;
  const reason = document.getElementById('adj-reason').value;
  const note = document.getElementById('adj-note').value;
  const prod = prods.find(p=>p.id===prodId);
  const oldQty = prod?.stock||0;
  try {
    await db.collection('products').doc(prodId).update({ stock:newQty, updatedAt:firebase.firestore.FieldValue.serverTimestamp() });
    await db.collection('pos_inventory_log').add({
      productId:prodId, productName:prod?.name||'',
      oldQty, newQty, diff:newQty-oldQty,
      reason, note, type:'adjustment',
      createdAt:firebase.firestore.FieldValue.serverTimestamp(),
      cashierId:currentUser?.uid
    });
    toast('✅ تم تحديث المخزون','ok');
    closeModal('adj-modal');
    load();
  } catch(e) { toast('خطأ: '+e.message,'err'); }
};

window.saveWaste = async () => {
  const prodId = document.getElementById('waste-prod').value;
  if (!prodId) { toast('اختر منتجاً','warn'); return; }
  const qty = parseInt(document.getElementById('waste-qty').value)||1;
  const reason = document.getElementById('waste-reason').value;
  const note = document.getElementById('waste-note').value;
  const prod = prods.find(p=>p.id===prodId);
  try {
    await db.collection('products').doc(prodId).update({ stock:firebase.firestore.FieldValue.increment(-qty) });
    await db.collection('pos_inventory_log').add({
      productId:prodId, productName:prod?.name||'',
      qty, reason, note, type:'waste',
      createdAt:firebase.firestore.FieldValue.serverTimestamp(),
      cashierId:currentUser?.uid
    });
    toast('✅ تم تسجيل الهالك','ok');
    closeModal('waste-modal');
    load();
  } catch(e) { toast('خطأ: '+e.message,'err'); }
};

document.querySelectorAll('.overlay').forEach(m=>{m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('open');});});
</script>
</body>
</html>
