<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>التقارير — كاشير الزهراء</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
<script src="shared.js"></script>
<style>
.report-tabs{display:flex;gap:5px;margin-bottom:18px;flex-wrap:wrap}
.rtab{padding:8px 16px;border-radius:var(--r);border:1.5px solid var(--border);background:var(--bg3);
  color:var(--text2);cursor:pointer;font-family:'Cairo',sans-serif;font-size:12px;font-weight:700;transition:all .17s}
.rtab.active{background:var(--gold);border-color:var(--gold);color:#000}
.bar-wrap{display:flex;gap:4px;align-items:flex-end;height:160px;margin-top:12px}
.bar-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.bar-fill{width:100%;border-radius:4px 4px 0 0;background:var(--gold);min-height:4px;transition:height .4s}
.bar-lbl{font-size:9px;color:var(--text3);text-align:center}
.bar-val{font-size:9px;color:var(--gold);font-weight:700}
.chart-wrap{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:16px;margin-bottom:16px}
</style>
</head>
<body>
<div class="app-shell">
  <div id="sidebar"></div>
  <div class="page-content">
    <div class="page-header">
      <h1><i class="fas fa-chart-line"></i> التقارير والتحليلات</h1>
      <button class="btn btn-ghost" onclick="window.print()"><i class="fas fa-print"></i> طباعة</button>
    </div>
    <div class="page-body">
      <!-- Date filter -->
      <div class="search-bar" style="margin-bottom:20px">
        <div class="report-tabs">
          <button class="rtab active" onclick="setPeriod('today',this)">اليوم</button>
          <button class="rtab" onclick="setPeriod('week',this)">هذا الأسبوع</button>
          <button class="rtab" onclick="setPeriod('month',this)">هذا الشهر</button>
          <button class="rtab" onclick="setPeriod('custom',this)">تاريخ محدد</button>
        </div>
        <input class="search-input" id="date-from" type="date" style="flex:unset;width:140px;display:none">
        <input class="search-input" id="date-to" type="date" style="flex:unset;width:140px;display:none">
        <button class="btn btn-primary" id="apply-btn" style="display:none" onclick="loadReport()"><i class="fas fa-search"></i> تطبيق</button>
      </div>

      <div id="report-content"><div class="spinner"></div></div>
    </div>
  </div>
</div>

<script>
injectSharedCSS();
let period = 'today', dateFrom, dateTo;

requireAuth(() => { loadReport(); });

function setPeriod(p, el) {
  period = p;
  document.querySelectorAll('.rtab').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  const custom = p==='custom';
  document.getElementById('date-from').style.display = custom?'':'none';
  document.getElementById('date-to').style.display = custom?'':'none';
  document.getElementById('apply-btn').style.display = custom?'':'none';
  if (!custom) loadReport();
}

function getRange() {
  const now = new Date();
  let from, to = new Date();
  if (period==='today') { from = new Date(); from.setHours(0,0,0,0); }
  else if (period==='week') { from = new Date(); from.setDate(now.getDate()-6); from.setHours(0,0,0,0); }
  else if (period==='month') { from = new Date(now.getFullYear(), now.getMonth(), 1); }
  else {
    from = new Date(document.getElementById('date-from').value);
    to = new Date(document.getElementById('date-to').value);
    to.setHours(23,59,59,999);
  }
  return { from, to };
}

async function loadReport() {
  document.getElementById('report-content').innerHTML = '<div class="spinner"></div>';
  const { from, to } = getRange();
  try {
    let q = db.collection('pos_invoices').where('createdAt','>=',from);
    if (to) q = q.where('createdAt','<=',to);
    const snap = await q.orderBy('createdAt','desc').get();
    const invs = [];
    snap.forEach(d=>invs.push({id:d.id,...d.data()}));

    // Stats
    const total = invs.reduce((s,i)=>s+(i.totalPrice||0),0);
    const profit = invs.reduce((s,i)=>s+(i.estimatedProfit||0),0);
    const cash = invs.filter(i=>i.paymentType==='cash').reduce((s,i)=>s+(i.paidAmount||0),0);
    const card = invs.filter(i=>i.paymentType==='card'||i.paymentType==='transfer').reduce((s,i)=>s+(i.paidAmount||0),0);
    const deferred = invs.filter(i=>i.paymentType==='deferred'||i.paymentType==='partial').reduce((s,i)=>s+(i.remainingAmount||0),0);
    const returns = invs.filter(i=>i.type==='return').length;

    // Product map
    const prodMap = {};
    invs.filter(i=>i.type!=='return').forEach(inv=>{
      (inv.items||[]).forEach(item=>{
        if (!prodMap[item.name]) prodMap[item.name]={qty:0,revenue:0};
        prodMap[item.name].qty += item.qty||1;
        prodMap[item.name].revenue += item.total||0;
      });
    });
    const topProds = Object.entries(prodMap).sort((a,b)=>b[1].qty-a[1].qty).slice(0,10);

    // Daily breakdown (last 7 days)
    const dayMap = {};
    invs.filter(i=>i.type!=='return').forEach(inv=>{
      const d = inv.createdAt?.toDate?.()?.toLocaleDateString('en-CA') || '—';
      if (!dayMap[d]) dayMap[d]={rev:0,count:0};
      dayMap[d].rev += inv.totalPrice||0;
      dayMap[d].count++;
    });
    const days = Object.entries(dayMap).sort((a,b)=>a[0]>b[0]?1:-1).slice(-14);
    const maxRev = Math.max(...days.map(d=>d[1].rev),1);

    // Payment breakdown
    const payCounts = {};
    invs.forEach(i=>{ payCounts[i.paymentMethod||'نقدي']=(payCounts[i.paymentMethod||'نقدي']||0)+(i.totalPrice||0); });

    // Cashier breakdown
    const cashierMap = {};
    invs.filter(i=>i.type!=='return').forEach(i=>{
      const k = i.cashierEmail||'غير معروف';
      if (!cashierMap[k]) cashierMap[k]={count:0,total:0};
      cashierMap[k].count++;
      cashierMap[k].total += i.totalPrice||0;
    });

    document.getElementById('report-content').innerHTML = `
    <!-- KPIs -->
    <div class="stat-grid">
      <div class="card"><div class="card-title">إجمالي المبيعات</div><div class="card-value">${fmt(total)}</div></div>
      <div class="card"><div class="card-title" style="color:var(--green)">الربح</div><div class="card-value" style="color:var(--green)">${fmt(profit)}</div></div>
      <div class="card"><div class="card-title">عدد الفواتير</div><div class="card-value" style="color:var(--blue)">${invs.filter(i=>i.type!=='return').length}</div></div>
      <div class="card"><div class="card-title">متوسط الفاتورة</div><div class="card-value">${fmt(invs.length?total/invs.filter(i=>i.type!=='return').length:0)}</div></div>
      <div class="card"><div class="card-title">نقدي</div><div class="card-value" style="color:var(--green)">${fmt(cash)}</div></div>
      <div class="card"><div class="card-title">بطاقة/تحويل</div><div class="card-value" style="color:var(--blue)">${fmt(card)}</div></div>
      <div class="card"><div class="card-title" style="color:var(--orange)">آجل متبقي</div><div class="card-value" style="color:var(--orange)">${fmt(deferred)}</div></div>
      <div class="card"><div class="card-title" style="color:var(--red)">مسترجع</div><div class="card-value" style="color:var(--red)">${returns} فاتورة</div></div>
    </div>

    <!-- Sales chart -->
    ${days.length>1?`<div class="chart-wrap">
      <div style="font-size:13px;font-weight:900;color:var(--gold);margin-bottom:4px"><i class="fas fa-chart-bar"></i> المبيعات اليومية</div>
      <div class="bar-wrap">
        ${days.map(([d,v])=>`<div class="bar-item">
          <div class="bar-val">${v.rev>0?Math.round(v.rev/1000)+'k':''}</div>
          <div class="bar-fill" style="height:${Math.round((v.rev/maxRev)*140)}px"></div>
          <div class="bar-lbl">${d.slice(5)}</div>
        </div>`).join('')}
      </div>
    </div>`:''}

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <!-- Top products -->
      <div class="card" style="padding:16px">
        <div style="font-size:13px;font-weight:900;color:var(--gold);margin-bottom:12px"><i class="fas fa-trophy"></i> أكثر المنتجات مبيعاً</div>
        ${topProds.length?topProds.map(([name,v],i)=>`
          <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px">
            <span>${i+1}. ${name}</span>
            <div style="text-align:left">
              <div style="font-weight:900;color:var(--gold)">${v.qty} قطعة</div>
              <div style="font-size:10px;color:var(--text3)">${fmt(v.revenue)}</div>
            </div>
          </div>`).join(''):'<p style="color:var(--text3);text-align:center;padding:20px">لا بيانات</p>'}
      </div>

      <!-- Payment methods -->
      <div class="card" style="padding:16px">
        <div style="font-size:13px;font-weight:900;color:var(--gold);margin-bottom:12px"><i class="fas fa-credit-card"></i> طرق الدفع</div>
        ${Object.entries(payCounts).map(([method,amount])=>`
          <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px">
            <span>${method||'نقدي'}</span><span style="font-weight:900;color:var(--gold)">${fmt(amount)}</span>
          </div>`).join('') || '<p style="color:var(--text3);text-align:center;padding:20px">لا بيانات</p>'}
      </div>

      <!-- Cashier breakdown -->
      ${Object.keys(cashierMap).length?`<div class="card" style="padding:16px">
        <div style="font-size:13px;font-weight:900;color:var(--gold);margin-bottom:12px"><i class="fas fa-user-tie"></i> أداء الكاشيرين</div>
        ${Object.entries(cashierMap).map(([email,v])=>`
          <div style="padding:7px 0;border-bottom:1px solid var(--border);font-size:12px">
            <div style="font-weight:700">${email}</div>
            <div style="display:flex;justify-content:space-between;color:var(--text2)">
              <span>${v.count} فاتورة</span><span style="color:var(--gold)">${fmt(v.total)}</span>
            </div>
          </div>`).join('')}
      </div>`:''}
    </div>

    <!-- Invoices table -->
    <div style="margin-top:16px">
      <div style="font-size:13px;font-weight:900;color:var(--gold);margin-bottom:10px"><i class="fas fa-list"></i> تفاصيل الفواتير (${invs.length})</div>
      <div class="tbl-wrap"><table>
        <thead><tr><th>رقم الفاتورة</th><th>العميل</th><th>التاريخ</th><th>الإجمالي</th><th>المدفوع</th><th>المتبقي</th><th>الطريقة</th><th>الحالة</th></tr></thead>
        <tbody>${invs.slice(0,50).map(inv=>`<tr>
          <td style="font-family:monospace;font-size:11px">${inv.invoiceNumber||inv.id.slice(0,8)}</td>
          <td>${inv.userName||'عميل'}</td>
          <td style="font-size:11px;color:var(--text3)">${fmtDate(inv.createdAt)}</td>
          <td style="color:var(--gold);font-weight:900">${fmt(inv.totalPrice)}</td>
          <td>${fmt(inv.paidAmount)}</td>
          <td style="color:${(inv.remainingAmount||0)>0?'var(--red)':'var(--green)'}">${fmt(inv.remainingAmount)}</td>
          <td>${inv.paymentMethod||'—'}</td>
          <td><span class="badge badge-${inv.status==='مكتمل'?'green':inv.type==='return'?'red':'orange'}">${inv.status||'—'}</span></td>
        </tr>`).join('')}</tbody>
      </table></div>
      ${invs.length>50?`<p style="text-align:center;color:var(--text3);font-size:12px;margin-top:8px">يتم عرض أحدث 50 فاتورة فقط</p>`:''}
    </div>`;
  } catch(e) {
    document.getElementById('report-content').innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-circle"></i><p>خطأ في تحميل التقارير</p><p style="font-size:12px">${e.message}</p></div>`;
  }
}
</script>
</body>
</html>
