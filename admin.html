<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم ZAHRAA STUDIO - الفول أوبشن</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #0a0a0a; color: #fff; }
        .gold-border { border: 1px solid #d4af37; }
        .gold-bg { background-color: #d4af37; }
        .gradient-text { background: linear-gradient(to right, #d4af37, #f9e29c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .tab-active { border-bottom: 3px solid #d4af37; color: #d4af37; }
        .loader { border-top-color: #d4af37; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-2 md:p-6">
    <div id="auth-section" class="max-w-md mx-auto mt-20 p-6 bg-zinc-900 rounded-xl gold-border">
        <h2 class="text-2xl font-bold mb-6 text-center gradient-text">تسجيل دخول الإدارة</h2>
        <input type="email" id="email" placeholder="البريد الإلكتروني" class="w-full p-3 mb-4 bg-black border border-zinc-700 rounded text-white">
        <input type="password" id="password" placeholder="كلمة المرور" class="w-full p-3 mb-6 bg-black border border-zinc-700 rounded text-white">
        <button id="login-btn" class="w-full p-3 gold-bg text-black font-bold rounded hover:opacity-90">دخول</button>
        <p id="login-error" class="text-red-500 mt-4 text-center hidden"></p>
    </div>

    <div id="admin-content" class="hidden max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold gradient-text">لوحة تحكم ZAHRAA STUDIO</h1>
            <button id="logout-btn" class="bg-red-600/20 text-red-500 border border-red-600 px-4 py-2 rounded font-bold hover:bg-red-600 hover:text-white transition-all">خروج</button>
        </div>

        <div class="flex border-b border-zinc-800 mb-8 overflow-x-auto">
            <button onclick="showTab('products-tab')" id="btn-products-tab" class="px-6 py-3 font-bold tab-active whitespace-nowrap">إدارة المنتجات</button>
            <button onclick="showTab('orders-tab')" id="btn-orders-tab" class="px-6 py-3 font-bold text-zinc-500 whitespace-nowrap">متابعة الطلبات</button>
            <button onclick="showTab('stats-tab')" id="btn-stats-tab" class="px-6 py-3 font-bold text-zinc-500 whitespace-nowrap">الإحصائيات</button>
        </div>

        <div id="products-tab" class="tab-content">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="lg:col-span-1 bg-zinc-900 p-6 rounded-xl gold-border h-fit sticky top-4">
                    <h3 id="form-title" class="text-xl font-bold mb-4 border-b border-zinc-800 pb-2">إضافة منتج جديد</h3>
                    <input type="hidden" id="product-id">
                    <div class="space-y-4">
                        <input type="text" id="p-name" placeholder="اسم المنتج" class="w-full p-2 bg-black border border-zinc-700 rounded">
                        <div class="grid grid-cols-2 gap-4">
                            <input type="number" id="p-price" placeholder="السعر" class="w-full p-2 bg-black border border-zinc-700 rounded">
                            <input type="number" id="p-stock" placeholder="الكمية (قطع)" class="w-full p-2 bg-black border border-zinc-700 rounded">
                        </div>
                        <select id="p-status" class="w-full p-2 bg-black border border-zinc-700 rounded">
                            <option value="available">متوفر</option>
                            <option value="out_of_stock">نفذت الكمية</option>
                        </select>
                        <textarea id="p-desc" placeholder="الوصف" class="w-full p-2 bg-black border border-zinc-700 rounded h-24"></textarea>
                        <div class="border-2 border-dashed border-zinc-700 p-4 rounded-lg text-center">
                            <label class="cursor-pointer block">
                                <span class="text-zinc-400 block mb-2">رفع صور إلى Cloudinary</span>
                                <input type="file" id="p-file" multiple accept="image/*" class="hidden">
                                <div class="gold-bg text-black px-4 py-2 rounded font-bold inline-block">اختر الصور</div>
                            </label>
                            <div id="upload-progress" class="mt-2 hidden">
                                <div class="w-full bg-zinc-800 rounded-full h-2"><div id="progress-bar" class="bg-yellow-600 h-2 rounded-full" style="width: 0%"></div></div>
                            </div>
                        </div>
                        <div id="images-preview" class="grid grid-cols-3 gap-2 mt-2"></div>
                        <div class="flex gap-2 pt-4">
                            <button id="save-btn" class="flex-1 p-3 gold-bg text-black font-bold rounded">حفظ المنتج</button>
                            <button id="cancel-btn" class="hidden p-3 bg-zinc-800 text-white font-bold rounded">إلغاء</button>
                        </div>
                    </div>
                </div>
                <div class="lg:col-span-2 bg-zinc-900 p-6 rounded-xl gold-border">
                    <h3 class="text-xl font-bold mb-4">قائمة المنتجات</h3>
                    <div id="products-list" class="space-y-4"></div>
                </div>
            </div>
        </div>

        <div id="orders-tab" class="tab-content hidden">
            <div class="bg-zinc-900 p-6 rounded-xl gold-border"><h3 class="text-xl font-bold mb-6">متابعة طلبات العملاء</h3><div id="orders-list" class="space-y-4"></div></div>
        </div>

        <div id="stats-tab" class="tab-content hidden">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-zinc-900 p-8 rounded-xl gold-border text-center"><h4 class="text-zinc-400 mb-2">إجمالي المنتجات</h4><p id="stat-products" class="text-4xl font-bold gradient-text">0</p></div>
                <div class="bg-zinc-900 p-8 rounded-xl gold-border text-center"><h4 class="text-zinc-400 mb-2">إجمالي الطلبات</h4><p id="stat-orders" class="text-4xl font-bold gradient-text">0</p></div>
                <div class="bg-zinc-900 p-8 rounded-xl gold-border text-center"><h4 class="text-zinc-400 mb-2">حالة المتجر</h4><p class="text-4xl font-bold text-green-500">نشط</p></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCG6Yc0iH-rt-PaiRqL_V9Re1z49ZF3OMM", authDomain: "zahraa-store-f4c90.firebaseapp.com", projectId: "zahraa-store-f4c90" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const CLOUDINARY_URL = "https://api.cloudinary.com/v1_1/dxlxwe55b/image/upload";
        const CLOUDINARY_UPLOAD_PRESET = "zahraa_upload";
        let currentProductImages = [];

        document.getElementById('login-btn').onclick = () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            signInWithEmailAndPassword(auth, email, pass).catch(err => alert(err.message));
        };
        document.getElementById('logout-btn').onclick = () => signOut(auth);
        onAuthStateChanged(auth, user => {
            if (user) {
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('admin-content').classList.remove('hidden');
                loadProducts(); loadOrders();
            } else {
                document.getElementById('auth-section').classList.remove('hidden');
                document.getElementById('admin-content').classList.add('hidden');
            }
        });

        window.showTab = (tabId) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.getElementById(tabId).classList.remove('hidden');
            document.querySelectorAll('[id^="btn-"]').forEach(b => b.classList.remove('tab-active'));
            document.getElementById('btn-' + tabId).classList.add('tab-active');
        };

        document.getElementById('p-file').onchange = async (e) => {
            const files = e.target.files;
            document.getElementById('upload-progress').classList.remove('hidden');
            for (let i = 0; i < files.length; i++) {
                const formData = new FormData();
                formData.append('file', files[i]);
                formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);
                const res = await fetch(CLOUDINARY_URL, { method: 'POST', body: formData });
                const data = await res.json();
                if (data.secure_url) { currentProductImages.push(data.secure_url); renderImagePreviews(); }
                document.getElementById('progress-bar').style.width = ((i+1)/files.length)*100 + '%';
            }
            setTimeout(() => document.getElementById('upload-progress').classList.add('hidden'), 1000);
        };

        function renderImagePreviews() {
            const container = document.getElementById('images-preview');
            container.innerHTML = '';
            currentProductImages.forEach((url, index) => {
                const div = document.createElement('div');
                div.className = "relative aspect-square border border-zinc-800 rounded overflow-hidden";
                div.innerHTML = `<img src="${url}" class="w-full h-full object-cover"><button onclick="removeImage(${index})" class="absolute top-0 right-0 bg-red-600 text-white p-1">×</button>`;
                container.appendChild(div);
            });
        }
        window.removeImage = (index) => { currentProductImages.splice(index, 1); renderImagePreviews(); };

        async function loadProducts() {
            const list = document.getElementById('products-list');
            const q = query(collection(db, "products"), orderBy("updatedAt", "desc"));
            const snapshot = await getDocs(q);
            list.innerHTML = '';
            let count = 0;
            snapshot.forEach(docData => {
                count++;
                const p = docData.data();
                const id = docData.id;
                const div = document.createElement('div');
                div.className = "flex items-center justify-between p-4 bg-black rounded border border-zinc-800";
                div.innerHTML = `
                    <div class="flex items-center gap-4">
                        <img src="${p.images?.[0] || ''}" class="w-12 h-12 object-cover rounded">
                        <div><h4 class="font-bold">${p.name}</h4><p class="text-xs text-yellow-500">${p.price} جنيه | ${p.stock || 0} قطعة</p></div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="editProduct('${id}', ${JSON.stringify(p).replace(/"/g, '&quot;')})" class="text-blue-400 text-sm">تعديل</button>
                        <button onclick="deleteProduct('${id}')" class="text-red-500 text-sm">حذف</button>
                    </div>
                `;
                list.appendChild(div);
            });
            document.getElementById('stat-products').innerText = count;
        }

        document.getElementById('save-btn').onclick = async () => {
            const id = document.getElementById('product-id').value;
            const data = {
                name: document.getElementById('p-name').value,
                price: parseFloat(document.getElementById('p-price').value),
                stock: parseInt(document.getElementById('p-stock').value) || 0,
                description: document.getElementById('p-desc').value,
                status: document.getElementById('p-status').value,
                images: currentProductImages,
                updatedAt: Date.now()
            };
            if(id) await updateDoc(doc(db, "products", id), data);
            else await addDoc(collection(db, "products"), data);
            alert('تم الحفظ'); resetForm(); loadProducts();
        };

        window.editProduct = (id, p) => {
            document.getElementById('product-id').value = id;
            document.getElementById('p-name').value = p.name;
            document.getElementById('p-price').value = p.price;
            document.getElementById('p-stock').value = p.stock || 0;
            document.getElementById('p-desc').value = p.description || '';
            document.getElementById('p-status').value = p.status || 'available';
            currentProductImages = [...(p.images || [])];
            renderImagePreviews();
            document.getElementById('form-title').innerText = 'تعديل المنتج';
            document.getElementById('cancel-btn').classList.remove('hidden');
        };

        window.deleteProduct = async (id) => { if(confirm('حذف؟')) { await deleteDoc(doc(db, "products", id)); loadProducts(); } };
        function resetForm() {
            document.getElementById('product-id').value = '';
            document.getElementById('p-name').value = '';
            document.getElementById('p-price').value = '';
            document.getElementById('p-stock').value = '';
            document.getElementById('p-desc').value = '';
            currentProductImages = []; renderImagePreviews();
            document.getElementById('form-title').innerText = 'إضافة منتج جديد';
            document.getElementById('cancel-btn').classList.add('hidden');
        }
        document.getElementById('cancel-btn').onclick = resetForm;

        async function loadOrders() {
            const list = document.getElementById('orders-list');
            const q = query(collection(db, "orders"), orderBy("createdAt", "desc"));
            const snapshot = await getDocs(q).catch(() => ({empty: true}));
            list.innerHTML = snapshot.empty ? '<p class="text-center text-zinc-500">لا توجد طلبات</p>' : '';
            let count = 0;
            if(!snapshot.empty) snapshot.forEach(docData => {
                count++;
                const o = docData.data();
                const div = document.createElement('div');
                div.className = "bg-black p-4 rounded border border-zinc-800";
                div.innerHTML = `<div class="flex justify-between"><b>${o.customerName}</b><span>${o.totalPrice} جنيه</span></div>`;
                list.appendChild(div);
            });
            document.getElementById('stat-orders').innerText = count;
        }
    </script>
</body>
</html>
