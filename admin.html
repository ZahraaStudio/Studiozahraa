<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم استوديو الزهراء - ZAHRAA STUDIO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #0a0a0a; color: #fff; }
        .gold-border { border: 1px solid #d4af37; }
        .gold-bg { background-color: #d4af37; }
        .gold-text { color: #d4af37; }
        .gradient-text { background: linear-gradient(to right, #d4af37, #f9e29c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .tab-active { border-bottom: 3px solid #d4af37; color: #d4af37; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: #1a1a1a; border: 1px solid #d4af37; border-radius: 12px; padding: 24px; max-width: 700px; width: 95%; max-height: 90vh; overflow-y: auto; }
        .status-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .status-pending { background: #fbbf24; color: #000; }
        .status-processing { background: #3b82f6; color: #fff; }
        .status-shipped { background: #8b5cf6; color: #fff; }
        .status-delivered { background: #10b981; color: #fff; }
        .status-completed { background: #10b981; color: #fff; }
        .status-cancelled { background: #ef4444; color: #fff; }
        .btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 6px; cursor: pointer; transition: all 0.3s; }
        .btn-primary { background: #d4af37; color: #000; }
        .btn-danger { background: #ef4444; color: #fff; }
        .btn-warning { background: #f59e0b; color: #000; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .notification { position: fixed; top: 20px; right: 20px; background: #1a1a1a; border: 1px solid #d4af37; padding: 16px; border-radius: 8px; z-index: 2000; }
        .notification.success { border-color: #10b981; }
        .notification.error { border-color: #ef4444; }
    </style>
</head>
<body class="p-2 md:p-6">
    <!-- Auth Section -->
    <div id="auth-section" class="max-w-md mx-auto mt-20 p-6 bg-zinc-900 rounded-xl gold-border shadow-2xl">
        <h2 class="text-2xl font-bold mb-6 text-center gradient-text">تسجيل دخول الإدارة</h2>
        <input type="email" id="email" placeholder="البريد الإلكتروني" class="w-full p-3 mb-4 bg-black border border-zinc-700 rounded text-white outline-none focus:border-gold-text">
        <input type="password" id="password" placeholder="كلمة المرور" class="w-full p-3 mb-6 bg-black border border-zinc-700 rounded text-white outline-none focus:border-gold-text">
        <button id="login-btn" class="w-full p-3 gold-bg text-black font-bold rounded hover:opacity-90 transition-all">دخول</button>
        <p id="login-error" class="text-red-500 mt-4 text-center hidden"></p>
    </div>

    <!-- Admin Content -->
    <div id="admin-content" class="hidden max-w-7xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <h1 class="text-2xl md:text-3xl font-bold gradient-text">ZAHRAA STUDIO Admin</h1>
            <div class="flex gap-2">
                <button onclick="loadAll()" class="bg-zinc-800 text-white px-4 py-2 rounded font-bold text-xs hover:bg-zinc-700 transition-all">🔄 تحديث</button>
                <button id="logout-btn" class="bg-red-600/20 text-red-500 border border-red-600 px-4 py-2 rounded font-bold text-xs hover:bg-red-600 hover:text-white transition-all">خروج</button>
            </div>
        </div>

        <!-- Tabs Navigation -->
        <div class="flex border-b border-zinc-800 mb-8 overflow-x-auto no-scrollbar gap-2">
            <button onclick="showTab('products-tab')" id="btn-products-tab" class="px-6 py-3 font-bold tab-active whitespace-nowrap">📦 المنتجات</button>
            <button onclick="showTab('orders-tab')" id="btn-orders-tab" class="px-6 py-3 font-bold text-zinc-500 whitespace-nowrap">🛒 الطلبات</button>
            <button onclick="showTab('coupons-tab')" id="btn-coupons-tab" class="px-6 py-3 font-bold text-zinc-500 whitespace-nowrap">🏷️ الكوبونات</button>
            <button onclick="showTab('referral-tab')" id="btn-referral-tab" class="px-6 py-3 font-bold text-zinc-500 whitespace-nowrap">🎁 الإحالة</button>
            <button onclick="showTab('shipping-tab')" id="btn-shipping-tab" class="px-6 py-3 font-bold text-zinc-500 whitespace-nowrap">🚚 الشحن</button>
            <button onclick="showTab('offers-tab')" id="btn-offers-tab" class="px-6 py-3 font-bold text-zinc-500 whitespace-nowrap">🎉 العروض</button>
            <button onclick="showTab('stats-tab')" id="btn-stats-tab" class="px-6 py-3 font-bold text-zinc-500 whitespace-nowrap">📊 الإحصائيات</button>
            <button onclick="showTab('settings-tab')" id="btn-settings-tab" class="px-6 py-3 font-bold text-zinc-500 whitespace-nowrap">⚙️ الإعدادات</button>
        </div>

        <!-- Products Tab -->
        <div id="products-tab" class="tab-content active">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="lg:col-span-1 bg-zinc-900 p-6 rounded-xl gold-border h-fit sticky top-4">
                    <h3 id="form-title" class="text-xl font-bold mb-4 border-b border-zinc-800 pb-2">إضافة منتج</h3>
                    <input type="hidden" id="product-id">
                    <div class="space-y-4 text-sm">
                        <input type="text" id="p-code" placeholder="كود المنتج (مثل: ZA-450)" class="w-full p-2 bg-black border border-zinc-700 rounded outline-none focus:border-gold-text">
                        <input type="text" id="p-name" placeholder="اسم المنتج" class="w-full p-2 bg-black border border-zinc-700 rounded outline-none focus:border-gold-text">
                        <div class="grid grid-cols-2 gap-2">
                            <input type="number" id="p-price" placeholder="السعر" class="w-full p-2 bg-black border border-zinc-700 rounded outline-none focus:border-gold-text">
                            <input type="number" id="p-old-price" placeholder="السعر القديم" class="w-full p-2 bg-black border border-zinc-700 rounded outline-none focus:border-gold-text">
                        </div>
                        <input type="text" id="p-category" placeholder="القسم" class="w-full p-2 bg-black border border-zinc-700 rounded outline-none focus:border-gold-text">
                        <textarea id="p-desc" placeholder="الوصف" class="w-full p-2 bg-black border border-zinc-700 rounded h-20 outline-none focus:border-gold-text"></textarea>
                        
                        <!-- Variants -->
                        <div class="border border-zinc-800 p-3 rounded-lg">
                            <p class="text-[10px] font-bold mb-2 gold-text">الأنواع/المقاسات:</p>
                            <div id="variants-container" class="space-y-2 mb-2"></div>
                            <button onclick="addVariantField()" class="text-[10px] bg-zinc-800 px-2 py-1 rounded">+ إضافة</button>
                        </div>

                        <!-- Images -->
                        <div class="border-2 border-dashed border-zinc-700 p-4 rounded-lg text-center">
                            <input type="file" id="p-file" multiple accept="image/*" class="hidden" onchange="uploadToCloudinary(this)">
                            <button onclick="document.getElementById('p-file').click()" class="gold-bg text-black px-4 py-2 rounded font-bold text-xs">رفع صور</button>
                            <div id="upload-status" class="text-[10px] mt-2 text-zinc-500"></div>
                        </div>
                        <div id="images-preview" class="grid grid-cols-3 gap-2"></div>
                        
                        <button id="save-btn" onclick="saveProduct()" class="w-full p-3 gold-bg text-black font-bold rounded">حفظ</button>
                        <button id="cancel-btn" onclick="resetProductForm()" class="w-full p-3 bg-zinc-800 text-white font-bold rounded hidden">إلغاء</button>
                    </div>
                </div>
                <div class="lg:col-span-2 bg-zinc-900 p-6 rounded-xl gold-border">
                    <div id="products-list" class="space-y-3"></div>
                </div>
            </div>
        </div>

        <!-- Orders Tab -->
        <div id="orders-tab" class="tab-content">
            <div class="bg-zinc-900 p-6 rounded-xl gold-border">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-xl font-bold">الطلبات</h3>
                    <select id="order-filter-status" onchange="loadOrders()" class="bg-black border border-zinc-700 rounded text-xs p-2 outline-none">
                        <option value="all">كل الحالات</option>
                        <option value="قيد التنفيذ">قيد التنفيذ</option>
                        <option value="تم الشحن">تم الشحن</option>
                        <option value="تم التوصيل">تم التوصيل</option>
                        <option value="مكتمل">مكتمل</option>
                        <option value="ملغي">ملغي</option>
                    </select>
                </div>
                <div id="orders-list" class="space-y-6"></div>
            </div>
        </div>

        <!-- Coupons Tab -->
        <div id="coupons-tab" class="tab-content">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="lg:col-span-1 bg-zinc-900 p-6 rounded-xl gold-border h-fit sticky top-4">
                    <h3 class="text-xl font-bold mb-4 border-b border-zinc-800 pb-2">إضافة كوبون</h3>
                    <div class="space-y-4 text-sm">
                        <input type="text" id="c-code" placeholder="كود الكوبون" class="w-full p-2 bg-black border border-zinc-700 rounded outline-none focus:border-gold-text">
                        <div class="grid grid-cols-2 gap-2">
                            <input type="number" id="c-discount" placeholder="قيمة الخصم" class="w-full p-2 bg-black border border-zinc-700 rounded outline-none focus:border-gold-text">
                            <select id="c-type" class="w-full p-2 bg-black border border-zinc-700 rounded outline-none focus:border-gold-text">
                                <option value="percentage">نسبة %</option>
                                <option value="fixed">مبلغ ثابت</option>
                            </select>
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            <input type="number" id="c-limit" placeholder="الحد الكلي" class="w-full p-2 bg-black border border-zinc-700 rounded outline-none focus:border-gold-text">
                            <input type="number" id="c-per-user" placeholder="لكل مستخدم" class="w-full p-2 bg-black border border-zinc-700 rounded outline-none focus:border-gold-text">
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            <input type="date" id="c-start-date" class="w-full p-2 bg-black border border-zinc-700 rounded outline-none focus:border-gold-text">
                            <input type="date" id="c-expiry-date" class="w-full p-2 bg-black border border-zinc-700 rounded outline-none focus:border-gold-text">
                        </div>
                        <button onclick="saveCoupon()" class="w-full p-3 gold-bg text-black font-bold rounded">حفظ</button>
                    </div>
                </div>
                <div class="lg:col-span-2 bg-zinc-900 p-6 rounded-xl gold-border">
                    <div id="coupons-list" class="space-y-3"></div>
                </div>
            </div>
        </div>

        <!-- Referral Tab -->
        <div id="referral-tab" class="tab-content">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="lg:col-span-1 bg-zinc-900 p-6 rounded-xl gold-border h-fit">
                    <h3 class="text-xl font-bold mb-4 border-b border-zinc-800 pb-2">إعدادات المكافآت</h3>
                    <div class="space-y-4 text-sm">
                        <div>
                            <label class="text-[10px] text-zinc-500 block mb-1">قيمة المكافأة:</label>
                            <input type="number" id="reward-amount" class="w-full p-2 bg-black border border-zinc-700 rounded outline-none focus:border-gold-text">
                        </div>
                        <div>
                            <label class="text-[10px] text-zinc-500 block mb-1">نوع المكافأة:</label>
                            <select id="reward-type" class="w-full p-2 bg-black border border-zinc-700 rounded outline-none focus:border-gold-text">
                                <option value="fixed">مبلغ ثابت</option>
                                <option value="percentage">نسبة %</option>
                            </select>
                        </div>
                        <label class="flex items-center gap-2 p-2 bg-black rounded border border-zinc-700 cursor-pointer">
                            <input type="checkbox" id="referral-enabled" class="w-4 h-4">
                            <span class="text-xs">تفعيل الإحالات</span>
                        </label>
                        <button onclick="saveRewardSettings()" class="w-full p-3 gold-bg text-black font-bold rounded">حفظ</button>
                    </div>
                </div>
                <div class="lg:col-span-2 bg-zinc-900 p-6 rounded-xl gold-border">
                    <h3 class="text-xl font-bold mb-4">سجل الإحالات</h3>
                    <div id="referrals-list" class="space-y-3">
                        <p class="text-center text-zinc-500">جاري التحميل...</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Shipping Tab -->
        <div id="shipping-tab" class="tab-content">
            <div class="max-w-2xl bg-zinc-900 p-6 rounded-xl gold-border mx-auto">
                <h3 class="text-xl font-bold mb-6">أسعار الشحن حسب المحافظة</h3>
                <div id="shipping-rates" class="space-y-4"></div>
                <button onclick="saveShippingRates()" class="w-full p-3 gold-bg text-black font-bold rounded mt-6">حفظ</button>
            </div>
        </div>

        <!-- Offers Tab -->
        <div id="offers-tab" class="tab-content">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="lg:col-span-1 bg-zinc-900 p-6 rounded-xl gold-border h-fit">
                    <h3 class="text-xl font-bold mb-4 border-b border-zinc-800 pb-2">إضافة عرض</h3>
                    <div class="space-y-4 text-sm">
                        <select id="offer-type" class="w-full p-2 bg-black border border-zinc-700 rounded outline-none focus:border-gold-text">
                            <option value="daily">عرض يومي</option>
                            <option value="weekly">عرض أسبوعي</option>
                        </select>
                        <select id="offer-product" class="w-full p-2 bg-black border border-zinc-700 rounded outline-none focus:border-gold-text">
                            <option value="">اختر منتج</option>
                        </select>
                        <input type="number" id="offer-discount" placeholder="نسبة الخصم %" class="w-full p-2 bg-black border border-zinc-700 rounded outline-none focus:border-gold-text">
                        <input type="date" id="offer-date" class="w-full p-2 bg-black border border-zinc-700 rounded outline-none focus:border-gold-text">
                        <button onclick="saveOffer()" class="w-full p-3 gold-bg text-black font-bold rounded">حفظ</button>
                    </div>
                </div>
                <div class="lg:col-span-2 bg-zinc-900 p-6 rounded-xl gold-border">
                    <div id="offers-list" class="space-y-3"></div>
                </div>
            </div>
        </div>

        <!-- Stats Tab -->
        <div id="stats-tab" class="tab-content">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                <div class="bg-zinc-900 p-8 rounded-2xl gold-border text-center">
                    <p class="text-zinc-500 text-sm mb-2">المنتجات</p>
                    <h4 id="stat-products" class="text-4xl font-bold gold-text">0</h4>
                </div>
                <div class="bg-zinc-900 p-8 rounded-2xl gold-border text-center">
                    <p class="text-zinc-500 text-sm mb-2">الطلبات</p>
                    <h4 id="stat-orders" class="text-4xl font-bold gold-text">0</h4>
                </div>
                <div class="bg-zinc-900 p-8 rounded-2xl gold-border text-center">
                    <p class="text-zinc-500 text-sm mb-2">إجمالي الزوار</p>
                    <h4 id="stat-visitors" class="text-4xl font-bold gold-text">0</h4>
                </div>
                <div class="bg-zinc-900 p-8 rounded-2xl gold-border text-center">
                    <p class="text-zinc-500 text-sm mb-2">الزوار الحاليون</p>
                    <h4 id="stat-online" class="text-4xl font-bold gold-text">0</h4>
                </div>
            </div>
            <div class="bg-zinc-900 p-6 rounded-xl gold-border">
                <h3 class="text-xl font-bold mb-4">أعلى المنتجات مبيعاً</h3>
                <div id="top-products" class="space-y-2"></div>
            </div>
        </div>

        <!-- Settings Tab -->
        <div id="settings-tab" class="tab-content">
            <div class="max-w-2xl bg-zinc-900 p-8 rounded-2xl gold-border mx-auto">
                <h3 class="text-2xl font-bold mb-6 border-b border-zinc-800 pb-4">إعدادات المتجر</h3>
                <div class="space-y-6 text-sm">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="text-zinc-400 block mb-2">رقم واتساب:</label>
                            <input type="text" id="setting-whatsapp" class="w-full p-3 bg-black border border-zinc-700 rounded outline-none focus:border-gold-text">
                        </div>
                        <div>
                            <label class="text-zinc-400 block mb-2">سعر تغليف الهدايا (ج):</label>
                            <input type="number" id="setting-gift-price" class="w-full p-3 bg-black border border-zinc-700 rounded outline-none focus:border-gold-text">
                        </div>
                    </div>
                    <div>
                        <label class="text-zinc-400 block mb-2">رابط الفيسبوك:</label>
                        <input type="text" id="setting-facebook" class="w-full p-3 bg-black border border-zinc-700 rounded outline-none focus:border-gold-text">
                    </div>
                    <div>
                        <label class="text-zinc-400 block mb-2">رابط إنستغرام:</label>
                        <input type="text" id="setting-instagram" class="w-full p-3 bg-black border border-zinc-700 rounded outline-none focus:border-gold-text">
                    </div>
                    <div>
                        <label class="text-zinc-400 block mb-2">رسالة الترحيب:</label>
                        <textarea id="setting-welcome-msg" class="w-full p-3 bg-black border border-zinc-700 rounded h-24 outline-none focus:border-gold-text"></textarea>
                    </div>
                    <button onclick="saveGeneralSettings()" class="w-full p-4 gold-bg text-black font-bold rounded-xl hover:opacity-90">حفظ الإعدادات</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Order Details Modal -->
    <div id="order-details-modal" class="modal">
        <div class="modal-content max-w-4xl">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold">تفاصيل الطلب</h3>
                <button onclick="closeOrderDetailsModal()" class="text-zinc-500 hover:text-white">✕</button>
            </div>
            <div id="order-details-content"></div>
        </div>
    </div>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyCG6Yc0iH-rt-PaiRqL_V9Re1z49ZF3OMM",
            authDomain: "zahraa-store-f4c90.firebaseapp.com",
            projectId: "zahraa-store-f4c90",
            storageBucket: "zahraa-store-f4c90.appspot.com",
            messagingSenderId: "123456789",
            appId: "1:123456789:web:abcdef123456"
        };

        const CLOUDINARY_URL = "https://api.cloudinary.com/v1_1/dxlxwe55b/image/upload";
        const CLOUDINARY_UPLOAD_PRESET = "zahraa_upload";

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // Global Variables
        let currentUser = null;
        let allProducts = [];
        let allOrders = [];
        let allCoupons = [];
        let allReferrals = [];
        let shippingRates = {};
        let productImages = [];

        // Auth
        document.getElementById('login-btn').addEventListener('click', async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            try {
                await auth.signInWithEmailAndPassword(email, password);
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('admin-content').classList.remove('hidden');
                loadAll();
            } catch (e) {
                document.getElementById('login-error').innerText = 'خطأ: ' + e.message;
                document.getElementById('login-error').classList.remove('hidden');
            }
        });

        document.getElementById('logout-btn').addEventListener('click', () => {
            auth.signOut();
            location.reload();
        });

        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('admin-content').classList.remove('hidden');
                loadAll();
            } else {
                document.getElementById('auth-section').classList.remove('hidden');
                document.getElementById('admin-content').classList.add('hidden');
            }
        });

        // Tab Navigation
        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('[id^="btn-"]').forEach(btn => btn.classList.remove('tab-active'));
            document.getElementById(tabId).classList.add('active');
            document.getElementById('btn-' + tabId).classList.add('tab-active');
        }

        // Load All Data
        async function loadAll() {
            loadProducts();
            loadOrders();
            loadCoupons();
            loadReferrals();
            loadShippingRates();
            loadOffers();
            loadSettings();
            loadStats();
        }

        // ==================== PRODUCTS ====================
        async function loadProducts() {
            try {
                const snapshot = await db.collection('products').get();
                allProducts = [];
                document.getElementById('products-list').innerHTML = '';
                snapshot.forEach(doc => {
                    allProducts.push({ id: doc.id, ...doc.data() });
                    renderProductItem(doc.id, doc.data());
                });
                document.getElementById('stat-products').innerText = allProducts.length;
                populateProductSelect();
            } catch (e) { console.error(e); }
        }

        function renderProductItem(id, data) {
            const list = document.getElementById('products-list');
            list.innerHTML += `
                <div class="p-4 bg-black rounded-lg border border-zinc-800">
                    <div class="flex justify-between items-start mb-2">
                        <div>
                            <p class="font-bold gold-text">${data.name}</p>
                            <p class="text-xs text-zinc-500">${data.code || 'بدون كود'}</p>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="editProduct('${id}')" class="btn-sm bg-blue-600 text-white">تعديل</button>
                            <button onclick="deleteProduct('${id}')" class="btn-sm btn-danger">حذف</button>
                        </div>
                    </div>
                    <p class="text-sm text-zinc-400">${data.price} ج</p>
                </div>
            `;
        }

        window.saveProduct = async () => {
            const id = document.getElementById('product-id').value;
            const data = {
                code: document.getElementById('p-code').value,
                name: document.getElementById('p-name').value,
                price: parseFloat(document.getElementById('p-price').value),
                oldPrice: parseFloat(document.getElementById('p-old-price').value) || 0,
                category: document.getElementById('p-category').value,
                description: document.getElementById('p-desc').value,
                images: productImages,
                variants: Array.from(document.querySelectorAll('#variants-container .v-row')).map(row => ({
                    name: row.querySelector('.v-name').value,
                    price: parseFloat(row.querySelector('.v-price').value)
                })),
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            };

            try {
                if (id) {
                    await db.collection('products').doc(id).update(data);
                } else {
                    await db.collection('products').add(data);
                }
                showNotification('تم الحفظ بنجاح', 'success');
                resetProductForm();
                loadProducts();
            } catch (e) { console.error(e); }
        };

        window.editProduct = async (id) => {
            const product = allProducts.find(p => p.id === id);
            if (!product) return;
            document.getElementById('product-id').value = id;
            document.getElementById('p-code').value = product.code || '';
            document.getElementById('p-name').value = product.name;
            document.getElementById('p-price').value = product.price;
            document.getElementById('p-old-price').value = product.oldPrice || '';
            document.getElementById('p-category').value = product.category || '';
            document.getElementById('p-desc').value = product.description || '';
            productImages = product.images || [];
            renderImagePreview();
            renderVariants(product.variants || []);
            document.getElementById('form-title').innerText = 'تعديل المنتج';
            document.getElementById('cancel-btn').classList.remove('hidden');
        };

        window.deleteProduct = async (id) => {
            if (confirm('هل أنت متأكد؟')) {
                await db.collection('products').doc(id).delete();
                loadProducts();
            }
        };

        window.resetProductForm = () => {
            document.getElementById('product-id').value = '';
            document.getElementById('p-code').value = '';
            document.getElementById('p-name').value = '';
            document.getElementById('p-price').value = '';
            document.getElementById('p-old-price').value = '';
            document.getElementById('p-category').value = '';
            document.getElementById('p-desc').value = '';
            productImages = [];
            document.getElementById('form-title').innerText = 'إضافة منتج';
            document.getElementById('cancel-btn').classList.add('hidden');
            document.getElementById('variants-container').innerHTML = '';
            renderImagePreview();
        };

        window.uploadToCloudinary = async (input) => {
            const files = input.files;
            for (let file of files) {
                const fd = new FormData();
                fd.append('file', file);
                fd.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);
                try {
                    const res = await fetch(CLOUDINARY_URL, { method: 'POST', body: fd });
                    const data = await res.json();
                    if (data.secure_url) {
                        productImages.push(data.secure_url);
                        renderImagePreview();
                    }
                } catch (e) { console.error(e); }
            }
        };

        function renderImagePreview() {
            const container = document.getElementById('images-preview');
            container.innerHTML = productImages.map((img, idx) => `
                <div class="relative">
                    <img src="${img}" class="w-full h-20 object-cover rounded">
                    <button onclick="productImages.splice(${idx},1);renderImagePreview()" class="absolute top-1 right-1 bg-red-500 text-white w-5 h-5 rounded-full text-xs">✕</button>
                </div>
            `).join('');
        }

        function renderVariants(variants) {
            const container = document.getElementById('variants-container');
            container.innerHTML = variants.map(v => `
                <div class="flex gap-2 v-row">
                    <input type="text" value="${v.name}" class="v-name flex-1 p-2 bg-black border border-zinc-800 rounded text-[10px] outline-none">
                    <input type="number" value="${v.price}" class="v-price w-24 p-2 bg-black border border-zinc-800 rounded text-[10px] outline-none">
                    <button onclick="this.parentElement.remove()" class="text-red-500 px-2">✕</button>
                </div>
            `).join('');
        }

        window.addVariantField = () => {
            const container = document.getElementById('variants-container');
            const div = document.createElement('div');
            div.className = 'flex gap-2 v-row';
            div.innerHTML = `
                <input type="text" placeholder="النوع" class="v-name flex-1 p-2 bg-black border border-zinc-800 rounded text-[10px] outline-none">
                <input type="number" placeholder="السعر" class="v-price w-24 p-2 bg-black border border-zinc-800 rounded text-[10px] outline-none">
                <button onclick="this.parentElement.remove()" class="text-red-500 px-2">✕</button>
            `;
            container.appendChild(div);
        };

        function populateProductSelect() {
            const select = document.getElementById('offer-product');
            select.innerHTML = '<option value="">اختر منتج</option>' + allProducts.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
        }

        // ==================== ORDERS ====================
        async function loadOrders() {
            try {
                const snapshot = await db.collection('orders').orderBy('createdAt', 'desc').get();
                allOrders = [];
                document.getElementById('orders-list').innerHTML = '';
                snapshot.forEach(doc => {
                    allOrders.push({ id: doc.id, ...doc.data() });
                    renderOrderItem(doc.id, doc.data());
                });
                document.getElementById('stat-orders').innerText = allOrders.length;
            } catch (e) { console.error(e); }
        }

        function renderOrderItem(id, order) {
            const list = document.getElementById('orders-list');
            const date = order.createdAt?.toDate ? order.createdAt.toDate().toLocaleString('ar-EG') : 'N/A';
            list.innerHTML += `
                <div class="p-6 bg-black rounded-2xl border border-zinc-800">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <p class="font-bold gold-text">${order.orderNumber}</p>
                            <p class="text-xs text-zinc-500">${date}</p>
                        </div>
                        <span class="status-badge status-${order.status.replace(/\s+/g, '-').toLowerCase()}">${order.status}</span>
                    </div>
                    <div class="grid grid-cols-3 gap-4 mb-4 text-sm">
                        <div>
                            <p class="text-zinc-500">العميل:</p>
                            <p class="font-bold">${order.customerName}</p>
                            <p class="text-xs text-zinc-400">${order.customerPhone}</p>
                        </div>
                        <div>
                            <p class="text-zinc-500">الإجمالي:</p>
                            <p class="font-bold gold-text">${order.totalPrice} ج</p>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="viewOrderDetails('${id}')" class="btn-sm btn-primary">تفاصيل</button>
                            <select onchange="updateOrderStatus('${id}', this.value)" class="bg-black border border-zinc-700 rounded p-2 text-xs outline-none">
                                <option value="قيد التنفيذ" ${order.status === 'قيد التنفيذ' ? 'selected' : ''}>قيد التنفيذ</option>
                                <option value="تم الشحن" ${order.status === 'تم الشحن' ? 'selected' : ''}>تم الشحن</option>
                                <option value="تم التوصيل" ${order.status === 'تم التوصيل' ? 'selected' : ''}>تم التوصيل</option>
                                <option value="مكتمل" ${order.status === 'مكتمل' ? 'selected' : ''}>مكتمل</option>
                                <option value="ملغي" ${order.status === 'ملغي' ? 'selected' : ''}>ملغي</option>
                            </select>
                        </div>
                    </div>
                </div>
            `;
        }

        window.updateOrderStatus = async (id, status) => {
            try {
                await db.collection('orders').doc(id).update({ status });
                loadOrders();
                showNotification('تم التحديث', 'success');
            } catch (e) { console.error(e); }
        };

        window.viewOrderDetails = (id) => {
            const order = allOrders.find(o => o.id === id);
            if (!order) return;
            const content = document.getElementById('order-details-content');
            const date = order.createdAt?.toDate ? order.createdAt.toDate().toLocaleString('ar-EG') : 'N/A';
            
            content.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-4">
                        <div class="bg-black p-4 rounded-lg border border-zinc-800">
                            <p class="text-zinc-500 text-sm mb-2">بيانات العميل</p>
                            <p class="font-bold">${order.customerName}</p>
                            <p class="text-sm text-zinc-400">${order.customerPhone}</p>
                            <p class="text-sm text-zinc-400">${order.customerAddress}</p>
                            <p class="text-sm text-zinc-400">${order.customerGovernorate}</p>
                        </div>
                        <div class="bg-black p-4 rounded-lg border border-zinc-800">
                            <p class="text-zinc-500 text-sm mb-2">الحالة</p>
                            <span class="status-badge status-${order.status.replace(/\s+/g, '-').toLowerCase()}">${order.status}</span>
                        </div>
                    </div>
                    <div class="space-y-4">
                        <div class="bg-black p-4 rounded-lg border border-zinc-800">
                            <p class="text-zinc-500 text-sm mb-2">ملخص الحساب</p>
                            <div class="space-y-1 text-sm">
                                <div class="flex justify-between"><span>الأساسي:</span><span>${order.subtotal} ج</span></div>
                                <div class="flex justify-between"><span>الخصم:</span><span>-${order.discountAmount || 0} ج</span></div>
                                <div class="flex justify-between"><span>الشحن:</span><span>${order.shipping || 0} ج</span></div>
                                <div class="flex justify-between font-bold border-t border-zinc-700 pt-1"><span>الإجمالي:</span><span class="gold-text">${order.totalPrice} ج</span></div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="mt-6 bg-black p-4 rounded-lg border border-zinc-800">
                    <p class="text-zinc-500 text-sm mb-3">المنتجات</p>
                    <div class="space-y-2">
                        ${(order.items || []).map(item => `
                            <div class="flex justify-between text-sm">
                                <span>${item.name} × ${item.qty}</span>
                                <span class="gold-text">${item.price * item.qty} ج</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            document.getElementById('order-details-modal').classList.add('active');
        };

        window.closeOrderDetailsModal = () => {
            document.getElementById('order-details-modal').classList.remove('active');
        };

        // ==================== COUPONS ====================
        async function loadCoupons() {
            try {
                const snapshot = await db.collection('coupons').get();
                allCoupons = [];
                document.getElementById('coupons-list').innerHTML = '';
                snapshot.forEach(doc => {
                    allCoupons.push({ id: doc.id, ...doc.data() });
                    renderCouponItem(doc.id, doc.data());
                });
            } catch (e) { console.error(e); }
        }

        function renderCouponItem(id, coupon) {
            const list = document.getElementById('coupons-list');
            list.innerHTML += `
                <div class="p-4 bg-black rounded-lg border border-zinc-800">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="font-bold gold-text">${coupon.code}</p>
                            <p class="text-xs text-zinc-500">خصم: ${coupon.discount}${coupon.type === 'percentage' ? '%' : ' ج'}</p>
                        </div>
                        <button onclick="deleteCoupon('${id}')" class="btn-sm btn-danger">حذف</button>
                    </div>
                </div>
            `;
        }

        window.saveCoupon = async () => {
            const data = {
                code: document.getElementById('c-code').value.toUpperCase(),
                discount: parseFloat(document.getElementById('c-discount').value),
                type: document.getElementById('c-type').value,
                limit: parseInt(document.getElementById('c-limit').value) || 0,
                perUserLimit: parseInt(document.getElementById('c-per-user').value) || 0,
                startDate: document.getElementById('c-start-date').value ? new Date(document.getElementById('c-start-date').value) : null,
                expiryDate: document.getElementById('c-expiry-date').value ? new Date(document.getElementById('c-expiry-date').value) : null,
                usedCount: 0,
                isActive: true,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            };

            try {
                await db.collection('coupons').add(data);
                showNotification('تم إضافة الكوبون', 'success');
                document.getElementById('c-code').value = '';
                document.getElementById('c-discount').value = '';
                document.getElementById('c-limit').value = '';
                document.getElementById('c-per-user').value = '';
                document.getElementById('c-start-date').value = '';
                document.getElementById('c-expiry-date').value = '';
                loadCoupons();
            } catch (e) { console.error(e); }
        };

        window.deleteCoupon = async (id) => {
            if (confirm('حذف الكوبون؟')) {
                await db.collection('coupons').doc(id).delete();
                loadCoupons();
            }
        };

        // ==================== REFERRALS ====================
        async function loadReferrals() {
            try {
                const snapshot = await db.collection('referrals').orderBy('timestamp', 'desc').limit(20).get();
                allReferrals = [];
                document.getElementById('referrals-list').innerHTML = '';
                snapshot.forEach(doc => {
                    allReferrals.push(doc.data());
                    const data = doc.data();
                    document.getElementById('referrals-list').innerHTML += `
                        <div class="p-3 bg-black rounded-lg border border-zinc-800 text-sm">
                            <p class="font-bold gold-text">${data.couponCode}</p>
                            <p class="text-zinc-500">مبلغ: ${data.amount} ج</p>
                        </div>
                    `;
                });
            } catch (e) { console.error(e); }
        }

        window.saveRewardSettings = async () => {
            try {
                await db.collection('settings').doc('rewards').set({
                    amount: parseFloat(document.getElementById('reward-amount').value),
                    type: document.getElementById('reward-type').value,
                    enabled: document.getElementById('referral-enabled').checked,
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                }, { merge: true });
                showNotification('تم الحفظ', 'success');
            } catch (e) { console.error(e); }
        };

        // ==================== SHIPPING ====================
        async function loadShippingRates() {
            try {
                const snap = await db.collection('settings').doc('shipping').get();
                shippingRates = snap.exists ? snap.data().rates || {} : {};
                renderShippingRates();
            } catch (e) { console.error(e); }
        }

        function renderShippingRates() {
            const container = document.getElementById('shipping-rates');
            const governorates = ['القاهرة', 'الجيزة', 'الإسكندرية', 'الشرقية', 'الدقهلية', 'المنوفية', 'الغربية', 'البحيرة'];
            container.innerHTML = governorates.map(gov => `
                <div class="flex gap-4 items-center">
                    <label class="flex-1">${gov}</label>
                    <input type="number" value="${shippingRates[gov] || 0}" data-gov="${gov}" class="w-24 p-2 bg-black border border-zinc-700 rounded outline-none focus:border-gold-text">
                </div>
            `).join('');
        }

        window.saveShippingRates = async () => {
            const rates = {};
            document.querySelectorAll('#shipping-rates input').forEach(input => {
                rates[input.getAttribute('data-gov')] = parseFloat(input.value);
            });
            try {
                await db.collection('settings').doc('shipping').set({ rates }, { merge: true });
                showNotification('تم الحفظ', 'success');
            } catch (e) { console.error(e); }
        };

        // ==================== OFFERS ====================
        async function loadOffers() {
            try {
                const snapshot = await db.collection('offers').get();
                document.getElementById('offers-list').innerHTML = '';
                snapshot.forEach(doc => {
                    const offer = doc.data();
                    const product = allProducts.find(p => p.id === offer.productId);
                    document.getElementById('offers-list').innerHTML += `
                        <div class="p-4 bg-black rounded-lg border border-zinc-800">
                            <div class="flex justify-between items-start">
                                <div>
                                    <p class="font-bold">${product?.name || 'منتج محذوف'}</p>
                                    <p class="text-xs text-zinc-500">${offer.type === 'daily' ? 'عرض يومي' : 'عرض أسبوعي'} - خصم ${offer.discount}%</p>
                                </div>
                                <button onclick="deleteOffer('${doc.id}')" class="btn-sm btn-danger">حذف</button>
                            </div>
                        </div>
                    `;
                });
            } catch (e) { console.error(e); }
        }

        window.saveOffer = async () => {
            const productId = document.getElementById('offer-product').value;
            if (!productId) return alert('اختر منتج');
            try {
                await db.collection('offers').add({
                    productId,
                    type: document.getElementById('offer-type').value,
                    discount: parseFloat(document.getElementById('offer-discount').value),
                    date: document.getElementById('offer-date').value,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                showNotification('تم إضافة العرض', 'success');
                document.getElementById('offer-product').value = '';
                document.getElementById('offer-discount').value = '';
                document.getElementById('offer-date').value = '';
                loadOffers();
            } catch (e) { console.error(e); }
        };

        window.deleteOffer = async (id) => {
            if (confirm('حذف العرض؟')) {
                await db.collection('offers').doc(id).delete();
                loadOffers();
            }
        };

        // ==================== STATS ====================
        async function loadStats() {
            try {
                const snap = await db.collection('settings').doc('stats').get();
                const stats = snap.exists ? snap.data() : { totalVisitors: 0, onlineVisitors: 0 };
                document.getElementById('stat-visitors').innerText = stats.totalVisitors || 0;
                document.getElementById('stat-online').innerText = stats.onlineVisitors || 0;
            } catch (e) { console.error(e); }
        }

        // ==================== SETTINGS ====================
        async function loadSettings() {
            try {
                const snap = await db.collection('settings').doc('store').get();
                if (snap.exists) {
                    const data = snap.data();
                    document.getElementById('setting-whatsapp').value = data.whatsapp || '';
                    document.getElementById('setting-gift-price').value = data.giftPrice || 20;
                    document.getElementById('setting-facebook').value = data.facebook || '';
                    document.getElementById('setting-instagram').value = data.instagram || '';
                    document.getElementById('setting-welcome-msg').value = data.welcomeMsg || '';
                }
                const rewardSnap = await db.collection('settings').doc('rewards').get();
                if (rewardSnap.exists) {
                    const data = rewardSnap.data();
                    document.getElementById('reward-amount').value = data.amount || 50;
                    document.getElementById('reward-type').value = data.type || 'fixed';
                    document.getElementById('referral-enabled').checked = data.enabled !== false;
                }
            } catch (e) { console.error(e); }
        }

        window.saveGeneralSettings = async () => {
            try {
                await db.collection('settings').doc('store').set({
                    whatsapp: document.getElementById('setting-whatsapp').value,
                    giftPrice: parseFloat(document.getElementById('setting-gift-price').value),
                    facebook: document.getElementById('setting-facebook').value,
                    instagram: document.getElementById('setting-instagram').value,
                    welcomeMsg: document.getElementById('setting-welcome-msg').value,
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                }, { merge: true });
                showNotification('تم الحفظ', 'success');
            } catch (e) { console.error(e); }
        };

        // Notification
        function showNotification(msg, type) {
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.innerText = msg;
            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 3000);
        }

        // Initialize
        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('admin-content').classList.remove('hidden');
                loadAll();
            }
        });

        // ============ CRM SYSTEM ============
        window.loadCRMDashboard = async () => {
            try {
                const usersSnapshot = await db.collection('users').get();
                const ordersSnapshot = await db.collection('orders').get();

                let totalCustomers = usersSnapshot.size;
                let totalOrders = ordersSnapshot.size;
                let totalRevenue = 0;
                let vipCustomers = 0;

                ordersSnapshot.forEach(doc => {
                    totalRevenue += doc.data().total || 0;
                });

                usersSnapshot.forEach(doc => {
                    if (doc.data().isVIP) vipCustomers++;
                });

                const crmHTML = `
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
                        <div class="bg-zinc-900 border border-gold-text p-6 rounded-lg text-center">
                            <p class="text-zinc-500 text-sm">إجمالي العملاء</p>
                            <p class="text-3xl font-bold gold-text">${totalCustomers}</p>
                        </div>
                        <div class="bg-zinc-900 border border-gold-text p-6 rounded-lg text-center">
                            <p class="text-zinc-500 text-sm">إجمالي الطلبات</p>
                            <p class="text-3xl font-bold gold-text">${totalOrders}</p>
                        </div>
                        <div class="bg-zinc-900 border border-gold-text p-6 rounded-lg text-center">
                            <p class="text-zinc-500 text-sm">إجمالي الإيرادات</p>
                            <p class="text-3xl font-bold gold-text">${totalRevenue} ج</p>
                        </div>
                        <div class="bg-zinc-900 border border-gold-text p-6 rounded-lg text-center">
                            <p class="text-zinc-500 text-sm">عملاء مميزين</p>
                            <p class="text-3xl font-bold gold-text">${vipCustomers}</p>
                        </div>
                    </div>
                `;

                const crmContainer = document.getElementById('crm-dashboard') || document.createElement('div');
                if (!crmContainer.id) {
                    crmContainer.id = 'crm-dashboard';
                    document.querySelector('[data-page="admin"]')?.appendChild(crmContainer);
                }
                crmContainer.innerHTML = crmHTML;
            } catch (e) {
                console.error('Error loading CRM dashboard:', e);
            }
        };

        window.markCustomerAsVIP = async (customerId) => {
            try {
                await db.collection('users').doc(customerId).update({
                    isVIP: true,
                    vipSince: firebase.firestore.FieldValue.serverTimestamp()
                });
                showNotification('تم تصنيف العميل كعميل مميز', 'success');
                loadCRMDashboard();
            } catch (e) {
                console.error('Error marking as VIP:', e);
            }
        };

        window.blockCustomer = async (customerId) => {
            try {
                await db.collection('users').doc(customerId).update({
                    blocked: true,
                    blockedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                showNotification('تم حظر العميل', 'success');
                loadCRMDashboard();
            } catch (e) {
                console.error('Error blocking customer:', e);
            }
        };

        window.sendMessageToCustomer = async (customerId, message) => {
            try {
                await db.collection('admin_messages').add({
                    customerId: customerId,
                    message: message,
                    sentAt: firebase.firestore.FieldValue.serverTimestamp(),
                    read: false
                });
                showNotification('تم إرسال الرسالة', 'success');
            } catch (e) {
                console.error('Error sending message:', e);
            }
        };

        // Load CRM dashboard on admin page load
        const originalLoadAll = window.loadAll;
        window.loadAll = async function() {
            if (originalLoadAll) await originalLoadAll();
            await loadCRMDashboard();
        };
    </script>
</body>
</html>
