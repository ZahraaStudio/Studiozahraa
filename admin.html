<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم ZAHRAA STUDIO - Cloudinary Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- Firebase SDKs Compat -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #0a0a0a; color: #fff; }
        .gold-border { border: 1px solid #d4af37; }
        .gold-bg { background-color: #d4af37; }
        .gradient-text {
            background: linear-gradient(to right, #d4af37, #f9e29c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .tab-active { border-bottom: 3px solid #d4af37; color: #d4af37; }
        .loader { border-top-color: #d4af37; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-2 md:p-6">
    <!-- Auth Section -->
    <div id="auth-section" class="max-w-md mx-auto mt-20 p-6 bg-zinc-900 rounded-xl gold-border">
        <h2 class="text-2xl font-bold mb-6 text-center gradient-text">تسجيل دخول الإدارة</h2>
        <input type="email" id="email" placeholder="البريد الإلكتروني" class="w-full p-3 mb-4 bg-black border border-zinc-700 rounded text-white">
        <input type="password" id="password" placeholder="كلمة المرور" class="w-full p-3 mb-6 bg-black border border-zinc-700 rounded text-white">
        <button id="login-btn" class="w-full p-3 gold-bg text-black font-bold rounded hover:opacity-90">دخول</button>
        <p id="login-error" class="text-red-500 mt-4 text-center hidden"></p>
    </div>

    <!-- Main Admin Content -->
    <div id="admin-content" class="hidden max-w-6xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <h1 class="text-3xl font-bold gradient-text">لوحة تحكم ZAHRAA STUDIO</h1>
            <div class="flex gap-4">
                <button id="logout-btn" class="bg-red-600/20 text-red-500 border border-red-600 px-4 py-2 rounded font-bold hover:bg-red-600 hover:text-white transition-all">خروج</button>
            </div>
        </div>

        <!-- Tabs Navigation -->
        <div class="flex border-b border-zinc-800 mb-8 overflow-x-auto">
            <button onclick="showTab('products-tab')" id="btn-products-tab" class="px-6 py-3 font-bold tab-active whitespace-nowrap">إدارة المنتجات</button>
            <button onclick="showTab('orders-tab')" id="btn-orders-tab" class="px-6 py-3 font-bold text-zinc-500 whitespace-nowrap">متابعة الطلبات</button>
            <button onclick="showTab('stats-tab')" id="btn-stats-tab" class="px-6 py-3 font-bold text-zinc-500 whitespace-nowrap">الإحصائيات</button>
        </div>

        <!-- Products Tab -->
        <div id="products-tab" class="tab-content">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <!-- Form Section -->
                <div class="lg:col-span-1 bg-zinc-900 p-6 rounded-xl gold-border h-fit sticky top-4">
                    <h3 id="form-title" class="text-xl font-bold mb-4 border-b border-zinc-800 pb-2">إضافة منتج جديد</h3>
                    <input type="hidden" id="product-id">
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm text-zinc-400 mb-1">اسم المنتج</label>
                            <input type="text" id="p-name" class="w-full p-2 bg-black border border-zinc-700 rounded focus:border-yellow-600 outline-none">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm text-zinc-400 mb-1">السعر (جنيه)</label>
                                <input type="number" id="p-price" class="w-full p-2 bg-black border border-zinc-700 rounded focus:border-yellow-600 outline-none">
                            </div>
                            <div>
                                <label class="block text-sm text-zinc-400 mb-1">الحالة</label>
                                <select id="p-status" class="w-full p-2 bg-black border border-zinc-700 rounded focus:border-yellow-600 outline-none">
                                    <option value="available">متوفر</option>
                                    <option value="out_of_stock">نفذت الكمية</option>
                                </select>
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm text-zinc-400 mb-1">الوصف</label>
                            <textarea id="p-desc" class="w-full p-2 bg-black border border-zinc-700 rounded h-24 focus:border-yellow-600 outline-none"></textarea>
                        </div>
                        
                        <!-- Cloudinary Image Upload Section -->
                        <div class="border-2 border-dashed border-zinc-700 p-4 rounded-lg text-center hover:border-yellow-600 transition-colors">
                            <label class="cursor-pointer block">
                                <span class="text-zinc-400 block mb-2">رفع صور إلى Cloudinary</span>
                                <input type="file" id="p-file" multiple accept="image/*" class="hidden">
                                <div class="gold-bg text-black px-4 py-2 rounded font-bold inline-block">اختر الصور من جهازك</div>
                            </label>
                            <div id="upload-progress" class="mt-2 hidden">
                                <div class="w-full bg-zinc-800 rounded-full h-2">
                                    <div id="progress-bar" class="bg-yellow-600 h-2 rounded-full" style="width: 0%"></div>
                                </div>
                                <span id="upload-status-text" class="text-xs text-zinc-500 mt-1 block">جاري الرفع...</span>
                            </div>
                        </div>

                        <!-- Preview Images -->
                        <div id="images-preview" class="grid grid-cols-3 gap-2 mt-2"></div>

                        <div class="flex gap-2 pt-4">
                            <button id="save-btn" class="flex-1 p-3 gold-bg text-black font-bold rounded hover:opacity-90 transition-opacity">حفظ المنتج</button>
                            <button id="cancel-btn" class="hidden p-3 bg-zinc-800 text-white font-bold rounded hover:bg-zinc-700 transition-colors">إلغاء</button>
                        </div>
                    </div>
                </div>

                <!-- List Section -->
                <div class="lg:col-span-2 bg-zinc-900 p-6 rounded-xl gold-border">
                    <div class="flex justify-between items-center mb-4 border-b border-zinc-800 pb-2">
                        <h3 class="text-xl font-bold">قائمة المنتجات</h3>
                        <input type="text" id="search-products" placeholder="بحث عن منتج..." class="bg-black border border-zinc-700 rounded px-3 py-1 text-sm">
                    </div>
                    <div id="products-list" class="space-y-4">
                        <div class="flex justify-center py-10"><div class="loader ease-linear rounded-full border-4 border-t-4 border-zinc-800 h-12 w-12"></div></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Orders Tab -->
        <div id="orders-tab" class="tab-content hidden">
            <div class="bg-zinc-900 p-6 rounded-xl gold-border">
                <h3 class="text-xl font-bold mb-6 border-b border-zinc-800 pb-2">متابعة طلبات العملاء</h3>
                <div id="orders-list" class="space-y-4">
                    <p class="text-center text-zinc-500 py-10">جاري تحميل الطلبات...</p>
                </div>
            </div>
        </div>

        <!-- Stats Tab -->
        <div id="stats-tab" class="tab-content hidden">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-zinc-900 p-8 rounded-xl gold-border text-center">
                    <h4 class="text-zinc-400 mb-2">إجمالي المنتجات</h4>
                    <p id="stat-products" class="text-4xl font-bold gradient-text">0</p>
                </div>
                <div id="stat-orders-card" class="bg-zinc-900 p-8 rounded-xl gold-border text-center">
                    <h4 class="text-zinc-400 mb-2">إجمالي الطلبات</h4>
                    <p id="stat-orders" class="text-4xl font-bold gradient-text">0</p>
                </div>
                <div class="bg-zinc-900 p-8 rounded-xl gold-border text-center">
                    <h4 class="text-zinc-400 mb-2">حالة المتجر</h4>
                    <p class="text-4xl font-bold text-green-500">نشط</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCG6Yc0iH-rt-PaiRqL_V9Re1z49ZF3OMM",
            authDomain: "zahraa-store-f4c90.firebaseapp.com",
            projectId: "zahraa-store-f4c90"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Cloudinary Config
        const CLOUDINARY_URL = "https://api.cloudinary.com/v1_1/dxlxwe55b/image/upload";
        const CLOUDINARY_UPLOAD_PRESET = "zahraa_upload";

        let currentProductImages = [];

        // --- Auth Logic ---
        document.getElementById('login-btn').onclick = () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const errorEl = document.getElementById('login-error');
            errorEl.classList.add('hidden');
            auth.signInWithEmailAndPassword(email, pass).catch(err => {
                errorEl.innerText = "خطأ: " + err.message;
                errorEl.classList.remove('hidden');
            });
        };

        document.getElementById('logout-btn').onclick = () => auth.signOut();

        auth.onAuthStateChanged((user) => {
            if (user) {
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('admin-content').classList.remove('hidden');
                loadProducts();
            } else {
                document.getElementById('auth-section').classList.remove('hidden');
                document.getElementById('admin-content').classList.add('hidden');
            }
        });

        // --- Cloudinary Image Upload Logic ---
        document.getElementById('p-file').onchange = async (e) => {
            const files = e.target.files;
            if (!files.length) return;

            const progressSection = document.getElementById('upload-progress');
            const progressBar = document.getElementById('progress-bar');
            const statusText = document.getElementById('upload-status-text');
            
            progressSection.classList.remove('hidden');

            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                statusText.innerText = `جاري رفع صورة ${i+1} من ${files.length}...`;
                
                const formData = new FormData();
                formData.append('file', file);
                formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);

                try {
                    const response = await fetch(CLOUDINARY_URL, {
                        method: 'POST',
                        body: formData
                    });
                    const data = await response.json();
                    if (data.secure_url) {
                        currentProductImages.push(data.secure_url);
                        renderImagePreviews();
                    } else {
                        alert('خطأ في رفع الصورة: ' + (data.error ? data.error.message : 'غير معروف'));
                    }
                } catch (error) {
                    console.error('Error uploading to Cloudinary:', error);
                    alert('فشل الاتصال بـ Cloudinary');
                }
                
                const progress = ((i + 1) / files.length) * 100;
                progressBar.style.width = progress + '%';
            }
            
            setTimeout(() => {
                progressSection.classList.add('hidden');
                progressBar.style.width = '0%';
            }, 1000);
        };

        function renderImagePreviews() {
            const container = document.getElementById('images-preview');
            container.innerHTML = '';
            currentProductImages.forEach((url, index) => {
                const div = document.createElement('div');
                div.className = "relative group aspect-square border border-zinc-800 rounded overflow-hidden";
                div.innerHTML = `
                    <img src="${url}" class="w-full h-full object-cover">
                    <button class="remove-img-btn absolute top-0 right-0 bg-red-600 text-white p-1 opacity-0 group-hover:opacity-100 transition-opacity">×</button>
                `;
                div.querySelector('.remove-img-btn').onclick = () => removeImage(index);
                container.appendChild(div);
            });
        }

        function removeImage(index) {
            currentProductImages.splice(index, 1);
            renderImagePreviews();
        }

        async function loadProducts() {
            const list = document.getElementById('products-list');
            try {
                const snapshot = await db.collection("products").orderBy("updatedAt", "desc").get();
                list.innerHTML = '';
                let count = 0;
                snapshot.forEach((doc) => {
                    count++;
                    const p = doc.data();
                    const id = doc.id;
                    const div = document.createElement('div');
                    div.className = "flex flex-col md:flex-row items-center justify-between p-4 bg-black rounded border border-zinc-800 hover:border-yellow-600/50 transition-all gap-4";
                    div.innerHTML = `
                        <div class="flex items-center gap-4 w-full">
                            <div class="flex -space-x-2 overflow-hidden">
                                ${p.images && p.images.length > 0 ? p.images.slice(0, 3).map(img => `<img src="${img}" class="w-12 h-12 object-cover rounded-full border-2 border-black">`).join('') : '<div class="w-12 h-12 bg-zinc-800 rounded-full"></div>'}
                            </div>
                            <div class="flex-1">
                                <h4 class="font-bold text-lg">${p.name}</h4>
                                <div class="flex gap-3 text-sm">
                                    <span class="text-yellow-500 font-bold">${p.price} جنيه</span>
                                    <span class="${p.status === 'available' ? 'text-green-500' : 'text-red-500'}">${p.status === 'available' ? 'متوفر' : 'نفذت'}</span>
                                </div>
                            </div>
                        </div>
                        <div class="flex gap-3 w-full md:w-auto justify-end">
                            <button class="edit-btn bg-blue-600/10 text-blue-400 border border-blue-600 px-4 py-1 rounded hover:bg-blue-600 hover:text-white transition-all">تعديل</button>
                            <button class="delete-btn bg-red-600/10 text-red-500 border border-red-600 px-4 py-1 rounded hover:bg-red-600 hover:text-white transition-all">حذف</button>
                        </div>
                    `;
                    div.querySelector('.edit-btn').onclick = () => editProduct(id, p);
                    div.querySelector('.delete-btn').onclick = () => deleteProduct(id);
                    list.appendChild(div);
                });
                document.getElementById('stat-products').innerText = count;
                if (count === 0) list.innerHTML = '<p class="text-center text-zinc-500 py-10">لا توجد منتجات حالياً</p>';
            } catch (e) {
                list.innerHTML = '<p class="text-center text-red-500">خطأ: ' + e.message + '</p>';
            }
        }

        document.getElementById('save-btn').onclick = async () => {
            const id = document.getElementById('product-id').value;
            const name = document.getElementById('p-name').value;
            const price = parseFloat(document.getElementById('p-price').value);
            const desc = document.getElementById('p-desc').value;
            const status = document.getElementById('p-status').value;

            if(!name || !price) return alert('أدخل الاسم والسعر');

            const data = { 
                name, 
                price, 
                description: desc, 
                status,
                images: currentProductImages, 
                updatedAt: Date.now() 
            };

            try {
                if(id) {
                    await db.collection("products").doc(id).update(data);
                    alert('تم التعديل بنجاح');
                } else {
                    await db.collection("products").add(data);
                    alert('تمت الإضافة بنجاح');
                }
                resetForm();
                loadProducts();
            } catch (e) {
                alert('خطأ في الحفظ: ' + e.message);
            }
        };

        function resetForm() {
            document.getElementById('product-id').value = '';
            document.getElementById('p-name').value = '';
            document.getElementById('p-price').value = '';
            document.getElementById('p-desc').value = '';
            document.getElementById('p-status').value = 'available';
            currentProductImages = [];
            document.getElementById('images-preview').innerHTML = '';
            document.getElementById('form-title').innerText = 'إضافة منتج جديد';
            document.getElementById('cancel-btn').classList.add('hidden');
        }

        function editProduct(id, p) {
            document.getElementById('product-id').value = id;
            document.getElementById('p-name').value = p.name;
            document.getElementById('p-price').value = p.price;
            document.getElementById('p-desc').value = p.description || '';
            document.getElementById('p-status').value = p.status || 'available';
            currentProductImages = p.images || [];
            renderImagePreviews();
            document.getElementById('form-title').innerText = 'تعديل المنتج';
            document.getElementById('cancel-btn').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function deleteProduct(id) {
            if(confirm('هل أنت متأكد من حذف هذا المنتج؟')) {
                try {
                    await db.collection("products").doc(id).delete();
                    loadProducts();
                } catch (e) {
                    alert('خطأ في الحذف: ' + e.message);
                }
            }
        }

        window.showTab = (tabId) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.getElementById(tabId).classList.remove('hidden');
            document.querySelectorAll('nav button, .flex button').forEach(b => b.classList.remove('tab-active', 'text-zinc-500'));
            document.getElementById('btn-' + tabId).classList.add('tab-active');
        };

        document.getElementById('cancel-btn').onclick = resetForm;
    </script>
</body>
</html>
