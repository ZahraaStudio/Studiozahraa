<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة التحكم - استوديو الزهراء</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <style>
    body { font-family: 'Cairo', sans-serif; background-color: #0a0a0a; color: #fff; }
    .gold-text { color: #d4af37; }
    .gold-bg { background-color: #d4af37; }
    .tab-btn.active { background-color: #d4af37; color: black; }
    .tab-btn { color: #d4af37; border: 2px solid #d4af37; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
  </style>
</head>
<body class="bg-zinc-950">
  <nav class="bg-black border-b border-zinc-800 p-6">
    <div class="container mx-auto flex justify-between items-center">
      <h1 class="text-2xl font-bold gradient-text">🎛️ لوحة التحكم</h1>
      <button onclick="logout()" class="bg-red-600 text-white px-6 py-2 rounded-lg font-bold">تسجيل الخروج</button>
    </div>
  </nav>

  <div class="container mx-auto p-6">
    <!-- Tabs -->
    <div class="flex gap-2 mb-8 flex-wrap">
      <button class="tab-btn active px-6 py-3 rounded-lg font-bold transition-all" onclick="switchTab('orders')">📦 الطلبات</button>
      <button class="tab-btn px-6 py-3 rounded-lg font-bold transition-all" onclick="switchTab('coupons')">🏷️ الكوبونات</button>
      <button class="tab-btn px-6 py-3 rounded-lg font-bold transition-all" onclick="switchTab('testimonials')">⭐ الآراء</button>
      <button class="tab-btn px-6 py-3 rounded-lg font-bold transition-all" onclick="switchTab('products')">📦 المنتجات</button>
    </div>

    <!-- Orders Tab -->
    <div id="orders" class="tab-content active bg-zinc-900 p-8 rounded-xl border border-zinc-800">
      <h2 class="text-2xl font-bold mb-6 gold-text">الطلبات الجديدة</h2>
      <div id="orders-list" class="space-y-4"></div>
    </div>

    <!-- Coupons Tab -->
    <div id="coupons" class="tab-content bg-zinc-900 p-8 rounded-xl border border-zinc-800">
      <h2 class="text-2xl font-bold mb-6 gold-text">إدارة الكوبونات</h2>
      <div class="mb-8 p-6 bg-black rounded-lg border border-zinc-800">
        <h3 class="font-bold mb-4">➕ إضافة كوبون جديد</h3>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
          <input type="text" id="coupon-code" placeholder="كود الكوبون" class="p-3 bg-zinc-900 border border-zinc-700 rounded-lg outline-none focus:border-gold-text">
          <input type="number" id="coupon-discount" placeholder="قيمة الخصم" class="p-3 bg-zinc-900 border border-zinc-700 rounded-lg outline-none focus:border-gold-text">
          <select id="coupon-type" class="p-3 bg-zinc-900 border border-zinc-700 rounded-lg outline-none focus:border-gold-text">
            <option value="percentage">نسبة مئوية %</option>
            <option value="fixed">مبلغ ثابت</option>
          </select>
          <input type="text" id="coupon-desc" placeholder="الوصف" class="p-3 bg-zinc-900 border border-zinc-700 rounded-lg outline-none focus:border-gold-text">
        </div>
        <button onclick="addCoupon()" class="gold-bg text-black px-8 py-3 rounded-lg font-bold">إضافة</button>
      </div>
      <div id="coupons-list" class="space-y-4"></div>
    </div>

    <!-- Testimonials Tab -->
    <div id="testimonials" class="tab-content bg-zinc-900 p-8 rounded-xl border border-zinc-800">
      <h2 class="text-2xl font-bold mb-6 gold-text">الآراء المعلقة</h2>
      <div id="testimonials-list" class="space-y-4"></div>
    </div>

    <!-- Products Tab -->
    <div id="products" class="tab-content bg-zinc-900 p-8 rounded-xl border border-zinc-800">
      <h2 class="text-2xl font-bold mb-6 gold-text">المنتجات</h2>
      <div id="products-list" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
    </div>
  </div>

  <script>
    const firebaseConfig = { apiKey: "AIzaSyCG6Yc0iH-rt-PaiRqL_V9Re1z49ZF3OMM", authDomain: "zahraa-store-f4c90.firebaseapp.com", projectId: "zahraa-store-f4c90" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function switchTab(tabName) {
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.getElementById(tabName).classList.add('active');
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');
      
      if (tabName === 'orders') loadOrders();
      else if (tabName === 'coupons') loadCoupons();
      else if (tabName === 'testimonials') loadPendingTestimonials();
      else if (tabName === 'products') loadProducts();
    }

    async function loadOrders() {
      const snap = await db.collection("orders").orderBy("createdAt", "desc").get();
      let html = '';
      snap.forEach(doc => {
        const o = doc.data();
        html += `
          <div class="bg-black p-6 rounded-lg border border-zinc-700">
            <div class="flex justify-between items-start mb-4">
              <div>
                <h3 class="text-lg font-bold gold-text">#${o.orderNumber}</h3>
                <p class="text-sm text-zinc-400">${o.customerName} | ${o.customerPhone}</p>
              </div>
              <select onchange="updateOrderStatus('${doc.id}', this.value)" class="bg-zinc-900 border border-zinc-700 p-2 rounded text-sm">
                <option value="قيد المراجعة" ${o.status === 'قيد المراجعة' ? 'selected' : ''}>قيد المراجعة</option>
                <option value="جاري التنفيذ" ${o.status === 'جاري التنفيذ' ? 'selected' : ''}>جاري التنفيذ</option>
                <option value="تم التوصيل" ${o.status === 'تم التوصيل' ? 'selected' : ''}>تم التوصيل</option>
              </select>
            </div>
            <p class="text-sm mb-2"><strong>الإجمالي:</strong> ${o.totalPrice} جنيه</p>
            <p class="text-sm text-zinc-400"><strong>العنوان:</strong> ${o.customerAddress}</p>
            ${o.giftWrap ? '<p class="text-sm text-gold-text">🎁 مع تغليف هدايا</p>' : ''}
          </div>
        `;
      });
      document.getElementById('orders-list').innerHTML = html || '<p class="text-zinc-500">لا توجد طلبات</p>';
    }

    async function updateOrderStatus(id, status) {
      await db.collection("orders").doc(id).update({ status });
      loadOrders();
    }

    async function loadCoupons() {
      const snap = await db.collection("coupons").get();
      let html = '';
      snap.forEach(doc => {
        const c = doc.data();
        html += `
          <div class="bg-black p-4 rounded-lg border border-zinc-700 flex justify-between items-center">
            <div>
              <p class="font-bold gold-text">${c.code}</p>
              <p class="text-sm text-zinc-400">${c.description}</p>
              <p class="text-sm">خصم: ${c.discount}${c.type === 'percentage' ? '%' : ' جنيه'}</p>
            </div>
            <button onclick="deleteCoupon('${doc.id}')" class="bg-red-600 text-white px-4 py-2 rounded text-sm">حذف</button>
          </div>
        `;
      });
      document.getElementById('coupons-list').innerHTML = html || '<p class="text-zinc-500">لا توجد كوبونات</p>';
    }

    async function addCoupon() {
      const code = document.getElementById('coupon-code').value.trim().toUpperCase();
      const discount = parseFloat(document.getElementById('coupon-discount').value);
      const type = document.getElementById('coupon-type').value;
      const desc = document.getElementById('coupon-desc').value.trim();
      
      if (!code || !discount || !desc) { alert('ملء جميع الحقول مطلوب'); return; }
      
      await db.collection("coupons").add({ code, discount, type, description: desc, active: true });
      document.getElementById('coupon-code').value = '';
      document.getElementById('coupon-discount').value = '';
      document.getElementById('coupon-desc').value = '';
      loadCoupons();
      alert('تم إضافة الكوبون بنجاح');
    }

    async function deleteCoupon(id) {
      if (confirm('هل أنت متأكد؟')) {
        await db.collection("coupons").doc(id).delete();
        loadCoupons();
      }
    }

    async function loadPendingTestimonials() {
      const snap = await db.collection("testimonials").get();
      let html = '';
      snap.forEach(doc => {
        const t = doc.data();
        html += `
          <div class="bg-black p-4 rounded-lg border border-zinc-700">
            <p class="font-bold">${t.name}</p>
            <p class="text-sm text-zinc-400 my-2">"${t.text}"</p>
            <p class="text-sm text-gold-text">${'⭐'.repeat(t.rating)}</p>
            <button onclick="deleteTestimonial('${doc.id}')" class="bg-red-600 text-white px-4 py-2 rounded text-sm mt-2">حذف</button>
          </div>
        `;
      });
      document.getElementById('testimonials-list').innerHTML = html || '<p class="text-zinc-500">لا توجد آراء</p>';
    }

    async function deleteTestimonial(id) {
      if (confirm('حذف هذا الرأي؟')) {
        await db.collection("testimonials").doc(id).delete();
        loadPendingTestimonials();
      }
    }

    async function loadProducts() {
      const snap = await db.collection("products").get();
      let html = '';
      snap.forEach(doc => {
        const p = doc.data();
        html += `
          <div class="bg-black p-4 rounded-lg border border-zinc-700">
            <img src="${p.images?.[0] || ''}" class="w-full h-32 object-cover rounded mb-2">
            <p class="font-bold">${p.name}</p>
            <p class="text-sm text-gold-text">${p.price} جنيه</p>
            <button onclick="deleteProduct('${doc.id}')" class="bg-red-600 text-white px-4 py-2 rounded text-sm mt-2 w-full">حذف</button>
          </div>
        `;
      });
      document.getElementById('products-list').innerHTML = html || '<p class="text-zinc-500">لا توجد منتجات</p>';
    }

    async function deleteProduct(id) {
      if (confirm('حذف هذا المنتج؟')) {
        await db.collection("products").doc(id).delete();
        loadProducts();
      }
    }

    function logout() {
      if (confirm('تسجيل الخروج؟')) {
        localStorage.removeItem('adminAuth');
        window.location.href = 'index.html';
      }
    }

    window.onload = () => {
      if (!localStorage.getItem('adminAuth')) {
        const pass = prompt('أدخل كلمة المرور:');
        if (pass === 'zahraa2024') {
          localStorage.setItem('adminAuth', 'true');
          loadOrders();
        } else {
          alert('كلمة المرور خاطئة');
          window.location.href = 'index.html';
        }
      } else {
        loadOrders();
      }
    };
  </script>
</body>
</html>
