<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ZAHRAA ADMIN PRO</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{font-family:Cairo;background:#0a0a0a;color:#fff}
.gold{color:#d4af37}
.box{background:#111;padding:15px;border-radius:10px}
</style>
</head>

<body class="p-4">

<audio id="sound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<!-- LOGIN -->
<div id="loginBox" class="max-w-md mx-auto mt-20 box">
<h2 class="text-center mb-4">تسجيل الدخول</h2>
<input id="email" class="w-full p-2 mb-2 bg-black border" placeholder="Email">
<input id="pass" type="password" class="w-full p-2 mb-3 bg-black border" placeholder="Password">
<button id="loginBtn" class="w-full bg-yellow-500 text-black p-2">دخول</button>
</div>

<!-- ADMIN -->
<div id="app" class="hidden max-w-6xl mx-auto">

<div class="flex justify-between mb-5">
<h1 class="text-2xl gold">ZAHRAA PRO</h1>
<button id="logout" class="bg-red-600 px-3 py-1 rounded">خروج</button>
</div>

<!-- DASH -->
<div class="grid grid-cols-3 gap-3 mb-6">
<div class="box text-center">منتجات<br><b id="pCount">0</b></div>
<div class="box text-center">طلبات<br><b id="oCount">0</b></div>
<div class="box text-center">مبيعات<br><b id="sales">0</b></div>
</div>

<!-- SEARCH -->
<input id="search" placeholder="🔍 بحث..." class="w-full p-2 mb-4 bg-black border">

<!-- ADD PRODUCT -->
<div class="box mb-5">
<h3 class="mb-3">إضافة منتج</h3>
<input id="name" class="w-full p-2 mb-2 bg-black border" placeholder="اسم">
<input id="price" type="number" class="w-full p-2 mb-2 bg-black border" placeholder="سعر">
<input id="cat" class="w-full p-2 mb-2 bg-black border" placeholder="قسم">
<input type="file" id="img" multiple class="mb-2">
<button id="addBtn" class="bg-yellow-500 text-black px-3 py-1">حفظ</button>
</div>

<!-- PRODUCTS -->
<div id="products"></div>

<hr class="my-6">

<!-- ORDERS -->
<h2 class="mb-3">الطلبات</h2>
<select id="filter" class="p-2 bg-black border mb-3">
<option value="all">الكل</option>
<option value="تم التوصيل">تم التوصيل</option>
</select>

<div id="orders"></div>

<hr class="my-6">

<!-- COUPONS -->
<h2>الكوبونات</h2>
<input id="code" placeholder="كود" class="p-2 bg-black border">
<input id="discount" type="number" placeholder="خصم" class="p-2 bg-black border">
<button id="addC" class="bg-yellow-500 px-3 py-1">إضافة</button>
<div id="coupons"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, deleteDoc, doc, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const appFirebase = initializeApp({
apiKey:"AIzaSyCG6Yc0iH-rt-PaiRqL_V9Re1z49ZF3OMM",
authDomain:"zahraa-store-f4c90.firebaseapp.com",
projectId:"zahraa-store-f4c90"
});

const auth=getAuth(appFirebase);
const db=getFirestore(appFirebase);

let imgs=[];

// LOGIN
loginBtn.onclick=()=>signInWithEmailAndPassword(auth,email.value,pass.value);
logout.onclick=()=>signOut(auth);

onAuthStateChanged(auth,u=>{
if(u){
loginBox.style.display="none";
app.style.display="block";
loadAll();
}
});

// SEARCH
search.oninput=()=>{
let v=search.value.toLowerCase();
document.querySelectorAll("#products div").forEach(e=>{
e.style.display=e.innerText.toLowerCase().includes(v)?"flex":"none";
});
};

// IMAGE UPLOAD (Cloudinary)
img.onchange=async e=>{
for(let f of e.target.files){
let fd=new FormData();
fd.append("file",f);
fd.append("upload_preset","zahraa_upload");

let res=await fetch("https://api.cloudinary.com/v1_1/dxlxwe55b/image/upload",{method:"POST",body:fd});
let data=await res.json();
imgs.push(data.secure_url);
}
};

// ADD PRODUCT
addBtn.onclick=async ()=>{
await addDoc(collection(db,"products"),{
name:name.value,
price:+price.value,
category:cat.value,
images:imgs,
updatedAt:Date.now()
});
imgs=[];
};

// PRODUCTS LIVE
function loadProducts(){
onSnapshot(query(collection(db,"products"),orderBy("updatedAt","desc")),snap=>{
products.innerHTML="";
pCount.innerText=snap.size;

snap.forEach(d=>{
let p=d.data();
products.innerHTML+=`
<div class="box mb-2 flex justify-between">
${p.name} - ${p.price} ج
<button onclick="delP('${d.id}')">حذف</button>
</div>`;
});
});
}

window.delP=async id=>{
await deleteDoc(doc(db,"products",id));
};

// ORDERS LIVE
let last=0;

function loadOrders(){
onSnapshot(query(collection(db,"orders"),orderBy("createdAt","desc")),snap=>{
orders.innerHTML="";
oCount.innerText=snap.size;

if(last && snap.size>last){
sound.play();
alert("🔥 طلب جديد");
}
last=snap.size;

let total=0;

snap.forEach(d=>{
let o=d.data();
total+=o.totalPrice||0;

orders.innerHTML+=`
<div class="box mb-2">
#${o.orderNumber} - ${o.customerName}
<br>${o.totalPrice} ج
<button onclick='copy("${o.orderNumber}","${o.customerName}","${o.customerPhone}","${o.totalPrice}")'>نسخ</button>
</div>`;
});

sales.innerText=total+" ج";
});
}

// COPY
window.copy=(n,name,phone,total)=>{
navigator.clipboard.writeText(
`طلب رقم ${n}
${name}
${phone}
${total} جنيه`
);
alert("تم النسخ");
};

// FILTER
filter.onchange=()=>{
let v=filter.value;
document.querySelectorAll("#orders div").forEach(e=>{
e.style.display=v=="all"||e.innerText.includes(v)?"block":"none";
});
};

// COUPONS
addC.onclick=async ()=>{
await addDoc(collection(db,"coupons"),{
code:code.value,
discount:+discount.value
});
};

function loadCoupons(){
onSnapshot(collection(db,"coupons"),snap=>{
coupons.innerHTML="";
snap.forEach(d=>{
let c=d.data();
coupons.innerHTML+=`<div class="box mt-2">${c.code} - ${c.discount}</div>`;
});
});
}

// INIT
function loadAll(){
loadProducts();
loadOrders();
loadCoupons();
}

</script>

</body>
</html>
