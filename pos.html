<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>كاشير — استوديو الزهراء</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#d4af37;--gold2:#f0c94e;--bg:#0d0d0d;--bg2:#141414;--bg3:#1c1c1c;--card:#181818;--border:#2a2a2a;--text:#f1f1f1;--text2:#aaa;--text3:#666;--green:#22c55e;--red:#ef4444;--orange:#f97316;--blue:#3b82f6;--r:8px;--r2:12px}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);direction:rtl;height:100vh;overflow:hidden;display:flex;flex-direction:column}

/* ── TOP BAR ── */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;gap:10px;flex-wrap:wrap}
.topbar-left{display:flex;align-items:center;gap:10px}
.store-logo{width:36px;height:36px;border-radius:8px;object-fit:contain;border:1px solid rgba(212,175,55,.3)}
.store-name{font-size:15px;font-weight:900;color:var(--gold)}
.topbar-actions{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.tb-btn{padding:7px 14px;border-radius:var(--r);border:1px solid var(--border);background:var(--bg3);color:var(--text2);font-family:Cairo,sans-serif;font-size:11px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .2s;text-decoration:none}
.tb-btn:hover{border-color:var(--gold);color:var(--gold)}
.tb-btn.primary{background:var(--gold);color:#000;border-color:var(--gold)}
.tb-btn.primary:hover{background:var(--gold2)}
.tb-btn.green{background:var(--green);color:#fff;border-color:var(--green)}

/* ── MAIN LAYOUT ── */
.pos-layout{display:flex;flex:1;overflow:hidden}

/* ── LEFT: PRODUCTS ── */
.products-panel{flex:1;display:flex;flex-direction:column;min-width:0;border-left:1px solid var(--border)}
.search-bar{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:center}
.search-input{flex:1;padding:8px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-family:Cairo,sans-serif;font-size:13px;font-weight:600;outline:none}
.search-input:focus{border-color:var(--gold)}
.cat-tabs{display:flex;gap:4px;padding:8px 14px;overflow-x:auto;border-bottom:1px solid var(--border);flex-shrink:0}
.cat-tabs::-webkit-scrollbar{height:3px}
.cat-tabs::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.cat-btn{padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);font-family:Cairo,sans-serif;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .2s;flex-shrink:0}
.cat-btn.active{background:rgba(212,175,55,.15);border-color:var(--gold);color:var(--gold)}
.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;padding:14px;overflow-y:auto;flex:1}
.prod-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--r2);overflow:hidden;cursor:pointer;transition:all .2s;user-select:none;position:relative}
.prod-card:hover{border-color:var(--gold);transform:translateY(-2px);box-shadow:0 4px 20px rgba(212,175,55,.15)}
.prod-card:active{transform:scale(.97)}
.prod-card.out-of-stock{opacity:.5;cursor:not-allowed}
.prod-card.out-of-stock:hover{transform:none;border-color:var(--border)}
.prod-img{width:100%;height:100px;object-fit:cover;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:36px;color:var(--text3)}
.prod-img img{width:100%;height:100%;object-fit:cover}
.prod-info{padding:8px}
.prod-name{font-size:11px;font-weight:700;color:var(--text);margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.prod-price{font-size:13px;font-weight:900;color:var(--gold)}
.prod-stock{font-size:9px;color:var(--text3);margin-top:2px}
.prod-stock.low{color:var(--orange)}
.prod-stock.out{color:var(--red)}
.stock-badge{position:absolute;top:5px;left:5px;padding:2px 7px;border-radius:20px;font-size:9px;font-weight:900}
.badge-in{background:rgba(34,197,94,.15);color:var(--green);border:1px solid rgba(34,197,94,.2)}
.badge-low{background:rgba(249,115,22,.15);color:var(--orange);border:1px solid rgba(249,115,22,.2)}
.badge-out{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.2)}

/* ── RIGHT: CART ── */
.cart-panel{width:320px;flex-shrink:0;display:flex;flex-direction:column;background:var(--bg2)}
.cart-header{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.cart-header h2{font-size:14px;font-weight:900;color:var(--gold);display:flex;align-items:center;gap:6px}
.cart-clear{font-size:11px;color:var(--text3);cursor:pointer;padding:4px 8px;border-radius:var(--r);border:1px solid var(--border);background:none;font-family:Cairo,sans-serif;font-weight:700;transition:all .2s}
.cart-clear:hover{border-color:var(--red);color:var(--red)}

/* Customer section */
.customer-section{padding:10px 14px;border-bottom:1px solid var(--border)}
.cust-row{display:flex;gap:6px;margin-bottom:6px}
.cust-inp{flex:1;padding:7px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-family:Cairo,sans-serif;font-size:12px;font-weight:600;outline:none}
.cust-inp:focus{border-color:var(--gold)}
.cust-suggest{background:var(--bg3);border:1px solid var(--gold);border-radius:var(--r);max-height:120px;overflow-y:auto;position:absolute;z-index:100;width:100%}
.cust-suggest-item{padding:8px 12px;cursor:pointer;font-size:12px;border-bottom:1px solid var(--border)}
.cust-suggest-item:hover{background:rgba(212,175,55,.1)}
.cust-suggest-item:last-child{border-bottom:none}
.cust-relative{position:relative}

/* Cart items */
.cart-items{flex:1;overflow-y:auto;padding:6px}
.cart-item{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:8px 10px;margin-bottom:6px;position:relative}
.cart-item-name{font-size:12px;font-weight:700;padding-left:20px;margin-bottom:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cart-item-remove{position:absolute;top:6px;left:8px;background:none;border:none;color:var(--red);cursor:pointer;font-size:14px;line-height:1;padding:2px}
.cart-item-row{display:flex;align-items:center;justify-content:space-between;gap:6px}
.qty-ctrl{display:flex;align-items:center;gap:4px;background:var(--bg2);border-radius:6px;padding:3px}
.qty-btn{width:22px;height:22px;border:none;background:var(--gold);color:#000;border-radius:4px;cursor:pointer;font-size:14px;font-weight:900;display:flex;align-items:center;justify-content:center;transition:all .2s}
.qty-btn:hover{background:var(--gold2)}
.qty-num{min-width:28px;text-align:center;font-size:13px;font-weight:900}
.cart-item-price{font-size:13px;font-weight:900;color:var(--gold)}
.cart-item-disc{display:flex;align-items:center;gap:4px;margin-top:4px}
.disc-inp{width:80px;padding:3px 6px;background:var(--bg2);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:11px;font-weight:700;outline:none;font-family:Cairo,sans-serif}
.disc-inp:focus{border-color:var(--gold)}
.disc-lbl{font-size:10px;color:var(--text3);font-weight:700}
.cart-empty{text-align:center;padding:40px 20px;color:var(--text3)}
.cart-empty i{font-size:40px;display:block;margin-bottom:10px}

/* Order summary */
.order-summary{padding:10px 14px;border-top:1px solid var(--border);flex-shrink:0}
.sum-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:12px}
.sum-row .l{color:var(--text3);font-weight:700}
.sum-row .r{font-weight:900}
.sum-row .r.red{color:var(--red)}
.sum-row .r.blue{color:var(--blue)}
.sum-total{display:flex;justify-content:space-between;align-items:center;padding:10px;background:rgba(212,175,55,.08);border:1px solid rgba(212,175,55,.2);border-radius:var(--r);margin:8px 0}
.sum-total .l{font-size:13px;font-weight:900}
.sum-total .r{font-size:20px;font-weight:900;color:var(--gold)}
.disc-delivery-row{display:flex;gap:6px;margin-bottom:6px}
.disc-delivery-inp{flex:1;padding:6px 8px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-family:Cairo,sans-serif;font-size:11px;font-weight:700;outline:none}
.disc-delivery-inp:focus{border-color:var(--gold)}
.disc-type-btn{padding:5px 8px;border:1px solid var(--border);border-radius:var(--r);background:var(--bg3);color:var(--text2);cursor:pointer;font-size:10px;font-weight:900;transition:all .2s}
.disc-type-btn.active{background:var(--gold);color:#000;border-color:var(--gold)}

/* Payment methods */
.pay-methods{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.pay-btn{flex:1;padding:7px 6px;border-radius:var(--r);border:1.5px solid var(--border);background:var(--bg3);color:var(--text2);font-family:Cairo,sans-serif;font-size:11px;font-weight:700;cursor:pointer;text-align:center;transition:all .2s;white-space:nowrap}
.pay-btn.active{background:rgba(212,175,55,.12);border-color:var(--gold);color:var(--gold)}
.pay-btn.active.card{background:rgba(59,130,246,.1);border-color:var(--blue);color:var(--blue)}
.pay-btn.active.transfer{background:rgba(138,92,246,.1);border-color:var(--purple,#8b5cf6);color:var(--purple,#8b5cf6)}
.pay-btn.active.deferred{background:rgba(249,115,22,.1);border-color:var(--orange);color:var(--orange)}

/* Change calculator */
.change-calc{padding:6px;background:rgba(34,197,94,.05);border:1px solid rgba(34,197,94,.15);border-radius:var(--r);margin-bottom:8px}
.change-calc label{font-size:10px;color:var(--green);font-weight:700;display:block;margin-bottom:4px}
.change-calc input{width:100%;padding:6px 8px;background:var(--bg2);border:1px solid rgba(34,197,94,.2);border-radius:5px;color:var(--text);font-family:Cairo,sans-serif;font-size:13px;font-weight:900;outline:none;text-align:center}
.change-result{text-align:center;font-size:13px;font-weight:900;margin-top:6px;padding:4px;border-radius:5px;background:rgba(34,197,94,.1);color:var(--green)}

/* Pending orders */
.pending-bar{padding:8px 14px;border-top:1px solid var(--border);display:flex;gap:6px;overflow-x:auto;flex-shrink:0}
.pending-bar::-webkit-scrollbar{height:3px}
.pending-tag{padding:5px 10px;border-radius:20px;background:rgba(249,115,22,.12);border:1px solid rgba(249,115,22,.3);color:var(--orange);font-size:10px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;display:flex;align-items:center;gap:4px}
.pending-tag:hover{background:rgba(249,115,22,.2)}
.pending-add{padding:5px 10px;border-radius:20px;background:var(--bg3);border:1px solid var(--border);color:var(--text3);font-size:10px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0}
.pending-add:hover{border-color:var(--orange);color:var(--orange)}

/* Checkout button */
.checkout-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000;border:none;border-radius:var(--r2);font-family:Cairo,sans-serif;font-size:15px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s;letter-spacing:.5px}
.checkout-btn:hover{opacity:.9;transform:translateY(-1px)}
.checkout-btn:disabled{opacity:.5;cursor:default;transform:none}

/* Login overlay */
.login-overlay{position:fixed;inset:0;background:var(--bg);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
.login-box{background:var(--bg2);border:1px solid var(--gold);border-radius:16px;padding:32px;width:100%;max-width:360px;text-align:center}
.login-box h2{font-size:20px;font-weight:900;color:var(--gold);margin-bottom:6px}
.login-box p{font-size:12px;color:var(--text3);margin-bottom:24px}
.login-inp{width:100%;padding:10px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-family:Cairo,sans-serif;font-size:13px;outline:none;margin-bottom:10px;text-align:center}
.login-inp:focus{border-color:var(--gold)}
.login-btn{width:100%;padding:12px;background:var(--gold);color:#000;border:none;border-radius:var(--r);font-family:Cairo,sans-serif;font-size:14px;font-weight:900;cursor:pointer;margin-top:6px}
.login-btn:hover{background:var(--gold2)}
.login-err{color:var(--red);font-size:12px;margin-top:8px;font-weight:700}

/* Toast */
.toast-wrap{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:6px;align-items:center;pointer-events:none}
.toast-item{background:var(--bg2);border:1px solid var(--border);color:var(--text);padding:9px 20px;border-radius:30px;font-size:12px;font-weight:700;font-family:Cairo,sans-serif;animation:fadeInUp .3s ease;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.4)}
.toast-item.ok{border-color:var(--green)}
.toast-item.err{border-color:var(--red)}
.toast-item.warn{border-color:var(--orange)}
@keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* Scanner modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:500;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal-box{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:24px;width:100%;max-width:420px}
.modal-box h3{font-size:15px;font-weight:900;color:var(--gold);margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.modal-close{background:none;border:none;color:var(--text3);cursor:pointer;font-size:20px}
.modal-close:hover{color:var(--red)}

/* Notes modal */
.notes-modal{max-width:380px}
.notes-textarea{width:100%;padding:10px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-family:Cairo,sans-serif;font-size:13px;resize:vertical;min-height:80px;outline:none;margin-bottom:12px}
.notes-textarea:focus{border-color:var(--gold)}

/* Due date */
.deferred-section{margin-top:6px;padding:8px;background:rgba(249,115,22,.05);border:1px solid rgba(249,115,22,.15);border-radius:var(--r);display:none}
.deferred-section.show{display:block}
.deferred-section label{font-size:10px;color:var(--orange);font-weight:700;display:block;margin-bottom:4px}
.deferred-section input{width:100%;padding:6px 8px;background:var(--bg2);border:1px solid rgba(249,115,22,.3);border-radius:5px;color:var(--text);font-family:Cairo,sans-serif;font-size:12px;outline:none}

/* Loading skeleton */
.skeleton{background:linear-gradient(90deg,var(--bg3) 25%,var(--bg2) 50%,var(--bg3) 75%);background-size:400px 100%;animation:shimmer 1.4s infinite linear;border-radius:var(--r2)}
@keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}

@media(max-width:700px){
  .pos-layout{flex-direction:column}
  .products-panel{flex:0 0 50vh}
  .cart-panel{width:100%;flex:1}
  .products-grid{grid-template-columns:repeat(3,1fr)}
}
</style>
</head>
<body>

<!-- Login overlay -->
<div class="login-overlay" id="login-overlay">
  <div class="login-box">
    <div style="font-size:50px;margin-bottom:12px">📷</div>
    <h2>استوديو الزهراء</h2>
    <p>ZAHRAA STUDIO — كاشير المتجر</p>
    <input class="login-inp" type="email" id="email-inp" placeholder="البريد الإلكتروني">
    <input class="login-inp" type="password" id="pass-inp" placeholder="كلمة المرور" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()"><i class="fas fa-sign-in-alt"></i> دخول</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- Top bar -->
<div class="topbar">
  <div class="topbar-left">
    <img class="store-logo" id="store-logo" src="/icon-192.png" onerror="this.style.display='none'">
    <span class="store-name" id="store-name">استوديو الزهراء</span>
  </div>
  <div class="topbar-actions">
    <button class="tb-btn" onclick="openScanner()"><i class="fas fa-barcode"></i> باركود</button>
    <a class="tb-btn" href="/active-orders.html"><i class="fas fa-hourglass-half"></i> الطلبات</a>
    <a class="tb-btn" href="/dashboard.html"><i class="fas fa-chart-bar"></i> الإحصائيات</a>
    <a class="tb-btn" href="/customers.html"><i class="fas fa-users"></i> العملاء</a>
    <button class="tb-btn" onclick="doSignOut()"><i class="fas fa-sign-out-alt"></i></button>
  </div>
</div>

<!-- Main layout -->
<div class="pos-layout">

  <!-- Products panel -->
  <div class="products-panel">
    <div class="search-bar">
      <input class="search-input" id="search-inp" type="text" placeholder="🔍 ابحث عن منتج أو باركود..." oninput="filterProducts()" onkeydown="handleBarcodeKey(event)">
      <button class="tb-btn" onclick="toggleView()" id="view-toggle-btn" title="تغيير العرض"><i class="fas fa-th"></i></button>
    </div>
    <div class="cat-tabs" id="cat-tabs">
      <button class="cat-btn active" onclick="filterByCategory('all',this)">الكل</button>
    </div>
    <div class="products-grid" id="products-grid">
      <div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text3)">
        <div style="width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px"></div>
        جاري تحميل المنتجات...
      </div>
    </div>
  </div>

  <!-- Cart panel -->
  <div class="cart-panel">
    <div class="cart-header">
      <h2><i class="fas fa-shopping-cart"></i> طلب جديد</h2>
      <button class="cart-clear" onclick="clearCart()"><i class="fas fa-trash-alt"></i> مسح</button>
    </div>

    <!-- Customer info -->
    <div class="customer-section">
      <div class="cust-row">
        <div class="cust-relative" style="flex:1">
          <input class="cust-inp" id="cust-name" type="text" placeholder="👤 اسم العميل" oninput="searchCustomers()" onblur="hideSuggest()">
          <div class="cust-suggest" id="cust-suggest" style="display:none"></div>
        </div>
      </div>
      <div class="cust-row">
        <input class="cust-inp" id="cust-phone" type="tel" placeholder="📞 رقم الهاتف" style="direction:ltr;text-align:right" oninput="autoFillCustomer()">
        <input class="cust-inp" id="cust-addr" type="text" placeholder="📍 العنوان (اختياري)" style="display:none">
      </div>
    </div>

    <!-- Cart items -->
    <div class="cart-items" id="cart-items">
      <div class="cart-empty"><i class="fas fa-shopping-cart"></i><br>أضف منتجات للطلب</div>
    </div>

    <!-- Order summary -->
    <div class="order-summary">
      <!-- Discount & Delivery -->
      <div class="disc-delivery-row">
        <span style="font-size:10px;color:var(--text3);font-weight:700;white-space:nowrap;padding-top:8px">خصم:</span>
        <input class="disc-delivery-inp" id="discount-inp" type="number" min="0" placeholder="0" oninput="updateTotals()">
        <button class="disc-type-btn active" id="disc-pct-btn" onclick="setDiscType('pct')">%</button>
        <button class="disc-type-btn" id="disc-fix-btn" onclick="setDiscType('fix')">ج</button>
      </div>
      <div class="disc-delivery-row">
        <span style="font-size:10px;color:var(--text3);font-weight:700;white-space:nowrap;padding-top:8px">توصيل:</span>
        <input class="disc-delivery-inp" id="delivery-inp" type="number" min="0" placeholder="0" oninput="updateTotals()">
      </div>

      <!-- Totals -->
      <div class="sum-row"><span class="l">المجموع الفرعي</span><span class="r" id="sum-subtotal">0.00 ج</span></div>
      <div class="sum-row" id="disc-row" style="display:none"><span class="l">الخصم</span><span class="r red" id="sum-discount">- 0.00 ج</span></div>
      <div class="sum-row" id="del-row" style="display:none"><span class="l">التوصيل</span><span class="r blue" id="sum-delivery">+ 0.00 ج</span></div>
      <div class="sum-total"><span class="l">الإجمالي الكلي</span><span class="r" id="sum-total">0.00 ج</span></div>

      <!-- Payment method -->
      <div class="pay-methods">
        <button class="pay-btn active" id="pm-cash" onclick="setPayMethod('نقدي',this)">💵 نقدي</button>
        <button class="pay-btn" id="pm-card" onclick="setPayMethod('بطاقة',this,'card')">💳 بطاقة</button>
        <button class="pay-btn" id="pm-transfer" onclick="setPayMethod('تحويل',this,'transfer')">🏦 تحويل</button>

        <input type="number" id="cash-given" placeholder="المبلغ المدفوع" oninput="calcChange()">
        <div class="change-result" id="change-result" style="display:none"></div>

      <!-- Deferred date -->
      <div class="deferred-section" id="deferred-section">
        <label>📅 تاريخ الاستحقاق</label>
        <input type="date" id="due-date-inp">

      <!-- Notes button -->
      <button class="tb-btn" style="width:100%;justify-content:center;margin-bottom:8px;font-size:12px" onclick="openNotesModal()">
        <i class="fas fa-sticky-note"></i> <span id="notes-btn-txt">إضافة ملاحظة</span>
      </button>

      <!-- Checkout -->
      <button class="checkout-btn" id="checkout-btn" onclick="checkout()">
        <i class="fas fa-receipt"></i> إصدار الفاتورة
      </button>

    <!-- Pending orders bar -->
    <div class="pending-bar" id="pending-bar">
      <button class="pending-add" onclick="savePending()"><i class="fas fa-pause-circle"></i> تعليق</button>

</div>

<!-- Toast container -->
<div class="toast-wrap" id="toast-wrap"></div>

<!-- Scanner modal -->
<div class="modal-overlay" id="scanner-modal">
  <div class="modal-box">
    <h3><span><i class="fas fa-barcode"></i> مسح الباركود</span>
      <button class="modal-close" onclick="closeScanner()">✕</button>
    </h3>
    <div id="qr-reader" style="width:100%;border-radius:10px;overflow:hidden"></div>
    <div id="scan-result" style="margin-top:10px;font-size:12px;color:var(--text3)">وجّه الكاميرا نحو الباركود...</div>
    <button style="width:100%;margin-top:12px;padding:10px;border-radius:var(--r);background:var(--bg3);border:1px solid var(--border);color:var(--text);font-family:Cairo,sans-serif;font-weight:700;cursor:pointer" onclick="closeScanner()">إغلاق</button>
  </div>
</div>

<!-- Notes modal -->
<div class="modal-overlay" id="notes-modal">
  <div class="modal-box notes-modal">
    <h3><span><i class="fas fa-sticky-note"></i> ملاحظة الطلب</span>
      <button class="modal-close" onclick="document.getElementById('notes-modal').classList.remove('open')">✕</button>
    </h3>
    <textarea class="notes-textarea" id="notes-textarea" placeholder="أدخل ملاحظات الطلب هنا..."></textarea>
    <button style="width:100%;padding:10px;border-radius:var(--r);background:var(--gold);border:none;color:#000;font-family:Cairo,sans-serif;font-weight:900;font-size:13px;cursor:pointer" onclick="saveNotes()"><i class="fas fa-check"></i> حفظ الملاحظة</button>
  </div>
</div>

<script>
/* ══════════════════════════════
   FIREBASE INIT
══════════════════════════════ */
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyCG6Yc0iH-rt-PaiRqL_V9Re1z49ZF3OMM",
  authDomain: "zahraa-store-f4c90.firebaseapp.com",
  projectId: "zahraa-store-f4c90",
  storageBucket: "zahraa-store-f4c90.firebasestorage.app",
};
if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
const db = firebase.firestore();
const auth = firebase.auth();

/* ══════════════════════════════
   STATE
══════════════════════════════ */
let allProducts = [], allCategories = [], allCustomers = [], storeSettings = {};
let cart = [], pendingOrders = [], activePending = null;
let paymentMethod = 'نقدي';
let discountType = 'pct'; // 'pct' | 'fix'
let orderNotes = '';
let currentUser = null;
let barcodeBuffer = '';
let barcodeTimeout = null;
let qrScanner = null;
let isGridView = true;

/* ══════════════════════════════
   AUTH
══════════════════════════════ */
auth.onAuthStateChanged(user => {
  if (user) {
    currentUser = user;
    document.getElementById('login-overlay').style.display = 'none';
    init();
  } else {
    document.getElementById('login-overlay').style.display = 'flex';
  }
});

async function doLogin() {
  const email = document.getElementById('email-inp').value.trim();
  const pass  = document.getElementById('pass-inp').value;
  document.getElementById('login-err').textContent = '';
  try {
    await auth.signInWithEmailAndPassword(email, pass);
  } catch(e) {
    const msgs = {
      'auth/user-not-found': 'البريد الإلكتروني غير موجود',
      'auth/wrong-password': 'كلمة المرور غير صحيحة',
      'auth/invalid-email': 'البريد الإلكتروني غير صالح',
      'auth/too-many-requests': 'محاولات كثيرة، انتظر قليلاً',
      'auth/invalid-credential': 'بيانات الدخول غير صحيحة',
    };
    document.getElementById('login-err').textContent = msgs[e.code] || e.message;
  }
}
function doSignOut() { auth.signOut(); }

/* ══════════════════════════════
   INIT
══════════════════════════════ */
async function init() {
  loadSettings();
  loadPendingOrders();
  await Promise.all([loadProducts(), loadCustomers()]);
}

async function loadSettings() {
  try {
    const snap = await db.collection('settings').doc('store').get();
    if (snap.exists) {
      storeSettings = snap.data();
      if (storeSettings.storeName) document.getElementById('store-name').textContent = storeSettings.storeName;
      if (storeSettings.logoUrl) {
        const img = document.getElementById('store-logo');
        img.src = storeSettings.logoUrl;
        img.style.display = 'block';
      }
    }
  } catch(e) {}
}

async function loadProducts() {
  try {
    const snap = await db.collection('products').orderBy('createdAt','desc').get();
    allProducts = [];
    const cats = new Set(['الكل']);
    snap.forEach(d => {
      const p = { id: d.id, ...d.data() };
      allProducts.push(p);
      if (p.category) cats.add(p.category);
    });
    allCategories = ['الكل', ...Array.from(cats).filter(c => c !== 'الكل')];
    renderCategories();
    renderProducts(allProducts);
  } catch(e) {
    document.getElementById('products-grid').innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--red)"><i class="fas fa-exclamation-circle" style="font-size:32px;display:block;margin-bottom:10px"></i>خطأ في تحميل المنتجات<br><small style="color:var(--text3)">${e.message}</small></div>`;
  }
}

async function loadCustomers() {
  try {
    const snap = await db.collection('pos_customers').limit(500).get();
    allCustomers = [];
    snap.forEach(d => allCustomers.push({ id: d.id, ...d.data() }));
  } catch(e) {}
}

/* ══════════════════════════════
   RENDER PRODUCTS
══════════════════════════════ */
function renderCategories() {
  const tabs = document.getElementById('cat-tabs');
  tabs.innerHTML = allCategories.map((c, i) =>
    `<button class="cat-btn ${i===0?'active':''}" onclick="filterByCategory('${c}',this)">${c}</button>`
  ).join('');
}

function renderProducts(list) {
  const grid = document.getElementById('products-grid');
  if (!list.length) {
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text3)"><i class="fas fa-search" style="font-size:32px;display:block;margin-bottom:10px"></i>لا توجد منتجات</div>`;
    return;
  }
  grid.innerHTML = list.map(p => {
    const stock = parseInt(p.stock) || 0;
    const unlimited = p.trackStock === false || p.stock === undefined || p.stock === null;
    const isOut = !unlimited && stock <= 0;
    const isLow = !unlimited && stock > 0 && stock <= 5;
    const stockLabel = unlimited ? '' : (isOut ? `<span class="stock-badge badge-out">نفد</span>` : (isLow ? `<span class="stock-badge badge-low">آخر ${stock}</span>` : `<span class="stock-badge badge-in">${stock}</span>`));
    const imgHtml = p.image
      ? `<div class="prod-img"><img src="${p.image}" alt="${p.name}" loading="lazy" onerror="this.parentElement.innerHTML='📷'"></div>`
      : `<div class="prod-img">${p.emoji||'📦'}</div>`;
    return `<div class="prod-card ${isOut?'out-of-stock':''}" onclick="${isOut?'':'addToCart(\''+p.id+'\')'}" id="pc-${p.id}">
      ${imgHtml}
      ${stockLabel}
      <div class="prod-info">
        <div class="prod-name">${p.name}</div>
        <div class="prod-price">${formatPrice(p.price)}</div>
        ${!unlimited ? `<div class="prod-stock ${isOut?'out':isLow?'low':''}">${isOut?'نفد من المخزون':`مخزون: ${stock}`}</div>` : ''}
      </div>
    </div>`;
  }).join('');
}

function filterByCategory(cat, btn) {
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const q = document.getElementById('search-inp').value.toLowerCase();
  let list = cat === 'الكل' ? allProducts : allProducts.filter(p => p.category === cat);
  if (q) list = list.filter(p => (p.name||'').toLowerCase().includes(q) || (p.barcode||'').toLowerCase().includes(q) || (p.sku||'').toLowerCase().includes(q));
  renderProducts(list);
}

function filterProducts() {
  const q = document.getElementById('search-inp').value.toLowerCase();
  const activeCat = document.querySelector('.cat-btn.active')?.textContent;
  let list = activeCat && activeCat !== 'الكل' ? allProducts.filter(p => p.category === activeCat) : allProducts;
  if (q) list = list.filter(p => (p.name||'').toLowerCase().includes(q) || (p.barcode||'').includes(q) || (p.sku||'').includes(q));
  renderProducts(list);
}

function toggleView() {
  isGridView = !isGridView;
  const grid = document.getElementById('products-grid');
  const btn   = document.getElementById('view-toggle-btn');
  if (isGridView) {
    grid.style.gridTemplateColumns = 'repeat(auto-fill,minmax(140px,1fr))';
    btn.innerHTML = '<i class="fas fa-th"></i>';
  } else {
    grid.style.gridTemplateColumns = '1fr 1fr';
    btn.innerHTML = '<i class="fas fa-list"></i>';
  }
}

/* ══════════════════════════════
   CART
══════════════════════════════ */
function addToCart(productId) {
  const p = allProducts.find(x => x.id === productId);
  if (!p) return;
  const existing = cart.find(i => i.productId === productId);
  if (existing) {
    existing.qty++;
  } else {
    cart.push({ productId, name: p.name, price: parseFloat(p.price)||0, qty: 1, discount: 0 });
  }
  toast(`✓ ${p.name}`, 'ok');
  renderCart();
}

function renderCart() {
  const el = document.getElementById('cart-items');
  if (!cart.length) {
    el.innerHTML = `<div class="cart-empty"><i class="fas fa-shopping-cart"></i><br>أضف منتجات للطلب</div>`;
    updateTotals();
    return;
  }
  el.innerHTML = cart.map((item, idx) => {
    const lineTotal = (item.price - (item.discount||0)) * item.qty;
    return `<div class="cart-item">
      <div class="cart-item-name">${item.name}</div>
      <button class="cart-item-remove" onclick="removeFromCart(${idx})">✕</button>
      <div class="cart-item-row">
        <div class="qty-ctrl">
          <button class="qty-btn" onclick="changeQty(${idx},-1)">−</button>
          <span class="qty-num">${item.qty}</span>
          <button class="qty-btn" onclick="changeQty(${idx},1)">+</button>
        </div>
        <div class="cart-item-price">${formatPrice((item.price-(item.discount||0))*item.qty)}</div>
      </div>
      <div class="cart-item-disc">
        <span class="disc-lbl">خصم:</span>
        <input class="disc-inp" type="number" min="0" value="${item.discount||''}" placeholder="0" 
          oninput="setItemDiscount(${idx},this.value)" title="خصم على هذا المنتج">
        <span class="disc-lbl">ج</span>
      </div>
    </div>`;
  }).join('');
  updateTotals();
}

function removeFromCart(idx) { cart.splice(idx, 1); renderCart(); }
function changeQty(idx, delta) {
  cart[idx].qty = Math.max(1, cart[idx].qty + delta);
  renderCart();
}
function setItemDiscount(idx, val) {
  cart[idx].discount = Math.max(0, parseFloat(val)||0);
  updateTotals();
}
function clearCart() {
  if (cart.length && !confirm('مسح جميع منتجات الطلب؟')) return;
  cart = []; orderNotes = ''; paymentMethod = 'نقدي';
  document.getElementById('cust-name').value = '';
  document.getElementById('cust-phone').value = '';
  document.getElementById('discount-inp').value = '';
  document.getElementById('delivery-inp').value = '';
  document.getElementById('cash-given').value = '';
  document.getElementById('change-result').style.display = 'none';
  document.getElementById('notes-btn-txt').textContent = 'إضافة ملاحظة';
  document.querySelectorAll('.pay-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('pm-cash').classList.add('active');
  document.getElementById('deferred-section').classList.remove('show');
  renderCart();
}

/* ══════════════════════════════
   TOTALS
══════════════════════════════ */
function calcSubtotal() {
  return cart.reduce((s, i) => s + (i.price - (i.discount||0)) * i.qty, 0);
}
function updateTotals() {
  const sub = calcSubtotal();
  const discVal = parseFloat(document.getElementById('discount-inp').value) || 0;
  const delVal  = parseFloat(document.getElementById('delivery-inp').value) || 0;
  const discAmt = discountType === 'pct' ? sub * discVal / 100 : discVal;
  const total   = Math.max(0, sub - discAmt + delVal);

  document.getElementById('sum-subtotal').textContent = fmtN(sub);
  document.getElementById('disc-row').style.display = discAmt > 0 ? 'flex' : 'none';
  document.getElementById('del-row').style.display  = delVal > 0 ? 'flex' : 'none';
  document.getElementById('sum-discount').textContent = '- ' + fmtN(discAmt);
  document.getElementById('sum-delivery').textContent  = '+ ' + fmtN(delVal);
  document.getElementById('sum-total').textContent = fmtN(total);
  calcChange();
}

function calcChange() {
  const total = parseFloat(document.getElementById('sum-total').textContent) || 0;
  const given = parseFloat(document.getElementById('cash-given').value) || 0;
  const el    = document.getElementById('change-result');
  if (given > 0 && paymentMethod === 'نقدي') {
    const change = given - total;
    el.textContent = change >= 0 ? `الباقي: ${fmtN(change)}` : `ناقص: ${fmtN(-change)}`;
    el.style.color = change >= 0 ? 'var(--green)' : 'var(--red)';
    el.style.display = 'block';
  } else {
    el.style.display = 'none';
  }
}

function setDiscType(type) {
  discountType = type;
  document.getElementById('disc-pct-btn').classList.toggle('active', type === 'pct');
  document.getElementById('disc-fix-btn').classList.toggle('active', type === 'fix');
  updateTotals();
}

function setPayMethod(method, btn, cls) {
  paymentMethod = method;
  document.querySelectorAll('.pay-btn').forEach(b => b.classList.remove('active','card','transfer','deferred'));
  btn.classList.add('active');
  if (cls) btn.classList.add(cls);
  document.getElementById('change-calc').style.display = method === 'نقدي' ? 'block' : 'none';
  document.getElementById('deferred-section').classList.toggle('show', method === 'آجل');
  calcChange();
}

/* ══════════════════════════════
   CUSTOMERS
══════════════════════════════ */
async function searchCustomers() {
  const q = document.getElementById('cust-name').value.trim().toLowerCase();
  if (q.length < 1) { document.getElementById('cust-suggest').style.display = 'none'; return; }
  const matches = allCustomers.filter(c => (c.name||'').toLowerCase().includes(q) || (c.phone||'').includes(q)).slice(0,5);
  const el = document.getElementById('cust-suggest');
  if (!matches.length) { el.style.display = 'none'; return; }
  el.innerHTML = matches.map(c =>
    `<div class="cust-suggest-item" onmousedown="selectCustomer('${c.id}')">
      <strong>${c.name}</strong><br><small style="color:var(--text3)">${c.phone||''}</small>
    </div>`
  ).join('');
  el.style.display = 'block';
}

function selectCustomer(id) {
  const c = allCustomers.find(x => x.id === id);
  if (!c) return;
  document.getElementById('cust-name').value  = c.name || '';
  document.getElementById('cust-phone').value = c.phone || '';
  document.getElementById('cust-suggest').style.display = 'none';
}

function hideSuggest() {
  setTimeout(() => { document.getElementById('cust-suggest').style.display = 'none'; }, 200);
}

function autoFillCustomer() {
  const phone = document.getElementById('cust-phone').value.trim();
  if (phone.length < 7) return;
  const match = allCustomers.find(c => (c.phone||'').replace(/\D/g,'').endsWith(phone.replace(/\D/g,'')));
  if (match && !document.getElementById('cust-name').value) {
    document.getElementById('cust-name').value = match.name || '';
  }
}

/* ══════════════════════════════
   PENDING ORDERS
══════════════════════════════ */
function loadPendingOrders() {
  const saved = localStorage.getItem('zahraa_pending_orders');
  if (saved) { pendingOrders = JSON.parse(saved); renderPendingBar(); }
}

function savePending() {
  if (!cart.length) { toast('السلة فارغة', 'warn'); return; }
  const name = document.getElementById('cust-name').value.trim() || `طلب ${pendingOrders.length + 1}`;
  pendingOrders.push({
    id: Date.now().toString(),
    label: name,
    cart: JSON.parse(JSON.stringify(cart)),
    customer: { name, phone: document.getElementById('cust-phone').value },
    notes: orderNotes,
    paymentMethod,
    discount: document.getElementById('discount-inp').value,
    delivery: document.getElementById('delivery-inp').value,
    discountType,
    savedAt: new Date().toISOString()
  });
  localStorage.setItem('zahraa_pending_orders', JSON.stringify(pendingOrders));
  clearCart();
  renderPendingBar();
  toast(`⏸️ تم تعليق طلب: ${name}`, 'info');
}

function restorePending(id) {
  const order = pendingOrders.find(o => o.id === id);
  if (!order) return;
  if (cart.length && !confirm('سيتم مسح الطلب الحالي. هل تريد المتابعة؟')) return;
  cart = JSON.parse(JSON.stringify(order.cart));
  document.getElementById('cust-name').value  = order.customer?.name || '';
  document.getElementById('cust-phone').value = order.customer?.phone || '';
  orderNotes = order.notes || '';
  paymentMethod = order.paymentMethod || 'نقدي';
  document.getElementById('discount-inp').value = order.discount || '';
  document.getElementById('delivery-inp').value = order.delivery || '';
  discountType = order.discountType || 'pct';
  if (orderNotes) document.getElementById('notes-btn-txt').textContent = '📝 يوجد ملاحظة';
  pendingOrders = pendingOrders.filter(o => o.id !== id);
  localStorage.setItem('zahraa_pending_orders', JSON.stringify(pendingOrders));
  renderCart();
  renderPendingBar();
  toast(`✅ تم استعادة طلب: ${order.label}`, 'ok');
}

function deletePending(id, e) {
  e.stopPropagation();
  pendingOrders = pendingOrders.filter(o => o.id !== id);
  localStorage.setItem('zahraa_pending_orders', JSON.stringify(pendingOrders));
  renderPendingBar();
}

function renderPendingBar() {
  const bar = document.getElementById('pending-bar');
  bar.innerHTML = `<button class="pending-add" onclick="savePending()"><i class="fas fa-pause-circle"></i> تعليق</button>`;
  pendingOrders.forEach(o => {
    const tag = document.createElement('div');
    tag.className = 'pending-tag';
    tag.innerHTML = `<i class="fas fa-clock"></i> ${o.label} <button style="background:none;border:none;color:var(--red);cursor:pointer;padding:0 2px;font-size:11px" onclick="deletePending('${o.id}',event)">✕</button>`;
    tag.onclick = () => restorePending(o.id);
    bar.appendChild(tag);
  });
}

/* ══════════════════════════════
   NOTES
══════════════════════════════ */
function openNotesModal() {
  document.getElementById('notes-textarea').value = orderNotes;
  document.getElementById('notes-modal').classList.add('open');
}
function saveNotes() {
  orderNotes = document.getElementById('notes-textarea').value.trim();
  document.getElementById('notes-btn-txt').textContent = orderNotes ? `📝 ${orderNotes.slice(0,20)}...` : 'إضافة ملاحظة';
  document.getElementById('notes-modal').classList.remove('open');
}

/* ══════════════════════════════
   CHECKOUT
══════════════════════════════ */
async function checkout() {
  if (!cart.length) { toast('أضف منتجات للطلب أولاً', 'warn'); return; }

  const custName  = document.getElementById('cust-name').value.trim();
  const custPhone = document.getElementById('cust-phone').value.trim();
  const sub       = calcSubtotal();
  const discVal   = parseFloat(document.getElementById('discount-inp').value) || 0;
  const delVal    = parseFloat(document.getElementById('delivery-inp').value) || 0;
  const discAmt   = discountType === 'pct' ? sub * discVal / 100 : discVal;
  const total     = Math.max(0, sub - discAmt + delVal);
  const dueDate   = document.getElementById('due-date-inp').value || '';
  const isDeferred = paymentMethod === 'آجل';

  const btn = document.getElementById('checkout-btn');
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الإنشاء...';

  try {
    /* Generate invoice number */
    const dateStr = new Date().toISOString().slice(0,10).replace(/-/g,'');
    const randomPart = Math.floor(Math.random()*9000)+1000;
    const invoiceNumber = `SZ-${dateStr}-${randomPart}`;

    /* Save/update customer */
    let customerId = null;
    if (custName) {
      const existing = allCustomers.find(c =>
        (c.phone && custPhone && c.phone.replace(/\D/g,'') === custPhone.replace(/\D/g,'')) ||
        c.name?.toLowerCase() === custName.toLowerCase()
      );
      if (existing) {
        customerId = existing.id;
        await db.collection('pos_customers').doc(existing.id).update({
          name: custName, phone: custPhone || existing.phone,
          lastOrderAt: firebase.firestore.FieldValue.serverTimestamp(),
          totalOrders: firebase.firestore.FieldValue.increment(1),
          totalSpent: firebase.firestore.FieldValue.increment(total),
        });
      } else {
        const newCust = await db.collection('pos_customers').add({
          name: custName, phone: custPhone || '',
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          lastOrderAt: firebase.firestore.FieldValue.serverTimestamp(),
          totalOrders: 1, totalSpent: total,
        });
        customerId = newCust.id;
        allCustomers.push({ id: newCust.id, name: custName, phone: custPhone });
      }
    }

    /* Build invoice document */
    const invoiceData = {
      invoiceNumber,
      userName: custName || 'عميل',
      phone: custPhone,
      customerId,
      items: cart.map(i => ({
        productId: i.productId, name: i.name,
        price: i.price, qty: i.qty, discount: i.discount||0,
        total: (i.price-(i.discount||0))*i.qty,
      })),
      subtotal: sub,
      discountValue: discVal,
      discountType,
      discountAmount: discAmt,
      deliveryFee: delVal,
      totalPrice: total,
      paymentMethod,
      paidAmount: isDeferred ? 0 : total,
      remainingAmount: isDeferred ? total : 0,
      dueDate: isDeferred ? dueDate : '',
      status: isDeferred ? 'آجل' : 'مكتمل',
      notes: orderNotes,
      orderPrepared: false,
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      createdBy: currentUser?.email || 'cashier',
    };

    const docRef = await db.collection('pos_invoices').add(invoiceData);

    /* Update product stock */
    for (const item of cart) {
      const prod = allProducts.find(p => p.id === item.productId);
      if (prod && prod.trackStock !== false && prod.stock !== undefined) {
        const newStock = Math.max(0, (parseInt(prod.stock)||0) - item.qty);
        await db.collection('products').doc(item.productId).update({ stock: newStock });
        prod.stock = newStock;
      }
    }

    toast(`✅ فاتورة ${invoiceNumber}`, 'ok');

    /* Open invoice in new tab */
    window.open(`/invoice.html?id=${docRef.id}`, '_blank');

    /* Reset cart */
    clearCart();
    loadProducts(); /* Refresh stock */
  } catch(e) {
    toast('خطأ: ' + e.message, 'err');
    console.error(e);
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-receipt"></i> إصدار الفاتورة';
  }
}

/* ══════════════════════════════
   BARCODE SCANNER
══════════════════════════════ */
function handleBarcodeKey(e) {
  if (e.key === 'Enter') {
    const val = e.target.value.trim();
    if (val) {
      const prod = allProducts.find(p => p.barcode === val || p.sku === val);
      if (prod) { addToCart(prod.id); e.target.value = ''; filterProducts(); }
      else toast('الباركود غير موجود: ' + val, 'warn');
    }
  }
}

function openScanner() {
  document.getElementById('scanner-modal').classList.add('open');
  const reader = document.getElementById('qr-reader');
  reader.innerHTML = '';
  qrScanner = new Html5Qrcode('qr-reader');
  qrScanner.start(
    { facingMode: 'environment' },
    { fps: 10, qrbox: { width: 250, height: 250 } },
    (decoded) => {
      closeScanner();
      document.getElementById('scan-result').textContent = 'تم: ' + decoded;
      const prod = allProducts.find(p => p.barcode === decoded || p.sku === decoded || p.id === decoded);
      if (prod) { addToCart(prod.id); }
      else {
        document.getElementById('search-inp').value = decoded;
        filterProducts();
        toast('تم مسح: ' + decoded, 'info');
      }
    },
    () => {}
  ).catch(e => { toast('لا يمكن فتح الكاميرا', 'err'); closeScanner(); });
}

function closeScanner() {
  document.getElementById('scanner-modal').classList.remove('open');
  if (qrScanner) {
    qrScanner.stop().catch(() => {});
    qrScanner = null;
  }
}

/* ══════════════════════════════
   UTILS
══════════════════════════════ */
function formatPrice(p) { return (parseFloat(p)||0).toFixed(2) + ' ج'; }
function fmtN(n) { return (parseFloat(n)||0).toFixed(2) + ' ج'; }

function toast(msg, type = 'ok') {
  const wrap = document.getElementById('toast-wrap');
  const el = document.createElement('div');
  el.className = `toast-item ${type}`;
  el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

/* Close modals on overlay click */
document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) { m.classList.remove('open'); closeScanner(); } });
});

/* Keyboard shortcut: Enter on pass field */
document.getElementById('pass-inp').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
