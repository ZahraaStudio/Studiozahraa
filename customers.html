<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>العملاء — كاشير الزهراء</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
<script src="shared.js"></script>
<style>
/* Stats row */
.cust-stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:18px}
.cs-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:14px 12px}
.cs-icon{font-size:20px;margin-bottom:8px}
.cs-lbl{font-size:10px;color:var(--text3);font-weight:700;margin-bottom:2px}
.cs-val{font-size:20px;font-weight:900;color:var(--gold)}
.cs-val.red{color:var(--red)}
.cs-val.green{color:var(--green)}
.cs-val.blue{color:var(--blue)}

/* Customer cards */
.cust-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.cust-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:14px;
  transition:all .17s;cursor:pointer;position:relative;overflow:hidden}
.cust-card:hover{border-color:var(--gold);transform:translateY(-1px);box-shadow:var(--sh)}
.cust-card::before{content:'';position:absolute;top:0;right:0;width:100%;height:3px}
.cust-card.vip::before{background:linear-gradient(90deg,var(--gold),var(--gold2))}
.cust-card.debt::before{background:var(--red)}
.cust-card.good::before{background:var(--green)}

.cc-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.cc-avatar{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:18px;font-weight:900;flex-shrink:0;background:rgba(212,175,55,.15);border:2px solid var(--border)}
.cc-avatar.vip{background:rgba(212,175,55,.2);border-color:var(--gold)}
.cc-name{font-size:13px;font-weight:900;line-height:1.3}
.cc-phone{font-size:11px;color:var(--text3);direction:ltr}

.cc-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:10px}
.cc-stat{text-align:center;background:var(--bg3);border-radius:8px;padding:6px 4px}
.cc-stat-v{font-size:12px;font-weight:900;color:var(--gold)}
.cc-stat-v.red{color:var(--red)}
.cc-stat-l{font-size:9px;color:var(--text3);font-weight:700}

.cc-actions{display:flex;gap:5px}
.ca-btn{flex:1;padding:6px;border-radius:var(--r);border:1.5px solid var(--border);
  background:transparent;color:var(--text2);cursor:pointer;
  font-family:'Cairo',sans-serif;font-size:10px;font-weight:700;transition:all .15s;
  display:flex;align-items:center;justify-content:center;gap:4px;text-decoration:none}
.ca-btn:hover{border-color:var(--gold);color:var(--gold)}
.ca-btn.wa{border-color:rgba(37,211,102,.4);color:#25D366}
.ca-btn.wa:hover{background:#25D366;color:#fff;border-color:#25D366}
.ca-btn.danger:hover{border-color:var(--red);color:var(--red)}

/* Filter tabs */
.filter-tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.ft-btn{padding:5px 14px;border-radius:20px;border:1.5px solid var(--border);
  background:var(--bg3);color:var(--text2);cursor:pointer;
  font-family:'Cairo',sans-serif;font-size:11px;font-weight:700;transition:all .15s}
.ft-btn.on{background:var(--gold);border-color:var(--gold);color:#000}

/* Empty */
.cust-empty{text-align:center;padding:60px 20px;color:var(--text3);grid-column:1/-1}
.cust-empty i{font-size:48px;margin-bottom:16px;display:block;opacity:.3}
</style>
</head>
<body>
<div class="app-shell">
  <div id="sidebar"></div>
  <div class="page-content">
    <div class="page-header">
      <h1><i class="fas fa-users"></i> إدارة العملاء</h1>
      <button class="btn btn-primary" onclick="openAdd()"><i class="fas fa-user-plus"></i> إضافة عميل</button>
    </div>
    <div class="page-body">

      <!-- Stats -->
      <div class="cust-stats" id="cust-stats">
        <div class="cs-card"><div class="cs-icon">👥</div><div class="cs-lbl">إجمالي العملاء</div><div class="cs-val" id="cs-total">—</div></div>
        <div class="cs-card"><div class="cs-icon">⭐</div><div class="cs-lbl">عملاء VIP</div><div class="cs-val blue" id="cs-vip">—</div></div>
        <div class="cs-card"><div class="cs-icon">💰</div><div class="cs-lbl">إجمالي الديون</div><div class="cs-val red" id="cs-debt">—</div></div>
        <div class="cs-card"><div class="cs-icon">🏆</div><div class="cs-lbl">أعلى مشتريات</div><div class="cs-val green" id="cs-top">—</div></div>
      </div>

      <!-- Search + Filters -->
      <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center">
        <input class="search-input" id="q" placeholder="🔍 بحث بالاسم أو الهاتف..." oninput="filter()" style="flex:1;min-width:200px">
        <div class="filter-tabs">
          <button class="ft-btn on" onclick="setFilter('all',this)">الكل</button>
          <button class="ft-btn" onclick="setFilter('debt',this)">⚠️ عليهم دين</button>
          <button class="ft-btn" onclick="setFilter('vip',this)">⭐ VIP</button>
        </div>
      </div>

      <!-- Cards grid -->
      <div class="cust-grid" id="cust-grid"><div style="grid-column:1/-1" class="spinner"></div></div>

    </div>
  </div>
</div>

<!-- Add/Edit Modal -->
<div class="overlay" id="cust-modal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="cust-modal-title">إضافة عميل جديد</h3>
      <button class="close-btn" onclick="closeModal('cust-modal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group"><label>الاسم *</label><input class="form-control" id="c-name" placeholder="اسم العميل"></div>
        <div class="form-group"><label>الهاتف</label><input class="form-control" id="c-phone" type="tel" placeholder="01xxxxxxxxx"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>البريد الإلكتروني</label><input class="form-control" id="c-email" type="email" placeholder="email@..."></div>
        <div class="form-group"><label>تاريخ الميلاد</label><input class="form-control" id="c-dob" type="date"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>الحد الائتماني (ج)</label><input class="form-control" id="c-credit" type="number" min="0" value="0"></div>
        <div class="form-group"><label>نقاط الولاء</label><input class="form-control" id="c-points" type="number" min="0" value="0"></div>
      </div>
      <div class="form-group"><label>العنوان</label><input class="form-control" id="c-addr" placeholder="العنوان بالتفصيل"></div>
      <div class="form-group">
        <label>الفئة</label>
        <select class="form-control" id="c-tag">
          <option value="">عادي</option>
          <option value="vip">⭐ VIP</option>
          <option value="wholesale">🏪 جملة</option>
          <option value="new">🆕 جديد</option>
        </select>
      </div>
      <div class="form-group"><label>ملاحظات</label><textarea class="form-control" id="c-notes" rows="2" placeholder="أي ملاحظات عن العميل..."></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-primary" onclick="saveCust()"><i class="fas fa-save"></i> حفظ</button>
      <button class="btn btn-ghost" onclick="closeModal('cust-modal')">إلغاء</button>
    </div>
  </div>
</div>

<script>
injectSharedCSS();

let allCusts = [];
let editId = null;
let activeFilter = 'all';

requireAuth(async () => {
  await loadCusts();
});

async function loadCusts() {
  try {
    const snap = await db.collection('pos_customers').orderBy('createdAt','desc').get();
    allCusts = snap.docs.map(d => ({ id: d.id, ...d.data() }));

    // Load invoice totals per customer
    try {
      const invSnap = await db.collection('pos_invoices').get();
      const custTotals = {};
      const custDebt = {};
      invSnap.forEach(d => {
        const inv = d.data();
        const phone = inv.phone || inv.customerPhone;
        if (!phone) return;
        custTotals[phone] = (custTotals[phone] || 0) + (inv.totalPrice || 0);
        custDebt[phone] = (custDebt[phone] || 0) + (inv.remainingAmount || 0);
      });
      allCusts = allCusts.map(c => ({
        ...c,
        totalSpent: custTotals[c.phone] || c.totalSpent || 0,
        debtAmount: custDebt[c.phone] || c.debtAmount || 0,
      }));
    } catch(e) {}

    // Stats
    const totalDebt = allCusts.reduce((s,c) => s + (c.debtAmount||0), 0);
    const vipCount = allCusts.filter(c => c.tag === 'vip').length;
    const topCust = allCusts.sort((a,b) => (b.totalSpent||0)-(a.totalSpent||0))[0];
    // re-sort by recent
    allCusts.sort((a,b) => (b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));

    document.getElementById('cs-total').textContent = allCusts.length;
    document.getElementById('cs-vip').textContent = vipCount;
    document.getElementById('cs-debt').textContent = fmt(totalDebt);
    document.getElementById('cs-top').textContent = topCust ? fmt(topCust.totalSpent) : '—';

    filter();
  } catch(e) {
    document.getElementById('cust-grid').innerHTML = '<div class="cust-empty"><i class="fas fa-exclamation-triangle"></i><p>خطأ في التحميل: ' + e.message + '</p></div>';
  }
}

function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.ft-btn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  filter();
}

function filter() {
  const q = (document.getElementById('q').value || '').toLowerCase().trim();
  let list = allCusts.filter(c => {
    if (activeFilter === 'debt' && !(c.debtAmount > 0)) return false;
    if (activeFilter === 'vip' && c.tag !== 'vip') return false;
    if (!q) return true;
    return (c.name||'').toLowerCase().includes(q) || (c.phone||'').includes(q);
  });
  render(list);
}

function render(list) {
  if (!list.length) {
    document.getElementById('cust-grid').innerHTML = '<div class="cust-empty"><i class="fas fa-user-slash"></i><p>لا يوجد عملاء</p></div>';
    return;
  }
  document.getElementById('cust-grid').innerHTML = list.map(c => {
    const initials = (c.name||'?').charAt(0).toUpperCase();
    const hasDebt = (c.debtAmount||0) > 0;
    const isVip = c.tag === 'vip';
    const cardClass = isVip ? 'vip' : hasDebt ? 'debt' : 'good';
    const waNum = (c.phone||'').replace(/\D/g,'');
    const waE = waNum.startsWith('0') ? '2'+waNum : waNum;
    const waMsg = encodeURIComponent(`السلام عليكم ${c.name||''} 👋\nمن استوديو الزهراء 📸`);
    return `<div class="cust-card ${cardClass}" onclick="goProfile('${c.id}','${c.phone||''}')">
      <div class="cc-top">
        <div class="cc-avatar ${isVip?'vip':''}">${initials}</div>
        <div style="flex:1;min-width:0">
          <div class="cc-name">${c.name||'—'} ${isVip?'⭐':''}</div>
          <div class="cc-phone">${c.phone||'—'}</div>
          ${c.tag&&c.tag!=='vip'?`<span class="badge badge-blue" style="font-size:9px">${c.tag}</span>`:''}
        </div>
      </div>
      <div class="cc-stats">
        <div class="cc-stat">
          <div class="cc-stat-v">${fmt(c.totalSpent||0)}</div>
          <div class="cc-stat-l">إجمالي</div>
        </div>
        <div class="cc-stat">
          <div class="cc-stat-v ${hasDebt?'red':''}">${hasDebt?fmt(c.debtAmount):'✅'}</div>
          <div class="cc-stat-l">${hasDebt?'دين':'صافي'}</div>
        </div>
        <div class="cc-stat">
          <div class="cc-stat-v">${c.points||0}</div>
          <div class="cc-stat-l">نقاط</div>
        </div>
      </div>
      <div class="cc-actions" onclick="event.stopPropagation()">
        ${c.phone?`<a class="ca-btn wa" href="https://wa.me/${waE}?text=${waMsg}" target="_blank"><i class="fab fa-whatsapp"></i> واتساب</a>`:''}
        <button class="ca-btn" onclick="openEdit('${c.id}')"><i class="fas fa-edit"></i> تعديل</button>
        <button class="ca-btn danger" onclick="deleteCust('${c.id}')"><i class="fas fa-trash"></i></button>
      </div>
    </div>`;
  }).join('');
}

function goProfile(id, phone) {
  if (phone) location.href = `customer-profile.html?id=__phone__${encodeURIComponent(phone)}`;
  else location.href = `customer-profile.html?id=${id}`;
}

function openAdd() {
  editId = null;
  document.getElementById('cust-modal-title').textContent = 'إضافة عميل جديد';
  ['c-name','c-phone','c-email','c-addr','c-notes'].forEach(id => document.getElementById(id).value = '');
  ['c-credit','c-points'].forEach(id => document.getElementById(id).value = '0');
  document.getElementById('c-dob').value = '';
  document.getElementById('c-tag').value = '';
  openModal('cust-modal');
}

function openEdit(id) {
  const c = allCusts.find(x => x.id === id);
  if (!c) return;
  editId = id;
  document.getElementById('cust-modal-title').textContent = 'تعديل بيانات العميل';
  document.getElementById('c-name').value = c.name || '';
  document.getElementById('c-phone').value = c.phone || '';
  document.getElementById('c-email').value = c.email || '';
  document.getElementById('c-dob').value = c.dob || '';
  document.getElementById('c-credit').value = c.creditLimit || 0;
  document.getElementById('c-points').value = c.points || 0;
  document.getElementById('c-addr').value = c.address || '';
  document.getElementById('c-notes').value = c.notes || '';
  document.getElementById('c-tag').value = c.tag || '';
  openModal('cust-modal');
}

async function saveCust() {
  const name = document.getElementById('c-name').value.trim();
  if (!name) { toast('الاسم مطلوب', 'warn'); return; }
  const data = {
    name,
    phone: document.getElementById('c-phone').value.trim(),
    email: document.getElementById('c-email').value.trim(),
    dob: document.getElementById('c-dob').value,
    creditLimit: parseFloat(document.getElementById('c-credit').value) || 0,
    points: parseInt(document.getElementById('c-points').value) || 0,
    address: document.getElementById('c-addr').value.trim(),
    notes: document.getElementById('c-notes').value.trim(),
    tag: document.getElementById('c-tag').value,
    updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
  };
  try {
    if (editId) {
      await db.collection('pos_customers').doc(editId).update(data);
      toast('✅ تم تحديث بيانات العميل', 'ok');
    } else {
      data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
      data.totalSpent = 0; data.invoiceCount = 0;
      await db.collection('pos_customers').add(data);
      toast('✅ تم إضافة العميل', 'ok');
    }
    closeModal('cust-modal');
    await loadCusts();
  } catch(e) { toast('خطأ: ' + e.message, 'err'); }
}

async function deleteCust(id) {
  const ok = await confirm2('هل أنت متأكد من حذف هذا العميل؟');
  if (!ok) return;
  try {
    await db.collection('pos_customers').doc(id).delete();
    toast('✅ تم حذف العميل', 'ok');
    await loadCusts();
  } catch(e) { toast('خطأ: ' + e.message, 'err'); }
}
</script>
</body>
</html>
