<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>فاتورة — كاشير الزهراء</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
<script src="shared.js"></script>
<style>
/* ──────────────────────────────────
   SCREEN LAYOUT  (normal view)
────────────────────────────────── */
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  font-family:'Cairo',sans-serif;
  background:#c9c9c9;
  min-height:100vh;
}

/* action bar */
.actions{
  display:flex;gap:10px;padding:12px 20px;
  background:#1a1a2e;border-bottom:2px solid #d4af37;
  flex-wrap:wrap;align-items:center;
  position:sticky;top:0;z-index:100;
}
.actions h2{font-size:14px;font-weight:900;color:#d4af37;margin-right:auto}
.btn-act{
  padding:8px 18px;border:none;border-radius:8px;font-size:13px;
  font-family:'Cairo',sans-serif;font-weight:800;cursor:pointer;
  display:flex;align-items:center;gap:6px;transition:opacity .2s;
}
.btn-act:hover{opacity:.82}
.btn-print{background:#111;color:#fff}
.btn-wa{background:#25D366;color:#fff;display:none}
.btn-back{background:#475569;color:#fff}

/* two-column layout on screen */
.screen-wrap{
  display:flex;gap:20px;padding:20px;
  max-width:1100px;margin:0 auto;align-items:flex-start;
}
.screen-left{flex:1;min-width:0}
.screen-right{width:320px;flex-shrink:0}

/* info card */
.info-card{
  background:#fff;border-radius:12px;padding:20px;
  box-shadow:0 4px 20px rgba(0,0,0,.12);margin-bottom:14px;
  border:1px solid #e5e7eb;
}
.info-card h3{
  font-size:13px;font-weight:900;color:#6b7280;
  text-transform:uppercase;letter-spacing:.5px;
  margin-bottom:12px;padding-bottom:8px;
  border-bottom:1px solid #f3f4f6;
  display:flex;align-items:center;gap:6px;
}
.info-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:7px 0;border-bottom:1px solid #f9fafb;font-size:13px;
}
.info-row:last-child{border-bottom:none}
.info-lbl{color:#6b7280;font-weight:700}
.info-val{font-weight:900;color:#111;text-align:left}
.info-val.gold{color:#a88520}
.info-val.red{color:#dc2626}
.info-val.green{color:#15803d}

/* products table */
.prod-table{width:100%;border-collapse:collapse;font-size:13px}
.prod-table th{
  background:#f9fafb;color:#374151;font-weight:900;font-size:12px;
  padding:10px 12px;text-align:right;border-bottom:2px solid #e5e7eb;
}
.prod-table td{padding:10px 12px;border-bottom:1px solid #f3f4f6;color:#111}
.prod-table tr:last-child td{border-bottom:none}
.prod-table td.num{text-align:center;font-weight:900}
.prod-table td.price{text-align:left;direction:ltr;font-weight:900;font-family:monospace}

/* totals */
.total-strip{
  background:#1a1a2e;color:#fff;border-radius:8px;
  padding:12px 16px;display:flex;justify-content:space-between;
  align-items:center;margin:8px 0 6px;
}
.total-strip .lbl{font-size:15px;font-weight:900}
.total-strip .amt{font-size:22px;font-weight:900;direction:ltr;font-family:monospace}
.rem-strip{
  background:#d4af37;border-radius:8px;
  padding:10px 16px;display:flex;justify-content:space-between;
  align-items:center;margin-bottom:6px;
  border:2px solid #a88520;
}
.rem-strip .lbl{font-size:14px;font-weight:900;color:#1a1a00}
.rem-strip .amt{font-size:18px;font-weight:900;color:#1a1a00;direction:ltr;font-family:monospace}
.paid-strip{
  background:#f0fdf4;border:1.5px solid #86efac;border-radius:8px;
  padding:8px 16px;text-align:center;font-size:13px;font-weight:900;color:#15803d;
}

/* ── THERMAL RECEIPT (right column on screen, and full width on print) ── */
.receipt{
  background:#fff;border-radius:8px;
  box-shadow:0 4px 20px rgba(0,0,0,.15);
  border:1px solid #ddd;
  padding:6px 8px 8px;
  font-family:'Cairo',monospace;
  font-size:11px;
  color:#000;
}
.receipt *{color:#000}
.r-sep{display:block;width:100%;height:3px;background:#000;margin:5px 0}
.r-sep1{display:block;width:100%;height:1px;background:#000;margin:3px 0}
.r-logo-row{display:flex;justify-content:flex-end;margin-bottom:3px}
.r-logo{background:#111;color:#fff;padding:3px 8px;text-align:center;line-height:1.1}
.r-logo .z{font-size:16px;font-weight:900;color:#fff;display:block}
.r-logo .s{font-size:7px;letter-spacing:1.5px;color:#ccc;display:block}
.r-store{text-align:center;font-size:17px;font-weight:900;margin:2px 0}
.r-phone{text-align:center;font-size:11px;direction:ltr;margin-bottom:2px}
.r-invline{text-align:center;font-size:9.5px;font-weight:900;margin:3px 0}
.r-cust{font-size:10px;font-weight:900;margin:2px 0;display:flex;gap:3px}
.r-cl{white-space:nowrap;color:#333}
.r-cv{font-weight:700;flex:1;word-break:break-word}
.r-table{width:100%;border-collapse:collapse;font-size:9.5px;margin:4px 0}
.r-table th,.r-table td{border:1px solid #000;padding:2px 3px;text-align:center;font-weight:900}
.r-table th{background:#000;color:#fff;font-size:9px;print-color-adjust:exact;-webkit-print-color-adjust:exact}
.r-table td:first-child,.r-table th:first-child{text-align:right;max-width:26mm;word-break:break-word}
.r-tot{background:#000;color:#fff;display:flex;justify-content:space-between;align-items:center;padding:6px 8px;margin:4px 0 2px;print-color-adjust:exact;-webkit-print-color-adjust:exact}
.r-tot *{color:#fff}
.r-tot .l{font-size:12px;font-weight:900}
.r-tot .a{font-size:18px;font-weight:900;direction:ltr}
.r-rem{background:#d4af37;display:flex;justify-content:space-between;align-items:center;padding:5px 8px;margin-bottom:4px;border:1.5px solid #a88520;print-color-adjust:exact;-webkit-print-color-adjust:exact}
.r-rem .l{font-size:11px;font-weight:900}
.r-rem .a{font-size:14px;font-weight:900;direction:ltr}
.r-paid{border:1px solid #000;text-align:center;padding:3px;font-size:9px;font-weight:900;margin:3px 0;background:#f0f0f0}
.r-qr-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin:5px 0}
.r-qr-cell{border:1px solid #000;padding:3px;text-align:center}
.r-qr-cell img{display:block;margin:0 auto;border:1px solid #eee}
.r-qr-lbl{font-size:8px;background:#000;color:#fff;display:block;padding:1px 0;margin-top:2px;print-color-adjust:exact;-webkit-print-color-adjust:exact}
.r-notice{border:1px solid #000;text-align:center;padding:4px 3px;margin:3px 0;font-size:8px;line-height:1.5;font-weight:700}
.r-ftr{border-top:2px solid #000;padding:3px 0;margin:3px 0}
.r-ftr-row{display:flex;align-items:center;gap:4px;font-size:9px;margin-bottom:2px;font-weight:900}

/* status badge */
.status-badge{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;border-radius:10px;
  font-size:14px;font-weight:900;margin-bottom:12px;
}
.status-badge.prepared{background:#f0fdf4;border:2px solid #86efac;color:#15803d}
.status-badge.pending{background:#fffbeb;border:2px solid #fcd34d;color:#92400e}

/* loader / error */
.loader-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:12px}
.loader-wrap .sp{width:44px;height:44px;border:4px solid #e5e7eb;border-top-color:#d4af37;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.err-box{background:#fff;border:2px solid #dc2626;border-radius:12px;padding:24px;text-align:center;color:#dc2626;max-width:400px;margin:40px auto;font-size:14px}
.err-box code{display:block;background:#fef2f2;padding:8px;border-radius:6px;font-size:11px;direction:ltr;margin-top:8px;color:#991b1b;text-align:left}

/* ──────────────────────────────────
   PRINT  (thermal 80mm only)
────────────────────────────────── */
@media print{
  html,body{background:#fff!important;padding:0!important;margin:0!important}
  .actions,.screen-left{display:none!important}
  .screen-wrap{padding:0!important;display:block!important}
  .screen-right{width:100%!important}
  .receipt{
    width:80mm!important;max-width:80mm!important;
    box-shadow:none!important;border:none!important;
    padding:2px 4px!important;border-radius:0!important;
  }
  @page{size:80mm auto;margin:0}
  .r-tot,.r-rem,.r-table th,.r-qr-lbl{print-color-adjust:exact;-webkit-print-color-adjust:exact}
}
</style>
</head>
<body>

<!-- Action bar -->
<div class="actions">
  <h2 id="inv-title">⏳ جاري التحميل...</h2>
  <button class="btn-act btn-print" onclick="window.print()"><i class="fas fa-print"></i> طباعة</button>
  <button class="btn-act btn-wa" id="wa-btn" onclick="shareWA()"><i class="fab fa-whatsapp"></i> واتساب</button>
  <button class="btn-act btn-back" onclick="history.back()"><i class="fas fa-arrow-right"></i> رجوع</button>
</div>

<div id="root">
  <div class="loader-wrap"><div class="sp"></div><span style="color:#555;font-family:Cairo,sans-serif">جاري تحميل الفاتورة...</span></div>
</div>

<script>
injectSharedCSS();

const params  = new URLSearchParams(location.search);
const orderId = params.get('id');
const invNum  = params.get('inv');

function pad(n){ return String(n).padStart(2,'0'); }
function fmtAr(d){ return d.toLocaleDateString('ar-EG',{year:'numeric',month:'numeric',day:'numeric'}); }
function fmtTime(d){ return `${pad(d.getHours())}:${pad(d.getMinutes())}`; }
function money(n){ return Number(n||0).toFixed(2); }

/* QR via external img (always works, no JS library needed) */
function qrSrc(text, sz){
  return `https://api.qrserver.com/v1/create-qr-code/?size=${sz}x${sz}&color=000000&bgcolor=ffffff&data=${encodeURIComponent(text)}&qzone=1&format=png`;
}

/* ── Load invoice after auth ready ── */
function loadInvoice(){
  /* requireAuth runs callback when user is signed in */
  requireAuth(async () => {
    try {
      let inv = null;

      /* 1. by Firestore document ID */
      if (orderId) {
        try {
          const d = await db.collection('pos_invoices').doc(orderId).get();
          if (d.exists) inv = { id: d.id, ...d.data() };
        } catch(e){}
      }

      /* 2. by invoiceNumber field */
      if (!inv) {
        const lookup = invNum || orderId;
        if (lookup) {
          try {
            const snap = await db.collection('pos_invoices').where('invoiceNumber','==',lookup).limit(1).get();
            if (!snap.empty) inv = { id: snap.docs[0].id, ...snap.docs[0].data() };
          } catch(e){}
        }
      }

      /* 3. online orders fallback */
      if (!inv && orderId) {
        try {
          const d = await db.collection('orders').doc(orderId).get();
          if (d.exists) inv = { id: d.id, ...d.data() };
        } catch(e){}
      }

      if (!inv) {
        document.getElementById('root').innerHTML =
          `<div class="err-box">❌ لم يتم العثور على الفاتورة<br>
          <code>id: ${orderId||'—'} | inv: ${invNum||'—'}</code></div>`;
        return;
      }

      /* Load store settings (best-effort) */
      let store = {};
      try {
        const sd = await db.collection('settings').doc('general').get();
        if (sd.exists) store = sd.data();
      } catch(e){}

      render(inv, store);
    } catch(e) {
      document.getElementById('root').innerHTML =
        `<div class="err-box">❌ خطأ: ${e.message}<br>
        <code>${e.code||'unknown'}</code></div>`;
    }
  });
}

/* ── Render ── */
function render(inv, store){
  const items = inv.items || inv.products || [];
  const raw   = inv.createdAt;
  const createdAt = raw && raw.toDate ? raw.toDate() : (raw ? new Date(raw) : new Date());

  const sub  = typeof inv.subtotal      ==='number' ? inv.subtotal      : items.reduce((s,i)=>s+(parseFloat(i.price)||0)*(i.qty||i.quantity||1),0);
  const disc = typeof inv.discountAmount==='number' ? inv.discountAmount : 0;
  const del  = typeof inv.deliveryFee   ==='number' ? inv.deliveryFee   : 0;
  const tot  = typeof inv.totalPrice    ==='number' ? inv.totalPrice    : (sub-disc+del);
  const paid = typeof inv.paidAmount    ==='number' ? inv.paidAmount    : tot;
  const rem  = Math.max(0, tot - paid);

  const cust   = inv.userName   || inv.customerName || inv.name || '—';
  const phone  = inv.phone      || inv.customerPhone || '';
  const invNo  = inv.invoiceNumber || inv.id || '—';
  const payLbl = inv.paymentMethod || inv.paymentType || 'نقدي';
  const notes  = inv.notes || '';
  const dlvDate= inv.deliveryDate || inv.dueDate || '';
  const isPrepared = inv.orderPrepared || false;

  const sName  = store.storeName   || store.name   || 'استوديو الزهراء';
  const sPhone = store.storePhone  || store.phone1 || '';
  const sPhone2= store.storePhone2 || store.phone2 || '';
  const sAddr  = store.storeAddress|| store.address|| '';
  const sInsta = store.instagram   || store.storeInstagram || '';

  /* title bar */
  document.getElementById('inv-title').textContent = `# ${invNo}`;
  if (phone){
    document.getElementById('wa-btn').style.display = 'flex';
    window._wa = { phone, invNo, cust, tot };
  }

  const trackURL = `${location.origin}/order-status.html?id=${encodeURIComponent(invNo)}`;
  const q1 = qrSrc(invNo, 80);
  const q2 = qrSrc(trackURL, 80);

  const itemsHTML = items.map(i=>{
    const q = i.qty||i.quantity||1;
    const p = parseFloat(i.price)||0;
    return `<tr>
      <td>${i.name||i.productName||'—'}</td>
      <td class="num">${q}</td>
      <td class="price">${money(p)}</td>
      <td class="price">${money(p*q)}</td>
    </tr>`;
  }).join('');

  const rItemsHTML = items.map(i=>{
    const q = i.qty||i.quantity||1;
    const p = parseFloat(i.price)||0;
    return `<tr>
      <td>${i.name||i.productName||'—'}</td>
      <td>${q}</td>
      <td>${money(p)}</td>
      <td>${money(p*q)}</td>
    </tr>`;
  }).join('');

  document.getElementById('root').innerHTML = `
  <div class="screen-wrap">

    <!-- ═══ LEFT: full invoice screen view ═══ -->
    <div class="screen-left">

      <!-- Status -->
      <div class="status-badge ${isPrepared?'prepared':'pending'}">
        ${isPrepared?'✅ جاهز للاستلام':'⏳ قيد التجهيز'}
      </div>

      <!-- Customer -->
      <div class="info-card">
        <h3><i class="fas fa-user"></i> بيانات العميل</h3>
        <div class="info-row"><span class="info-lbl">الاسم</span><span class="info-val">${cust}</span></div>
        ${phone?`<div class="info-row"><span class="info-lbl">الهاتف</span><span class="info-val" style="direction:ltr">${phone}</span></div>`:''}
        <div class="info-row"><span class="info-lbl">رقم الفاتورة</span><span class="info-val gold">${invNo}</span></div>
        <div class="info-row"><span class="info-lbl">التاريخ</span><span class="info-val">${fmtAr(createdAt)} — ${fmtTime(createdAt)}</span></div>
        <div class="info-row"><span class="info-lbl">طريقة الدفع</span><span class="info-val">${payLbl}</span></div>
        ${dlvDate?`<div class="info-row"><span class="info-lbl">📅 موعد الاستلام</span><span class="info-val red">${dlvDate}</span></div>`:''}
        ${notes?`<div class="info-row"><span class="info-lbl">📝 ملاحظات</span><span class="info-val">${notes}</span></div>`:''}
      </div>

      <!-- Products -->
      <div class="info-card">
        <h3><i class="fas fa-shopping-bag"></i> المنتجات (${items.length} صنف)</h3>
        <table class="prod-table">
          <thead><tr><th>المنتج</th><th style="text-align:center">الكمية</th><th style="text-align:left">السعر</th><th style="text-align:left">الإجمالي</th></tr></thead>
          <tbody>${itemsHTML}</tbody>
        </table>
      </div>

      <!-- Totals -->
      <div class="info-card">
        <h3><i class="fas fa-calculator"></i> الملخص المالي</h3>
        ${disc>0||del>0?`
          <div class="info-row"><span class="info-lbl">المجموع الفرعي</span><span class="info-val">${money(sub)} ج</span></div>
          ${disc>0?`<div class="info-row"><span class="info-lbl">خصم</span><span class="info-val red">- ${money(disc)} ج</span></div>`:''}
          ${del>0?`<div class="info-row"><span class="info-lbl">توصيل</span><span class="info-val">+ ${money(del)} ج</span></div>`:''}
        `:''}
        <div class="total-strip"><span class="lbl">الإجمالي</span><span class="amt">${money(tot)} ج</span></div>
        ${rem>0
          ? `<div class="rem-strip"><span class="lbl">المتبقي</span><span class="amt">${money(rem)} ج</span></div>
             <div class="info-row"><span class="info-lbl">المدفوع</span><span class="info-val green">${money(paid)} ج</span></div>`
          : `<div class="paid-strip">✅ تم السداد بالكامل — ${money(tot)} ج</div>`
        }
      </div>

      <!-- Action links -->
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        ${phone?`<a href="customer-profile.html?id=__phone__${encodeURIComponent(phone)}" style="background:#d4af37;color:#000;padding:10px 20px;border-radius:8px;text-decoration:none;font-weight:900;font-size:13px;display:flex;align-items:center;gap:6px"><i class="fas fa-user-circle"></i> ملف العميل</a>`:''}
        <a href="active-orders.html" style="background:#1a1a2e;color:#d4af37;padding:10px 20px;border-radius:8px;text-decoration:none;font-weight:900;font-size:13px;display:flex;align-items:center;gap:6px"><i class="fas fa-list"></i> الطلبات النشطة</a>
      </div>
    </div>

    <!-- ═══ RIGHT: thermal receipt preview ═══ -->
    <div class="screen-right">
      <div style="font-size:11px;font-weight:700;color:#6b7280;margin-bottom:6px;text-align:center">
        <i class="fas fa-receipt"></i> معاينة الإيصال الحراري (80mm)
      </div>
      <div class="receipt" id="rcp">

        <div class="r-logo-row">
          <div class="r-logo">
            <span class="z">Z</span>
            <span class="s">ZAHRAA STUDIO</span>
          </div>
        </div>

        <div class="r-store">${sName}</div>
        ${sPhone?`<div class="r-phone">${sPhone}${sPhone2?' | '+sPhone2:''}</div>`:''}
        <span class="r-sep"></span>

        <div class="r-invline"># ${invNo} &nbsp; ${fmtAr(createdAt)} &nbsp; ${fmtTime(createdAt)}</div>
        <span class="r-sep1"></span>

        <div class="r-cust"><span class="r-cl">الاسم:</span><span class="r-cv">${cust}</span></div>
        ${phone?`<div class="r-cust"><span class="r-cl">الهاتف:</span><span class="r-cv" style="direction:ltr">${phone}</span></div>`:''}
        <div class="r-cust"><span class="r-cl">طريقة الدفع:</span><span class="r-cv">${payLbl}</span></div>
        ${dlvDate?`<div class="r-cust"><span class="r-cl">📅 الاستلام:</span><span class="r-cv" style="font-weight:900">${dlvDate}</span></div>`:''}
        <span class="r-sep1"></span>

        <table class="r-table">
          <thead><tr><th>المنتج</th><th>كم</th><th>سعر</th><th>إجمالي</th></tr></thead>
          <tbody>${rItemsHTML}</tbody>
        </table>

        ${disc>0||del>0?`
        <div style="border-top:1px solid #ccc;padding:2px 0">
          ${disc>0?`<div style="display:flex;justify-content:space-between;font-size:9px;padding:1px 2px"><span>خصم:</span><span>- ${money(disc)} ج</span></div>`:''}
          ${del>0?`<div style="display:flex;justify-content:space-between;font-size:9px;padding:1px 2px"><span>توصيل:</span><span>+ ${money(del)} ج</span></div>`:''}
        </div>`:''}

        <div class="r-tot">
          <span class="l">الإجمالي</span>
          <span class="a">${money(tot)} ج</span>
        </div>

        ${rem>0
          ?`<div class="r-rem"><span class="l">المتبقي</span><span class="a">${money(rem)} ج</span></div>`
          :`<div class="r-paid">✅ تم السداد بالكامل</div>`
        }

        ${notes?`<div style="border:1px dashed #999;padding:3px;font-size:9px;margin:2px 0">📝 ${notes}</div>`:''}
        <span class="r-sep1"></span>

        <div class="r-qr-grid">
          <div class="r-qr-cell">
            <img src="${q1}" width="80" height="80" alt="QR" loading="lazy">
            <span class="r-qr-lbl">رقم الفاتورة</span>
          </div>
          <div class="r-qr-cell">
            <img src="${q2}" width="80" height="80" alt="QR" loading="lazy">
            <span class="r-qr-lbl">تتبع طلبك</span>
          </div>
        </div>

        <div class="r-notice">
          عميلنا العزيز 💛 نرجو استلام الطلب خلال <b>15 يوماً</b> من تاريخ التجهيز،<br>
          حيث لا يتحمل الاستوديو مسؤولية الطلبات غير المستلمة،<br>
          وقد تتعرض للتلف أو الفقدان. شكراً لثقتكم 💛
        </div>

        ${sAddr||sInsta?`
        <div class="r-ftr">
          ${sAddr?`<div class="r-ftr-row">📍 <span>${sAddr}</span></div>`:''}
          ${sInsta?`<div class="r-ftr-row"><i class="fab fa-instagram" style="font-size:10px"></i> <span>${sInsta}</span></div>`:''}
        </div>`:''}
        <span class="r-sep" style="margin-top:4px"></span>
      </div>
    </div>

  </div>`;
}

/* ── WhatsApp ── */
window.shareWA = function(){
  const { phone, invNo, cust, tot } = window._wa || {};
  const msg = `فاتورة رقم ${invNo}\nالعميل: ${cust}\nالإجمالي: ${money(tot)} ج\nتتبع طلبك: ${location.origin}/order-status.html?id=${encodeURIComponent(invNo)}`;
  const num = (phone||'').replace(/\D/g,'');
  const e = num.startsWith('0') ? '2'+num : num;
  window.open(`https://wa.me/${e}?text=${encodeURIComponent(msg)}`);
};
