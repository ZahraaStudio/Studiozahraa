<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=yes">
<title>ZAHRAA STUDIO | فاتورة</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode-generator.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{background:#d1d5db}
body{
  background:#d1d5db;min-height:100vh;
  display:flex;flex-direction:column;align-items:center;
  font-family:'Segoe UI','Cairo','Arial Black',sans-serif;
  padding:16px 8px 30px;
}

/* ── Action bar ── */
.actions{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;justify-content:center}
.actions button{
  padding:9px 20px;border:none;border-radius:8px;font-size:13px;
  font-family:'Cairo',sans-serif;font-weight:800;cursor:pointer;
  display:flex;align-items:center;gap:6px;transition:opacity .2s;
}
.actions button:hover{opacity:.82}
.btn-p{background:#111;color:#fff}
.btn-w{background:#25D366;color:#fff}
.btn-b{background:#64748b;color:#fff}

/* ── Loading / Error ── */
.loader{text-align:center;padding:50px 20px;color:#64748b;font-family:'Cairo',sans-serif;font-size:15px}
.err{background:#fff;border:2px solid #dc2626;border-radius:12px;
  padding:20px;text-align:center;color:#dc2626;font-family:'Cairo',sans-serif;
  max-width:360px;margin:20px auto;font-size:14px}

/* ═══════════════════════════════════
   RECEIPT — 80mm
═══════════════════════════════════ */
.receipt{
  width:80mm;max-width:80mm;background:#fff;color:#000;
  margin:0 auto;padding:4px 5px 6px;
  box-shadow:0 6px 24px rgba(0,0,0,.18);
  font-family:'Cairo','Segoe UI',sans-serif;
}
.receipt *{font-weight:900;color:#000;letter-spacing:-.3px}

/* separators */
.sep{display:block;width:100%;height:3px;background:#000;margin:5px 0}
.sep1{display:block;width:100%;height:1px;background:#000;margin:3px 0}
.sep-dash{display:block;width:100%;text-align:center;font-size:9px;letter-spacing:3px;margin:3px 0;color:#000}

/* header */
.hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.hdr-cam{font-size:26px}
.hdr-logo{font-size:13px;background:#000;color:#fff;padding:3px 9px;font-weight:900;letter-spacing:1px}
.hdr-logo *{color:#fff}
.s-name{text-align:center;font-size:21px;line-height:1.2;margin:2px 0}
.s-phones{text-align:center;font-size:12px;direction:ltr;margin-bottom:2px;letter-spacing:.5px}

/* info grid — two columns */
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px 6px;margin:5px 0}
.info-grid.three{grid-template-columns:1fr 1fr 1fr}
.info-cell{display:flex;flex-direction:column;gap:1px}
.info-cell .lbl{font-size:9px;color:#555;font-weight:900}
.info-cell .val{
  font-size:10px;background:#f7f7f7;border:1.5px solid #000;
  padding:2px 5px;word-break:break-all;font-weight:900;
}
.info-cell .val.hl{background:#000;color:#fff}
.info-cell .val.hl *{color:#fff}

/* products table */
.pt{width:100%;border-collapse:collapse;margin:5px 0;font-size:10px}
.pt th,.pt td{border:1.5px solid #000;padding:3px 2px;text-align:center;font-weight:900}
.pt th{background:#000;color:#fff;font-size:9px}
.pt th *,.pt th{color:#fff}
.pt td:first-child,.pt th:first-child{text-align:right;max-width:26mm;word-break:break-word}

/* subtotals */
.st-row{display:flex;justify-content:space-between;font-size:10px;padding:1px 0}

/* total box */
.tot{
  background:#000;color:#fff;margin:5px 0;padding:7px 10px;
  display:flex;justify-content:space-between;align-items:center;
  border:2.5px solid #000;
}
.tot *{color:#fff}
.tot-lbl{font-size:14px}
.tot-amt{font-size:22px;direction:ltr}

/* payment badges */
.pay-row{display:flex;gap:4px;margin:3px 0}
.pay-badge{flex:1;border:1.5px solid #000;text-align:center;font-size:9px;padding:2px 3px}
.pay-badge.done{background:#000;color:#fff}
.pay-badge.done *{color:#fff}

/* QR codes — side by side */
.qr-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:6px 0}
.qr-cell{border:1.5px solid #000;padding:4px 3px;text-align:center}
.qr-cell canvas{display:block;margin:0 auto;border:1px solid #ccc}
.qr-cell .ql{
  font-size:9px;background:#000;color:#fff;
  display:block;text-align:center;padding:2px 0;margin-top:3px;font-weight:900;
}
.qr-cell .ql *{color:#fff}

/* notice */
.notice{
  border:1.5px solid #000;text-align:center;
  padding:4px;margin:4px 0;font-size:9px;line-height:1.5;
}

/* footer */
.ftr{border-top:2px solid #000;border-bottom:2px solid #000;padding:4px 0;margin:4px 0 2px}
.ftr-row{display:flex;align-items:center;gap:5px;font-size:10px;margin-bottom:3px}
.ftr-row:last-child{margin-bottom:0}
.ftr-icon{width:20px;text-align:center;font-size:13px}
.ftr-badge{background:#000;color:#fff;padding:1px 5px;font-size:9px;display:inline-block;margin-left:3px}
.ftr-badge *{color:#fff}

/* print */
@media print{
  html,body{background:#fff;padding:0;margin:0}
  .actions{display:none!important}
  .receipt{width:80mm;box-shadow:none;padding:2px}
  .hdr-logo,.tot,.pt th,.pay-badge.done,.qr-cell .ql,.ftr-badge{print-color-adjust:exact;-webkit-print-color-adjust:exact}
}
</style>
</head>
<body>

<div class="actions" id="action-bar">
  <button class="btn-p" onclick="window.print()"><i class="fas fa-print"></i> طباعة</button>
  <button class="btn-w" id="wa-btn" style="display:none" onclick="shareWA()"><i class="fab fa-whatsapp"></i> واتساب</button>
  <button class="btn-b" onclick="history.back()"><i class="fas fa-arrow-right"></i> رجوع</button>
</div>

<div id="root"><div class="loader">⏳ جاري تحميل الفاتورة...</div></div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyCG6Yc0iH-rt-PaiRqL_V9Re1z49ZF3OMM",
  authDomain:"zahraa-store-f4c90.firebaseapp.com",
  projectId:"zahraa-store-f4c90",
  storageBucket:"zahraa-store-f4c90.firebasestorage.app",
  messagingSenderId:"885722081307",
  appId:"1:885722081307:web:7c91e0f8b0ea9b8b4df0be"
},'inv-app');
const db = firebase.firestore();

const params = new URLSearchParams(location.search);
const orderId = params.get('id');
const invNum  = params.get('inv');
const isPOS   = params.get('pos')==='1';

/* ── helpers ── */
function pad(n){return String(n).padStart(2,'0')}
function fmtDate(d){return`${pad(d.getDate())}-${pad(d.getMonth()+1)}-${d.getFullYear()}`}
function fmtTime(d){return`${pad(d.getHours())}:${pad(d.getMinutes())}`}

/* ── Draw QR on a canvas element by ID ── */
function drawQR(canvasId, text, sz) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  // Try error correction L → M → H
  for (const lvl of ['L','M','Q']) {
    try {
      const qr = qrcode(0, lvl);
      qr.addData(encodeURIComponent(text).length > 200 ? text.slice(0, 180) : text);
      qr.make();
      const mc = qr.getModuleCount();
      const cs = sz / mc;
      canvas.width = sz; canvas.height = sz;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#fff'; ctx.fillRect(0,0,sz,sz);
      ctx.fillStyle = '#000';
      for (let r=0;r<mc;r++) for (let c=0;c<mc;c++)
        if (qr.isDark(r,c)) ctx.fillRect(c*cs, r*cs, cs, cs);
      return; // success
    } catch(e) { /* try next level */ }
  }
  // ultimate fallback — show text
  const ctx = canvas.getContext('2d');
  ctx.fillStyle='#fff'; ctx.fillRect(0,0,sz,sz);
  ctx.fillStyle='#000'; ctx.font=`7px monospace`;
  ctx.fillText('QR', 2, 14);
}

/* ── Render receipt ── */
function renderReceipt(inv, store) {
  const root = document.getElementById('root');

  const items = inv.items || inv.products || [];
  const raw = inv.createdAt;
  const createdAt = raw && raw.toDate ? raw.toDate() : (raw ? new Date(raw) : new Date());
  const dateStr = fmtDate(createdAt);
  const timeStr = fmtTime(createdAt);

  const sub  = typeof inv.subtotal === 'number'      ? inv.subtotal      : items.reduce((s,i)=>s+(i.price||0)*(i.qty||i.quantity||1),0);
  const disc = typeof inv.discountAmount === 'number' ? inv.discountAmount : 0;
  const del  = typeof inv.deliveryFee === 'number'    ? inv.deliveryFee   : 0;
  const tot  = typeof inv.totalPrice === 'number'     ? inv.totalPrice    : (sub-disc+del);
  const paid = typeof inv.paidAmount === 'number'     ? inv.paidAmount    : tot;
  const rem  = Math.max(0, tot - paid);

  const cust   = inv.userName || inv.customerName || inv.name || 'عميل';
  const phone  = inv.phone || inv.customerPhone || '';
  const invNo  = inv.invoiceNumber || inv.id || '—';
  const payLbl = inv.paymentMethod || inv.paymentType || 'نقدي';
  const notes  = inv.notes || '';
  const dlvDate= inv.deliveryDate || inv.dueDate || '';

  const sName  = store.storeName  || store.name     || 'استوديو الزهراء';
  const sPhone = store.storePhone || store.phone1   || '';
  const sPhone2= store.storePhone2|| store.phone2   || '';
  const sAddr  = store.storeAddress||store.address  || '';
  const sInsta = store.instagram  || store.storeInstagram || '';
  const sEmail = store.email      || store.storeEmail     || '';

  // WhatsApp
  if (phone) {
    const btn = document.getElementById('wa-btn');
    btn.style.display = 'flex';
    window._wa = { phone, invNo, cust, tot };
  }

  // Build receipt HTML
  root.innerHTML = `
  <div class="receipt" id="rcp">

    <!-- HEADER -->
    <div class="hdr">
      <span class="hdr-cam"><i class="fas fa-camera-retro"></i></span>
      <span class="hdr-logo">ZAHRAA STUDIO</span>
    </div>
    <div class="s-name">${sName}</div>
    ${sPhone ? `<div class="s-phones">${sPhone}${sPhone2?' &nbsp;|&nbsp; '+sPhone2:''}</div>` : ''}
    <span class="sep"></span>

    <!-- INFO GRID -->
    <div class="info-grid">
      <div class="info-cell">
        <span class="lbl">العميل</span>
        <span class="val">${cust}</span>
      </div>
      <div class="info-cell">
        <span class="lbl">رقم الفاتورة</span>
        <span class="val">${invNo}</span>
      </div>
      <div class="info-cell">
        <span class="lbl">التاريخ</span>
        <span class="val">${dateStr}</span>
      </div>
      <div class="info-cell">
        <span class="lbl">الوقت</span>
        <span class="val">${timeStr}</span>
      </div>
      <div class="info-cell">
        <span class="lbl">طريقة الدفع</span>
        <span class="val">${payLbl}</span>
      </div>
      ${dlvDate ? `<div class="info-cell"><span class="lbl">موعد الاستلام</span><span class="val hl">${dlvDate}</span></div>` : ''}
      ${phone ? `<div class="info-cell"><span class="lbl">الهاتف</span><span class="val">${phone}</span></div>` : ''}
    </div>
    <span class="sep"></span>

    <!-- PRODUCTS TABLE -->
    <table class="pt">
      <thead><tr><th>المنتج</th><th>كم</th><th>سعر</th><th>إجمالي</th></tr></thead>
      <tbody>
        ${items.map(i=>{
          const q=i.qty||i.quantity||1;
          const p=parseFloat(i.price)||0;
          return `<tr>
            <td>${i.name||i.productName||'—'}</td>
            <td>${q}</td>
            <td>${p.toFixed(2)}</td>
            <td>${(p*q).toFixed(2)}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>

    <!-- SUBTOTALS -->
    ${disc>0||del>0 ? `
    <div style="padding:2px 0;border-top:1px solid #ccc">
      <div class="st-row"><span>المجموع الفرعي:</span><span>${sub.toFixed(2)} ج</span></div>
      ${disc>0?`<div class="st-row"><span>خصم:</span><span style="color:#000">- ${disc.toFixed(2)} ج</span></div>`:''}
      ${del>0?`<div class="st-row"><span>توصيل:</span><span>+ ${del.toFixed(2)} ج</span></div>`:''}
    </div>
    ` : ''}

    <!-- TOTAL BOX -->
    <div class="tot">
      <span class="tot-lbl">الإجمالي</span>
      <span class="tot-amt">${tot.toFixed(2)} ج</span>
    </div>

    <!-- PAYMENT STATUS -->
    <div class="pay-row">
      <div class="pay-badge ${rem<=0?'done':''}">${rem<=0?'✅ تم السداد':'💰 '+payLbl}</div>
      ${paid<tot?`<div class="pay-badge">مدفوع: ${paid.toFixed(2)} ج</div>`:''}
      ${rem>0?`<div class="pay-badge done">متبقي: ${rem.toFixed(2)} ج</div>`:''}
    </div>

    ${notes ? `<div class="notice">📝 ${notes}</div>` : ''}
    <span class="sep1"></span>

    <!-- QR CODES — SIDE BY SIDE -->
    <div class="qr-grid">
      <div class="qr-cell">
        <canvas id="qr1" width="70" height="70"></canvas>
        <span class="ql">رقم الفاتورة</span>
      </div>
      <div class="qr-cell">
        <canvas id="qr2" width="70" height="70"></canvas>
        <span class="ql">تتبع الطلب</span>
      </div>
    </div>

    <!-- NOTICE -->
    <div class="notice">
      عميلنا العزيز: يرجى الاحتفاظ بالفاتورة لأي استفسار.<br>نسعد بخدمتكم دائماً 🌸
    </div>

    <!-- FOOTER -->
    ${sAddr||sPhone||sInsta ? `
    <div class="ftr">
      ${sAddr?`<div class="ftr-row"><span class="ftr-icon"><i class="fas fa-map-marker-alt"></i></span><span>${sAddr}</span></div>`:''}
      ${sPhone?`<div class="ftr-row"><span class="ftr-icon"><i class="fas fa-phone-alt"></i></span><span><span class="ftr-badge">${sPhone}</span>${sPhone2?`<span class="ftr-badge">${sPhone2}</span>`:''}</span></div>`:''}
      ${sInsta?`<div class="ftr-row"><span class="ftr-icon"><i class="fab fa-instagram"></i></span><span>${sInsta}${sEmail?' | '+sEmail:''}</span></div>`:''}
    </div>
    ` : ''}
    <span class="sep" style="margin-top:3px"></span>

  </div>`;

  // Draw QR codes after DOM is painted
  setTimeout(() => {
    const origin = location.origin;
    const trackURL = `${origin}/order-status.html?id=${invNo}`;
    drawQR('qr1', invNo, 70);              // short text → reliable
    drawQR('qr2', trackURL, 70);           // tracking URL
  }, 80);
}

/* ── WhatsApp share ── */
window.shareWA = function(){
  const { phone, invNo, cust, tot } = window._wa || {};
  const msg = `فاتورة رقم ${invNo}\nالعميل: ${cust}\nالإجمالي: ${tot?.toFixed(2)} ج\nتتبع: ${location.origin}/order-status.html?id=${invNo}`;
  const num = (phone||'').replace(/\D/g,'');
  const e = num.startsWith('0') ? '2'+num : num;
  window.open(`https://wa.me/${e}?text=${encodeURIComponent(msg)}`);
};

/* ── Load invoice ── */
async function loadInvoice() {
  const root = document.getElementById('root');
  try {
    let inv = null;

    if (isPOS || invNum) {
      const val = invNum || orderId;
      const snap = await db.collection('pos_invoices').where('invoiceNumber','==',val).limit(1).get();
      if (!snap.empty) inv = { id: snap.docs[0].id, ...snap.docs[0].data() };
    }

    if (!inv && orderId) {
      // Try pos_invoices by doc ID
      try {
        const d = await db.collection('pos_invoices').doc(orderId).get();
        if (d.exists) inv = { id: d.id, ...d.data() };
      } catch(e) {}
      // Try online orders
      if (!inv) {
        try {
          const d = await db.collection('orders').doc(orderId).get();
          if (d.exists) inv = { id: d.id, ...d.data() };
        } catch(e) {}
      }
    }

    if (!inv) {
      root.innerHTML = `<div class="err">❌ الفاتورة غير موجودة<br><small>${orderId||invNum||'—'}</small></div>`;
      return;
    }

    // Load store settings
    let store = {};
    try {
      const sd = await db.collection('settings').doc('general').get();
      if (sd.exists) store = sd.data();
    } catch(e) {}

    renderReceipt(inv, store);
  } catch(e) {
    root.innerHTML = `<div class="err">❌ خطأ: ${e.message}</div>`;
  }
}

loadInvoice();
</script>
</body>
</html>
