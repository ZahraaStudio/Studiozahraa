<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=yes">
<title>ZAHRAA STUDIO | فاتورة</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode-generator.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{background:#c8c8c8}
body{
  background:#c8c8c8;min-height:100vh;
  display:flex;flex-direction:column;align-items:center;
  font-family:'Cairo','Segoe UI',sans-serif;
  padding:16px 8px 40px;
}

/* Action bar */
.actions{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;justify-content:center}
.actions button{
  padding:9px 20px;border:none;border-radius:8px;font-size:13px;
  font-family:'Cairo',sans-serif;font-weight:800;cursor:pointer;
  display:flex;align-items:center;gap:6px;transition:opacity .2s;
}
.actions button:hover{opacity:.82}
.btn-p{background:#111;color:#fff}
.btn-w{background:#25D366;color:#fff}
.btn-b{background:#64748b;color:#fff}

/* Loading / Error */
.loader{text-align:center;padding:50px 20px;color:#555;font-family:'Cairo',sans-serif;font-size:15px}
.err{background:#fff;border:2px solid #dc2626;border-radius:12px;
  padding:20px;text-align:center;color:#dc2626;font-family:'Cairo',sans-serif;
  max-width:360px;margin:20px auto;font-size:14px}

/* ═══════════════════════════════
   RECEIPT — 80mm thermal
═══════════════════════════════ */
.receipt{
  width:80mm;max-width:80mm;background:#fff;color:#000;
  margin:0 auto;padding:5px 6px 8px;
  box-shadow:0 8px 30px rgba(0,0,0,.25);
  font-family:'Cairo','Segoe UI',sans-serif;
}
.receipt *{color:#000}

/* separators */
.sep {display:block;width:100%;height:3px;background:#000;margin:5px 0}
.sep1{display:block;width:100%;height:1px;background:#000;margin:3px 0}
.sep-dot{display:block;text-align:center;font-size:9px;letter-spacing:3px;margin:2px 0}

/* ── Header logo area ── */
.logo-row{display:flex;justify-content:flex-end;margin-bottom:4px}
.logo-box{
  background:#1a1a1a;color:#fff;
  padding:4px 10px;text-align:center;
  font-weight:900;line-height:1.1;
}
.logo-z{font-size:18px;font-weight:900;color:#fff;display:block}
.logo-text{font-size:8px;letter-spacing:2px;color:#ccc;display:block}

/* ── Store name & phone ── */
.s-name{text-align:center;font-size:20px;font-weight:900;line-height:1.2;margin:2px 0}
.s-phone{text-align:center;font-size:13px;font-weight:900;direction:ltr;margin-bottom:2px;letter-spacing:.5px}

/* ── Invoice header line ── */
.inv-line{
  text-align:center;font-size:10.5px;font-weight:900;
  margin:4px 0;letter-spacing:.2px;
}

/* ── Customer info rows ── */
.cust-row{font-size:11px;font-weight:900;margin:2px 0;display:flex;gap:4px}
.cust-row .cl{color:#333;white-space:nowrap}
.cust-row .cv{font-weight:700;flex:1}

/* ── Products table ── */
.pt{width:100%;border-collapse:collapse;margin:5px 0;font-size:10px}
.pt th,.pt td{border:1.5px solid #000;padding:3px 3px;text-align:center;font-weight:900}
.pt th{background:#000;color:#fff;font-size:9.5px;print-color-adjust:exact;-webkit-print-color-adjust:exact}
.pt td:first-child,.pt th:first-child{text-align:right;max-width:28mm;word-break:break-word;padding-right:4px}

/* subtotals */
.st-row{display:flex;justify-content:space-between;font-size:10px;padding:1px 2px;font-weight:900}

/* ── Total box (black) ── */
.tot-box{
  background:#000;color:#fff;margin:5px 0 3px;padding:8px 12px;
  display:flex;justify-content:space-between;align-items:center;
  border:2.5px solid #000;
  print-color-adjust:exact;-webkit-print-color-adjust:exact;
}
.tot-box *{color:#fff}
.tot-lbl{font-size:15px;font-weight:900}
.tot-amt{font-size:23px;font-weight:900;direction:ltr}

/* ── Remaining box (gold) ── */
.rem-box{
  background:#d4af37;color:#000;margin:3px 0 5px;padding:6px 12px;
  display:flex;justify-content:space-between;align-items:center;
  border:2px solid #a88520;
  print-color-adjust:exact;-webkit-print-color-adjust:exact;
}
.rem-lbl{font-size:13px;font-weight:900}
.rem-amt{font-size:18px;font-weight:900;direction:ltr}

/* ── Paid badge ── */
.paid-badge{
  border:1.5px solid #000;text-align:center;padding:3px;
  font-size:10px;font-weight:900;margin:3px 0;background:#f0f0f0;
}

/* ── QR grid ── */
.qr-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:5px 0}
.qr-cell{border:1.5px solid #000;padding:4px 3px;text-align:center}
.qr-cell canvas{display:block;margin:0 auto}
.qr-lbl{
  font-size:9px;background:#000;color:#fff;display:block;
  text-align:center;padding:2px 0;margin-top:3px;font-weight:900;
  print-color-adjust:exact;-webkit-print-color-adjust:exact;
}

/* ── Notice ── */
.notice{
  border:1.5px solid #000;text-align:center;
  padding:5px 4px;margin:4px 0;font-size:9px;line-height:1.6;font-weight:700;
}

/* ── Footer ── */
.ftr{border-top:2px solid #000;padding:4px 0;margin:4px 0 2px}
.ftr-row{display:flex;align-items:center;gap:5px;font-size:10px;margin-bottom:2px;font-weight:900}
.ftr-row:last-child{margin-bottom:0}
.ftr-icon{width:18px;text-align:center;font-size:12px}

/* ── Notes ── */
.notes-box{background:#f9f9f9;border:1px solid #ccc;padding:3px 6px;font-size:9px;margin:3px 0;font-weight:700}

/* PRINT */
@media print{
  html,body{background:#fff;padding:0;margin:0}
  .actions{display:none!important}
  .receipt{width:80mm;box-shadow:none;padding:2px 4px}
  @page{size:80mm auto;margin:0}
}
</style>
</head>
<body>

<div class="actions" id="action-bar">
  <button class="btn-p" onclick="window.print()"><i class="fas fa-print"></i> طباعة</button>
  <button class="btn-w" id="wa-btn" style="display:none" onclick="shareWA()"><i class="fab fa-whatsapp"></i> واتساب</button>
  <button class="btn-b" onclick="history.back()"><i class="fas fa-arrow-right"></i> رجوع</button>
</div>

<div id="root"><div class="loader">⏳ جاري تحميل الفاتورة...</div></div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyCG6Yc0iH-rt-PaiRqL_V9Re1z49ZF3OMM",
  authDomain:"zahraa-store-f4c90.firebaseapp.com",
  projectId:"zahraa-store-f4c90",
  storageBucket:"zahraa-store-f4c90.firebasestorage.app",
  messagingSenderId:"885722081307",
  appId:"1:885722081307:web:7c91e0f8b0ea9b8b4df0be"
},'inv-app');
const db = firebase.firestore();

const params  = new URLSearchParams(location.search);
const orderId = params.get('id');
const invNum  = params.get('inv');
const isPOS   = params.get('pos') === '1';

/* helpers */
function pad(n){ return String(n).padStart(2,'0'); }
function fmtDateAr(d){
  return d.toLocaleDateString('ar-EG',{year:'numeric',month:'numeric',day:'numeric'});
}
function fmtTime(d){ return `${pad(d.getHours())}:${pad(d.getMinutes())}`; }

/* Draw QR on canvas */
function drawQR(canvasId, text, sz){
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  for (const lvl of ['L','M','Q']){
    try{
      const qr = qrcode(0, lvl);
      qr.addData(text.length > 200 ? text.slice(0,180) : text);
      qr.make();
      const mc = qr.getModuleCount(), cs = sz/mc;
      canvas.width = sz; canvas.height = sz;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle='#fff'; ctx.fillRect(0,0,sz,sz);
      ctx.fillStyle='#000';
      for(let r=0;r<mc;r++) for(let c=0;c<mc;c++)
        if(qr.isDark(r,c)) ctx.fillRect(c*cs,r*cs,cs,cs);
      return;
    } catch(e){}
  }
}

/* Render receipt */
function renderReceipt(inv, store){
  const root  = document.getElementById('root');
  const items = inv.items || inv.products || [];
  const raw   = inv.createdAt;
  const createdAt = raw && raw.toDate ? raw.toDate() : (raw ? new Date(raw) : new Date());

  const sub  = typeof inv.subtotal       === 'number' ? inv.subtotal       : items.reduce((s,i)=>s+(parseFloat(i.price)||0)*(i.qty||i.quantity||1),0);
  const disc = typeof inv.discountAmount  === 'number' ? inv.discountAmount  : 0;
  const del  = typeof inv.deliveryFee    === 'number' ? inv.deliveryFee    : 0;
  const tot  = typeof inv.totalPrice     === 'number' ? inv.totalPrice     : (sub - disc + del);
  const paid = typeof inv.paidAmount     === 'number' ? inv.paidAmount     : tot;
  const rem  = Math.max(0, tot - paid);

  const cust   = inv.userName   || inv.customerName || inv.name || 'عميل';
  const phone  = inv.phone      || inv.customerPhone || '';
  const invNo  = inv.invoiceNumber || inv.id || '—';
  const payLbl = inv.paymentMethod || inv.paymentType || 'نقدي';
  const notes  = inv.notes || '';
  const dlvDate= inv.deliveryDate || inv.dueDate || '';

  const sName  = store.storeName   || store.name            || 'استوديو الزهراء';
  const sPhone = store.storePhone  || store.phone1          || '';
  const sPhone2= store.storePhone2 || store.phone2          || '';
  const sAddr  = store.storeAddress|| store.address         || '';
  const sInsta = store.instagram   || store.storeInstagram  || '';
  const sEmail = store.email       || store.storeEmail      || '';

  if(phone){
    document.getElementById('wa-btn').style.display = 'flex';
    window._wa = { phone, invNo, cust, tot };
  }

  const origin   = location.origin;
  const trackURL = `${origin}/order-status.html?id=${encodeURIComponent(invNo)}`;

  root.innerHTML = `
  <div class="receipt" id="rcp">

    <!-- LOGO -->
    <div class="logo-row">
      <div class="logo-box">
        <span class="logo-z">Z</span>
        <span class="logo-text">ZAHRAA STUDIO</span>
      </div>
    </div>

    <!-- STORE NAME & PHONE -->
    <div class="s-name">${sName}</div>
    ${sPhone ? `<div class="s-phone">${sPhone}${sPhone2 ? ' | ' + sPhone2 : ''}</div>` : ''}
    <span class="sep"></span>

    <!-- INVOICE LINE: # + date + time -->
    <div class="inv-line"># ${invNo} &nbsp; ${fmtDateAr(createdAt)} &nbsp; ${fmtTime(createdAt)}</div>
    <span class="sep1"></span>

    <!-- CUSTOMER INFO -->
    <div class="cust-row"><span class="cl">الاسم:</span><span class="cv">${cust}</span></div>
    ${phone ? `<div class="cust-row"><span class="cl">الهاتف:</span><span class="cv" style="direction:ltr">${phone}</span></div>` : ''}
    <div class="cust-row"><span class="cl">طريقة الدفع:</span><span class="cv">${payLbl}</span></div>
    ${dlvDate ? `<div class="cust-row"><span class="cl">📅 موعد الاستلام:</span><span class="cv" style="color:#000;font-weight:900">${dlvDate}</span></div>` : ''}
    <span class="sep1"></span>

    <!-- PRODUCTS TABLE -->
    <table class="pt">
      <thead>
        <tr><th>المنتج</th><th>الكمية</th><th>السعر</th><th>الإجمالي</th></tr>
      </thead>
      <tbody>
        ${items.map(i=>{
          const q = i.qty || i.quantity || 1;
          const p = parseFloat(i.price) || 0;
          return `<tr>
            <td>${i.name || i.productName || '—'}</td>
            <td>${q}</td>
            <td>${p.toFixed(2)}</td>
            <td>${(p*q).toFixed(2)}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>

    <!-- SUBTOTALS if needed -->
    ${disc > 0 || del > 0 ? `
    <div style="padding:2px 2px;border-top:1px solid #ccc">
      <div class="st-row"><span>المجموع:</span><span>${sub.toFixed(2)} ج</span></div>
      ${disc > 0 ? `<div class="st-row"><span>خصم:</span><span>- ${disc.toFixed(2)} ج</span></div>` : ''}
      ${del  > 0 ? `<div class="st-row"><span>توصيل:</span><span>+ ${del.toFixed(2)} ج</span></div>` : ''}
    </div>` : ''}

    <!-- TOTAL BOX (black) -->
    <div class="tot-box">
      <span class="tot-lbl">الإجمالي</span>
      <span class="tot-amt">${tot.toFixed(2)} ج</span>
    </div>

    <!-- REMAINING BOX (gold) — only if there's remaining -->
    ${rem > 0 ? `
    <div class="rem-box">
      <span class="rem-lbl">المتبقي</span>
      <span class="rem-amt">${rem.toFixed(2)} ج</span>
    </div>` : `
    <div class="paid-badge">✅ تم السداد بالكامل</div>`}

    ${notes ? `<div class="notes-box">📝 ${notes}</div>` : ''}
    <span class="sep1"></span>

    <!-- QR CODES — side by side -->
    <div class="qr-grid">
      <div class="qr-cell">
        <canvas id="qr1" width="75" height="75"></canvas>
        <span class="qr-lbl">رقم الفاتورة</span>
      </div>
      <div class="qr-cell">
        <canvas id="qr2" width="75" height="75"></canvas>
        <span class="qr-lbl">تتبع طلبك</span>
      </div>
    </div>

    <!-- NOTICE -->
    <div class="notice">
      عميلنا العزيز 💛 نرجو استلام الطلب خلال <b>15 يوماً</b> من تاريخ التجهيز،<br>
      حيث لا يتحمل الاستوديو مسؤولية الطلبات غير المستلمة بعد هذه المدة،<br>
      وقد تتعرض للتلف أو الفقدان. شكراً لثقتكم 💛
    </div>

    <!-- FOOTER -->
    ${sAddr || sPhone || sInsta ? `
    <div class="ftr">
      ${sAddr  ? `<div class="ftr-row"><span class="ftr-icon">📍</span><span>${sAddr}</span></div>` : ''}
      ${sPhone ? `<div class="ftr-row"><span class="ftr-icon"><i class="fas fa-phone-alt"></i></span><span>${sPhone}${sPhone2 ? ' | ' + sPhone2 : ''}</span></div>` : ''}
      ${sInsta ? `<div class="ftr-row"><span class="ftr-icon"><i class="fab fa-instagram"></i></span><span>${sInsta}${sEmail ? ' | ' + sEmail : ''}</span></div>` : ''}
    </div>` : ''}

    <span class="sep" style="margin-top:4px"></span>
  </div>`;

  /* Draw QR after DOM paint */
  setTimeout(() => {
    drawQR('qr1', invNo, 75);
    drawQR('qr2', trackURL, 75);
  }, 80);
}

/* WhatsApp share */
window.shareWA = function(){
  const { phone, invNo, cust, tot } = window._wa || {};
  const msg = `فاتورة رقم ${invNo}\nالعميل: ${cust}\nالإجمالي: ${(tot||0).toFixed(2)} ج\nتتبع طلبك: ${location.origin}/order-status.html?id=${encodeURIComponent(invNo)}`;
  const num = (phone||'').replace(/\D/g,'');
  const e = num.startsWith('0') ? '2' + num : num;
  window.open(`https://wa.me/${e}?text=${encodeURIComponent(msg)}`);
};

/* Load invoice */
async function loadInvoice(){
  const root = document.getElementById('root');
  try {
    let inv = null;

    if (isPOS || invNum){
      const val  = invNum || orderId;
      const snap = await db.collection('pos_invoices').where('invoiceNumber','==',val).limit(1).get();
      if (!snap.empty) inv = { id: snap.docs[0].id, ...snap.docs[0].data() };
    }

    if (!inv && orderId){
      /* try by doc ID */
      try{
        const d = await db.collection('pos_invoices').doc(orderId).get();
        if (d.exists) inv = { id: d.id, ...d.data() };
      } catch(e){}
      /* try by invoiceNumber */
      if (!inv){
        try{
          const snap = await db.collection('pos_invoices').where('invoiceNumber','==',orderId).limit(1).get();
          if (!snap.empty) inv = { id: snap.docs[0].id, ...snap.docs[0].data() };
        } catch(e){}
      }
      /* try online orders */
      if (!inv){
        try{
          const d = await db.collection('orders').doc(orderId).get();
          if (d.exists) inv = { id: d.id, ...d.data() };
        } catch(e){}
      }
    }

    if (!inv){
      root.innerHTML = `<div class="err">❌ الفاتورة غير موجودة<br><small>${orderId || invNum || '—'}</small></div>`;
      return;
    }

    /* Load store settings */
    let store = {};
    try{
      const sd = await db.collection('settings').doc('general').get();
      if (sd.exists) store = sd.data();
    } catch(e){}

    renderReceipt(inv, store);
  } catch(e){
    root.innerHTML = `<div class="err">❌ خطأ: ${e.message}<br><small>تأكد من إعدادات Firestore Security Rules للسماح بالقراءة</small></div>`;
  }
}

loadInvoice();
</script>
</body>
</html>
