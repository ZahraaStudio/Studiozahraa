<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>فاتورة — كاشير الزهراء</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Cairo',sans-serif;background:#1a1a1a;color:#fff;direction:rtl;min-height:100vh;padding:20px}

/* Action Bar */
.action-bar{display:flex;gap:10px;margin-bottom:20px;justify-content:center;flex-wrap:wrap}
.action-bar button{padding:10px 20px;border-radius:10px;font-family:Cairo,sans-serif;font-weight:700;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px;border:none;transition:all .2s}
.btn-print{background:#d4af37;color:#000}
.btn-print:hover{background:#f0c94e}
.btn-wa{background:#25D366;color:#fff}
.btn-wa:hover{background:#128C7E}
.btn-share{background:#1a1a1a;color:#d4af37;border:1px solid #d4af37}
.btn-share:hover{background:rgba(212,175,55,.1)}
.btn-back{background:#333;color:#aaa;border:1px solid #444}
.btn-back:hover{background:#444;color:#fff}

/* Invoice Paper */
.invoice-wrap{max-width:600px;margin:0 auto;background:#fff;color:#000;border-radius:16px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.inv-header{background:linear-gradient(135deg,#1a1a1a,#333);color:#fff;padding:24px;text-align:center;position:relative}
.inv-header .logo{width:80px;height:80px;object-fit:contain;border-radius:12px;margin-bottom:10px;border:2px solid rgba(212,175,55,.4)}
.inv-header h1{font-size:22px;font-weight:900;color:#d4af37;letter-spacing:1px}
.inv-header .sub{font-size:12px;color:#aaa;margin-top:4px}
.inv-meta{display:grid;grid-template-columns:1fr 1fr;gap:0;border-bottom:2px solid #eee}
.inv-meta-cell{padding:12px 16px}
.inv-meta-cell:first-child{border-left:1px solid #eee}
.inv-meta .lbl{font-size:10px;color:#888;font-weight:700;text-transform:uppercase;margin-bottom:3px}
.inv-meta .val{font-size:14px;font-weight:900;color:#1a1a1a}
.inv-meta .val.gold{color:#b8941f}
.inv-customer{background:#f9f9f6;padding:14px 16px;border-bottom:1px solid #eee}
.inv-customer .section-title{font-size:10px;font-weight:900;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;display:flex;align-items:center;gap:5px}
.inv-customer .name{font-size:15px;font-weight:900;color:#1a1a1a}
.inv-customer .phone{font-size:12px;color:#666;direction:ltr;display:inline-block;margin-top:3px}
.inv-customer .addr{font-size:11px;color:#888;margin-top:2px}
.inv-items{padding:16px}
.items-table{width:100%;border-collapse:collapse;font-size:12px}
.items-table th{background:#f5f5f5;padding:8px 10px;text-align:right;border-bottom:2px solid #e0e0e0;font-weight:900;color:#555;font-size:11px}
.items-table td{padding:10px;border-bottom:1px solid #f0f0f0;color:#1a1a1a;font-weight:700}
.items-table tr:last-child td{border-bottom:none}
.items-table .num{text-align:center}
.items-table .amt{text-align:left;direction:ltr;font-family:monospace;font-weight:900}
.items-table .disc{color:#ef4444;font-size:11px}
.totals{padding:16px;background:#fafafa;border-top:1px solid #e0e0e0}
.total-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:13px}
.total-row .l{color:#666;font-weight:700}
.total-row .r{font-weight:900;direction:ltr;text-align:left}
.total-row.disc .r{color:#ef4444}
.total-row.delivery .r{color:#3b82f6}
.total-final{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:#1a1a1a;color:#fff;margin-top:8px;border-radius:0}
.total-final .l{font-size:14px;font-weight:900}
.total-final .r{font-size:22px;font-weight:900;color:#d4af37;direction:ltr;font-family:monospace}
.remaining-bar{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;background:#d4af37;color:#000}
.remaining-bar .l{font-size:12px;font-weight:900}
.remaining-bar .r{font-size:18px;font-weight:900;direction:ltr;font-family:monospace}
.paid-stamp{text-align:center;padding:10px;background:rgba(34,197,94,.1);border-top:2px solid #22c55e;font-size:13px;font-weight:900;color:#16a34a}
.payment-method{padding:10px 16px;background:#f0f9ff;border-top:1px solid #bae6fd;display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;color:#0369a1}
.notes-section{padding:12px 16px;background:#fffef0;border-top:1px solid #fde68a}
.notes-section .lbl{font-size:10px;font-weight:900;color:#92400e;text-transform:uppercase;margin-bottom:4px}
.notes-section .txt{font-size:12px;color:#78350f;font-weight:700}
.barcode-section{padding:16px;text-align:center;border-top:1px solid #eee;background:#fff}
.barcode-section .bc-lbl{font-size:10px;color:#888;font-weight:700;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
#barcode-svg{max-width:280px;width:100%;height:60px}
.barcode-num{font-size:11px;color:#aaa;margin-top:6px;font-family:monospace;letter-spacing:2px}
.inv-footer{padding:14px 16px;text-align:center;background:#1a1a1a;color:#888;font-size:11px}
.inv-footer .footer-txt{color:#666;margin-bottom:4px}
.inv-footer .store-info{color:#d4af37;font-weight:700;font-size:12px}
.inv-status-badge{display:inline-block;padding:4px 14px;border-radius:20px;font-size:11px;font-weight:900;margin-top:6px}
.status-prepared{background:rgba(34,197,94,.15);color:#16a34a;border:1px solid rgba(34,197,94,.3)}
.status-pending{background:rgba(245,158,11,.15);color:#b45309;border:1px solid rgba(245,158,11,.3)}
.status-delivered{background:rgba(59,130,246,.15);color:#1d4ed8;border:1px solid rgba(59,130,246,.3)}

/* Print styles */
@media print {
  body{background:#fff;padding:0}
  .action-bar,.no-print{display:none!important}
  .invoice-wrap{box-shadow:none;border-radius:0;max-width:100%}
  .inv-header{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .total-final,.remaining-bar{-webkit-print-color-adjust:exact;print-color-adjust:exact}
}

/* Loading */
.loading{text-align:center;padding:80px 20px;color:#888}
.loading .spinner{width:40px;height:40px;border:3px solid #333;border-top-color:#d4af37;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="action-bar no-print">
  <button class="btn-back" onclick="history.back()"><i class="fas fa-arrow-right"></i> رجوع</button>
  <button class="btn-print" onclick="window.print()"><i class="fas fa-print"></i> طباعة الفاتورة</button>
  <button class="btn-wa" id="wa-btn" onclick="shareWhatsApp()"><i class="fab fa-whatsapp"></i> إرسال واتساب</button>
  <button class="btn-share" onclick="shareInvoice()"><i class="fas fa-share-alt"></i> مشاركة</button>
</div>

<div id="invoice-wrap" class="invoice-wrap">
  <div class="loading">
    <div class="spinner"></div>
    <p>جاري تحميل الفاتورة...</p>
  </div>
</div>

<script>
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyCG6Yc0iH-rt-PaiRqL_V9Re1z49ZF3OMM",
  authDomain: "zahraa-store-f4c90.firebaseapp.com",
  projectId: "zahraa-store-f4c90",
  storageBucket: "zahraa-store-f4c90.firebasestorage.app",
};

if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
const db = firebase.firestore();

let currentInvoice = null;
let storeSettings = {};

/* Get invoice ID from URL */
const params = new URLSearchParams(window.location.search);
const invoiceId = params.get('id') || params.get('invoice') || params.get('num');

if (!invoiceId) {
  document.getElementById('invoice-wrap').innerHTML = `
    <div class="loading"><i class="fas fa-exclamation-circle" style="font-size:48px;color:#ef4444;display:block;margin-bottom:16px"></i>
    <p style="color:#ef4444;font-size:16px;font-weight:900">لم يتم تحديد رقم الفاتورة</p>
    <p style="margin-top:8px;font-size:12px">أضف ?id=رقم_الفاتورة في الرابط</p></div>`;
} else {
  loadInvoice();
}

async function loadInvoice() {
  try {
    /* Load store settings */
    const settingsSnap = await db.collection('settings').doc('store').get();
    if (settingsSnap.exists) storeSettings = settingsSnap.data();

    /* Try to find invoice by document ID or by invoiceNumber field */
    let invDoc = await db.collection('pos_invoices').doc(invoiceId).get();
    let invData = null;

    if (invDoc.exists) {
      invData = { id: invDoc.id, ...invDoc.data() };
    } else {
      /* Search by invoiceNumber */
      const snap = await db.collection('pos_invoices')
        .where('invoiceNumber', '==', invoiceId).limit(1).get();
      if (!snap.empty) {
        invData = { id: snap.docs[0].id, ...snap.docs[0].data() };
      }
    }

    if (!invData) {
      document.getElementById('invoice-wrap').innerHTML = `
        <div class="loading"><i class="fas fa-search" style="font-size:48px;color:#d4af37;display:block;margin-bottom:16px"></i>
        <p style="color:#d4af37;font-size:16px;font-weight:900">الفاتورة غير موجودة</p>
        <p style="margin-top:8px;font-size:12px;color:#888">رقم البحث: ${invoiceId}</p></div>`;
      return;
    }

    currentInvoice = invData;
    renderInvoice(invData);
  } catch(e) {
    document.getElementById('invoice-wrap').innerHTML = `
      <div class="loading"><i class="fas fa-exclamation-triangle" style="font-size:48px;color:#ef4444;display:block;margin-bottom:16px"></i>
      <p style="color:#ef4444">خطأ في تحميل الفاتورة</p>
      <p style="font-size:11px;color:#888;margin-top:8px">${e.message}</p></div>`;
  }
}

function renderInvoice(inv) {
  const items = inv.items || [];
  const subtotal = parseFloat(inv.subtotal) || items.reduce((s,i) => s + (parseFloat(i.price)||0)*(i.qty||i.quantity||1), 0);
  const discount = parseFloat(inv.discountAmount) || 0;
  const delivery = parseFloat(inv.deliveryFee) || 0;
  const total    = parseFloat(inv.totalPrice) || subtotal;
  const remaining = parseFloat(inv.remainingAmount) || 0;
  const paid     = parseFloat(inv.paidAmount) || (remaining > 0 ? total - remaining : total);
  const raw = inv.createdAt;
  const dt  = raw?.toDate ? raw.toDate() : (raw ? new Date(raw) : new Date());
  const dtStr = dt.toLocaleDateString('ar-EG', { weekday:'long', year:'numeric', month:'long', day:'numeric' })
    + ' — ' + dt.toLocaleTimeString('ar-EG', { hour:'2-digit', minute:'2-digit' });

  const storeName   = storeSettings.storeName || 'استوديو الزهراء';
  const storePhone  = storeSettings.storePhone || '';
  const logoUrl     = storeSettings.logoUrl || '';
  const footerText  = storeSettings.invoiceFooter || 'شكراً لثقتكم بنا — ZAHRAA STUDIO';

  const statusText = inv.status === 'تم التسليم' ? 'تم التسليم' : (inv.orderPrepared ? 'جاهز للاستلام' : 'قيد التجهيز');
  const statusClass = inv.status === 'تم التسليم' ? 'status-delivered' : (inv.orderPrepared ? 'status-prepared' : 'status-pending');
  const pmIcon = {'نقدي':'💵','بطاقة':'💳','تحويل':'🏦','آجل':'📋'}[inv.paymentMethod] || '💵';

  const itemsRows = items.map(item => {
    const q = item.qty || item.quantity || 1;
    const p = parseFloat(item.price) || 0;
    const itemDisc = parseFloat(item.discount) || 0;
    const effectivePrice = p - itemDisc;
    return `<tr>
      <td>${item.name || item.productName || '—'}
        ${itemDisc > 0 ? `<div class="disc">خصم: ${itemDisc.toFixed(2)} ج</div>` : ''}
      </td>
      <td class="num">${q}</td>
      <td class="amt">${effectivePrice.toFixed(2)}</td>
      <td class="amt">${(effectivePrice*q).toFixed(2)}</td>
    </tr>`;
  }).join('');

  document.getElementById('invoice-wrap').innerHTML = `
    <div class="inv-header">
      ${logoUrl ? `<img class="logo" src="${logoUrl}" alt="logo">` : `<div style="width:80px;height:80px;background:rgba(212,175,55,.15);border:2px solid rgba(212,175,55,.4);border-radius:12px;margin:0 auto 10px;display:flex;align-items:center;justify-content:center;font-size:32px">📷</div>`}
      <h1>${storeName}</h1>
      <div class="sub">ZAHRAA STUDIO — استوديو الزهراء</div>
      ${storePhone ? `<div style="font-size:12px;color:#888;margin-top:4px;direction:ltr">${storePhone}</div>` : ''}
      <div style="margin-top:8px"><span class="inv-status-badge ${statusClass}">${statusText}</span></div>
    </div>

    <div class="inv-meta">
      <div class="inv-meta-cell">
        <div class="lbl">رقم الفاتورة</div>
        <div class="val gold">${inv.invoiceNumber || inv.id}</div>
      </div>
      <div class="inv-meta-cell">
        <div class="lbl">التاريخ والوقت</div>
        <div class="val" style="font-size:11px">${dtStr}</div>
      </div>
    </div>

    <div class="inv-customer">
      <div class="section-title"><i class="fas fa-user"></i> بيانات العميل</div>
      <div class="name">${inv.userName || '—'}</div>
      ${inv.phone ? `<div class="phone"><i class="fas fa-phone"></i> ${inv.phone}</div>` : ''}
      ${inv.address ? `<div class="addr"><i class="fas fa-map-marker-alt"></i> ${inv.address}</div>` : ''}
      ${inv.deliveryDate ? `<div class="addr" style="color:#b45309"><i class="fas fa-calendar-alt"></i> موعد الاستلام: ${inv.deliveryDate}</div>` : ''}
    </div>

    <div class="inv-items">
      <table class="items-table">
        <thead><tr><th>المنتج / الخدمة</th><th class="num">الكمية</th><th class="amt">السعر</th><th class="amt">الإجمالي</th></tr></thead>
        <tbody>${itemsRows}</tbody>
      </table>
    </div>

    <div class="totals">
      ${(discount > 0 || delivery > 0) ? `
        <div class="total-row"><span class="l">المجموع الفرعي</span><span class="r">${subtotal.toFixed(2)} ج</span></div>
        ${discount > 0 ? `<div class="total-row disc"><span class="l">الخصم</span><span class="r">- ${discount.toFixed(2)} ج</span></div>` : ''}
        ${delivery > 0 ? `<div class="total-row delivery"><span class="l">رسوم التوصيل</span><span class="r">+ ${delivery.toFixed(2)} ج</span></div>` : ''}
      ` : ''}
    </div>

    <div class="total-final">
      <span class="l">الإجمالي الكلي</span>
      <span class="r">${total.toFixed(2)} ج</span>
    </div>

    ${remaining > 0
      ? `<div class="remaining-bar"><span class="l">المتبقي (آجل)</span><span class="r">${remaining.toFixed(2)} ج</span></div>
         <div style="padding:8px 16px;font-size:12px;color:#555;display:flex;justify-content:space-between">
           <span>المدفوع</span><span style="font-weight:900;color:#16a34a">${paid.toFixed(2)} ج</span>
         </div>`
      : `<div class="paid-stamp">✅ تم السداد بالكامل — ${total.toFixed(2)} ج</div>`
    }

    <div class="payment-method">${pmIcon} طريقة الدفع: <strong>${inv.paymentMethod || 'نقدي'}</strong>
      ${inv.dueDate ? ` — تاريخ الاستحقاق: <strong>${inv.dueDate}</strong>` : ''}
    </div>

    ${inv.notes ? `<div class="notes-section"><div class="lbl">📝 ملاحظات</div><div class="txt">${inv.notes}</div></div>` : ''}

    <div class="barcode-section">
      <div class="bc-lbl">باركود الفاتورة</div>
      <svg id="barcode-svg"></svg>
      <div class="barcode-num">${inv.invoiceNumber || inv.id}</div>
    </div>

    <div class="inv-footer">
      <div class="footer-txt">${footerText}</div>
      <div class="store-info">🌟 ${storeName} 🌟</div>
    </div>
  `;

  /* Generate barcode */
  try {
    JsBarcode('#barcode-svg', inv.invoiceNumber || inv.id, {
      format: 'CODE128', width: 2, height: 50, displayValue: false, background: '#fff', lineColor: '#1a1a1a'
    });
  } catch(e) { console.warn('Barcode error', e); }

  /* Update WhatsApp button */
  if (inv.phone) {
    document.getElementById('wa-btn').setAttribute('data-phone', inv.phone);
  }
}

function shareWhatsApp() {
  if (!currentInvoice) return;
  const inv = currentInvoice;
  const total = parseFloat(inv.totalPrice) || 0;
  const remaining = parseFloat(inv.remainingAmount) || 0;
  const items = (inv.items || []).map(i => `  • ${i.name||i.productName} × ${i.qty||i.quantity||1} = ${((parseFloat(i.price)||0)*(i.qty||i.quantity||1)).toFixed(2)} ج`).join('\n');
  const storeName = storeSettings.storeName || 'استوديو الزهراء';

  const msg = `🌟 *فاتورة ${storeName}* 🌟
━━━━━━━━━━━━━━━━
📋 رقم الفاتورة: *${inv.invoiceNumber || inv.id}*
👤 العميل: *${inv.userName || '—'}*
━━━━━━━━━━━━━━━━
*المنتجات:*
${items}
━━━━━━━━━━━━━━━━
💰 الإجمالي: *${total.toFixed(2)} ج*
${remaining > 0 ? `⏳ المتبقي: *${remaining.toFixed(2)} ج*` : '✅ تم السداد بالكامل'}
━━━━━━━━━━━━━━━━
${storeSettings.storePhone ? `📞 ${storeSettings.storePhone}` : ''}
شكراً لثقتكم بنا 🙏`;

  const phone = inv.phone ? inv.phone.replace(/\D/g,'') : '';
  const waUrl = phone
    ? `https://wa.me/${phone.startsWith('0') ? '2'+phone : phone}?text=${encodeURIComponent(msg)}`
    : `https://wa.me/?text=${encodeURIComponent(msg)}`;
  window.open(waUrl, '_blank');
}

async function shareInvoice() {
  const text = `فاتورة ${currentInvoice?.invoiceNumber || invoiceId}\nالرابط: ${window.location.href}`;
  if (navigator.share) {
    await navigator.share({ title: 'فاتورة استوديو الزهراء', text, url: window.location.href });
  } else {
    navigator.clipboard.writeText(window.location.href);
    alert('تم نسخ رابط الفاتورة');
  }
}
</script>
</body>
</html>
