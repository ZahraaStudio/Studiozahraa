<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>تفاصيل المنتج</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background: #0d0d0d;
  color:white;
  font-family: 'Cairo', sans-serif;
  padding-bottom: 80px;
}

.header {
  padding: 15px;
  display: flex;
  align-items: center;
  background: #111;
  position: sticky;
  top: 0;
  z-index: 100;
}

.back-btn {
  color: #ffd700;
  text-decoration: none;
  font-size: 24px;
  margin-left: 15px;
}

.container{
  max-width: 600px;
  margin: auto;
}

/* ===== SLIDER ===== */
.slider{
  position:relative;
  overflow:hidden;
  width: 100%;
  aspect-ratio: 1/1;
  background:#000;
  touch-action: pan-y;
}

.track{
  display:flex;
  height: 100%;
  transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

.track img{
  width:100%;
  height:100%;
  object-fit:contain;
  flex-shrink:0;
  cursor: zoom-in;
}

.dots{
  position:absolute;
  bottom:15px;
  width:100%;
  text-align:center;
}

.dot{
  width:8px;
  height:8px;
  background: rgba(255, 255, 255, 0.3);
  display:inline-block;
  border-radius:50%;
  margin:0 4px;
  transition: 0.3s;
}

.dot.active{
  background: #ffd700;
  width: 20px;
  border-radius: 10px;
}

/* info */
.product-info {
  padding: 20px;
}

h2{
  color: #ffd700;
  margin: 0 0 10px 0;
  font-size: 24px;
}

.price{
  font-size: 22px;
  color: #ffed4e;
  font-weight: bold;
  margin-bottom: 20px;
}

.description {
  background: #1a1a1a;
  padding: 15px;
  border-radius: 12px;
  line-height: 1.6;
  color: #ccc;
  margin-bottom: 20px;
  white-space: pre-wrap;
}

/* bottom bar */
.bottom-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  background: #111;
  padding: 15px;
  display: flex;
  gap: 10px;
  box-shadow: 0 -5px 15px rgba(0,0,0,0.5);
  z-index: 1000;
}

button, a.btn{
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  text-align: center;
  font-weight: bold;
  font-size: 16px;
  text-decoration: none;
  transition: 0.3s;
}

.add-btn {
  background: #ffd700;
  color: #000;
}

.wa-btn {
  background: #25D366;
  color: #fff;
}

/* FULLSCREEN */
#full{
  position:fixed;
  inset: 0;
  background: black;
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}

#full img{
  max-width: 100%;
  max-height: 100%;
}

.close-full {
  position: absolute;
  top: 20px;
  right: 20px;
  color: #fff;
  font-size: 30px;
  cursor: pointer;
}

#toast{
  position:fixed;
  bottom: 90px;
  left:50%;
  transform:translateX(-50%);
  background: #25D366;
  color: white;
  padding:12px 24px;
  border-radius:25px;
  display:none;
  font-weight: bold;
  z-index: 10001;
}
</style>
</head>

<body>

<div class="header">
  <a href="products.html" class="back-btn">←</a>
  <span style="font-weight: bold;">تفاصيل المنتج</span>
</div>

<div class="container">
  <div class="slider" id="slider">
    <div class="track" id="track"></div>
    <div class="dots" id="dots"></div>
  </div>

  <div class="product-info">
    <h2 id="name"></h2>
    <div class="price" id="price"></div>
    <div class="description" id="desc">لا يوجد وصف متاح لهذا المنتج.</div>
  </div>
</div>

<div class="bottom-bar">
  <button class="add-btn" onclick="addCart()">🛒 أضف للسلة</button>
  <a id="wa" class="btn wa-btn">اطلب واتساب</a>
</div>

<div id="full">
  <span class="close-full" onclick="document.getElementById('full').style.display='none'">✕</span>
  <img id="fullImg">
</div>

<div id="toast">تمت الإضافة للسلة 🛒</div>

<script>
let product = JSON.parse(localStorage.getItem("product"));
if(!product) window.location.href = "products.html";

let index = 0;

document.getElementById("name").innerText = product.name;
document.getElementById("price").innerText = product.price + " جنيه";
if(product.description) document.getElementById("desc").innerText = product.description;

document.getElementById("wa").href =
"https://wa.me/201204194540?text=" +
encodeURIComponent("أهلاً، أريد طلب هذا المنتج: " + product.name + "\nالسعر: " + product.price + " جنيه");

/* ===== SLIDER ===== */
const track = document.getElementById("track");
const dots = document.getElementById("dots");

function renderSlider(){
  track.innerHTML = product.images.map(img => `
    <img src="${img}" onclick="openFull('${img}')">
  `).join("");
  
  updateDots();
}

function updateDots(){
  dots.innerHTML = product.images.map((_, i) => `
    <span class="dot ${i === index ? 'active' : ''}"></span>
  `).join("");
}

function goToSlide(n){
  index = n;
  track.style.transform = `translateX(-${index * 100}%)`;
  updateDots();
}

renderSlider();

/* SWIPE LOGIC */
let startX = 0;
let isDragging = false;

track.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
  isDragging = true;
});

track.addEventListener("touchend", e => {
  if(!isDragging) return;
  let endX = e.changedTouches[0].clientX;
  let diff = startX - endX;

  if(Math.abs(diff) > 50){
    if(diff > 0 && index < product.images.length - 1) index++;
    else if(diff < 0 && index > 0) index--;
    goToSlide(index);
  }
  isDragging = false;
});

/* FULLSCREEN */
window.openFull = (img) => {
  document.getElementById("full").style.display = "flex";
  document.getElementById("fullImg").src = img;
};

/* CART */
window.addCart = () => {
  let cart = JSON.parse(localStorage.getItem("cart") || "[]");
  cart.push(product);
  localStorage.setItem("cart", JSON.stringify(cart));
  
  const t = document.getElementById("toast");
  t.style.display = "block";
  setTimeout(() => t.style.display = "none", 2000);
};
</script>

</body>
</html>
