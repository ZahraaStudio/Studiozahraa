<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product</title>

<style>
body{
  margin:0;
  background:#0d0d0d;
  color:white;
  font-family:Cairo;
}

.container{
  max-width:500px;
  margin:auto;
}

/* ===== SLIDER (SHOPIFY LEVEL) ===== */
.slider{
  position:relative;
  overflow:hidden;
  height:300px;
  background:#111;
  touch-action:pan-y;
}

.track{
  display:flex;
  transition:transform 0.4s ease;
}

.track img{
  width:100%;
  height:300px;
  object-fit:cover;
  flex-shrink:0;
  cursor:zoom-in;
}

/* dots */
.dots{
  position:absolute;
  bottom:10px;
  width:100%;
  text-align:center;
}

.dot{
  width:8px;
  height:8px;
  background:#777;
  display:inline-block;
  border-radius:50%;
  margin:3px;
}

.dot.active{
  background:gold;
}

/* info */
h2{
  text-align:center;
  color:gold;
}

p{
  text-align:center;
}

/* buttons */
button,a{
  display:block;
  width:90%;
  margin:10px auto;
  padding:10px;
  border:none;
  border-radius:20px;
  cursor:pointer;
  text-align:center;
}

button{
  background:gold;
  color:black;
}

a{
  background:#25D366;
  color:white;
  text-decoration:none;
}

/* FULLSCREEN */
#full{
  position:fixed;
  top:0;left:0;
  width:100%;
  height:100%;
  background:black;
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

#full img{
  max-width:100%;
  max-height:100%;
  transition:transform 0.3s;
}
</style>
</head>

<body>

<div class="container">

  <div class="slider" id="slider">
    <div class="track" id="track"></div>

    <div class="dots" id="dots"></div>
  </div>

  <h2 id="name"></h2>
  <p id="price"></p>

  <button onclick="addCart()">🛒 أضف للسلة</button>

  <a id="wa">اطلب واتساب</a>

</div>

<div id="full" onclick="this.style.display='none'">
  <img id="fullImg">
</div>

<!-- Toast -->
<div id="toast" style="
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#25D366;
padding:10px 20px;
border-radius:20px;
display:none;
">
تمت الإضافة 🛒
</div>

<script>
let product = JSON.parse(localStorage.getItem("product"));
let index = 0;

document.getElementById("name").innerText = product.name;
document.getElementById("price").innerText = product.price + " جنيه";

document.getElementById("wa").href =
"https://wa.me/201204194540?text=" +
encodeURIComponent("عايز المنتج: " + product.name);

/* ===== SLIDER ===== */
const track = document.getElementById("track");
const dots = document.getElementById("dots");

function render(){

  track.style.transform = `translateX(-${index*100}%)`;

  track.innerHTML = product.images.map(img=>`
    <img src="${img}" onclick="openFull('${img}')">
  `).join("");

  dots.innerHTML = product.images.map((_,i)=>`
    <span class="dot ${i===index?'active':''}"></span>
  `).join("");
}

render();

/* SWIPE */
let startX=0;

track.addEventListener("touchstart",e=>{
  startX = e.touches[0].clientX;
});

track.addEventListener("touchend",e=>{
  let endX = e.changedTouches[0].clientX;

  if(startX - endX > 50) next();
  if(endX - startX > 50) prev();
});

function next(){
  index = (index + 1) % product.images.length;
  render();
}

function prev(){
  index--;
  if(index < 0) index = product.images.length - 1;
  render();
}

/* AUTO PLAY */
setInterval(()=>{
  next();
},4000);

/* FULLSCREEN */
window.openFull = (img)=>{
  document.getElementById("full").style.display="flex";
  document.getElementById("fullImg").src = img;
};

/* CART */
window.addCart = ()=>{

  let cart = JSON.parse(localStorage.getItem("cart")||"[]");

  cart.push(product);

  localStorage.setItem("cart", JSON.stringify(cart));

  showToast();
};

/* TOAST */
function showToast(){
  const t = document.getElementById("toast");
  t.style.display="block";
  setTimeout(()=>t.style.display="none",1500);
}
</script>

</body>
</html>
