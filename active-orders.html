<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>الطلبات النشطة — كاشير الزهراء</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
<script src="shared.js"></script>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
/* ── Filters ── */
.top-bar{display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.filter-btn{padding:6px 16px;border-radius:20px;border:1.5px solid var(--border);background:var(--bg3);color:var(--text2);cursor:pointer;font-family:'Cairo',sans-serif;font-size:12px;font-weight:700;transition:all .17s}
.filter-btn.on{background:var(--gold);border-color:var(--gold);color:#000}

/* ── Bulk bar ── */
.bulk-bar{display:none;align-items:center;gap:10px;background:rgba(212,175,55,.12);border:1px solid var(--gold);border-radius:var(--r2);padding:10px 14px;margin-bottom:12px;flex-wrap:wrap}
.bulk-bar.show{display:flex}
.bulk-count{font-size:13px;font-weight:700;color:var(--gold)}

/* ── Date group header ── */
.date-group-hdr{display:flex;align-items:center;gap:10px;font-size:12px;font-weight:900;color:var(--text2);padding:8px 0 6px;margin-top:10px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:10}
.dg-badge{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:2px 10px;font-size:11px}

/* ── Order card ── */
.ocard{background:var(--card);border:1.5px solid var(--border);border-radius:var(--r2);padding:12px 14px;margin-bottom:8px;display:flex;align-items:flex-start;gap:10px;transition:all .2s;cursor:pointer}
.ocard:hover{border-color:var(--gold);box-shadow:0 2px 12px rgba(212,175,55,.2)}
.ocard.prepared{border-color:var(--green);background:rgba(34,197,94,.05)}
.ocard.deferred{border-color:var(--red)}
.ocard.selected{border-color:var(--gold);background:rgba(212,175,55,.07)}
.oc-check{flex-shrink:0;margin-top:2px}
.oc-check input{width:16px;height:16px;cursor:pointer;accent-color:var(--gold)}
.oc-body{flex:1;min-width:0}
.ocard-num{font-size:13px;font-weight:900;color:var(--gold);font-family:monospace}
.ocard-name{font-size:13px;font-weight:700;margin-top:2px}
.ocard-meta{font-size:11px;color:var(--text3);margin-top:3px;display:flex;gap:8px;flex-wrap:wrap}
.ocard-notes{font-size:11px;color:var(--text3);margin-top:3px}
.oc-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.ocard-total{font-size:15px;font-weight:900}
.ocard-rem{font-size:11px}
.ocard-actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}

/* ── Buttons ── */
.prepare-btn{background:linear-gradient(135deg,#166534,#22c55e);color:#fff;border:none;border-radius:8px;padding:7px 14px;font-family:'Cairo',sans-serif;font-weight:900;font-size:11px;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .2s}
.prepare-btn:hover{opacity:.85}
.prepare-btn:disabled{opacity:.5;cursor:default}
.unprepare-btn{background:rgba(239,68,68,.12);color:var(--red);border:1px solid var(--red);border-radius:8px;padding:7px 12px;font-family:'Cairo',sans-serif;font-weight:700;font-size:11px;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .2s}
.unprepare-btn:hover{background:rgba(239,68,68,.2)}
.small-btn{background:var(--bg3);color:var(--text2);border:1.5px solid var(--border);border-radius:8px;padding:6px 10px;font-family:'Cairo',sans-serif;font-weight:700;font-size:11px;cursor:pointer;transition:all .2s;text-decoration:none;display:inline-flex;align-items:center;gap:4px}
.small-btn:hover{border-color:var(--gold);color:var(--gold)}
.cam-btn{background:var(--blue);color:#fff;border:none;border-radius:8px;padding:8px 14px;font-family:'Cairo',sans-serif;font-weight:700;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .2s}
.cam-btn:hover{opacity:.85}

/* ══════════════════════════════
   ORDER DETAIL MODAL
══════════════════════════════ */
.od-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:9000;display:none;align-items:center;justify-content:center;padding:12px}
.od-overlay.open{display:flex}
.od-modal{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);width:100%;max-width:640px;max-height:92vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.6)}
.od-head{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg2);border-radius:var(--r2) var(--r2) 0 0}
.od-head-left{display:flex;flex-direction:column;gap:2px}
.od-inv{font-size:15px;font-weight:900;color:var(--gold);font-family:monospace}
.od-name{font-size:13px;font-weight:700;color:var(--text)}
.od-close{background:none;border:none;color:var(--text2);cursor:pointer;font-size:20px;line-height:1;padding:4px}
.od-close:hover{color:var(--red)}
.od-body{overflow-y:auto;padding:18px;flex:1;display:flex;flex-direction:column;gap:14px}
.od-foot{padding:12px 18px;border-top:1px solid var(--border);display:flex;gap:8px;flex-wrap:wrap;background:var(--bg2);border-radius:0 0 var(--r2) var(--r2)}

/* status badge */
.od-status{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:10px;font-size:13px;font-weight:900}
.od-status.prep{background:rgba(34,197,94,.12);border:1.5px solid var(--green);color:var(--green)}
.od-status.pend{background:rgba(245,158,11,.12);border:1.5px solid #f59e0b;color:#f59e0b}

/* info rows */
.od-section{display:flex;flex-direction:column;gap:6px}
.od-sec-title{font-size:11px;font-weight:900;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px;display:flex;align-items:center;gap:5px}
.od-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px}
.od-row:last-child{border-bottom:none}
.od-row .k{color:var(--text3);font-weight:700}
.od-row .v{color:var(--text);font-weight:900;text-align:left}
.od-row .v.gold{color:var(--gold)}
.od-row .v.red{color:var(--red)}
.od-row .v.green{color:var(--green)}

/* items mini-table */
.od-table{width:100%;border-collapse:collapse;font-size:12px}
.od-table th{background:var(--bg3);color:var(--text3);font-weight:700;padding:7px 10px;text-align:right;border-bottom:1.5px solid var(--border);font-size:11px}
.od-table td{padding:8px 10px;border-bottom:1px solid var(--border);color:var(--text);font-weight:700}
.od-table tr:last-child td{border-bottom:none}
.od-table .num{text-align:center}
.od-table .amt{text-align:left;direction:ltr;font-family:monospace}

/* total strips */
.od-total{background:#000;color:#fff;border-radius:8px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;margin-top:4px}
.od-total *{color:#fff}
.od-total .l{font-size:13px;font-weight:900}
.od-total .a{font-size:19px;font-weight:900;direction:ltr;font-family:monospace}
.od-rem{background:#d4af37;border-radius:8px;padding:8px 14px;display:flex;justify-content:space-between;align-items:center;margin-top:4px;border:2px solid #a88520}
.od-rem .l{font-size:12px;font-weight:900;color:#1a1a00}
.od-rem .a{font-size:16px;font-weight:900;color:#1a1a00;direction:ltr;font-family:monospace}
.od-paid{border:1.5px solid var(--green);border-radius:8px;padding:7px;text-align:center;font-size:12px;font-weight:900;color:var(--green);margin-top:4px;background:rgba(34,197,94,.07)}

/* ══ SCANNER MODAL ══ */
.scanner-overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:9999;display:none;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.scanner-overlay.open{display:flex}
.scanner-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:20px;width:100%;max-width:400px}
.scanner-box h3{font-size:15px;font-weight:900;color:var(--gold);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
#qr-reader{width:100%;border-radius:10px;overflow:hidden}
.scanner-result{margin-top:10px;padding:10px;background:var(--bg3);border-radius:8px;font-size:12px;min-height:34px}
</style>
</head>
<body>
<div class="app-shell">
  <div id="sidebar"></div>
  <div class="page-content">
    <div class="page-header">
      <h1><i class="fas fa-hourglass-half"></i> الطلبات النشطة</h1>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <!-- Barcode / Invoice search box — USB scanner types here or Enter manually -->
        <div style="position:relative;display:flex;align-items:center">
          <i class="fas fa-barcode" style="position:absolute;right:10px;color:var(--text3);font-size:14px;pointer-events:none"></i>
          <input id="barcode-inp" type="text" placeholder="امسح الباركود أو اكتب رقم الفاتورة..." autocomplete="off"
            onkeydown="onSearchKeydown(event)"
            style="padding:7px 34px 7px 12px;background:var(--bg3);border:1.5px solid var(--gold);border-radius:var(--r);color:var(--text);font-family:Cairo,sans-serif;font-size:12px;font-weight:700;width:260px;outline:none">
        </div>
        <button class="cam-btn" onclick="openScanner()"><i class="fas fa-qrcode"></i> كاميرا</button>
        <button class="btn btn-ghost" onclick="loadOrders()"><i class="fas fa-sync-alt"></i> تحديث</button>
      </div>
    </div>
    <div class="page-body">
      <div class="top-bar">
        <button class="filter-btn on" onclick="setFilter('all',this)">الكل</button>
        <button class="filter-btn" onclick="setFilter('pending',this)"><i class="fas fa-hourglass"></i> قيد التجهيز</button>
        <button class="filter-btn" onclick="setFilter('prepared',this)"><i class="fas fa-check"></i> جاهزة</button>
        <button class="filter-btn" onclick="setFilter('deferred',this)"><i class="fas fa-credit-card"></i> آجل</button>
        <input class="search-input" id="q" placeholder="🔍 اسم / رقم فاتورة / هاتف..." oninput="filterOrders()" style="max-width:240px;margin-right:auto">
      </div>

      <div class="bulk-bar" id="bulk-bar">
        <label style="display:flex;align-items:center;gap:6px;font-size:12px;cursor:pointer">
          <input type="checkbox" id="select-all-chk" onchange="toggleSelectAll(this.checked)" style="width:16px;height:16px;accent-color:var(--gold)">
          <span>تحديد الكل</span>
        </label>
        <span class="bulk-count" id="bulk-count">0 محدد</span>
        <button class="prepare-btn" onclick="bulkPrepare()"><i class="fas fa-check-double"></i> تجهيز المحدد</button>
        <button class="unprepare-btn" onclick="bulkUnprepare()"><i class="fas fa-times-circle"></i> إلغاء تجهيز المحدد</button>
        <button class="small-btn" onclick="clearSelection()"><i class="fas fa-times"></i></button>
      </div>

      <div id="stats-row" style="display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap"></div>
      <div id="orders-list"><div class="spinner"></div></div>
    </div>
  </div>
</div>

<!-- ══ ORDER DETAIL MODAL ══ -->
<div class="od-overlay" id="od-overlay" onclick="closeOrderModal(event)">
  <div class="od-modal" id="od-modal">
    <div class="od-head">
      <div class="od-head-left">
        <div class="od-inv" id="od-invno">—</div>
        <div class="od-name" id="od-custname">—</div>
      </div>
      <button class="od-close" onclick="closeOrderModal()">✕</button>
    </div>
    <div class="od-body" id="od-body">
      <div class="spinner"></div>
    </div>
    <div class="od-foot" id="od-foot"></div>
  </div>
</div>

<!-- ══ SCANNER MODAL ══ -->
<div class="scanner-overlay" id="scanner-overlay">
  <div class="scanner-box">
    <h3>
      <span><i class="fas fa-qrcode"></i> مسح باركود الفاتورة</span>
      <button onclick="closeScanner()" style="background:none;border:none;color:var(--text2);cursor:pointer;font-size:18px">✕</button>
    </h3>
    <div id="qr-reader"></div>
    <div class="scanner-result" id="scanner-result"><span style="color:var(--text3)">وجّه الكاميرا نحو الباركود...</span></div>
    <button class="small-btn" style="width:100%;justify-content:center;margin-top:10px" onclick="closeScanner()"><i class="fas fa-times"></i> إغلاق</button>
  </div>
</div>

<script>
injectSharedCSS();

let allOrders = [], activeFilter = 'all', selectedIds = new Set();
let qrScanner = null;

requireAuth(async () => { await loadOrders(); });

/* ── Load ── */
async function loadOrders(){
  document.getElementById('orders-list').innerHTML = '<div class="spinner"></div>';
  try{
    const snap = await db.collection('pos_invoices').orderBy('createdAt','desc').limit(300).get();
    allOrders = [];
    snap.forEach(d => allOrders.push({ id: d.id, ...d.data() }));
    selectedIds.clear();
    renderStats(); filterOrders();
  } catch(e){
    document.getElementById('orders-list').innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-circle"></i><p>${e.message}</p></div>`;
  }
}

/* ── Stats ── */
function renderStats(){
  const pending  = allOrders.filter(o=>!o.orderPrepared).length;
  const prepared = allOrders.filter(o=>o.orderPrepared).length;
  const deferred = allOrders.filter(o=>(parseFloat(o.remainingAmount)||0)>0).length;
  const totalRem = allOrders.reduce((s,o)=>s+(parseFloat(o.remainingAmount)||0),0);
  document.getElementById('stats-row').innerHTML = `
    <div class="card" style="flex:1;min-width:100px"><div class="card-title">قيد التجهيز</div><div class="card-value" style="color:var(--orange);font-size:26px">${pending}</div></div>
    <div class="card" style="flex:1;min-width:100px"><div class="card-title">جاهزة</div><div class="card-value" style="color:var(--green);font-size:26px">${prepared}</div></div>
    <div class="card" style="flex:1;min-width:100px"><div class="card-title">آجل</div><div class="card-value" style="color:var(--red);font-size:26px">${deferred}</div></div>
    <div class="card" style="flex:1;min-width:100px"><div class="card-title">إجمالي المستحق</div><div class="card-value" style="font-size:18px">${fmt(totalRem)}</div></div>`;
}

/* ── Filter ── */
function setFilter(f, btn){
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on'); filterOrders();
}

function filterOrders(){
  const q = (document.getElementById('q').value||'').toLowerCase();
  let list = allOrders;
  if (activeFilter==='pending')  list = list.filter(o=>!o.orderPrepared);
  else if (activeFilter==='prepared') list = list.filter(o=>o.orderPrepared);
  else if (activeFilter==='deferred') list = list.filter(o=>(parseFloat(o.remainingAmount)||0)>0);
  if (q) list = list.filter(o=>
    (o.userName||'').toLowerCase().includes(q)||
    (o.invoiceNumber||'').toLowerCase().includes(q)||
    (o.phone||'').includes(q)
  );
  renderGrouped(list); updateBulkBar();
}

/* ── Date grouping ── */
function getDateLabel(ts){
  if (!ts) return 'بدون تاريخ';
  const d   = ts.toDate ? ts.toDate() : new Date(ts);
  const now = new Date(); now.setHours(0,0,0,0);
  const yest= new Date(now); yest.setDate(yest.getDate()-1);
  const day = new Date(d); day.setHours(0,0,0,0);
  if (day.getTime()===now.getTime())  return '📅 اليوم';
  if (day.getTime()===yest.getTime()) return '📅 أمس';
  return '📅 ' + d.toLocaleDateString('ar-EG',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
}

function renderGrouped(list){
  const el = document.getElementById('orders-list');
  if (!list.length){ el.innerHTML = `<div class="empty-state"><i class="fas fa-inbox"></i><p>لا توجد طلبات</p></div>`; return; }
  const groups = {};
  list.forEach(o=>{ const lbl=getDateLabel(o.createdAt); if(!groups[lbl]) groups[lbl]=[]; groups[lbl].push(o); });
  let html = '';
  for (const [lbl, orders] of Object.entries(groups)){
    const gids = orders.map(o=>o.id);
    html += `<div class="date-group-hdr">
      <label style="display:flex;align-items:center;gap:6px;cursor:pointer">
        <input type="checkbox" class="grp-chk" data-ids='${JSON.stringify(gids)}' onchange="toggleGroup(this)" style="width:15px;height:15px;accent-color:var(--gold)">
      </label>
      <span>${lbl}</span>
      <span class="dg-badge">${orders.length} طلب</span>
    </div>${orders.map(o=>orderCard(o)).join('')}`;
  }
  el.innerHTML = html;
}

/* ── Order card ── */
function orderCard(o){
  const rem = parseFloat(o.remainingAmount)||0;
  const isPrepared = o.orderPrepared||false;
  const isSelected = selectedIds.has(o.id);
  const dt = o.createdAt ? fmtDate(o.createdAt) : '—';
  let cls = '';
  if (isSelected) cls=' selected'; else if (isPrepared) cls=' prepared'; else if (rem>0) cls=' deferred';

  return `<div class="ocard${cls}" id="oc-${o.id}" onclick="onCardClick(event,'${o.id}')">
    <div class="oc-check" onclick="event.stopPropagation()">
      <input type="checkbox" class="order-chk" data-id="${o.id}" ${isSelected?'checked':''} onchange="toggleSelect('${o.id}',this.checked)">
    </div>
    <div class="oc-body">
      <div class="ocard-num"># ${o.invoiceNumber||o.id.slice(0,8)}</div>
      <div class="ocard-name">${o.userName||'—'}</div>
      <div class="ocard-meta">
        <span><i class="fas fa-calendar-alt"></i> ${dt}</span>
        ${o.phone?`<span><i class="fas fa-phone-alt"></i> ${o.phone}</span>`:''}
        <span><i class="fas fa-shopping-bag"></i> ${o.items?.length||0} صنف</span>
        <span><i class="fas fa-wallet"></i> ${o.paymentMethod||'نقدي'}</span>
      </div>
      ${o.notes?`<div class="ocard-notes">📝 ${o.notes}</div>`:''}
      ${rem>0&&o.dueDate?`<div class="ocard-notes" style="color:var(--orange)">📅 استحقاق: ${o.dueDate}</div>`:''}
    </div>
    <div class="oc-right">
      <div class="ocard-total" style="color:${rem>0?'var(--red)':'var(--green)'}">${fmt(o.totalPrice||0)}</div>
      ${rem>0?`<div class="ocard-rem" style="color:var(--red);font-weight:900">متبقي: ${fmt(rem)}</div>`:`<div class="ocard-rem" style="color:var(--green)">✅ مسدد</div>`}
      ${isPrepared?`<span style="font-size:10px;color:var(--green);font-weight:700">✅ جاهز</span>`:''}
      <i class="fas fa-chevron-left" style="color:var(--text3);font-size:10px;margin-top:4px"></i>
    </div>
  </div>`;
}

/* ── Card click → open modal (but not if checkbox area) ── */
window.onCardClick = function(e, orderId){
  if (e.target.closest('.oc-check')) return;
  const o = allOrders.find(x=>x.id===orderId);
  if (o) openOrderModal(o);
};

/* ══════════════════════════════════════════
   ORDER DETAIL MODAL
══════════════════════════════════════════ */
function openOrderModal(o){
  const items = o.items || [];
  const rem   = parseFloat(o.remainingAmount)||0;
  const sub   = parseFloat(o.subtotal) || items.reduce((s,i)=>s+(parseFloat(i.price)||0)*(i.qty||i.quantity||1),0);
  const disc  = parseFloat(o.discountAmount)||0;
  const del   = parseFloat(o.deliveryFee)||0;
  const tot   = parseFloat(o.totalPrice) || sub;
  const paid  = parseFloat(o.paidAmount) || (rem>0 ? tot-rem : tot);
  const isPrepared = o.orderPrepared||false;
  const raw   = o.createdAt;
  const dt    = raw && raw.toDate ? raw.toDate() : (raw ? new Date(raw) : new Date());

  document.getElementById('od-invno').textContent   = `# ${o.invoiceNumber||o.id}`;
  document.getElementById('od-custname').textContent = o.userName||'—';

  document.getElementById('od-body').innerHTML = `
    <!-- Status -->
    <div class="od-status ${isPrepared?'prep':'pend'}">
      ${isPrepared?'✅ جاهز للاستلام':'⏳ قيد التجهيز'}
    </div>

    <!-- Customer -->
    <div class="od-section">
      <div class="od-sec-title"><i class="fas fa-user"></i> بيانات العميل</div>
      <div class="od-row"><span class="k">الاسم</span><span class="v">${o.userName||'—'}</span></div>
      ${o.phone?`<div class="od-row"><span class="k">الهاتف</span><span class="v" style="direction:ltr">${o.phone}</span></div>`:''}
      <div class="od-row"><span class="k">رقم الفاتورة</span><span class="v gold">${o.invoiceNumber||o.id}</span></div>
      <div class="od-row"><span class="k">التاريخ</span><span class="v">${dt.toLocaleDateString('ar-EG',{year:'numeric',month:'long',day:'numeric'})} — ${dt.toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'})}</span></div>
      <div class="od-row"><span class="k">طريقة الدفع</span><span class="v">${o.paymentMethod||'نقدي'}</span></div>
      ${o.dueDate?`<div class="od-row"><span class="k">📅 تاريخ الاستحقاق</span><span class="v" style="color:var(--orange)">${o.dueDate}</span></div>`:''}
      ${o.deliveryDate?`<div class="od-row"><span class="k">📅 موعد الاستلام</span><span class="v red">${o.deliveryDate}</span></div>`:''}
      ${o.notes?`<div class="od-row"><span class="k">📝 ملاحظات</span><span class="v">${o.notes}</span></div>`:''}
    </div>

    <!-- Products -->
    <div class="od-section">
      <div class="od-sec-title"><i class="fas fa-shopping-bag"></i> المنتجات (${items.length} صنف)</div>
      <table class="od-table">
        <thead><tr><th>المنتج</th><th class="num">الكمية</th><th class="amt">السعر</th><th class="amt">الإجمالي</th></tr></thead>
        <tbody>
          ${items.map(i=>{
            const q=i.qty||i.quantity||1, p=parseFloat(i.price)||0;
            return `<tr>
              <td>${i.name||i.productName||'—'}</td>
              <td class="num">${q}</td>
              <td class="amt">${p.toFixed(2)}</td>
              <td class="amt">${(p*q).toFixed(2)}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>

    <!-- Totals -->
    <div class="od-section">
      <div class="od-sec-title"><i class="fas fa-calculator"></i> الملخص المالي</div>
      ${disc>0||del>0?`
        <div class="od-row"><span class="k">المجموع الفرعي</span><span class="v">${sub.toFixed(2)} ج</span></div>
        ${disc>0?`<div class="od-row"><span class="k">خصم</span><span class="v red">- ${disc.toFixed(2)} ج</span></div>`:''}
        ${del>0?`<div class="od-row"><span class="k">توصيل</span><span class="v">+ ${del.toFixed(2)} ج</span></div>`:''}
      `:''}
      <div class="od-total"><span class="l">الإجمالي</span><span class="a">${tot.toFixed(2)} ج</span></div>
      ${rem>0
        ? `<div class="od-rem"><span class="l">المتبقي</span><span class="a">${rem.toFixed(2)} ج</span></div>
           <div class="od-row"><span class="k">المدفوع</span><span class="v green">${paid.toFixed(2)} ج</span></div>`
        : `<div class="od-paid">✅ تم السداد بالكامل — ${tot.toFixed(2)} ج</div>`
      }
    </div>
  `;

  document.getElementById('od-foot').innerHTML = `
    <a href="invoice.html?id=${o.id}" target="_blank" class="btn btn-primary" style="font-size:12px"><i class="fas fa-print"></i> فتح الفاتورة</a>
    ${isPrepared
      ? `<button class="unprepare-btn" onclick="modalTogglePrepare('${o.id}',false)"><i class="fas fa-times-circle"></i> إلغاء التجهيز</button>`
      : `<button class="prepare-btn"  onclick="modalTogglePrepare('${o.id}',true)"><i class="fas fa-check-double"></i> تم التجهيز ✓</button>`
    }
    ${o.status !== 'تم التسليم'
      ? `<button onclick="markDelivered('${o.id}')" style="background:linear-gradient(135deg,#0f4c75,#1b6ca8);color:#fff;border:none;border-radius:8px;padding:7px 14px;font-family:Cairo,sans-serif;font-weight:900;font-size:11px;cursor:pointer;display:flex;align-items:center;gap:5px"><i class="fas fa-truck-fast"></i> تم التسليم</button>`
      : `<span style="font-size:11px;color:#22c55e;font-weight:900;padding:4px 10px;background:rgba(34,197,94,.1);border-radius:8px">✅ تم التسليم</span>`
    }
    ${rem>0
      ? `<button class="btn" style="background:var(--green);color:#fff;font-size:12px;padding:8px 12px;border-radius:var(--r);font-weight:900;border:none;cursor:pointer" onclick="showPayPanel('${o.id}',${rem},${tot})"><i class="fas fa-money-bill-wave"></i> تسجيل دفع</button>`
      : ''
    }
    ${o.phone?`<button class="small-btn" onclick="openByPhone('${encodeURIComponent(o.phone)}')"><i class="fas fa-user"></i> ملف العميل</button>`:''}
    <button class="small-btn" onclick="closeOrderModal()" style="margin-right:auto"><i class="fas fa-times"></i> إغلاق</button>
  `;
  /* payment panel (injected inline below footer) */
  let pp = document.getElementById('pay-panel-inline');
  if (pp) pp.remove();

  document.getElementById('od-overlay').classList.add('open');
}

window.closeOrderModal = function(e){
  if (e && e.target !== document.getElementById('od-overlay')) return;
  document.getElementById('od-overlay').classList.remove('open');
};

/* ══ PAY PANEL ══ */
window.showPayPanel = function(orderId, rem, tot){
  let pp = document.getElementById('pay-panel-inline');
  if (pp) { pp.remove(); return; }
  pp = document.createElement('div');
  pp.id = 'pay-panel-inline';
  pp.style.cssText = 'padding:12px 16px;background:rgba(34,197,94,.08);border-top:1px solid var(--green);display:flex;flex-direction:column;gap:8px';
  pp.innerHTML = `
    <div style="font-size:12px;font-weight:900;color:var(--green)">💰 تسجيل دفع — المتبقي: <span style="color:var(--gold)">${rem.toFixed(2)} ج</span></div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <input id="pay-amount-inp" type="number" step="0.01" min="0.01" max="${rem}" value="${rem.toFixed(2)}"
        style="flex:1;min-width:100px;padding:8px;border-radius:var(--r);border:1px solid var(--green);background:var(--bg2);color:var(--text);font-size:13px;font-weight:900;text-align:center">
      <button onclick="confirmPayment('${orderId}',${rem},${tot})" style="background:var(--green);color:#fff;border:none;border-radius:var(--r);padding:8px 14px;font-weight:900;font-size:12px;cursor:pointer;white-space:nowrap"><i class="fas fa-check"></i> تأكيد الدفع</button>
      <button onclick="document.getElementById('pay-panel-inline').remove()" style="background:var(--card);color:var(--text);border:1px solid var(--border);border-radius:var(--r);padding:8px 12px;font-weight:900;font-size:12px;cursor:pointer">إلغاء</button>
    </div>
    <div style="display:flex;gap:6px">
      <button onclick="document.getElementById('pay-amount-inp').value='${rem.toFixed(2)}'" style="font-size:10px;padding:4px 8px;border-radius:var(--r);border:1px solid var(--border);background:var(--card);color:var(--gold);cursor:pointer;font-weight:700">سداد كامل (${rem.toFixed(2)} ج)</button>
    </div>`;
  document.getElementById('od-foot').after(pp);
};

window.confirmPayment = async function(orderId, oldRem, tot){
  const inp = document.getElementById('pay-amount-inp');
  const amount = parseFloat(inp.value);
  if (!amount || amount <= 0) { toast('أدخل مبلغ صحيح','warn'); return; }
  if (amount > oldRem + 0.01) { toast('المبلغ أكبر من المتبقي','warn'); return; }
  const btn = inp.nextElementSibling;
  btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
  try {
    const newRem  = Math.max(0, parseFloat((oldRem - amount).toFixed(2)));
    const docRef  = db.collection('pos_invoices').doc(orderId);
    const docSnap = await docRef.get();
    const data    = docSnap.data() || {};
    const newPaid = parseFloat(((data.paidAmount||0) + amount).toFixed(2));
    await docRef.update({
      paidAmount: newPaid,
      remainingAmount: newRem,
      status: newRem > 0 ? 'جزئي' : 'مكتمل',
      ...(newRem === 0 ? { fullyPaidAt: firebase.firestore.FieldValue.serverTimestamp() } : {}),
    });
    const idx = allOrders.findIndex(o => o.id === orderId);
    if (idx >= 0) { allOrders[idx].paidAmount = newPaid; allOrders[idx].remainingAmount = newRem; }
    toast(newRem === 0 ? '✅ تم السداد بالكامل!' : `✅ تم تسجيل ${amount.toFixed(2)} ج`, 'ok');
    renderStats(); filterOrders();
    /* Refresh modal */
    const updated = allOrders[idx] || { ...data, id: orderId, paidAmount: newPaid, remainingAmount: newRem };
    openOrderModal(updated);
  } catch(e) { toast('خطأ: '+e.message,'err'); btn.disabled=false; btn.innerHTML='<i class="fas fa-check"></i> تأكيد الدفع'; }
};

window.modalTogglePrepare = async function(orderId, prepare){
  const btn = document.querySelector('#od-foot .prepare-btn, #od-foot .unprepare-btn');
  if (btn){ btn.disabled=true; btn.innerHTML='<i class="fas fa-spinner fa-spin"></i>'; }
  try{
    await db.collection('pos_invoices').doc(orderId).update({
      orderPrepared: prepare,
      orderPreparedAt: prepare ? firebase.firestore.FieldValue.serverTimestamp() : firebase.firestore.FieldValue.delete(),
      status: prepare ? 'جاهز للاستلام' : 'قيد التجهيز',
    });
    toast(prepare ? '✅ الطلب جاهز للاستلام!' : '↩️ تم إلغاء التجهيز', 'ok');
    const idx = allOrders.findIndex(o=>o.id===orderId);
    if (idx>=0){ allOrders[idx].orderPrepared=prepare; openOrderModal(allOrders[idx]); }
    renderStats(); filterOrders();
  } catch(e){ toast('خطأ: '+e.message,'err'); if(btn){btn.disabled=false;} }
};

/* ── Selection ── */
function toggleSelect(id, checked){
  checked ? selectedIds.add(id) : selectedIds.delete(id);
  document.getElementById(`oc-${id}`)?.classList.toggle('selected', checked);
  updateBulkBar();
}
function toggleGroup(chk){
  const ids = JSON.parse(chk.dataset.ids||'[]');
  ids.forEach(id=>{
    chk.checked ? selectedIds.add(id) : selectedIds.delete(id);
    document.getElementById(`oc-${id}`)?.classList.toggle('selected', chk.checked);
    const cb = document.getElementById(`oc-${id}`)?.querySelector('.order-chk');
    if(cb) cb.checked=chk.checked;
  });
  updateBulkBar();
}
function toggleSelectAll(checked){
  allOrders.forEach(o=>{
    checked ? selectedIds.add(o.id) : selectedIds.delete(o.id);
    document.getElementById(`oc-${o.id}`)?.classList.toggle('selected', checked);
    const cb=document.getElementById(`oc-${o.id}`)?.querySelector('.order-chk');
    if(cb) cb.checked=checked;
  });
  updateBulkBar();
}
function clearSelection(){
  selectedIds.clear();
  document.querySelectorAll('.order-chk').forEach(cb=>cb.checked=false);
  document.querySelectorAll('.ocard').forEach(c=>c.classList.remove('selected'));
  const sac=document.getElementById('select-all-chk'); if(sac) sac.checked=false;
  updateBulkBar();
}
function updateBulkBar(){
  document.getElementById('bulk-bar').classList.toggle('show', selectedIds.size>0);
  document.getElementById('bulk-count').textContent=`${selectedIds.size} محدد`;
}

/* ── Prepare/unprepare ── */
async function markPrepared(orderId){ await modalTogglePrepare(orderId, true); }
async function markUnprepared(orderId){ await modalTogglePrepare(orderId, false); }

async function bulkPrepare(){
  if (!selectedIds.size){ toast('لم تحدد أي طلبات','warn'); return; }
  const ids=[...selectedIds]; let done=0;
  for(const id of ids){
    try{
      await db.collection('pos_invoices').doc(id).update({orderPrepared:true,orderPreparedAt:firebase.firestore.FieldValue.serverTimestamp(),status:'جاهز للاستلام'});
      const idx=allOrders.findIndex(o=>o.id===id); if(idx>=0) allOrders[idx].orderPrepared=true; done++;
    }catch(e){}
  }
  toast(`✅ تم تجهيز ${done} طلب`,'ok'); clearSelection(); renderStats(); filterOrders();
}
async function bulkUnprepare(){
  if (!selectedIds.size){ toast('لم تحدد أي طلبات','warn'); return; }
  const ids=[...selectedIds]; let done=0;
  for(const id of ids){
    try{
      await db.collection('pos_invoices').doc(id).update({orderPrepared:false,status:'قيد التجهيز'});
      const idx=allOrders.findIndex(o=>o.id===id); if(idx>=0) allOrders[idx].orderPrepared=false; done++;
    }catch(e){}
  }
  toast(`↩️ تم إلغاء تجهيز ${done} طلب`,'ok'); clearSelection(); renderStats(); filterOrders();
}

/* ── Customer profile ── */
window.openByPhone = async (phone) => {
  const dec = decodeURIComponent(phone);
  try{
    const snap = await db.collection('pos_customers').where('phone','==',dec).limit(1).get();
    if (!snap.empty) location.href=`customer-profile.html?id=${snap.docs[0].id}`;
    else toast('لم يتم العثور على ملف العميل','warn');
  }catch(e){ toast('خطأ: '+e.message,'err'); }
};

/* ══ QR SCANNER ══ */
window.openScanner = function(){
  document.getElementById('scanner-overlay').classList.add('open');
  document.getElementById('scanner-result').innerHTML='<span style="color:var(--text3)">وجّه الكاميرا نحو الباركود...</span>';
  if (typeof Html5Qrcode==='undefined'){
    document.getElementById('scanner-result').innerHTML='<span style="color:var(--red)">مكتبة الماسح غير محملة</span>';
    return;
  }
  try{
    qrScanner = new Html5Qrcode('qr-reader');
    qrScanner.start(
      {facingMode:'environment'},
      {fps:10, qrbox:{width:230,height:230}},
      async (text) => {
        let id = text.trim();
        const m = text.match(/[?&]id=([^&\s]+)/);
        if (m) id = decodeURIComponent(m[1]);
        document.getElementById('scanner-result').innerHTML =
          `<span style="color:var(--green)">✅ تم المسح: <b>${id}</b></span>`;
        qrScanner.stop().catch(()=>{});
        /* Find order → open modal */
        const found = allOrders.find(o => o.invoiceNumber===id || o.id===id);
        if (found){
          closeScanner();
          setTimeout(() => {
            openOrderModal(found);
            window.open('invoice.html?id=' + found.id, '_blank');
          }, 200);
        } else {
          /* Fallback: search Firestore directly */
          document.getElementById('scanner-result').innerHTML +=
            `<br><span style="color:var(--text3)">🔍 جاري البحث في قاعدة البيانات...</span>`;
          try {
            let docData = null;
            /* Try by doc ID first */
            const byId = await db.collection('pos_invoices').doc(id).get();
            if (byId.exists) { docData = { id: byId.id, ...byId.data() }; }
            if (!docData) {
              /* Try by invoiceNumber */
              const byNum = await db.collection('pos_invoices').where('invoiceNumber','==',id).limit(1).get();
              if (!byNum.empty) docData = { id: byNum.docs[0].id, ...byNum.docs[0].data() };
            }
            if (docData) {
              closeScanner();
              setTimeout(() => {
                openOrderModal(docData);
                window.open('invoice.html?id=' + docData.id, '_blank');
              }, 200);
            } else {
              document.getElementById('scanner-result').innerHTML =
                `<span style="color:var(--orange)">⚠️ لم يُعثر على الطلب</span>
                 <br><a href="invoice.html?id=${encodeURIComponent(id)}" target="_blank" style="color:var(--gold);font-weight:700">فتح الفاتورة مباشرة ←</a>`;
            }
          } catch(fe) {
            document.getElementById('scanner-result').innerHTML =
              `<span style="color:var(--red)">❌ خطأ: ${fe.message}</span>`;
          }
        }
      },
      ()=>{}
    ).catch(e=>{
      document.getElementById('scanner-result').innerHTML=`<span style="color:var(--red)">❌ ${e}</span>`;
    });
  }catch(e){
    document.getElementById('scanner-result').innerHTML=`<span style="color:var(--red)">❌ ${e.message}</span>`;
  }
};

window.closeScanner = function(){
  document.getElementById('scanner-overlay').classList.remove('open');
  if(qrScanner){ qrScanner.stop().catch(()=>{}); qrScanner=null; document.getElementById('qr-reader').innerHTML=''; }
};

document.getElementById('scanner-overlay').addEventListener('click',e=>{
  if(e.target===document.getElementById('scanner-overlay')) closeScanner();
});

/* ══ USB BARCODE KEYBOARD HANDLER ══
   Captures fast typing (barcode scanner) + Enter and searches for the order */
let _bBuf = '', _bTimer = null;
document.addEventListener('keydown', e => {
  const tag = document.activeElement.tagName;
  /* If user is typing in a real input/textarea skip */
  if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
  /* Ignore modifier keys */
  if (e.key.length > 1 && e.key !== 'Enter') return;
  if (e.key === 'Enter') {
    const val = _bBuf.trim();
    _bBuf = ''; clearTimeout(_bTimer);
    if (val.length >= 3) searchAndOpenOrder(val);
    return;
  }
  _bBuf += e.key;
  clearTimeout(_bTimer);
  /* Reset buffer if no more keys within 300ms (end of scan) */
  _bTimer = setTimeout(() => { _bBuf = ''; }, 300);
});

/* Also handle the search input in header */
window.onSearchInput = function(v) {
  if (!v) return;
};
window.onSearchKeydown = async function(e) {
  if (e.key === 'Enter') {
    const val = e.target.value.trim();
    e.target.value = '';
    if (val) await searchAndOpenOrder(val);
  }
};

async function searchAndOpenOrder(rawVal) {
  /* Extract id from URL if QR contains full URL */
  let val = rawVal;
  const urlMatch = rawVal.match(/[?&]id=([^&\s]+)/);
  if (urlMatch) val = decodeURIComponent(urlMatch[1]);
  val = val.trim();
  /* Check in-memory list first */
  const found = allOrders.find(o => o.invoiceNumber === val || o.id === val);
  if (found) { openOrderModal(found); return; }
  /* Fallback: Firestore */
  toast('🔍 جاري البحث...', 'info');
  try {
    let docData = null;
    const byId = await db.collection('pos_invoices').doc(val).get().catch(()=>null);
    if (byId && byId.exists) docData = { id: byId.id, ...byId.data() };
    if (!docData) {
      const byNum = await db.collection('pos_invoices').where('invoiceNumber','==',val).limit(1).get();
      if (!byNum.empty) docData = { id: byNum.docs[0].id, ...byNum.docs[0].data() };
    }
    if (docData) { openOrderModal(docData); }
    else { toast('⚠️ لم يُعثر على طلب بهذا الكود', 'warn'); }
  } catch(e) { toast('❌ خطأ: ' + e.message, 'err'); }
}

window.markDelivered = async function(orderId){
  if (!confirm('تأكيد: هل تم تسليم الطلب للعميل؟')) return;
  try {
    await db.collection('pos_invoices').doc(orderId).update({
      status: 'تم التسليم',
      orderDelivered: true,
      deliveredAt: firebase.firestore.FieldValue.serverTimestamp(),
    });
    toast('✅ تم تسجيل التسليم بنجاح!', 'ok');
    const idx = allOrders.findIndex(o => o.id === orderId);
    if (idx >= 0) {
      allOrders[idx].status = 'تم التسليم';
      allOrders[idx].orderDelivered = true;
      openOrderModal(allOrders[idx]);
    }
    renderStats(); filterOrders();
  } catch(e) { toast('خطأ: ' + e.message, 'err'); }
};
