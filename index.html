<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZAHRAA STUDIO - المتجر المتكامل</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet" />
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <style>
    body { font-family: 'Cairo', sans-serif; background-color: #0a0a0a; color: #fff; scroll-behavior: smooth; }
    .gold-text { color: #d4af37; }
    .gold-bg { background-color: #d4af37; }
    .gradient-text { background: linear-gradient(to right, #d4af37, #f9e29c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .product-card { background: #151515; border-radius: 20px; overflow: hidden; border: 1px solid #222; transition: all 0.3s; }
    .product-card:hover { transform: translateY(-5px); border-color: #d4af37; }
    .modal { backdrop-filter: blur(15px); background: rgba(0,0,0,0.85); z-index: 100; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .cart-badge { position: absolute; top: -5px; right: -5px; background: #d4af37; color: black; font-size: 10px; font-bold; width: 18px; height: 18px; border-radius: 50%; display: flex; items-center; justify-center; }
  </style>
</head>
<body>
  <!-- Navigation -->
  <nav class="fixed w-full z-50 bg-black/70 backdrop-blur-md border-b border-zinc-900">
    <div class="container mx-auto px-4 py-4 flex justify-between items-center">
      <h1 class="text-xl font-bold gradient-text">ZAHRAA STUDIO</h1>
      <div class="flex items-center gap-4">
        <div class="relative cursor-pointer" onclick="toggleCart()">
          <svg class="w-6 h-6 text-zinc-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
          <span id="cart-count" class="cart-badge">0</span>
        </div>
        <a href="admin.html" class="text-xs text-zinc-600 hover:text-zinc-400">إدارة</a>
      </div>
    </div>
  </nav>

  <!-- Hero & Search -->
  <section class="pt-32 pb-12 px-4 text-center">
    <h1 class="text-4xl font-bold mb-6">اكتشف <span class="gold-text">عالم الزهراء</span></h1>
    <div class="max-w-xl mx-auto relative mb-8">
      <input type="text" id="search-input" oninput="handleSearch()" placeholder="ابحث عن منتج..." class="w-full p-4 bg-zinc-900 border border-zinc-800 rounded-2xl focus:border-gold-text outline-none text-right">
    </div>
    <div id="categories-list" class="flex gap-3 overflow-x-auto no-scrollbar justify-center pb-4">
      <button onclick="filterCategory('all')" class="category-btn px-6 py-2 rounded-full border border-zinc-800 bg-zinc-900 text-sm whitespace-nowrap active-cat">الكل</button>
      <!-- Categories will be injected here -->
    </div>
  </section>

  <!-- Products -->
  <section class="container mx-auto px-4 pb-24">
    <div id="products-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-8">
      <!-- Products injected here -->
    </div>
  </section>

  <!-- Product Details Modal -->
  <div id="product-modal" class="modal fixed inset-0 hidden flex items-center justify-center p-4 overflow-y-auto">
    <div class="bg-zinc-900 w-full max-w-2xl rounded-3xl overflow-hidden relative">
      <button onclick="closeModal()" class="absolute top-4 right-4 z-50 bg-black/50 text-white w-8 h-8 rounded-full">✕</button>
      <div id="modal-content" class="p-6">
        <!-- Details injected here -->
      </div>
    </div>
  </div>

  <!-- Cart Sidebar -->
  <div id="cart-sidebar" class="fixed inset-y-0 left-0 w-full md:w-96 bg-zinc-950 z-[110] border-r border-zinc-800 transform -translate-x-full transition-transform duration-300 flex flex-col">
    <div class="p-6 border-b border-zinc-900 flex justify-between items-center">
      <h2 class="text-xl font-bold">سلة المشتريات</h2>
      <button onclick="toggleCart()" class="text-zinc-500">إغلاق</button>
    </div>
    <div id="cart-items" class="flex-1 overflow-y-auto p-6 space-y-4"></div>
    <div class="p-6 border-t border-zinc-900 space-y-4">
      <div class="flex justify-between font-bold text-lg"><span>الإجمالي:</span><span id="cart-total">0 جنيه</span></div>
      <button onclick="openCheckout()" class="w-full gold-bg text-black py-4 rounded-xl font-bold">إتمام الطلب أونلاين</button>
    </div>
  </div>

  <!-- Checkout Modal -->
  <div id="checkout-modal" class="modal fixed inset-0 hidden flex items-center justify-center p-4">
    <div class="bg-zinc-900 w-full max-w-md rounded-3xl p-8 space-y-4">
      <h2 class="text-2xl font-bold mb-4">بيانات الطلب</h2>
      <input type="text" id="cust-name" placeholder="الاسم بالكامل" class="w-full p-3 bg-black border border-zinc-800 rounded-xl">
      <input type="tel" id="cust-phone" placeholder="رقم الهاتف" class="w-full p-3 bg-black border border-zinc-800 rounded-xl">
      <textarea id="cust-address" placeholder="العنوان بالتفصيل" class="w-full p-3 bg-black border border-zinc-800 rounded-xl"></textarea>
      
      <div class="border-2 border-dashed border-zinc-800 p-4 rounded-xl text-center">
        <p class="text-xs text-zinc-500 mb-2">ارفع صورك الخاصة (اختياري)</p>
        <input type="file" id="cust-files" multiple accept="image/*" class="hidden">
        <button onclick="document.getElementById('cust-files').click()" class="text-sm gold-text underline">اختر الصور</button>
        <div id="cust-files-status" class="text-[10px] mt-2 text-zinc-600"></div>
      </div>

      <button id="submit-order-btn" onclick="submitOrder()" class="w-full gold-bg text-black py-4 rounded-xl font-bold">تأكيد الطلب</button>
      <button onclick="closeCheckout()" class="w-full text-zinc-500 text-sm">إلغاء</button>
    </div>
  </div>

  <script>
    const firebaseConfig = { apiKey: "AIzaSyCG6Yc0iH-rt-PaiRqL_V9Re1z49ZF3OMM", authDomain: "zahraa-store-f4c90.firebaseapp.com", projectId: "zahraa-store-f4c90" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const CLOUDINARY_URL = "https://api.cloudinary.com/v1_1/dxlxwe55b/image/upload";
    const CLOUDINARY_UPLOAD_PRESET = "zahraa_upload";

    let allProducts = [], cart = [], selectedCategory = 'all', searchTerm = '';

    async function init() {
      const snap = await db.collection("products").orderBy("updatedAt", "desc").get().catch(() => db.collection("products").get());
      allProducts = [];
      const cats = new Set();
      snap.forEach(doc => {
        const p = { id: doc.id, ...doc.data() };
        allProducts.push(p);
        if(p.category) cats.add(p.category);
      });
      
      const catList = document.getElementById('categories-list');
      cats.forEach(c => {
        catList.innerHTML += `<button onclick="filterCategory('${c}')" class="category-btn px-6 py-2 rounded-full border border-zinc-800 bg-zinc-900 text-sm whitespace-nowrap">${c}</button>`;
      });
      renderProducts();
    }

    function renderProducts() {
      const grid = document.getElementById('products-grid');
      grid.innerHTML = '';
      const filtered = allProducts.filter(p => {
        const matchCat = selectedCategory === 'all' || p.category === selectedCategory;
        const matchSearch = p.name.toLowerCase().includes(searchTerm.toLowerCase());
        return matchCat && matchSearch;
      });

      filtered.forEach(p => {
        grid.innerHTML += `
          <div class="product-card group">
            <div onclick="openModal('${p.id}')" class="h-48 md:h-64 overflow-hidden cursor-pointer">
              <img src="${p.images?.[0] || ''}" class="w-full h-full object-cover transition-transform group-hover:scale-110">
            </div>
            <div class="p-4">
              <h3 class="font-bold text-sm md:text-base mb-1 truncate">${p.name}</h3>
              <p class="gold-text font-bold mb-3 text-sm">${p.price} جنيه</p>
              <div class="grid grid-cols-2 gap-2">
                <button onclick="addToCart('${p.id}')" class="bg-zinc-800 text-white text-[10px] py-2 rounded-lg font-bold">السلة</button>
                <a href="https://wa.me/201204194540?text=${encodeURIComponent('أريد طلب: '+p.name)}" target="_blank" class="gold-bg text-black text-[10px] py-2 rounded-lg font-bold text-center">واتساب</a>
              </div>
            </div>
          </div>
        `;
      });
    }

    function filterCategory(cat) {
      selectedCategory = cat;
      document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('gold-border', 'gold-text'));
      event.target.classList.add('gold-border', 'gold-text');
      renderProducts();
    }

    function handleSearch() { searchTerm = document.getElementById('search-input').value; renderProducts(); }

    function addToCart(id) {
      const p = allProducts.find(x => x.id === id);
      const item = cart.find(x => x.id === id);
      if(item) item.qty++;
      else cart.push({ ...p, qty: 1 });
      updateCartUI();
    }

    function updateCartUI() {
      document.getElementById('cart-count').innerText = cart.reduce((a, b) => a + b.qty, 0);
      const list = document.getElementById('cart-items');
      list.innerHTML = '';
      let total = 0;
      cart.forEach((item, i) => {
        total += item.price * item.qty;
        list.innerHTML += `
          <div class="flex items-center gap-4 bg-zinc-900 p-3 rounded-xl">
            <img src="${item.images?.[0]}" class="w-12 h-12 object-cover rounded-lg">
            <div class="flex-1">
              <h4 class="text-sm font-bold">${item.name}</h4>
              <p class="text-xs gold-text">${item.price} ج × ${item.qty}</p>
            </div>
            <button onclick="removeFromCart(${i})" class="text-red-500 text-xs">حذف</button>
          </div>
        `;
      });
      document.getElementById('cart-total').innerText = total + ' جنيه';
    }

    function removeFromCart(i) { cart.splice(i, 1); updateCartUI(); }
    function toggleCart() { document.getElementById('cart-sidebar').classList.toggle('-translate-x-full'); }

    function openModal(id) {
      const p = allProducts.find(x => x.id === id);
      const content = document.getElementById('modal-content');
      content.innerHTML = `
        <img src="${p.images?.[0]}" class="w-full h-64 object-cover rounded-2xl mb-6">
        <h2 class="text-2xl font-bold mb-2">${p.name}</h2>
        <p class="gold-text text-xl font-bold mb-4">${p.price} جنيه</p>
        <p class="text-zinc-400 text-sm mb-6">${p.description || ''}</p>
        <button onclick="addToCart('${p.id}'); closeModal(); toggleCart();" class="w-full gold-bg text-black py-4 rounded-xl font-bold mb-3">إضافة للسلة</button>
      `;
      document.getElementById('product-modal').classList.remove('hidden');
    }

    function closeModal() { document.getElementById('product-modal').classList.add('hidden'); }
    function openCheckout() { if(cart.length===0) return alert('السلة فارغة'); document.getElementById('checkout-modal').classList.remove('hidden'); }
    function closeCheckout() { document.getElementById('checkout-modal').classList.add('hidden'); }

    async function submitOrder() {
      const btn = document.getElementById('submit-order-btn');
      const name = document.getElementById('cust-name').value;
      const phone = document.getElementById('cust-phone').value;
      const address = document.getElementById('cust-address').value;
      const files = document.getElementById('cust-files').files;

      if(!name || !phone || !address) return alert('يرجى ملء البيانات');
      btn.disabled = true; btn.innerText = 'جاري إرسال الطلب...';

      let customerImages = [];
      if(files.length > 0) {
        for(let f of files) {
          const fd = new FormData(); fd.append('file', f); fd.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);
          const res = await fetch(CLOUDINARY_URL, { method: 'POST', body: fd });
          const data = await res.json();
          if(data.secure_url) customerImages.push(data.secure_url);
        }
      }

      const order = {
        customerName: name,
        customerPhone: phone,
        customerAddress: address,
        customerImages: customerImages,
        items: cart,
        totalPrice: cart.reduce((a, b) => a + (b.price * b.qty), 0),
        status: 'قيد المراجعة',
        createdAt: Date.now()
      };

      await db.collection("orders").add(order);
      alert('تم استلام طلبك بنجاح! رقم الطلب سيصلك قريباً.');
      cart = []; updateCartUI(); closeCheckout(); toggleCart();
      btn.disabled = false; btn.innerText = 'تأكيد الطلب';
    }

    window.onload = init;
  </script>
</body>
</html>
