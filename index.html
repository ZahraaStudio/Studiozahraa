    @keyframes gradientBG {

      50% {background-position: 100% 50%;}

    .logo img {

    h1 {

    .button {

      border: 1px solid #d4af37;

    .sidebar-toggle {

      top: 20px;
      right: 20px;
      font-size: 30px;
      z-index: 1002;
      cursor: pointer;
    }

    #sidebar {
      position: fixed;
      right: 0;
      top: 0;
      height: 100%;
      width: 0;
      overflow: hidden;
      background: #111;
      transition: 0.3s;
      z-index: 1001;
      padding: 0;
    }

    #sidebar.open {
      width: 250px;
      padding: 20px;
    }

    #sidebar a {
      display: block;
      color: #fff;
      margin: 10px 0;
      text-decoration: none;
    }

    #sidebar h3 {
      color: #d4af37;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: none;
      z-index: 1000;
    }

    .floating-buttons {
      position: fixed;
      bottom: 20px;

    .floating-btn {
      width: 55px;

      display: flex;
      align-items: center;
      justify-content: center;
      background: #25D366;

  <script>
    const sidebar = document.getElementById('sidebar');
    const overlay = document.querySelector('.overlay');

    function toggleSidebar(){
      sidebar.classList.toggle('open');
      overlay.style.display = sidebar.classList.contains('open') ? 'block' : 'none';
    }

    function closeSidebar(){
      sidebar.classList.remove('open');
      overlay.style.display = 'none';
    }
  </script>

  <!-- Firebase Admin Button -->
  <script type="module">

    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCG6Yc0iH-rt-PaiRqL_V9Re1z49ZF3OMM",
      authDomain: "zahraa-store-f4c90.firebaseapp.com",
      projectId: "zahraa-store-f4c90"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (user)=>{
      document.getElementById("adminLink").style.display = user ? "block" : "none";
    });
  </script>

  <!-- 🔥 SERVICE WORKER REGISTRATION -->
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("service-worker.js", { scope: "./" })
        .then(reg => {
          console.log("✅ Service Worker Registered Successfully");

          reg.update();

          reg.addEventListener("updatefound", () => {
            const newWorker = reg.installing;
            if (!newWorker) return;

            newWorker.addEventListener("statechange", () => {
              if (
                newWorker.state === "installed" &&
                navigator.serviceWorker.controller
              ) {
                console.log("✅ New Service Worker Available");
                // إخطار المستخدم بتحديث جديد
                if (confirm("هناك نسخة جديدة متاحة. هل تريد تحديث الصفحة؟")) {
                  window.location.reload();
                }
              }
            });
          });
        })
        .catch(err => console.error("❌ Service Worker Error:", err));
      });
    } else {
      console.warn("⚠️ Service Workers not supported in this browser");
    }
  </script>
