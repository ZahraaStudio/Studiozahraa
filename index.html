<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZAHRAA STUDIO - متجر فاخر</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet" />

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <style>
    body { font-family: 'Cairo', sans-serif; background-color: #0a0a0a; color: #fff; }
    .gold-text { color: #d4af37; }
    .gold-bg { background-color: #d4af37; }
    .gold-border { border: 1px solid #d4af37; }
    .product-card { background: #1a1a1a; border-radius: 15px; overflow: hidden; transition: transform 0.3s; }
    .product-card:hover { transform: translateY(-5px); }
    .loader { border: 4px solid #1a1a1a; border-top: 4px solid #d4af37; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="root">
    <!-- Header -->
    <header class="p-6 flex justify-between items-center border-b border-zinc-800">
      <h1 class="text-2xl font-bold gold-text">ZAHRAA STUDIO</h1>
      <a href="admin.html" class="text-sm text-zinc-500 hover:text-white">لوحة التحكم</a>
    </header>

    <!-- Main Content -->
    <main class="container mx-auto p-6">
      <div id="loading-spinner" class="flex flex-col items-center justify-center py-20">
        <div class="loader mb-4"></div>
        <p class="text-zinc-500">جاري تحميل المنتجات الفاخرة...</p>
      </div>

      <div id="products-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 hidden">
        <!-- Products will be injected here -->
      </div>

      <div id="error-message" class="text-center py-20 hidden">
        <p class="text-red-500 text-xl">عذراً، لم نتمكن من تحميل المنتجات.</p>
        <p class="text-zinc-500 mt-2">تأكد من إضافة منتجات من لوحة التحكم.</p>
      </div>
    </main>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCG6Yc0iH-rt-PaiRqL_V9Re1z49ZF3OMM",
      authDomain: "zahraa-store-f4c90.firebaseapp.com",
      projectId: "zahraa-store-f4c90"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function loadProducts() {
      const grid = document.getElementById('products-grid');
      const loader = document.getElementById('loading-spinner');
      const errorMsg = document.getElementById('error-message');

      try {
        const snapshot = await db.collection("products").get();
        loader.classList.add('hidden');

        if (snapshot.empty) {
          errorMsg.classList.remove('hidden');
          return;
        }

        grid.classList.remove('hidden');
        grid.innerHTML = '';

        snapshot.forEach(doc => {
          const p = doc.data();
          const img = (p.images && p.images.length > 0) ? p.images[0] : 'https://via.placeholder.com/300?text=No+Image';
          
          grid.innerHTML += `
            <div class="product-card gold-border">
              <img src="${img}" class="w-full h-64 object-cover" alt="${p.name}">
              <div class="p-4">
                <h3 class="text-xl font-bold mb-2">${p.name}</h3>
                <p class="text-zinc-400 text-sm mb-4 line-clamp-2">${p.description || ''}</p>
                <div class="flex justify-between items-center">
                  <span class="gold-text font-bold text-lg">${p.price} جنيه</span>
                  <button class="gold-bg text-black px-4 py-2 rounded font-bold text-sm">أضف للسلة</button>
                </div>
              </div>
            </div>
          `;
        });
      } catch (err) {
        console.error(err);
        loader.classList.add('hidden');
        errorMsg.classList.remove('hidden');
        errorMsg.querySelector('p').innerText = "خطأ في الاتصال بقاعدة البيانات.";
      }
    }

    window.onload = loadProducts;
  </script>
</body>
</html>
