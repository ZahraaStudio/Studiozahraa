<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZAHRAA STUDIO - المتجر الرسمي</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet" />
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <style>
    body { font-family: 'Cairo', sans-serif; background-color: #0a0a0a; color: #fff; scroll-behavior: smooth; }
    .gold-text { color: #d4af37; }
    .gold-bg { background-color: #d4af37; }
    .gradient-text { background: linear-gradient(to right, #d4af37, #f9e29c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .hero-bg { background: linear-gradient(to bottom, rgba(10,10,10,0.9), rgba(10,10,10,1)), url('https://i.ibb.co/gFbYCVhy/file-000000003d48620a9a545c81b8bf35e5.png'); background-size: cover; background-position: center; }
    .product-card { background: #151515; border-radius: 20px; overflow: hidden; transition: all 0.3s ease; border: 1px solid #222; }
    .product-card:hover { transform: translateY(-10px); border-color: #d4af37; }
    .modal { backdrop-filter: blur(10px); background: rgba(0,0,0,0.8); }
    .no-scrollbar::-webkit-scrollbar { display: none; }
  </style>
</head>
<body>
  <nav class="fixed w-full z-50 bg-black/50 backdrop-blur-md border-b border-zinc-900">
    <div class="container mx-auto px-6 py-4 flex justify-between items-center">
      <h1 class="text-xl font-bold gradient-text">ZAHRAA STUDIO</h1>
      <div class="flex items-center gap-6">
        <a href="https://www.facebook.com/share/1DuEaxYhW3/" target="_blank" class="text-blue-500 font-bold hover:underline">فيسبوك</a>
        <a href="#products" class="gold-text font-bold">المتجر</a>
      </div>
    </div>
  </nav>

  <section class="relative min-h-screen flex items-center justify-center hero-bg">
    <div class="container mx-auto px-6 text-center pt-20">
      <img src="https://i.ibb.co/gFbYCVhy/file-000000003d48620a9a545c81b8bf35e5.png" class="w-40 mx-auto mb-8 drop-shadow-[0_0_20px_rgba(212,175,55,0.3)]">
      <h1 class="text-5xl md:text-7xl font-bold mb-4"><span class="gradient-text">ZAHRAA</span> STUDIO</h1>
      <p class="text-zinc-400 text-lg max-w-2xl mx-auto mb-10">أرقى المنتجات والخدمات المختارة بعناية لتلبية أذواقك الراقية.</p>
      <div class="flex flex-wrap justify-center gap-4">
        <a href="https://wa.me/201204194540" target="_blank" class="bg-green-600 text-white px-8 py-4 rounded-full font-bold hover:bg-green-700 transition-all">واتساب 1</a>
        <a href="https://wa.me/201286815625" target="_blank" class="bg-green-600 text-white px-8 py-4 rounded-full font-bold hover:bg-green-700 transition-all">واتساب 2</a>
        <a href="https://www.facebook.com/share/1DuEaxYhW3/" target="_blank" class="bg-blue-600 text-white px-8 py-4 rounded-full font-bold hover:bg-blue-700 transition-all">فيسبوك</a>
      </div>
    </div>
  </section>

  <section id="products" class="py-24 bg-[#0a0a0a]">
    <div class="container mx-auto px-6">
      <h2 class="text-4xl font-bold mb-16 text-center">منتجاتنا <span class="gold-text">المميزة</span></h2>
      <div id="loading-spinner" class="text-center py-20"><p class="text-zinc-500">جاري التحميل...</p></div>
      <div id="products-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10 hidden"></div>
    </div>
  </section>

  <div id="product-modal" class="modal fixed inset-0 z-[100] flex items-center justify-center p-4 hidden">
    <div class="bg-zinc-900 w-full max-w-4xl max-h-[90vh] rounded-3xl overflow-hidden relative flex flex-col md:flex-row">
      <button onclick="closeModal()" class="absolute top-4 right-4 z-50 bg-black/50 text-white w-10 h-10 rounded-full flex items-center justify-center hover:bg-red-600">✕</button>
      <div class="w-full md:w-1/2 bg-black h-80 md:h-auto relative">
        <div id="modal-images" class="flex h-full overflow-x-auto snap-x snap-mandatory no-scrollbar"></div>
      </div>
      <div class="w-full md:w-1/2 p-8 overflow-y-auto">
        <h2 id="modal-title" class="text-3xl font-bold mb-4 gold-text"></h2>
        <div class="flex items-center gap-4 mb-6">
          <span id="modal-price" class="text-2xl font-bold"></span>
          <span id="modal-stock" class="text-zinc-500 text-sm"></span>
        </div>
        <p id="modal-desc" class="text-zinc-400 mb-8 whitespace-pre-line"></p>
        <div class="grid grid-cols-1 gap-3">
          <a id="order-wa-1" target="_blank" class="bg-green-600 text-white py-4 rounded-xl font-bold text-center">اطلب عبر واتساب 1</a>
          <a id="order-wa-2" target="_blank" class="bg-green-600/80 text-white py-4 rounded-xl font-bold text-center">اطلب عبر واتساب 2</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    const firebaseConfig = { apiKey: "AIzaSyCG6Yc0iH-rt-PaiRqL_V9Re1z49ZF3OMM", authDomain: "zahraa-store-f4c90.firebaseapp.com", projectId: "zahraa-store-f4c90" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    let allProducts = [];

    async function loadProducts() {
      try {
        const snapshot = await db.collection("products").orderBy("updatedAt", "desc").get().catch(() => db.collection("products").get());
        document.getElementById('loading-spinner').classList.add('hidden');
        const grid = document.getElementById('products-grid');
        grid.classList.remove('hidden');
        grid.innerHTML = '';
        snapshot.forEach(doc => {
          const p = { id: doc.id, ...doc.data() };
          allProducts.push(p);
          const img = p.images?.[0] || 'https://via.placeholder.com/400';
          const msg = encodeURIComponent(`مرحباً، أود طلب: ${p.name}\nالسعر: ${p.price} جنيه`);
          grid.innerHTML += `
            <div class="product-card group">
              <div onclick="openModal('${p.id}')" class="relative h-72 cursor-pointer overflow-hidden">
                <img src="${img}" class="w-full h-full object-cover transition-transform group-hover:scale-110">
                <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 flex items-center justify-center transition-opacity"><span class="bg-white text-black px-4 py-2 rounded-full text-sm font-bold">عرض التفاصيل</span></div>
              </div>
              <div class="p-6">
                <h3 class="text-xl font-bold mb-2">${p.name}</h3>
                <div class="flex justify-between items-center mb-4">
                  <span class="gold-text font-bold text-xl">${p.price} جنيه</span>
                  <span class="text-xs ${p.status==='available'?'text-green-500':'text-red-500'} font-bold">${p.status==='available'?'متوفر':'نفذت'}</span>
                </div>
                <a href="https://wa.me/201204194540?text=${msg}" target="_blank" class="block w-full gold-bg text-black text-center py-3 rounded-xl font-bold hover:opacity-90 transition-all">اطلب عبر واتساب</a>
              </div>
            </div>
          `;
        });
      } catch (err) { console.error(err); }
    }

    function openModal(id) {
      const p = allProducts.find(x => x.id === id);
      if(!p) return;
      document.getElementById('modal-title').innerText = p.name;
      document.getElementById('modal-price').innerText = p.price + ' جنيه';
      document.getElementById('modal-desc').innerText = p.description || '';
      document.getElementById('modal-stock').innerText = p.stock ? `الكمية المتاحة: ${p.stock} قطعة` : '';
      const imgContainer = document.getElementById('modal-images');
      imgContainer.innerHTML = '';
      (p.images || ['https://via.placeholder.com/800']).forEach(url => {
        imgContainer.innerHTML += `<img src="${url}" class="w-full h-full object-contain flex-shrink-0 snap-center">`;
      });
      const msg = encodeURIComponent(`مرحباً، أود طلب: ${p.name}\nالسعر: ${p.price} جنيه`);
      document.getElementById('order-wa-1').href = `https://wa.me/201204194540?text=${msg}`;
      document.getElementById('order-wa-2').href = `https://wa.me/201286815625?text=${msg}`;
      document.getElementById('product-modal').classList.remove('hidden');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() { document.getElementById('product-modal').classList.add('hidden'); document.body.style.overflow = 'auto'; }
    window.onload = loadProducts;
  </script>
</body>
</html>
